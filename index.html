/L, free T4 42 pmol/L [9-19]. What is the most appropriate antithyroid drug in the first trimester?", "options": {"A": "Carbimazole 20 mg daily", "B": "Propylthiouracil 100 mg TDS", "C": "Radioiodine ablation therapy", "D": "Lugol iodine solution", "E": "Propranolol alone until second trimester"}, "answer": "B", "explanation": "Propylthiouracil is preferred in the first trimester due to carbimazole/methimazole association with aplasia cutis and choanal atresia. Switch to carbimazole can be considered after the first trimester.", "diagram": null}, {"id": 241, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_pituitary", "question": "A 45-year-old man presents with coarsened facial features, enlarged hands and feet, and excessive sweating over 5 years. IGF-1 is elevated. Oral glucose tolerance test shows GH nadir of 3.2 µg/L. MRI reveals a 22 mm pituitary macroadenoma. What is the first-line treatment?", "options": {"A": "Cabergoline 0.5 mg twice weekly", "B": "Octreotide LAR 20 mg monthly", "C": "Transsphenoidal pituitary surgery", "D": "Pegvisomant subcutaneous injection daily", "E": "External beam radiotherapy"}, "answer": "C", "explanation": "Transsphenoidal surgery is first-line for acromegaly with a defined pituitary adenoma. Medical therapy (somatostatin analogues, dopamine agonists, or GH receptor antagonists) is reserved for post-surgical residual disease or inoperable tumours.", "diagram": null}, {"id": 242, "specialty": "endocrinology", "tag": "medical_science_endocrinology_metabolic", "question": "Which metabolic derangement is the most dangerous acute complication of refeeding syndrome in a chronically malnourished patient?", "options": {"A": "Hyperkalaemia", "B": "Hypernatraemia", "C": "Hypophosphataemia", "D": "Hypercalcaemia", "E": "Hypomagnesaemia"}, "answer": "C", "explanation": "Refeeding syndrome causes severe hypophosphataemia as insulin-driven cellular uptake of phosphate depletes extracellular stores. This can cause cardiac arrhythmias, respiratory failure, and death.", "diagram": null}, {"id": 243, "specialty": "nephrology", "tag": "clinical_science_nephrology_acute_kidney_injury", "question": "A 72-year-old man with hypertension and type 2 diabetes is admitted with acute chest pain. Troponin I 0.8 μg/L, ECG shows ST elevation in inferior leads. During coronary angiography with contrast administration, his serum creatinine rises from 1.2 mg/dL (baseline eGFR 58 mL/min/1.73m²) to 1.8 mg/dL within 48 hours. Urine sodium 45 mmol/L, FENa 0.4%, urine microscopy normal.\n\nWhat is the most likely diagnosis?", "options": {"A": "Contrast-associated acute kidney injury (hypervolemic state)", "B": "Pre-renal azotemia from hypotension", "C": "Atheroembolic disease", "D": "Acute tubular necrosis from sepsis", "E": "Plasma exchange with albumin replacement"}, "answer": "A", "explanation": "Contrast-induced AKI (CIAKI) typically occurs 24-72 hours post-angiography with gradual rise in creatinine. Risk factors include pre-existing CKD, diabetes, old age. FENa <1% and urine Na <20 suggest pre-renal etiology but CIAKI can occur despite adequate hydration. Mechanism involves contrast-induced direct tubular toxicity and oxidative injury. Prevention via IV hydration pre/post-contrast and using low-osmolality agents. Most CIAKI resolves within 1 week. Atheroemboli present acutely with systemic findings.", "diagram": null}, {"id": 244, "specialty": "nephrology", "tag": "medical_science_nephrology_acid_base", "question": "A 58-year-old woman with type 2 diabetes on metformin (GFR 32 mL/min/1.73m²) presents with nausea, malaise, and dyspnea. pH 7.22, HCO3- 11 mmol/L, pCO2 28 mmHg, lactate 7.2 mmol/L (normal <2), glucose 6.8 mmol/L, ketones negative. She denies medication non-adherence.\n\nWhat is the most likely diagnosis?", "options": {"A": "Metformin-associated lactic acidosis (MALA)", "B": "Alcoholic ketoacidosis", "C": "Uremic acidosis from CKD progression", "D": "Salicylate toxicity", "E": "Peritoneal dialysis catheter insertion"}, "answer": "A", "explanation": "Metformin-associated lactic acidosis (MALA) occurs with eGFR <30 mL/min/1.73m² (metformin contraindicated) due to impaired renal clearance of metformin and lactate. Presents with severe metabolic acidosis with elevated lactate, low glucose (unlike DKA), and high mortality (~50%). No ketosis differentiates from DKA. Treatment is immediate hemodialysis (removes both lactate and metformin), IV sodium bicarbonate, and supportive care. Metformin should not be used in CKD stage 4-5.", "diagram": null}, {"id": 245, "specialty": "nephrology", "tag": "clinical_science_nephrology_glomerulonephritis", "question": "A 28-year-old previously well man presents with malaise, dark-coloured urine, and mild ankle oedema. He had a skin infection treated with oral antibiotics 4 weeks ago. BP 158/98 mmHg. Urinalysis: blood 3+, protein 2+. Urine microscopy: dysmorphic RBCs with occasional red cell casts. Creatinine 140 µmol/L (baseline 85). ASO titre mildly elevated, anti-DNase B elevated. C3 0.4 g/L (↓), C4 0.22 g/L (normal), ANA negative, ANCA negative. Kidney ultrasound unremarkable. What is the most likely diagnosis?", "options": {"A": "IgA nephropathy", "B": "Post-infectious glomerulonephritis", "C": "Membranoproliferative glomerulonephritis (MPGN)", "D": "Lupus nephritis", "E": "Anti-GBM disease (Goodpasture syndrome)"}, "answer": "B", "explanation": "Post-infectious (including post-streptococcal) glomerulonephritis classically presents 1-4 weeks after skin or pharyngeal infection. Key features: nephritic syndrome, low C3 with normal C4, elevated anti-DNase B (better marker than ASO for skin-sourced infection), and negative ANA/ANCA. IgA nephropathy usually occurs synpharyngitically (within 48h) and has normal complement. MPGN causes persistently low C3 AND C4. Negative ANA excludes lupus nephritis.", "diagram": null}, {"id": 246, "specialty": "nephrology", "tag": "medical_science_nephrology_proteinuria", "question": "A 64-year-old man with type 2 diabetes and hypertension on amlodipine is found to have urinary albumin-to-creatinine ratio (ACR) 48 mg/mmol (microalbuminuria range 30-300) and eGFR 76 mL/min/1.73m². He declines ACE inhibitor due to prior cough.\n\nWhat is the most appropriate next step?", "options": {"A": "Initiate angiotensin receptor blocker (ARB) monotherapy (losartan 50 mg daily)", "B": "Continue amlodipine and reassess in 6 months", "C": "Add spironolactone 25 mg for proteinuria reduction", "D": "Refer for kidney biopsy given proteinuria", "E": "Mycophenolate mofetil 1 g BD"}, "answer": "A", "explanation": "Diabetic kidney disease with microalbuminuria requires renin-angiotensin system (RAS) blockade with either ACE inhibitor or ARB. ARB is appropriate choice if ACE inhibitor contraindicated (cough). ARB reduces proteinuria and slows CKD progression independent of BP effects. Amlodipine alone (calcium channel blocker) does not provide renal protection in diabetes. Spironolactone can be adjunctive but not monotherapy. Kidney biopsy is not indicated with classic diabetic presentation.", "diagram": null}, {"id": 247, "specialty": "nephrology", "tag": "clinical_science_nephrology_anca_vasculitis", "question": "A 54-year-old man with 2-week history of dyspnea, hemoptysis, and palpable purpura on legs presents with hematuria and rising creatinine (1.2→2.1 mg/dL). Chest X-ray shows diffuse alveolar infiltrates. ANCA panel: MPO-ANCA positive, anti-PR3 negative. Urine shows dysmorphic RBC, RBC casts. CXR pattern consistent with pulmonary hemorrhage.\n\nWhat is the diagnosis and most appropriate initial therapy?", "options": {"A": "ANCA-associated vasculitis (AAV), microscopic polyangiitis (MPA) with pulmonary-renal syndrome; induction with IV methylprednisolone and cyclophosphamide or rituximab", "B": "Goodpasture syndrome; plasma exchange only", "C": "Granulomatosis with polyangiitis (GPA); rituximab monotherapy", "D": "PSGN; high-dose prednisone only", "E": "Eculizumab for atypical HUS"}, "answer": "A", "explanation": "MPO-ANCA positive microscopic polyangiitis (MPA) presenting with pulmonary-renal syndrome (hemoptysis, diffuse alveolar infiltrates, rapidly progressive glomerulonephritis) requires urgent immunosuppression. Standard induction therapy includes IV methylprednisolone 500-1000 mg daily × 3 days followed by high-dose oral prednisolone plus cyclophosphamide (or rituximab if contraindication) to induce remission. Plasma exchange is reserved for severe pulmonary hemorrhage with hypoxia. Untreated AAV has poor prognosis.", "diagram": null}, {"id": 248, "specialty": "nephrology", "tag": "medical_science_nephrology_electrolytes_hyponatremia", "question": "A 68-year-old woman with small cell lung cancer on carboplatin presents with confusion, seizures, and serum sodium 118 mmol/L. Osmolality 248 mOsm/kg (hypotonic), urine osmolality 365 mOsm/kg (inappropriately high), urine Na+ 52 mmol/L, volume status clinically euvolemic. TSH normal, cortisol normal.\n\nWhat is the most likely diagnosis?", "options": {"A": "Syndrome of inappropriate antidiuretic hormone (SIADH) from malignancy", "B": "Primary polydipsia", "C": "Adrenal insufficiency", "D": "Hypothyroidism", "E": "Tolvaptan for autosomal dominant polycystic kidney disease"}, "answer": "A", "explanation": "SIADH presents with euvolemic hyponatremia (normal volume status), hypotonic plasma, elevated urine osmolality inappropriately retaining water, and urine Na >40. Cancer is common SIADH cause (especially SCLC). Acute symptomatic hyponatremia (seizures, confusion) requires hypertonic saline (3%) with careful rate control (6-8 mmol/L rise first 24h) to avoid osmotic demyelination. Chronic SIADH is managed with fluid restriction. Normal TSH/cortisol exclude endocrine causes.", "diagram": null}, {"id": 249, "specialty": "nephrology", "tag": "clinical_science_nephrology_hyperkalemia", "question": "A 58-year-old man with CKD stage 4 (eGFR 24 mL/min/1.73m²) on lisinopril 10 mg daily and spironolactone 25 mg daily presents with dyspnea and ECG findings of peaked T waves and prolonged PR interval. Serum K+ 6.8 mmol/L, pH 7.32 (acidemia).\n\nWhat is the most appropriate immediate management?", "options": {"A": "IV calcium gluconate 10 mL of 10% solution for cardiac membrane stabilization; then glucose-insulin, salbutamol, or cation exchange resin; review ACE inhibitor and spironolactone", "B": "IV insulin 10 units with dextrose 25 g only", "C": "Sodium polystyrene sulfonate 60 g orally only", "D": "Dialysis immediately without other interventions", "E": "Rituximab for membranous nephropathy"}, "answer": "A", "explanation": "Severe symptomatic hyperkalemia (K+ >6.5 with ECG changes) requires urgent treatment. IV calcium (calcium gluconate or chloride) provides immediate cardiac membrane stabilization against arrhythmias—essential first step. Then shift K+ intracellularly with glucose-insulin (10 units regular insulin with 25 g dextrose), beta-2 agonist (salbutamol IV/nebulized), or sodium bicarbonate if acidemia. These are temporizing; address underlying cause (hold ACE-I/ARB/MRA, treat CKD). Cation exchange resin (sodium polystyrene sulfonate) is slow. Dialysis if K+ persistent or renal failure.", "diagram": null}, {"id": 250, "specialty": "nephrology", "tag": "medical_science_nephrology_immunology", "question": "A 32-year-old woman with systemic lupus erythematosus presents with nephrotic syndrome (proteinuria 6.2 g/24h, albumin 24 g/L) and active urinary sediment (RBC casts, WBC). ANA 1:2560, anti-dsDNA 240 IU/mL, C3 68 mg/dL (low), C4 10 mg/dL (low). Kidney biopsy shows wire-loop lesions and subendothelial immune deposits.\n\nWhat is the diagnosis and recommended therapy?", "options": {"A": "SLE Class IV lupus nephritis (diffuse proliferative); induction with IV methylprednisolone followed by IV cyclophosphamide or IV mycophenolate mofetil", "B": "Class III lupus nephritis; oral mycophenolate monotherapy", "C": "Class V (membranous) lupus nephritis; ACE inhibitor monotherapy", "D": "Secondary FSGS; tacrolimus therapy", "E": "Sodium bicarbonate supplementation for metabolic acidosis"}, "answer": "A", "explanation": "SLE Class IV lupus nephritis (diffuse proliferative, confirmed by wire-loop lesions and subendothelial IgG/C1q deposits) with nephrotic syndrome requires intensive immunosuppression. Standard induction: IV methylprednisolone 500-1000 mg daily × 3 days followed by high-dose oral prednisolone PLUS either IV cyclophosphamide (Euro-Lupus protocol: 500 mg/m² fixed dose monthly × 6) or IV mycophenolate mofetil 1 g BD (increasingly favored). Maintenance therapy follows induction.", "diagram": null}, {"id": 251, "specialty": "nephrology", "tag": "clinical_science_nephrology_chronic_kidney_disease", "question": "A 62-year-old man with CKD stage 3b (eGFR 32 mL/min/1.73m²), hypertension, and type 2 diabetes has been stable on perindopril. Recent labs: creatinine has risen from 248 to 283 µmol/L over 3 months, K+ 5.4 mmol/L, HCO3⁻ 20 mmol/L. Ultrasound shows normal-sized kidneys without obstruction. He started ibuprofen 2 weeks ago for knee arthralgia. What is the most likely explanation for the decline?", "options": {"A": "NSAID-induced afferent arteriolar vasoconstriction", "B": "Acute pyelonephritis", "C": "Bilateral renal artery stenosis unmasked by ACE inhibition", "D": "Progression of diabetic nephropathy", "E": "Hyperkalaemic distal renal tubular acidosis"}, "answer": "A", "explanation": "NSAIDs inhibit prostaglandin-mediated afferent arteriolar vasodilation. In CKD patients on ACE inhibitors (which cause efferent vasodilation), this combination can precipitate haemodynamic AKI. Discontinue NSAID; hold ACE inhibitor if creatinine continues rising. Diabetic nephropathy progresses more slowly and does not fit this acute timeline.", "diagram": null}, {"id": 252, "specialty": "nephrology", "tag": "medical_science_nephrology_bone_disease", "question": "A 58-year-old woman with CKD stage 5 (eGFR 8 mL/min/1.73m²) on hemodialysis 3× weekly presents with bone pain and hypercalcemia (Ca2+ 2.65 mmol/L, corrected). PTH 892 mIU/L (markedly elevated), phosphate 2.1 mmol/L (target <1.8), alkaline phosphatase elevated, 1,25-OH-vitamin D suppressed. She was non-adherent with phosphate binders and vitamin D analogues.\n\nWhat is the most appropriate management?", "options": {"A": "Increase dialysate calcium, optimize phosphate binders, calcitriol therapy, cinacalcet if PTH remains uncontrolled despite biochemical optimization", "B": "Immediate parathyroidectomy", "C": "High-dose calcitriol with calcium-based binders", "D": "Restrict dietary calcium intake only", "E": "Tacrolimus 0.1 mg/kg/day"}, "answer": "A", "explanation": "Secondary hyperparathyroidism in CKD stage 5 (tertiary when hypercalcemic) requires multifactorial management: phosphate control (non-calcium-based binders preferred given hypercalcemia: sevelamer, lanthanum), calcitriol supplementation (activates CaSR, suppresses PTH), and cinacalcet (calcimimetic sensitizes CaSR) if PTH remains elevated. Avoid high-dose calcitriol with hypercalcemia risk. Parathyroidectomy reserved for refractory disease unresponsive to medical therapy. Hypercalcemia may reflect tertiary hyperparathyroidism; management depends on biochemical pattern.", "diagram": null}, {"id": 253, "specialty": "nephrology", "tag": "clinical_science_nephrology_nephrotic_syndrome", "question": "A 52-year-old man with obesity and hypertension presents with nephrotic syndrome (proteinuria 8.5 g/24h, albumin 22 g/L, edema). Serum creatinine normal (eGFR 92 mL/min/1.73m²), complement levels normal, ANA negative. Kidney biopsy shows diffuse foot process effacement on electron microscopy without immune deposits.\n\nWhat is the most likely diagnosis?", "options": {"A": "Minimal change disease (MCD)", "B": "Focal segmental glomerulosclerosis (FSGS)", "C": "Membranous nephropathy", "D": "IgA nephropathy", "E": "Bilateral nephrectomy for refractory hypertension"}, "answer": "B", "explanation": "FSGS presents with nephrotic syndrome, normal complement, negative ANA, and preserved renal function. Foot process effacement is not specific (seen in all podocytopathies). FSGS shows segmental sclerosis on light microscopy and podocyte dysfunction (protein loss). The obesity and hypertension are risk factors for FSGS. MCD shows normal light microscopy; membranous shows subepithelial deposits. FSGS requires aggressive immunosuppression (prednisolone + cyclophosphamide or calcineurin inhibitors) and management of proteinuria/HTN.", "diagram": null}, {"id": 254, "specialty": "nephrology", "tag": "medical_science_nephrology_hypertension", "question": "A 48-year-old woman with resistant hypertension (BP 162/98 despite lisinopril 20 mg, amlodipine 10 mg, hydrochlorothiazide 25 mg) has eGFR 58 mL/min/1.73m², ACR 12 mg/mmol, K+ 4.8 mmol/L, and normal renal artery ultrasound (no stenosis). Home BP monitoring shows BP consistently elevated.\n\nWhat is the most appropriate add-on therapy?", "options": {"A": "Spironolactone 12.5-25 mg daily (if K+ monitoring available)", "B": "Loop diuretic (furosemide) in addition to HCTZ", "C": "Beta-blocker (atenolol) monotherapy", "D": "Immediate referral for renal denervation", "E": "Darbepoetin alfa for renal anaemia"}, "answer": "A", "explanation": "Resistant hypertension (uncontrolled on ≥3 drugs including diuretic) in setting of CKD stage 3 warrants mineralocorticoid receptor antagonist (spironolactone or eplerenone) as fourth-line agent. Requires careful K+ monitoring (especially with lisinopril). K+ 4.8 is acceptable baseline. Loop diuretics are for pulmonary edema, not HTN in CKD. Beta-blockers are second-line, not first. Renal denervation is emerging but requires specialized centers and selection.", "diagram": null}, {"id": 255, "specialty": "nephrology", "tag": "clinical_science_nephrology_dialysis_complications", "question": "A 62-year-old man on hemodialysis (3× weekly, 4 hours) for 2 years presents with severe fatigue, dyspnea, and pale appearance. Hb 82 g/L, MCV 78 fL, serum iron 8 μmol/L (low), ferritin 185 ng/mL (low-normal), TSAT 16% (low). EPO level elevated despite EPO resistance. He has been adherent with IV iron supplements (ferrous gluconate 125 mg weekly).\n\nWhat is the underlying mechanism?", "options": {"A": "Functional iron deficiency from inadequate iron supplementation relative to iron loss during dialysis", "B": "Anemia of chronic kidney disease unresponsive to EPO", "C": "Chronic blood loss from dialysis catheter complications", "D": "Hemolysis from formaldehyde dialysate contamination", "E": "Phosphate binder therapy with sevelamer"}, "answer": "A", "explanation": "Dialysis patients lose iron continuously (1-3 mg/session) and develop functional iron deficiency (low TSAT, low-normal ferritin despite EPO resistance). This occurs when iron supply cannot meet utilization by erythropoiesis. Requires higher IV iron dosing (typically 125-250 mg 1-2× weekly) or more frequent dosing. TSAT should be 30-40% and ferritin 200-500 ng/mL for optimal EPO responsiveness. Elevated EPO with low Hb despite iron repletion suggests EPO resistance from other causes (infection, inflammation, malignancy).", "diagram": null}, {"id": 256, "specialty": "nephrology", "tag": "medical_science_nephrology_tubulointerstitial", "question": "A 54-year-old man with CKD stage 4 (eGFR 22 mL/min/1.73m²) is found to have serum uric acid 9.2 mg/dL, with recent gout flare treated with allopurinol 300 mg daily. Urine uric acid 1100 mg/24h (elevated), renal ultrasound shows echogenic kidneys. Kidney biopsy shows monosodium urate crystal deposition in tubules and interstitium with chronic inflammation.\n\nWhat is the diagnosis?", "options": {"A": "Urate nephropathy (hyperuricemic kidney disease)", "B": "Gouty arthritis with secondary renal involvement", "C": "Light chain nephropathy", "D": "Ethylene glycol toxicity", "E": "Allopurinol for uric acid nephropathy"}, "answer": "A", "explanation": "Urate nephropathy occurs with chronic hyperuricemia (serum uric acid >8 mg/dL chronically) from overproduction (high urine uric acid) or under-excretion (CKD). Causes chronic tubulointerstitial inflammation, crystal deposition, and progressive renal failure. Prevention/management: urate-lowering therapy (allopurinol, febuxostat, pegloticase), hydration to promote urine flow, and maintain serum uric acid <6 mg/dL. Acute uric acid nephropathy occurs with massive uric acid release (tumor lysis syndrome) causing acute tubular obstruction and acute kidney injury.", "diagram": null}, {"id": 257, "specialty": "nephrology", "tag": "clinical_science_nephrology_transplant", "question": "A 52-year-old man with CKD stage 5 (eGFR 6 mL/min/1.73m²) is undergoing pre-transplant evaluation for cadaveric kidney transplant. He has normal DSA (donor-specific antibody) screening, negative pretransplant crossmatch. CMV IgG positive (donor CMV IgG also positive). EBV serology: patient IgG positive, IgM negative.\n\nWhat is the most important infection-related consideration?", "options": {"A": "CMV prophylaxis indicated (valganciclovir or ganciclovir) given high-risk donor-positive/recipient-positive status", "B": "No CMV prophylaxis required; IgG positivity indicates immunity", "C": "EBV prophylaxis not needed given prior infection", "D": "SARS-CoV-2 vaccine contraindicated in transplant recipients", "E": "Intravenous iron sucrose infusion"}, "answer": "A", "explanation": "CMV D+/R+ status (both donor and recipient IgG positive) confers high CMV disease risk post-transplant despite prior immunity, requiring antiviral prophylaxis (valganciclovir 450-900 mg daily × 3-6 months post-transplant) to prevent reactivation. CMV D+/R- and D-/R+ carry highest risk. D-/R- (both seronegative) requires monitoring only. EBV seropositivity without IgM indicates prior infection with immunity (no prophylaxis). Pre-transplant vaccination (including SARS-CoV-2, influenza) should occur during CKD stage 4-5 before immunosuppression initiation.", "diagram": null}, {"id": 258, "specialty": "nephrology", "tag": "medical_science_nephrology_genetics", "question": "A 28-year-old man with family history of renal failure presents with asymptomatic hematuria and mild proteinuria (0.3 g/24h). Serum creatinine normal (eGFR 95 mL/min/1.73m²), audiometry shows high-frequency sensorineural hearing loss. Kidney biopsy shows thin glomerular basement membrane (TBMM) on electron microscopy with splitting appearance (\"basket-weave\").\n\nWhat is the diagnosis?", "options": {"A": "Alport syndrome from COL4A3/COL4A4 mutation", "B": "Thin basement membrane disease", "C": "IgA nephropathy", "D": "Hereditary nephritis without sensorineural hearing loss", "E": "Amiloride for lithium-induced nephrogenic DI"}, "answer": "A", "explanation": "Alport syndrome results from mutations in genes encoding type IV collagen (COL4A3, COL4A4, COL4A5 in X-linked form), causing progressive PSGN with pathognomonic basement membrane splitting (\"basket-weave\" on EM). Presents with hematuria, progressive proteinuria, and renal failure (males typically by age 20-30s). Sensorineural hearing loss is cardinal feature (high frequency loss). Ocular findings (anterior lenticonus, corneal dystrophy) may present. Genetic counseling and family screening are essential. ACE inhibitors slow CKD progression.", "diagram": null}, {"id": 259, "specialty": "nephrology", "tag": "clinical_science_nephrology_renal_artery_stenosis", "question": "A 64-year-old man with resistant hypertension (BP 168/94 despite triple therapy) and \"flash\" pulmonary edema presents with acute kidney injury (creatinine rise from 1.4 to 1.9 mg/dL) within 3 days of starting lisinopril. He smokes (40 pack-year history). Duplex ultrasound shows peak systolic velocity 380 cm/sec in right renal artery.\n\nWhat is the most appropriate management?", "options": {"A": "Stop lisinopril; consider percutaneous transluminal renal angioplasty (PTRA) ± stenting vs. medical management depending on clinical scenario and arteriogram findings", "B": "Continue lisinopril; increase dose for better BP control", "C": "Empiric repeat angiography immediately", "D": "Hemodialysis initiation", "E": "Cinacalcet for secondary hyperparathyroidism"}, "answer": "A", "explanation": "Atherosclerotic renal artery stenosis (RAS) presents with resistant HTN, flash pulmonary edema, and acute rise in creatinine with ACE-I initiation (loss of efferent arteriolar pressure). Duplex findings (peak velocity >380 cm/sec, direct visualization) suggest critical stenosis. ACE-I/ARB should be discontinued. PTRA ± stenting may benefit selected patients (recurrent flash pulmonary edema, bilateral RAS, renal insufficiency); medical management (antihypertensives, statins) is alternative. Randomized trials show mixed PTRA benefit vs. medical therapy alone in atherosclerotic RAS.", "diagram": null}, {"id": 260, "specialty": "nephrology", "tag": "medical_science_nephrology_amyloidosis", "question": "A 58-year-old man with multiple myeloma (IgG kappa paraprotein, 25% bone marrow plasma cells) presents with nephrotic syndrome (proteinuria 7.2 g/24h, serum albumin 24 g/L) and renal insufficiency (eGFR 28 mL/min/1.73m²). Serum creatinine 2.3 mg/dL with proteinuria predominantly composed of lambda and kappa light chains. Kidney biopsy shows Congo red-positive amyloid deposits on glomeruli and vessel walls.\n\nWhat is the diagnosis?", "options": {"A": "AL (light chain) amyloidosis from plasma cell dyscrasia with free light chain amyloid fibril deposition", "B": "ALID (light chain deposition disease)", "C": "Cast nephropathy (myeloma kidney)", "D": "Membranous nephropathy from myeloma", "E": "Cyclophosphamide pulse therapy"}, "answer": "A", "explanation": "AL amyloidosis develops from misfolded immunoglobulin light chain fibril deposition. Presents with nephrotic syndrome, progressive renal failure, and often cardiac/hepatic involvement. Diagnosis: Congo red staining with apple-green birefringence under polarized light, immunohistochemistry, and mass spectrometry of amyloid fibril. Light chain deposition disease shows nodular deposits on LM but no Congo red positivity. Cast nephropathy shows tubular casts without amyloid. Treatment: proteasome inhibitors (bortezomib) and alkylating agents to suppress plasma cell production.", "diagram": null}, {"id": 261, "specialty": "nephrology", "tag": "clinical_science_nephrology_pregnancy", "question": "A 34-year-old woman with CKD stage 3a (eGFR 54 mL/min/1.73m²) from IgA nephropathy is 20 weeks pregnant on lisinopril 10 mg daily. She is asymptomatic with stable creatinine 1.2 mg/dL baseline, BP 130/84 mmHg, ACR 28 mg/mmol.\n\nWhat is the most appropriate management?", "options": {"A": "Cease lisinopril immediately; switch to safe antihypertensive (methyldopa, nifedipine) for remainder of pregnancy", "B": "Continue lisinopril throughout pregnancy for renal protection", "C": "Initiate atenolol for improved BP control", "D": "Add hydralazine to current lisinopril therapy", "E": "Patiromer for chronic hyperkalaemia"}, "answer": "A", "explanation": "ACE inhibitors and ARBs are contraindicated in pregnancy (teratogenic, associated with renal dysgenesis, anuria, fetal demise, especially 2nd-3rd trimester). Stop immediately if pregnant or planning pregnancy. Safe antihypertensives in pregnancy: methyldopa, labetalol, nifedipine (long-acting), hydralazine. Aspirin (low-dose) is safe. Monitor renal function and BP closely; CKD with proteinuria increases preeclampsia risk. Close feto-maternal collaboration required.", "diagram": null}, {"id": 262, "specialty": "nephrology", "tag": "medical_science_nephrology_contrast_toxicity", "question": "A 48-year-old man with baseline eGFR 42 mL/min/1.73m² undergoing CT angiography with iodinated contrast for suspected pulmonary embolism is given IV contrast (ionic contrast agent, 100 mL) without hydration pre-procedure. He develops acute kidney injury with creatinine rising from 1.3 to 2.1 mg/dL by day 3.\n\nWhat is the most effective preventive strategy for contrast-associated acute kidney injury?", "options": {"A": "IV isotonic saline (0.9%) hydration 1-2 L over 3-4 hours before and after procedure; use low-osmolality contrast agents", "B": "Oral acetylcysteine N-acetylcysteine (NAC) therapy pre-contrast", "C": "Diuretics (loop diuretics) with hydration", "D": "Theophylline prophylaxis", "E": "Empagliflozin for diabetic nephropathy"}, "answer": "A", "explanation": "Prevention of contrast-induced acute kidney injury (CIAKI) in high-risk patients (CKD eGFR <60, diabetes, age >65) includes: IV isotonic saline 0.9% at 1 mL/kg/hr starting 12 hours pre-procedure through 4-6 hours post, low-osmolality non-ionic contrast (osmolality <400 mOsm/kg), and minimizing contrast volume (volume ≤3 mL/kg eGFR). NAC and other agents show limited efficacy in trials. Diuretics worsen dehydration. Adequate hydration is most critical factor.", "diagram": null}, {"id": 263, "specialty": "nephrology", "tag": "clinical_science_nephrology_diabetic_nephropathy", "question": "A 58-year-old man with 15 years of type 2 diabetes presents with an albumin-to-creatinine ratio (ACR) of 35 mg/mmol on two occasions and eGFR 52 mL/min/1.73m². He has established diabetic retinopathy and peripheral neuropathy.\nWhich class of medication provides the BEST renoprotective effect?", "options": {"A": "Calcium channel blockers", "B": "ACE inhibitors or angiotensin receptor blockers", "C": "Thiazide diuretics", "D": "Alpha-blockers", "E": "SGLT2 inhibitor (dapagliflozin or empagliflozin)"}, "answer": "B", "explanation": "ACE inhibitors (ACEi) and angiotensin receptor blockers (ARBs) are first-line for renoprotection in diabetic nephropathy. They reduce intraglomerular pressure by preferentially dilating the efferent arteriole, reducing proteinuria and slowing GFR decline. SGLT2 inhibitors (e.g. dapagliflozin, empagliflozin) have also demonstrated significant renoprotective benefits and are now recommended as add-on therapy. In this patient, the presence of retinopathy and neuropathy alongside nephropathy confirms microvascular disease from diabetes. Blood pressure target should be <130/80 mmHg.", "diagram": null}, {"id": 264, "specialty": "nephrology", "tag": "clinical_science_nephrology_polycystic", "question": "A 38-year-old woman presents with flank pain and haematuria. Ultrasound reveals bilaterally enlarged kidneys with multiple cysts. Her father is on dialysis for polycystic kidney disease. Her eGFR is 65 mL/min/1.73m².\nWhich medication has been shown to slow kidney growth and decline in renal function in ADPKD?", "options": {"A": "Sirolimus", "B": "Tolvaptan", "C": "Enalapril", "D": "Metformin", "E": "Sirolimus (mTOR inhibitor)"}, "answer": "B", "explanation": "Autosomal dominant polycystic kidney disease (ADPKD) is the most common inherited kidney disease, caused by mutations in PKD1 (85%) or PKD2 genes. Tolvaptan, a vasopressin V2 receptor antagonist, reduces cAMP-driven cyst growth and has been shown to slow the increase in total kidney volume and the decline in eGFR. It is indicated for patients at risk of rapid progression. Key complications include hypertension, pain, haematuria, cyst infection, nephrolithiasis, and intracranial aneurysms (screening recommended if family history). ADPKD accounts for ~10% of patients on dialysis.", "diagram": null}, {"id": 265, "specialty": "nephrology", "tag": "clinical_science_nephrology_renal_calculus", "question": "A 42-year-old man presents to the emergency department with acute-onset severe left loin-to-groin pain and microscopic haematuria. A non-contrast CT KUB shows a 7 mm stone at the left vesicoureteric junction.\nWhat is the most appropriate initial management?", "options": {"A": "Emergency lithotripsy", "B": "Analgesia and medical expulsive therapy with an alpha-blocker", "C": "Immediate ureteric stent insertion", "D": "Open surgical removal", "E": "Extracorporeal shockwave lithotripsy"}, "answer": "B", "explanation": "Ureteric stones <10 mm at the vesicoureteric junction have a reasonable chance of spontaneous passage. Initial management includes adequate analgesia (NSAIDs are first-line, superior to opioids for renal colic) and medical expulsive therapy with an alpha-blocker (e.g. tamsulosin) which relaxes ureteric smooth muscle. Urgent intervention is needed if there is concurrent infection (pyonephrosis), bilateral obstruction, or a solitary kidney. The most common stone composition is calcium oxalate. Metabolic workup (24-hour urine for calcium, oxalate, citrate, uric acid) should be performed for recurrent stone formers.", "diagram": null}, {"id": 266, "specialty": "nephrology", "tag": "medical_science_nephrology_physiology", "question": "Which segment of the nephron is the primary site of action of loop diuretics?", "options": {"A": "Proximal convoluted tubule", "B": "Thick ascending limb of the loop of Henle", "C": "Distal convoluted tubule", "D": "Collecting duct", "E": "Thin descending limb of the loop of Henle"}, "answer": "B", "explanation": "Loop diuretics (furosemide, bumetanide) inhibit the Na-K-2Cl cotransporter (NKCC2) in the thick ascending limb, blocking 25-30% of sodium reabsorption.", "diagram": null}, {"id": 267, "specialty": "nephrology", "tag": "clinical_science_nephrology_aki", "question": "A 72-year-old man develops oliguria 2 days post-cardiac surgery. Creatinine rises from 90 to 380 µmol/L. Urinalysis shows muddy brown granular casts. Fractional excretion of sodium (FeNa) is 3.8%. What is the most likely diagnosis?", "options": {"A": "Prerenal acute kidney injury", "B": "Acute tubular necrosis", "C": "Acute interstitial nephritis", "D": "Post-renal obstruction", "E": "Cholesterol crystal embolism"}, "answer": "B", "explanation": "Muddy brown granular casts with FeNa >2% in the context of post-surgical haemodynamic insult is characteristic of acute tubular necrosis (intrinsic renal AKI).", "diagram": null}, {"id": 268, "specialty": "nephrology", "tag": "clinical_science_nephrology_glomerular", "question": "A 25-year-old man presents with haematuria and nephrotic-range proteinuria 2 weeks after an upper respiratory tract infection. Serum C3 is normal, C4 is normal. Renal biopsy shows mesangial IgA deposition on immunofluorescence. What is the most likely diagnosis?", "options": {"A": "Post-streptococcal glomerulonephritis", "B": "IgA nephropathy", "C": "Membranous nephropathy", "D": "Minimal change disease", "E": "Lupus nephritis"}, "answer": "B", "explanation": "IgA nephropathy (Berger disease) classically presents with synpharyngitic haematuria (within days of URTI), mesangial IgA deposits, and normal complement levels.", "diagram": null}, {"id": 269, "specialty": "nephrology", "tag": "medical_science_nephrology_acid_base", "question": "A patient has the following arterial blood gas: pH 7.28, pCO₂ 24 mmHg, HCO₃⁻ 11 mmol/L. Sodium 140, chloride 114 mmol/L. What is the acid-base disturbance?", "options": {"A": "High anion gap metabolic acidosis", "B": "Normal anion gap (hyperchloraemic) metabolic acidosis", "C": "Respiratory acidosis with metabolic compensation", "D": "Mixed metabolic and respiratory acidosis", "E": "Respiratory alkalosis with metabolic compensation"}, "answer": "B", "explanation": "Anion gap = 140 - (114 + 11) = 15 (normal). Low pH with low bicarbonate indicates metabolic acidosis. Normal anion gap with elevated chloride indicates hyperchloraemic metabolic acidosis (e.g. RTA, diarrhoea).", "diagram": null}, {"id": 270, "specialty": "nephrology", "tag": "clinical_science_nephrology_ckd", "question": "A 58-year-old man with CKD stage G4 (eGFR 22 mL/min) has haemoglobin 88 g/L, ferritin 180 µg/L, transferrin saturation 18%. What is the most appropriate next step?", "options": {"A": "Commence erythropoiesis-stimulating agent (ESA)", "B": "Intravenous iron supplementation", "C": "Oral iron supplementation", "D": "Red cell transfusion", "E": "Commence darbepoetin alfa and oral iron simultaneously"}, "answer": "B", "explanation": "With transferrin saturation <20% and ferritin <500 µg/L in CKD, iron stores are functionally deficient. IV iron is preferred over oral in advanced CKD (better absorption and tolerance) and should be given before ESA initiation.", "diagram": null}, {"id": 271, "specialty": "nephrology", "tag": "clinical_science_nephrology_electrolytes", "question": "A 45-year-old woman presents with confusion and seizure. Serum sodium is 118 mmol/L, measured over 48 hours (chronic hyponatraemia). Urine osmolality is 520 mOsm/kg, urine sodium 45 mmol/L. She is euvolaemic. What is the most likely diagnosis?", "options": {"A": "Psychogenic polydipsia", "B": "SIADH", "C": "Adrenal insufficiency", "D": "Cerebral salt wasting", "E": "Hypothyroidism"}, "answer": "B", "explanation": "Euvolaemic hyponatraemia with concentrated urine (>100 mOsm/kg) and elevated urine sodium (>40 mmol/L) is characteristic of SIADH. Psychogenic polydipsia would have dilute urine.", "diagram": null}, {"id": 272, "specialty": "nephrology", "tag": "medical_science_nephrology_transplant", "question": "Which calcineurin inhibitor-related nephrotoxicity is characterised by arteriolar hyalinosis and striped interstitial fibrosis on renal biopsy?", "options": {"A": "Acute calcineurin inhibitor toxicity", "B": "Chronic calcineurin inhibitor nephrotoxicity", "C": "Thrombotic microangiopathy", "D": "Acute antibody-mediated rejection", "E": "BK virus nephropathy"}, "answer": "B", "explanation": "Chronic calcineurin inhibitor (tacrolimus/ciclosporin) nephrotoxicity shows characteristic striped interstitial fibrosis and arteriolar hyalinosis on biopsy, representing irreversible structural damage.", "diagram": null}, {"id": 273, "specialty": "neurology", "tag": "clinical_science_neurology_stroke", "question": "A 68-year-old man presents with sudden onset right-sided weakness and aphasia. Symptom onset was 2 hours ago. CT head shows no haemorrhage. CT angiography confirms left middle cerebral artery occlusion. NIHSS score is 16.\n\nWhat is the most appropriate reperfusion strategy?", "options": {"A": "IV alteplase alone", "B": "IV alteplase followed by endovascular thrombectomy", "C": "Endovascular thrombectomy alone without IV thrombolysis", "D": "Aspirin 300 mg and admission to stroke unit", "E": "Thrombolysis with IV alteplase"}, "answer": "B", "explanation": "For acute ischaemic stroke with large vessel occlusion (LVO) within 4.5 hours: IV alteplase (0.9 mg/kg) should be commenced immediately (\"drip and ship\") followed by endovascular thrombectomy. The MR CLEAN, ESCAPE, EXTEND-IA, SWIFT PRIME, and REVASCAT trials established that thrombectomy reduces disability (NNT ~2.6 for reduced disability at 90 days). Thrombectomy may be offered up to 24 hours with favourable perfusion imaging (DAWN, DEFUSE-3 trials).", "diagram": null}, {"id": 274, "specialty": "neurology", "tag": "clinical_science_neurology_epilepsy", "question": "A 22-year-old woman has her first generalised tonic-clonic seizure witnessed by her partner. She reports a history of early-morning myoclonic jerks over the past year, often after sleep deprivation. EEG shows generalised 4-6 Hz polyspike-and-wave discharges.\n\nWhat is the most likely diagnosis?", "options": {"A": "Temporal lobe epilepsy", "B": "Juvenile myoclonic epilepsy", "C": "Absence epilepsy", "D": "Lennox-Gastaut syndrome", "E": "Carbamazepine 200 mg BD"}, "answer": "B", "explanation": "Juvenile myoclonic epilepsy (JME) typically presents in adolescence/early adulthood with the triad of: myoclonic jerks (especially morning), generalised tonic-clonic seizures, and sometimes absence seizures. EEG shows generalised polyspike-and-wave at 4-6 Hz. Precipitants include sleep deprivation, alcohol, and photic stimulation. First-line treatment is sodium valproate (levetiracetam in women of childbearing potential due to valproate teratogenicity). Carbamazepine and phenytoin may worsen myoclonic seizures.", "diagram": null}, {"id": 275, "specialty": "neurology", "tag": "clinical_science_neurology_demyelination", "question": "A 28-year-old woman presents with painful loss of vision in the right eye over 3 days. Examination shows reduced visual acuity (6/36), relative afferent pupillary defect, and pain on eye movement. She had an episode of leg numbness 18 months ago that resolved spontaneously.\n\nWhat investigation would most support a diagnosis of multiple sclerosis?", "options": {"A": "Visual evoked potentials", "B": "MRI brain and spinal cord with gadolinium", "C": "Lumbar puncture for oligoclonal bands alone", "D": "CT head with contrast", "E": "Intravenous immunoglobulin 0.4 g/kg/day for 5 days"}, "answer": "B", "explanation": "MRI is the investigation of choice for MS diagnosis. The McDonald 2017 criteria require dissemination in space (DIS) and time (DIT), which can be demonstrated on a single MRI: DIS requires ≥1 T2 lesion in ≥2 of 4 MS-typical regions (periventricular, cortical/juxtacortical, infratentorial, spinal cord). DIT can be shown by simultaneous gadolinium-enhancing and non-enhancing lesions. Her previous neurological episode plus current optic neuritis already suggests DIT clinically. CSF oligoclonal bands can substitute for DIT if needed.", "diagram": null}, {"id": 276, "specialty": "neurology", "tag": "clinical_science_neurology_movement", "question": "A 62-year-old man presents with a 2-year history of resting tremor of the right hand, bradykinesia, and rigidity. He also has REM sleep behaviour disorder and hyposmia. His symptoms improve with levodopa.\n\nWhat is the most likely diagnosis?", "options": {"A": "Essential tremor", "B": "Parkinson disease", "C": "Progressive supranuclear palsy", "D": "Corticobasal degeneration", "E": "Lumbar puncture with CSF analysis"}, "answer": "B", "explanation": "Parkinson disease presents with the cardinal motor features: resting tremor (typically asymmetric, pill-rolling), bradykinesia (essential for diagnosis), rigidity (lead-pipe or cogwheel), and postural instability. Prodromal features include REM sleep behaviour disorder, hyposmia, and constipation. Levodopa responsiveness is a supportive diagnostic criterion (MDS criteria). PSP presents with vertical supranuclear gaze palsy and early postural instability. Essential tremor is action/postural, not resting.", "diagram": null}, {"id": 277, "specialty": "neurology", "tag": "clinical_science_neurology_headache", "question": "A 35-year-old man presents with severe unilateral periorbital pain lasting 45-90 minutes, occurring 3-4 times daily for the past 3 weeks. Episodes are accompanied by ipsilateral lacrimation, conjunctival injection, and nasal congestion. He paces the room during attacks.\n\nWhat is the most appropriate acute treatment?", "options": {"A": "Oral sumatriptan 100 mg", "B": "High-flow oxygen (12-15 L/min) via non-rebreather mask", "C": "Oral paracetamol 1 g", "D": "IV dihydroergotamine", "E": "MRI brain with gadolinium contrast"}, "answer": "B", "explanation": "Cluster headache presents with severe unilateral periorbital pain with ipsilateral autonomic features (lacrimation, conjunctival injection, rhinorrhoea, miosis, ptosis). Attacks last 15-180 minutes and occur in clusters. First-line acute treatment is high-flow oxygen (12-15 L/min for 15-20 minutes) or subcutaneous sumatriptan 6 mg (NOT oral — too slow onset). Oral triptans are effective for migraine but too slow for cluster headache. Verapamil is the first-line prophylactic agent.", "diagram": null}, {"id": 278, "specialty": "neurology", "tag": "medical_science_neurology_pharmacology", "question": "A 30-year-old woman with epilepsy controlled on sodium valproate is planning pregnancy. She is advised to switch medication.\n\nWhat is the primary teratogenic risk associated with valproate exposure in the first trimester?", "options": {"A": "Cardiac septal defects", "B": "Neural tube defects", "C": "Limb reduction defects", "D": "Renal agenesis", "E": "Levodopa-carbidopa 100/25 mg TDS"}, "answer": "B", "explanation": "Sodium valproate carries the highest teratogenic risk of all anti-epileptic drugs (major malformation rate 6-11%). Neural tube defects (spina bifida) are the most characteristic, occurring in 1-2% of exposed pregnancies (10-20x background risk). Additionally, valproate causes fetal valproate syndrome and a dose-dependent reduction in childhood IQ. It is contraindicated in women of childbearing potential unless no alternative exists and pregnancy prevention programme is in place. Lamotrigine and levetiracetam have lower teratogenic risk.", "diagram": null}, {"id": 279, "specialty": "neurology", "tag": "clinical_science_neurology_neuromuscular", "question": "A 25-year-old woman presents with fluctuating ptosis and diplopia that worsen throughout the day. She also has difficulty swallowing and proximal limb weakness. Tensilon (edrophonium) test is positive. Anti-acetylcholine receptor antibodies are elevated.\n\nWhat is the most important initial investigation to exclude?", "options": {"A": "Lambert-Eaton myasthenic syndrome", "B": "Thymoma", "C": "Motor neuron disease", "D": "Botulism", "E": "Plasma exchange for myasthenic crisis"}, "answer": "B", "explanation": "All patients diagnosed with myasthenia gravis should undergo CT chest to screen for thymoma, which is present in 10-15% of MG patients (particularly those with anti-AChR antibodies). Thymectomy is recommended for thymoma-associated MG and may benefit non-thymomatous generalised MG (MGTX trial). Treatment of MG includes pyridostigmine (symptomatic), corticosteroids, steroid-sparing immunosuppressants (azathioprine, mycophenolate), and rituximab for refractory disease. Myasthenic crisis requires ICU admission.", "diagram": null}, {"id": 280, "specialty": "neurology", "tag": "clinical_science_neurology_infection", "question": "A 55-year-old immunosuppressed man presents with headache, fever, and confusion over 5 days. CSF shows: opening pressure elevated, WCC 180 (90% lymphocytes), protein 1.8 g/L, glucose 1.2 mmol/L (serum 6.0). India ink stain is positive.\n\nWhat is the most appropriate initial treatment?", "options": {"A": "IV ceftriaxone and ampicillin", "B": "IV amphotericin B and oral flucytosine", "C": "IV aciclovir", "D": "IV dexamethasone and anti-tuberculosis therapy", "E": "Decompressive craniectomy"}, "answer": "B", "explanation": "Positive India ink stain in CSF indicates Cryptococcus neoformans meningitis. CSF typically shows lymphocytic pleocytosis, elevated protein, low glucose, and elevated opening pressure. Treatment is induction with IV amphotericin B (liposomal) plus flucytosine for 2 weeks, followed by consolidation with fluconazole 400 mg daily for 8 weeks, then maintenance fluconazole 200 mg daily. Raised ICP management (serial LPs or lumbar drain) is critical for outcomes. Cryptococcal antigen in CSF/serum has >95% sensitivity.", "diagram": null}, {"id": 281, "specialty": "neurology", "tag": "clinical_science_neurology_neuropathy", "question": "A 45-year-old man presents with ascending weakness over 5 days following a diarrhoeal illness. Examination shows areflexia, distal then proximal weakness (MRC 3/5 lower limbs, 4/5 upper limbs), and no sensory level. Respiratory function: FVC 1.8 L (predicted 4.5 L).\n\nWhat is the most urgent priority?", "options": {"A": "Commence IV immunoglobulin", "B": "Intubation and mechanical ventilation", "C": "Lumbar puncture", "D": "Nerve conduction studies", "E": "Sodium valproate 600 mg BD"}, "answer": "B", "explanation": "This patient has Guillain-Barré syndrome (post-infectious ascending weakness with areflexia) with critical respiratory compromise — FVC is 40% predicted (<20 mL/kg or <1L requires intubation, <15 mL/kg indicates imminent respiratory failure). The 20/30/40 rule: intubate if FVC <20 mL/kg, MIP <30 cmH2O, or MEP <40 cmH2O. After securing the airway, treatment is IVIg (0.4 g/kg/day x 5 days) or plasma exchange. Both are equally effective. Steroids are NOT beneficial in GBS. Preceding Campylobacter jejuni infection is most common.", "diagram": null}, {"id": 282, "specialty": "neurology", "tag": "medical_science_neurology_pathophysiology", "question": "A 70-year-old woman with atrial fibrillation presents with sudden onset right hemiplegia, expressive aphasia, and left gaze deviation.\n\nWhat is the most likely vascular territory affected?", "options": {"A": "Right middle cerebral artery", "B": "Left middle cerebral artery", "C": "Left anterior cerebral artery", "D": "Basilar artery", "E": "Riluzole 50 mg BD"}, "answer": "B", "explanation": "Left MCA territory stroke explains: right hemiplegia (contralateral motor cortex), expressive (Broca) aphasia (dominant hemisphere — left in >95% of right-handed individuals), and left gaze deviation (eyes deviate toward the lesion — frontal eye field damage causes ipsilateral gaze preference). The MCA supplies the lateral cortex including motor/sensory cortex for face and upper limb, and Broca area. ACA territory affects contralateral leg predominantly. Basilar stroke causes brainstem signs.", "diagram": null}, {"id": 283, "specialty": "neurology", "tag": "clinical_science_neurology_spinal", "question": "A 58-year-old man presents with acute back pain followed by bilateral leg weakness, urinary retention, and saddle anaesthesia. Lower limb reflexes are absent. Anal tone is reduced.\n\nWhat is the most likely diagnosis and urgent investigation?", "options": {"A": "Conus medullaris syndrome — CT spine", "B": "Cauda equina syndrome — urgent MRI whole spine", "C": "Transverse myelitis — MRI brain", "D": "Guillain-Barré syndrome — nerve conduction studies", "E": "Ocrelizumab infusion 6-monthly"}, "answer": "B", "explanation": "Cauda equina syndrome (CES) presents with bilateral lower limb weakness (LMN pattern — areflexia), saddle anaesthesia, and bladder/bowel dysfunction. It is caused by compression of the cauda equina nerve roots, most commonly by a large central disc prolapse. Urgent MRI of the whole spine is required, and surgical decompression within 48 hours (ideally <24 hours) improves outcomes. Conus medullaris syndrome presents with mixed UMN/LMN signs and earlier bladder involvement but is anatomically distinct.", "diagram": null}, {"id": 284, "specialty": "neurology", "tag": "clinical_science_neurology_dementia", "question": "A 72-year-old man presents with a 2-year history of progressive memory loss, visual hallucinations, fluctuating cognition, and Parkinsonian features (rigidity, bradykinesia). He has REM sleep behaviour disorder. His wife reports he is exquisitely sensitive to antipsychotic medications.\n\nWhat is the most likely diagnosis?", "options": {"A": "Alzheimer disease", "B": "Dementia with Lewy bodies", "C": "Vascular dementia", "D": "Frontotemporal dementia", "E": "Botulinum toxin injection"}, "answer": "B", "explanation": "Dementia with Lewy bodies (DLB) has core features: fluctuating cognition, visual hallucinations (detailed and recurrent), REM sleep behaviour disorder, and spontaneous Parkinsonism. Supportive features include severe neuroleptic sensitivity, repeated falls, and autonomic dysfunction. Cholinesterase inhibitors (rivastigmine, donepezil) are the mainstay of treatment. Antipsychotics should be avoided or used with extreme caution due to risk of severe neuroleptic sensitivity reactions. DaTscan shows reduced dopaminergic uptake in the basal ganglia.", "diagram": null}, {"id": 285, "specialty": "neurology", "tag": "medical_science_neurology_anatomy", "question": "A 50-year-old man presents with vertigo, nystagmus, ipsilateral Horner syndrome (ptosis, miosis, anhidrosis), ipsilateral cerebellar ataxia, ipsilateral facial sensory loss, contralateral body pain and temperature loss, and dysphagia.\n\nWhat is the affected vascular territory?", "options": {"A": "Anterior cerebral artery", "B": "Posterior inferior cerebellar artery (lateral medullary)", "C": "Superior cerebellar artery", "D": "Anterior inferior cerebellar artery", "E": "Nimodipine 60 mg Q4H"}, "answer": "B", "explanation": "This is lateral medullary (Wallenberg) syndrome from PICA occlusion (or vertebral artery). Key structures affected: vestibular nuclei (vertigo/nystagmus), descending sympathetic tract (ipsilateral Horner), inferior cerebellar peduncle (ipsilateral ataxia), spinal trigeminal nucleus (ipsilateral facial pain/temperature loss), spinothalamic tract (contralateral body pain/temperature loss), nucleus ambiguus (dysphagia/dysphonia). Notably, motor function is SPARED as the medullary pyramids are supplied by the anterior spinal artery.", "diagram": null}, {"id": 286, "specialty": "neurology", "tag": "clinical_science_neurology_autoimmune", "question": "A 45-year-old woman presents with progressive spastic paraparesis, optic neuritis, and longitudinally extensive transverse myelitis (spanning ≥3 vertebral segments on MRI). AQP4-IgG antibodies are positive.\n\nWhat is the most likely diagnosis?", "options": {"A": "Multiple sclerosis", "B": "Neuromyelitis optica spectrum disorder (NMOSD)", "C": "Acute disseminated encephalomyelitis", "D": "Sarcoidosis", "E": "Acetazolamide 250 mg BD"}, "answer": "B", "explanation": "NMOSD is characterised by AQP4-IgG antibodies targeting aquaporin-4 water channels on astrocyte foot processes. Core features include optic neuritis (often bilateral/severe), longitudinally extensive transverse myelitis (≥3 segments — unlike MS which typically causes short lesions), and area postrema syndrome. Unlike MS, NMOSD is treated with immunosuppression (rituximab, eculizumab, inebilizumab) rather than MS disease-modifying therapies. Some MS treatments (interferon-beta, natalizumab) can worsen NMOSD.", "diagram": null}, {"id": 287, "specialty": "neurology", "tag": "clinical_science_neurology_status", "question": "A 35-year-old man with known epilepsy presents with continuous generalised tonic-clonic seizure activity for 25 minutes. IV lorazepam 4 mg has been given twice without effect.\n\nWhat is the most appropriate next step?", "options": {"A": "Repeat IV lorazepam third dose", "B": "IV phenytoin or levetiracetam loading dose", "C": "Thiopentone infusion (general anaesthesia)", "D": "Oral carbamazepine via NG tube", "E": "Deep brain stimulation"}, "answer": "B", "explanation": "Status epilepticus management follows a staged approach: Stage 1 (0-5 min): benzodiazepine (IV lorazepam x2 or IV/IM midazolam). Stage 2 (5-20 min): if benzodiazepine-refractory, second-line agent — IV phenytoin 20 mg/kg (or fosphenytoin), levetiracetam 60 mg/kg, or sodium valproate 40 mg/kg. Stage 3: if refractory, general anaesthesia with thiopentone, propofol, or midazolam infusion with continuous EEG monitoring. This patient has failed stage 1 therapy and needs a stage 2 agent.", "diagram": null}, {"id": 288, "specialty": "neurology", "tag": "clinical_science_neurology_mnd", "question": "A 58-year-old man presents with progressive weakness and wasting of the hand muscles, fasciculations, tongue fasciculations, and brisk lower limb reflexes with upgoing plantars. Sensory examination is entirely normal. EMG shows widespread denervation and fasciculation potentials.\n\nWhat is the most likely diagnosis?", "options": {"A": "Cervical myelopathy", "B": "Motor neuron disease (ALS)", "C": "Multifocal motor neuropathy", "D": "Myasthenia gravis", "E": "Edrophonium (Tensilon) test"}, "answer": "B", "explanation": "Amyotrophic lateral sclerosis (MND/ALS) presents with combined upper motor neuron (brisk reflexes, upgoing plantars, spasticity) and lower motor neuron (wasting, fasciculations, weakness) signs WITHOUT sensory involvement. The El Escorial criteria require UMN+LMN signs in multiple body regions. Tongue fasciculations indicate bulbar involvement. Prognosis is 3-5 years from symptom onset. Riluzole extends survival by 2-3 months. Multifocal motor neuropathy is a treatable mimic (anti-GM1 antibodies, conduction block on NCS).", "diagram": null}, {"id": 289, "specialty": "neurology", "tag": "medical_science_neurology_csf", "question": "A lumbar puncture is performed on a patient with suspected meningitis. CSF results: WCC 850 (95% neutrophils), protein 3.2 g/L, glucose 0.8 mmol/L (serum glucose 6.5 mmol/L), Gram stain shows Gram-positive diplococci.\n\nWhat is the most likely causative organism?", "options": {"A": "Neisseria meningitidis", "B": "Streptococcus pneumoniae", "C": "Listeria monocytogenes", "D": "Haemophilus influenzae", "E": "Interferon beta-1a SC three times weekly"}, "answer": "B", "explanation": "Gram-positive diplococci in CSF are characteristic of Streptococcus pneumoniae, the most common cause of bacterial meningitis in adults. The CSF profile (neutrophilic pleocytosis, high protein, low glucose ratio <0.4) is typical of bacterial meningitis. Neisseria meningitidis appears as Gram-negative diplococci. Listeria appears as Gram-positive rods. Treatment is IV ceftriaxone plus dexamethasone (de Gans trial showed reduced mortality and neurological sequelae when given before or with first antibiotic dose in pneumococcal meningitis).", "diagram": null}, {"id": 290, "specialty": "neurology", "tag": "clinical_science_neurology_functional", "question": "A 28-year-old woman presents with acute-onset right leg weakness and inability to walk. Hoover sign is positive (involuntary hip extension when flexing the contralateral leg against resistance). MRI brain and spine are normal. There are no upper or lower motor neuron signs.\n\nWhat is the most likely diagnosis?", "options": {"A": "Early multiple sclerosis", "B": "Functional neurological disorder (conversion disorder)", "C": "Malingering", "D": "Peripheral neuropathy", "E": "Tetrabenazine for chorea"}, "answer": "B", "explanation": "Functional neurological disorder (FND) presents with neurological symptoms that are inconsistent with recognised neurological conditions and demonstrate positive clinical signs of internal inconsistency. Hoover sign is a validated positive diagnostic sign — weakness of hip extension that normalises with contralateral hip flexion demonstrates the motor pathway is intact. FND is a diagnosis made on positive clinical grounds, NOT merely by exclusion. Treatment involves physiotherapy, CBT, and multidisciplinary rehabilitation.", "diagram": null}, {"id": 291, "specialty": "neurology", "tag": "clinical_science_neurology_raised_icp", "question": "A 32-year-old obese woman presents with daily headaches worse on waking, transient visual obscurations, and pulsatile tinnitus. Fundoscopy shows bilateral papilloedema. MRI brain is normal. Lumbar puncture shows opening pressure 38 cmH2O with normal CSF composition.\n\nWhat is the most appropriate initial treatment?", "options": {"A": "Surgical VP shunt", "B": "Acetazolamide and weight loss", "C": "Prednisolone", "D": "Therapeutic LP only", "E": "Cladribine tablets"}, "answer": "B", "explanation": "Idiopathic intracranial hypertension (IIH) — formerly pseudotumour cerebri — is characterised by raised ICP without structural cause, typically in obese women of childbearing age. Treatment priorities are: (1) weight loss (5-10% body weight can resolve symptoms), (2) acetazolamide (carbonic anhydrase inhibitor reduces CSF production — IIH Treatment Trial showed benefit for visual function). Surgical interventions (VP shunt, optic nerve sheath fenestration) are reserved for refractory cases or rapid visual deterioration.", "diagram": null}, {"id": 292, "specialty": "neurology", "tag": "medical_science_neurology_neurogenetics", "question": "A 25-year-old man presents with progressive cerebellar ataxia, pes cavus, scoliosis, and hypertrophic cardiomyopathy. Nerve conduction studies show sensory axonal neuropathy. Echocardiography confirms concentric LV hypertrophy.\n\nWhat is the most likely diagnosis?", "options": {"A": "Spinocerebellar ataxia type 1", "B": "Friedreich ataxia", "C": "Multiple system atrophy — cerebellar type", "D": "Wilson disease", "E": "Amantadine 100 mg BD"}, "answer": "B", "explanation": "Friedreich ataxia is the most common inherited ataxia, caused by GAA trinucleotide repeat expansion in the FXN gene (autosomal recessive) encoding frataxin — a mitochondrial protein involved in iron-sulfur cluster assembly. Key features: progressive cerebellar ataxia, absent lower limb reflexes (peripheral neuropathy), pes cavus, scoliosis, and hypertrophic cardiomyopathy (leading cause of death). Onset is typically before age 25. Cardiac disease determines prognosis. Omaveloxolone (Nrf2 activator) is the first approved treatment.", "diagram": null}, {"id": 293, "specialty": "neurology", "tag": "clinical_science_neurology_vertigo", "question": "A 60-year-old woman presents with acute onset of vertigo, nausea, and unsteadiness. She has a positive head impulse test (corrective saccade on leftward rotation), direction-fixed right-beating nystagmus that suppresses with visual fixation, and no skew deviation.\nWhat is the most likely diagnosis?", "options": {"A": "Posterior circulation stroke", "B": "Acute left vestibular neuritis", "C": "Benign paroxysmal positional vertigo", "D": "Meniere disease", "E": "Central vestibular lesion requiring urgent MRI"}, "answer": "B", "explanation": "The HINTS exam (Head Impulse, Nystagmus, Test of Skew) is a powerful bedside tool for differentiating peripheral from central vertigo in acute vestibular syndrome. A positive head impulse test (corrective saccade), direction-fixed nystagmus suppressing with fixation, and absent skew deviation are all consistent with peripheral vestibular neuritis. A dangerous (central) pattern shows a NEGATIVE head impulse test, direction-changing nystagmus, or skew deviation — this pattern mandates urgent MRI to exclude posterior circulation stroke. Vestibular neuritis is treated with short-term vestibular suppressants and early vestibular rehabilitation.", "diagram": null}, {"id": 294, "specialty": "neurology", "tag": "clinical_science_neurology_cranial_nerve", "question": "A 45-year-old man presents with acute onset of unilateral facial weakness affecting both the upper and lower face, loss of taste on the anterior two-thirds of the tongue, and hyperacusis on the affected side.\nWhat is the most likely diagnosis?", "options": {"A": "Stroke affecting the facial nerve nucleus", "B": "Bell's palsy", "C": "Ramsay Hunt syndrome", "D": "Parotid gland tumour", "E": "Ramsay Hunt syndrome (VZV geniculate ganglion reactivation)"}, "answer": "B", "explanation": "Bell's palsy is the most common cause of acute lower motor neurone facial weakness, affecting both upper and lower facial muscles (unlike upper motor neurone lesions which spare the forehead). Associated features include loss of taste (chorda tympani), hyperacusis (nerve to stapedius), and reduced lacrimation. Early treatment with corticosteroids (within 72 hours) improves recovery rates. If vesicles are present in the ear canal, Ramsay Hunt syndrome (VZV reactivation in the geniculate ganglion) should be considered, which requires antivirals in addition. Most Bell's palsy patients recover fully within 3-6 months.", "diagram": null}, {"id": 295, "specialty": "neurology", "tag": "clinical_science_neurology_stroke", "question": "A 70-year-old man with atrial fibrillation presents with sudden onset right-sided weakness and aphasia. CT brain at 2 hours shows no haemorrhage. He is on apixaban 5 mg BD (last dose 6 hours ago). What is the most appropriate next step regarding thrombolysis?", "options": {"A": "Administer IV alteplase immediately", "B": "Check anti-Xa level; if below therapeutic threshold, administer IV alteplase", "C": "Thrombolysis is contraindicated — proceed to mechanical thrombectomy assessment", "D": "Wait 24 hours from last apixaban dose then administer alteplase", "E": "Administer andexanet alfa then proceed to thrombolysis"}, "answer": "B", "explanation": "In patients on DOACs, IV thrombolysis can be considered if specific drug level (anti-Xa for apixaban/rivaroxaban) is below the therapeutic threshold, or if idarucizumab reversal is given for dabigatran.", "diagram": null}, {"id": 296, "specialty": "neurology", "tag": "medical_science_neurology_neuroanatomy", "question": "A patient has a left homonymous hemianopia. Where is the most likely location of the lesion?", "options": {"A": "Left optic nerve", "B": "Optic chiasm", "C": "Right optic tract or right occipital cortex", "D": "Left lateral geniculate nucleus", "E": "Right optic nerve"}, "answer": "C", "explanation": "Left homonymous hemianopia (loss of left visual field in both eyes) localises to the right retrochiasmal visual pathway — either the right optic tract, right lateral geniculate nucleus, right optic radiation, or right occipital cortex.", "diagram": null}, {"id": 297, "specialty": "neurology", "tag": "clinical_science_neurology_epilepsy", "question": "A 22-year-old woman with juvenile myoclonic epilepsy (JME) is planning pregnancy. She is currently well-controlled on sodium valproate 600 mg BD. What is the most appropriate management?", "options": {"A": "Continue valproate with folic acid 5 mg daily", "B": "Switch to lamotrigine before conception with gradual cross-taper", "C": "Switch to carbamazepine before conception", "D": "Cease all antiepileptics 3 months before conception", "E": "Add levetiracetam and reduce valproate to minimum effective dose"}, "answer": "B", "explanation": "Valproate is teratogenic (neural tube defects, neurodevelopmental harm) and contraindicated in women of childbearing potential unless no alternative exists. Lamotrigine or levetiracetam are preferred in pregnancy.", "diagram": null}, {"id": 298, "specialty": "neurology", "tag": "medical_science_neurology_neurotransmission", "question": "Which neurotransmitter is primarily deficient in the nigrostriatal pathway in Parkinson disease?", "options": {"A": "Acetylcholine", "B": "Serotonin", "C": "Dopamine", "D": "GABA", "E": "Noradrenaline"}, "answer": "C", "explanation": "Parkinson disease results from degeneration of dopaminergic neurons in the substantia nigra pars compacta, leading to dopamine depletion in the nigrostriatal pathway and loss of motor control.", "diagram": null}, {"id": 299, "specialty": "neurology", "tag": "clinical_science_neurology_demyelination", "question": "A 28-year-old woman presents with 5 days of progressive visual loss in her left eye with pain on eye movement. Visual acuity is 6/36 left, 6/6 right. Relative afferent pupillary defect is present on the left. MRI brain shows multiple periventricular T2 hyperintensities. What is the most likely diagnosis?", "options": {"A": "Neuromyelitis optica spectrum disorder", "B": "Multiple sclerosis presenting with optic neuritis", "C": "Acute disseminated encephalomyelitis", "D": "Optic nerve glioma", "E": "Sarcoidosis-associated optic neuropathy"}, "answer": "B", "explanation": "Optic neuritis (painful visual loss, RAPD) with multiple periventricular white matter lesions on MRI strongly suggests multiple sclerosis, satisfying dissemination in space criteria.", "diagram": null}, {"id": 300, "specialty": "neurology", "tag": "clinical_science_neurology_headache", "question": "A 32-year-old woman presents with progressive headache, bilateral papilloedema, and visual obscurations. BMI is 38 kg/m². MRI brain and MRV are normal. CSF opening pressure is 32 cmH₂O with normal composition. What is the diagnosis?", "options": {"A": "Cerebral venous sinus thrombosis", "B": "Idiopathic intracranial hypertension", "C": "Normal pressure hydrocephalus", "D": "Meningeal carcinomatosis", "E": "Chiari malformation type 1"}, "answer": "B", "explanation": "Idiopathic intracranial hypertension presents with headache, papilloedema, and elevated CSF pressure (>25 cmH₂O) with normal imaging and CSF composition, typically in young obese women.", "diagram": null}, {"id": 301, "specialty": "neurology", "tag": "medical_science_neurology_neurophysiology", "question": "In Guillain-Barré syndrome (acute inflammatory demyelinating polyneuropathy), which nerve conduction study finding is most characteristic?", "options": {"A": "Reduced amplitude of compound muscle action potentials (CMAPs) with normal conduction velocity", "B": "Prolonged distal motor latencies and reduced conduction velocities with conduction block", "C": "Fibrillation potentials on electromyography", "D": "Normal nerve conduction studies with abnormal repetitive nerve stimulation", "E": "Absent F-waves with preserved H-reflex"}, "answer": "B", "explanation": "AIDP is characterised by demyelinating features on NCS: prolonged distal latencies, slowed conduction velocities, temporal dispersion, and conduction block reflecting segmental demyelination.", "diagram": null}, {"id": 302, "specialty": "neurology", "tag": "clinical_science_neurology_movement", "question": "A 68-year-old man with Parkinson disease on levodopa-carbidopa for 8 years develops involuntary writhing movements of his limbs and trunk at peak dose timing. What is the most appropriate initial management?", "options": {"A": "Increase levodopa dose", "B": "Add entacapone", "C": "Reduce individual levodopa doses and increase dosing frequency", "D": "Switch to dopamine agonist monotherapy", "E": "Commence amantadine for dyskinesia suppression"}, "answer": "C", "explanation": "Peak-dose dyskinesias are managed by reducing individual levodopa doses (to lower peak levels) while increasing dosing frequency to maintain therapeutic effect and reduce wearing-off.", "diagram": null}, {"id": 303, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_acute_presentations", "question": "A 58-year-old man with hypertension presents with sudden onset left-sided weakness, slurred speech, and facial droop lasting 45 minutes. BP 178/98 mmHg, glucose 6.2 mmol/L. CT brain shows no acute abnormality. What is the most appropriate immediate management?", "options": {"A": "Aspirin 300mg then clopidogrel", "B": "Alteplase IV thrombolysis", "C": "Observation and repeat imaging in 6 hours", "D": "Immediate thrombectomy without imaging", "E": "Urgent CT pulmonary angiogram"}, "answer": "B", "explanation": "This is an acute ischemic stroke within the thrombolysis window (< 4.5 hours). CT excludes hemorrhage. IV alteplase is indicated when presenting within 4.5 hours with no contraindications.", "diagram": null}, {"id": 304, "specialty": "general_medicine", "tag": "medical_science_general_medicine_fluid_electrolyte", "question": "A 72-year-old woman with SIADH presents with Na+ 118 mmol/L (serum osmolality 245 mOsm/kg). She develops confusion and seizures. What is the safest approach to sodium correction?", "options": {"A": "Hypertonic saline 3% bolus until seizures stop", "B": "Fluid restriction alone over 48 hours", "C": "Hypertonic saline at 4-8 mmol/L increase over 24 hours", "D": "Normal saline infusion to achieve rapid correction", "E": "Intravenous hydrocortisone 100 mg stat"}, "answer": "C", "explanation": "Severe symptomatic hyponatraemia requires controlled correction at 4-8 mmol/L per 24 hours to prevent osmotic demyelination syndrome. Hypertonic saline may be used but requires careful rate-controlled infusion.", "diagram": null}, {"id": 305, "specialty": "general_medicine", "tag": "medical_science_general_medicine_metabolic_syndrome", "question": "A 54-year-old man has waist circumference 108 cm, BP 148/92, triglycerides 2.8 mmol/L, HDL 1.0 mmol/L, fasting glucose 6.8 mmol/L. He has no prior diabetes. What is the primary modifiable risk factor to address first?", "options": {"A": "Immediate statin therapy", "B": "Weight loss and lifestyle modification", "C": "ACE inhibitor therapy", "D": "Fibrate therapy for triglycerides", "E": "Insulin-dextrose infusion for hyperkalaemia"}, "answer": "B", "explanation": "This patient has metabolic syndrome (meeting ≥3 criteria). Lifestyle modification addressing weight loss is the foundational intervention and may improve all metabolic parameters simultaneously.", "diagram": null}, {"id": 306, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_acute_coronary", "question": "A 58-year-old man presents to a PCI-capable metropolitan emergency department with 90 minutes of crushing central chest pain radiating to the left arm. ECG shows 3mm ST elevation in V1-V4. He is haemodynamically stable. What is the most appropriate reperfusion strategy?", "options": {"A": "IV tenecteplase followed by transfer for angiography within 24 hours", "B": "Primary percutaneous coronary intervention within 90 minutes", "C": "Dual antiplatelet therapy and enoxaparin, with angiography next morning", "D": "Glycoprotein IIb/IIIa inhibitor infusion and urgent CT coronary angiography", "E": "Emergency coronary artery bypass grafting"}, "answer": "B", "explanation": "Primary PCI is the preferred reperfusion strategy for STEMI when performed at a PCI-capable centre within 120 minutes of first medical contact. Thrombolysis is reserved for settings where PCI cannot be achieved within this timeframe.", "diagram": null}, {"id": 307, "specialty": "general_medicine", "tag": "medical_science_general_medicine_acid_base", "question": "A 48-year-old with COPD exacerbation has pH 7.28, PaCO2 72 mmHg, HCO3 32 mmol/L, PaO2 58 mmHg. Which acid-base disturbance best describes this?", "options": {"A": "Pure respiratory acidosis", "B": "Metabolic acidosis with respiratory compensation", "C": "Respiratory acidosis with metabolic alkalosis", "D": "Mixed metabolic and respiratory acidosis", "E": "Non-invasive ventilation with BiPAP"}, "answer": "C", "explanation": "pH is low (acidosis) but HCO3 is elevated (metabolic alkalosis). The expected HCO3 for PaCO2 72 in acute respiratory acidosis is ~26 mmol/L, so elevation to 32 indicates concurrent metabolic alkalosis (likely from diuretics or contraction).", "diagram": null}, {"id": 308, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_pneumonia", "question": "A 71-year-old man with CAP presenting with fever 39.2°C, cough productive of purulent sputum, and CXR right lower lobe consolidation now requires ICU admission for RR 32, O2 sat 88% on 6L NPA, systolic BP 88 mmHg. Besides antibiotics, what is the most critical immediate intervention?", "options": {"A": "Invasive mechanical ventilation", "B": "Noninvasive ventilation (CPAP/BiPAP)", "C": "IV fluid resuscitation and vasopressor consideration", "D": "Prone positioning", "E": "Therapeutic thoracentesis"}, "answer": "C", "explanation": "The patient has septic shock with hypotension and hypoxemia. IV fluid resuscitation is the first-line critical intervention, with vasopressors if BP remains inadequate despite fluids. Intubation may be needed but resuscitation takes priority.", "diagram": null}, {"id": 309, "specialty": "general_medicine", "tag": "medical_science_general_medicine_drug_interactions", "question": "A patient on warfarin (INR 2.8, therapeutic) is started on clarithromycin for respiratory infection. What is the expected consequence and most appropriate management?", "options": {"A": "Decreased INR due to enzyme induction, may require warfarin dose increase", "B": "Increased INR due to CYP3A4 inhibition, requiring warfarin dose reduction", "C": "No interaction, may continue as planned", "D": "Increased INR due to displacement from protein binding only", "E": "IV N-acetylcysteine protocol"}, "answer": "B", "explanation": "Clarithromycin is a potent CYP3A4 inhibitor that decreases warfarin metabolism, increasing INR and bleeding risk. Warfarin dosage should be reduced and INR closely monitored (check in 3-5 days).", "diagram": null}, {"id": 310, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_chronic_pain", "question": "A 56-year-old man with chronic pancreatitis-related pain (current opioid requirement 120 mg daily morphine equivalent) is newly diagnosed with depression. Regarding opioid therapy adjustment, what is most appropriate?", "options": {"A": "Continue current opioid dose, treat depression with SSRIs", "B": "Reduce opioids by 50% due to depression-related pain amplification", "C": "Gradually taper opioids while initiating depression treatment", "D": "Escalate opioids to 180+ mg daily given comorbid depression", "E": "Urgent upper GI endoscopy"}, "answer": "A", "explanation": "Depression and chronic pain often coexist. While depression may amplify pain perception, current opioid therapy should generally be maintained while treating depression. SSRI antidepressants may provide analgesic benefit and help assess true pain level over time.", "diagram": null}, {"id": 311, "specialty": "general_medicine", "tag": "medical_science_general_medicine_nutrition", "question": "An 82-year-old woman admitted with pneumonia has BMI 18.2, significant weight loss over 6 months, poor oral intake, and no swallowing difficulty. Albumin 28 g/L. After acute infection resolves, what is the most appropriate nutritional approach?", "options": {"A": "Oral nutritional supplements targeting 30-35 kcal/kg/day", "B": "Nasogastric feeding tube placement immediately", "C": "Standard hospital diet with encouragement", "D": "Parenteral nutrition", "E": "Temporary transvenous pacing"}, "answer": "A", "explanation": "This patient has malnutrition. Oral nutritional supplements (ONS) are first-line, evidence-based, and improve outcomes in older adults. NG feeding is reserved for swallowing difficulties or failed oral intake despite support. PN is rarely needed in non-critical care.", "diagram": null}, {"id": 312, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_arrhythmia", "question": "A 68-year-old woman with persistent atrial fibrillation (HR 142, symptomatic dyspnea) and normal LV function is on amiodarone and metoprolol but remains uncontrolled. She has hypertension and no structural heart disease. What is the most appropriate next management step?", "options": {"A": "Increase amiodarone dose", "B": "Radiofrequency catheter ablation", "C": "Add digoxin to current therapy", "D": "Switch to dronedarone monotherapy", "E": "IV alteplase for acute ischaemic stroke"}, "answer": "B", "explanation": "Persistent AF uncontrolled on dual rate-control agents warrants consideration of rhythm control strategy. Catheter ablation is effective for symptomatic AF, especially in patients with normal LV function and no structural disease.", "diagram": null}, {"id": 313, "specialty": "general_medicine", "tag": "medical_science_general_medicine_pulmonary", "question": "A 64-year-old former smoker (40 pack-years) with GOLD Stage 2 COPD has FEV1 45% predicted and frequent exacerbations (3 in past year). Current therapy is LAMA monotherapy. What is the most appropriate escalation?", "options": {"A": "Add LABA (LAMA/LABA dual therapy)", "B": "Add ICS (LABA/ICS combination)", "C": "Add ICS/LABA/LAMA triple therapy", "D": "Continue LAMA monotherapy but increase patient education", "E": "Broad-spectrum antibiotics within 1 hour"}, "answer": "A", "explanation": "GOLD guidelines recommend LAMA/LABA dual therapy as the next step for symptomatic COPD after LAMA monotherapy. ICS is added only if there's asthma features or blood eosinophils ≥100 cells/μL despite dual therapy.", "diagram": null}, {"id": 314, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_gi_bleed", "question": "A 70-year-old man on aspirin for stable CAD presents with haematemesis. OGD shows a 20mm ulcer in the gastric antrum with visible vessel (Forrest IIb). After endoscopic therapy, what is the most appropriate gastroprotection strategy?", "options": {"A": "Omeprazole 20 mg daily", "B": "Omeprazole 40 mg BD for 14 days then daily", "C": "Cimetidine 400 mg QID", "D": "No ongoing medical therapy required post-endoscopic treatment", "E": "Paracentesis with albumin replacement"}, "answer": "B", "explanation": "Post-endoscopic therapy, high-dose PPI BID for 14 days, then once daily, reduces re
