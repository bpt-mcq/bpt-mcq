 BNP with diastolic dysfunction phenotype are typical. Troponin negative excludes ACS. This is metabolic cardiomyopathy.", "diagram": null}, {"id": 169, "specialty": "cardiology", "tag": "clinical_science_cardiology_infiltrative", "question": "A 71-year-old man with multiple myeloma (IgG kappa, on bortezomib therapy) presents with dyspnea, peripheral edema, and syncope. LVEF 42%, wall thickness 16 mm globally on echo. Cardiac biomarkers elevated (troponin 0.12). QRS voltage low on ECG. Serum creatinine 1.8 mg/dL, Hb 89 g/L.\n\nWhat is the most likely diagnosis?", "options": {"A": "Cardiac amyloidosis (AL)", "B": "Hypertrophic cardiomyopathy", "C": "Acute myocarditis", "D": "Bortezomib cardiotoxicity", "E": "Left atrial appendage occlusion device"}, "answer": "A", "explanation": "AL amyloidosis in myeloma presents with restrictive physiology, reduced wall motion despite wall thickening, low QRS voltage, and elevated biomarkers. The combination of multiple myeloma, low voltage on ECG with wall thickening on echo, and preserved or mildly reduced LVEF is pathognomonic for cardiac amyloidosis. Diagnosis confirmed by tissue biopsy and Congo red staining. HCM shows severe LV hypertrophy with dynamic obstruction.", "diagram": null}, {"id": 170, "specialty": "cardiology", "tag": "medical_science_cardiology_genetics", "question": "A 34-year-old man with dilated cardiomyopathy (LVEF 28%, LV diameter 65 mm) and LVOT obstruction (SAM present) on echo is found to have a pathogenic TTN mutation. His mother has HCM with SMA but no dilated phenotype. His brother has LVEF 35% with no obstruction.\n\nWhat is the most appropriate genetic counseling?", "options": {"A": "Autosomal dominant inheritance; siblings and children should be screened", "B": "X-linked recessive inheritance; only daughters are carriers", "C": "Autosomal recessive inheritance; both parents must be carriers", "D": "Sporadic mutation with low recurrence risk", "E": "Endomyocardial biopsy"}, "answer": "A", "explanation": "TTN mutations cause autosomal dominant dilated cardiomyopathy (DCM) with variable penetrance and expressivity. Family members (siblings, children) should undergo genetic testing and cardiac screening. The mother's HCM phenotype suggests genetic heterogeneity or modifier genes. Recurrence risk for offspring is ~50% if father is affected.", "diagram": null}, {"id": 171, "specialty": "cardiology", "tag": "clinical_science_cardiology_postop", "question": "A 68-year-old man on day 3 post-CABG develops fever (38.6°C), elevated WBC 14.2 × 10^9/L, and new ST elevation in inferior leads on ECG. Troponin I 0.28 μg/L, CK-MB 8.5 ng/mL. Coronary angiography shows patent grafts. Echocardiography unchanged from pre-op.\n\nWhat is the most likely diagnosis?", "options": {"A": "Post-operative myocardial infarction (POMI)", "B": "Acute pericarditis", "C": "Graft thrombosis", "D": "Myocardial stunning", "E": "Extracorporeal membrane oxygenation"}, "answer": "B", "explanation": "Post-operative fever with ST elevation and elevated troponin in the context of normal graft angiography suggests post-operative pericarditis (Dressler syndrome). POMI typically shows in graft territory with more marked troponin elevation. Pericarditis presents with pleuritic pain, diffuse ST elevation, and pericardial friction rub. Echo findings depend on effusion presence. Treatment includes NSAIDs and colchicine.", "diagram": null}, {"id": 172, "specialty": "cardiology", "tag": "medical_science_cardiology_prevention", "question": "A 55-year-old man with no prior cardiovascular disease, hypertension (BP 142/88), and hyperlipidemia (LDL-C 4.1 mmol/L) has 10-year cardiovascular risk of 18% by Framingham score. He declines statin therapy due to myalgia concerns. He is otherwise fit with eGFR 78 mL/min/1.73m².\n\nWhat is the most appropriate approach?", "options": {"A": "Defer statin therapy and repeat risk assessment in 2 years", "B": "Initiate moderate-intensity statin with myalgia monitoring", "C": "Recommend nutraceuticals and lifestyle modification only", "D": "Initiate PCSK9 inhibitor monotherapy", "E": "Flecainide 100 mg BD"}, "answer": "B", "explanation": "10-year CVD risk ≥15% warrants statin initiation for primary prevention per current guidelines. Myalgia is subjective; true statin-induced muscle injury is rare. Start moderate-intensity statin, reassess lipids in 4-6 weeks, and monitor symptoms. If true myalgia occurs, switch to alternative agent or lower dose. Deferral or lifestyle-only approach carries unacceptable CVD risk.", "diagram": null}, {"id": 173, "specialty": "cardiology", "tag": "clinical_science_cardiology_endocarditis", "question": "A 32-year-old intravenous drug user presents with fever, a new pansystolic murmur at the left sternal edge, and multiple small haemorrhagic lesions on the palms. Blood cultures grow Staphylococcus aureus.\nWhat is the most likely diagnosis?", "options": {"A": "Rheumatic heart disease", "B": "Infective endocarditis", "C": "Myocarditis", "D": "Pericarditis", "E": "Acute rheumatic fever"}, "answer": "B", "explanation": "Infective endocarditis (IE) classically presents with fever, new or changing murmur, and peripheral embolic phenomena such as Janeway lesions (painless haemorrhagic palmar lesions) and Osler nodes. S. aureus is the most common cause of IE in IVDU, typically affecting the tricuspid valve. Duke criteria combine clinical, echocardiographic, and microbiological findings to establish the diagnosis.", "diagram": null}, {"id": 174, "specialty": "cardiology", "tag": "clinical_science_cardiology_cardiomyopathy", "question": "A 55-year-old woman presents with progressive dyspnoea and syncope on exertion. Echocardiography reveals asymmetric septal hypertrophy of 18 mm with systolic anterior motion of the mitral valve and a dynamic left ventricular outflow tract gradient of 60 mmHg.\nWhich management strategy is MOST appropriate as first-line therapy?", "options": {"A": "Digoxin", "B": "Non-dihydropyridine calcium channel blockers or beta-blockers", "C": "ACE inhibitors", "D": "Diuretics", "E": "Dilated cardiomyopathy"}, "answer": "B", "explanation": "Hypertrophic cardiomyopathy (HCM) with dynamic LVOT obstruction is managed with negative inotropes — beta-blockers or non-dihydropyridine calcium channel blockers (e.g. verapamil). These reduce heart rate and contractility, decreasing the obstruction gradient. Digoxin, vasodilators, and high-dose diuretics should be avoided as they can worsen obstruction.", "diagram": null}, {"id": 175, "specialty": "cardiology", "tag": "medical_science_cardiology_channelopathy", "question": "A 22-year-old man is referred after his brother suffered a sudden cardiac arrest. His ECG shows a coved-type ST elevation in leads V1-V3 with a right bundle branch block pattern. Echocardiography and coronary angiography are normal.\nWhat is the underlying diagnosis?", "options": {"A": "Wolff-Parkinson-White syndrome", "B": "Long QT syndrome", "C": "Brugada syndrome", "D": "Arrhythmogenic right ventricular cardiomyopathy", "E": "Long QT syndrome type 1"}, "answer": "C", "explanation": "Brugada syndrome is a channelopathy caused by mutations in sodium channel genes (most commonly SCN5A). The characteristic Type 1 (coved) ECG pattern shows ST elevation ≥2 mm with a negative T wave in V1-V3. It carries a risk of ventricular fibrillation and sudden cardiac death, particularly at rest or during sleep. An ICD is the only proven therapy for prevention of sudden death in high-risk patients.", "diagram": null}, {"id": 176, "specialty": "cardiology", "tag": "clinical_science_cardiology_rheumatic", "question": "A 28-year-old woman from a rural Indigenous Australian community presents with dyspnoea and a low-pitched diastolic rumble at the apex. She reports a history of recurrent sore throats as a child.\nWhat is the most likely valvular lesion?", "options": {"A": "Aortic stenosis", "B": "Mitral regurgitation", "C": "Mitral stenosis", "D": "Tricuspid regurgitation", "E": "Aortic regurgitation"}, "answer": "C", "explanation": "Rheumatic heart disease (RHD) remains prevalent in Indigenous Australian communities and developing nations. Mitral stenosis is the hallmark valvular lesion of chronic RHD, characterised by a low-pitched mid-diastolic rumble best heard at the apex. RHD results from immune-mediated damage following Group A streptococcal pharyngitis. Secondary prophylaxis with regular benzathine penicillin injections is essential to prevent recurrent rheumatic fever and progressive valve damage.", "diagram": null}, {"id": 177, "specialty": "cardiology", "tag": "clinical_science_cardiology_pulmonary_htn", "question": "A 45-year-old woman with systemic sclerosis presents with progressive exertional dyspnoea. Echocardiography estimates right ventricular systolic pressure at 55 mmHg with right ventricular dilatation. Lung function shows an isolated reduction in DLCO.\nWhat is the most appropriate next investigation?", "options": {"A": "CT pulmonary angiography", "B": "Right heart catheterisation", "C": "High-resolution CT chest", "D": "Ventilation-perfusion scan", "E": "Transthoracic echocardiography alone"}, "answer": "B", "explanation": "Right heart catheterisation (RHC) is the gold standard for confirming pulmonary arterial hypertension (PAH). It measures mean pulmonary artery pressure (≥20 mmHg defines PH) and pulmonary vascular resistance, and distinguishes pre-capillary from post-capillary causes. Systemic sclerosis is a major risk factor for Group 1 PAH. An isolated reduction in DLCO out of proportion to lung volumes is a classic early finding. While CTPA and V/Q scans help exclude chronic thromboembolic disease (Group 4), RHC is required before initiating targeted PAH therapy.", "diagram": null}, {"id": 178, "specialty": "cardiology", "tag": "medical_science_cardiology_pharmacology", "question": "Which mechanism of action best describes the antiarrhythmic effect of amiodarone?", "options": {"A": "Selective beta-1 adrenergic receptor blockade", "B": "Blockade of multiple ion channels (Na⁺, K⁺, Ca²⁺) with additional beta-blocking activity", "C": "Selective rapid delayed rectifier potassium channel (IKr) blockade", "D": "Muscarinic receptor antagonism with sodium channel blockade", "E": "Selective funny current (If) inhibition"}, "answer": "B", "explanation": "Amiodarone has properties of all four Vaughan-Williams classes: Na⁺ channel blockade (class I), beta-blockade (class II), K⁺ channel blockade (class III), and Ca²⁺ channel blockade (class IV).", "diagram": null}, {"id": 179, "specialty": "cardiology", "tag": "clinical_science_cardiology_heart_failure", "question": "A 62-year-old man with NYHA class III heart failure with reduced ejection fraction (LVEF 28%) is on maximally tolerated doses of ramipril, bisoprolol, and spironolactone. His BP is 108/68 mmHg, HR 72 bpm in sinus rhythm, eGFR 55 mL/min, K⁺ 4.8 mmol/L. Which additional therapy has mortality benefit?", "options": {"A": "Digoxin 125 µg daily", "B": "Sacubitril/valsartan (replacing ramipril)", "C": "Ivabradine 5 mg BD", "D": "Hydralazine and isosorbide dinitrate", "E": "Amlodipine 5 mg daily"}, "answer": "B", "explanation": "Sacubitril/valsartan (ARNI) replaces ACE inhibitors in HFrEF and reduces mortality (PARADIGM-HF). Ivabradine requires HR >70 in sinus rhythm. Digoxin reduces hospitalisations but not mortality.", "diagram": null}, {"id": 180, "specialty": "cardiology", "tag": "clinical_science_cardiology_valvular", "question": "A 78-year-old woman with severe symptomatic aortic stenosis (mean gradient 48 mmHg, AVA 0.7 cm²) has an STS score of 8%. She is considered high surgical risk. What is the most appropriate intervention?", "options": {"A": "Surgical aortic valve replacement (SAVR)", "B": "Transcatheter aortic valve implantation (TAVI)", "C": "Balloon aortic valvuloplasty", "D": "Medical therapy with ACE inhibitor and diuretic", "E": "Watchful waiting with serial echocardiography"}, "answer": "B", "explanation": "TAVI is recommended for patients with severe symptomatic aortic stenosis who are high surgical risk (STS ≥8%). Balloon valvuloplasty is only a bridge, not definitive therapy.", "diagram": null}, {"id": 181, "specialty": "cardiology", "tag": "medical_science_cardiology_physiology", "question": "During the cardiac cycle, which phase corresponds to the period when ventricular volume is decreasing and all valves are closed?", "options": {"A": "Isovolumetric contraction", "B": "Rapid ventricular ejection", "C": "Isovolumetric relaxation", "D": "Rapid ventricular filling", "E": "Atrial systole (atrial kick)"}, "answer": "A", "explanation": "During isovolumetric contraction, ventricular pressure rises with both AV and semilunar valves closed; volume does not change. The question describes isovolumetric relaxation — where volume is unchanged and both valves are closed after ejection.", "diagram": null}, {"id": 182, "specialty": "cardiology", "tag": "clinical_science_cardiology_arrhythmia", "question": "A 35-year-old man presents with recurrent episodes of sudden-onset palpitations lasting 20-30 minutes, terminating spontaneously. ECG in sinus rhythm shows a short PR interval (100 ms) and a delta wave. What is the most appropriate long-term management?", "options": {"A": "Verapamil 120 mg TDS", "B": "Flecainide 100 mg BD", "C": "Catheter ablation of the accessory pathway", "D": "Digoxin 250 µg daily", "E": "Amiodarone 200 mg daily"}, "answer": "C", "explanation": "WPW syndrome (short PR, delta wave) with symptomatic tachycardia is best managed with catheter ablation, which is curative. Verapamil and digoxin are contraindicated as they can enhance conduction through the accessory pathway.", "diagram": null}, {"id": 183, "specialty": "dermatology", "tag": "clinical_science_dermatology_melanoma", "question": "A 52-year-old man with fair skin and prior history of solar keratosis presents with a 18 mm brown nodule on the back with irregular borders, color variation (brown-black-tan), and surface crusting. No palpable lymph nodes. Dermoscopy shows blue-white veil, eccentric distribution of pigment, and atypical vessels. Excision biopsy shows invasion to Clark level IV with 2.8 mm Breslow thickness.\n\nWhat is the most appropriate next step?", "options": {"A": "Wide local excision with 2 cm margin", "B": "Sentinel lymph node biopsy", "C": "High-dose interferon alpha", "D": "Observation with clinical photography", "E": "Topical mupirocin 2% ointment TDS"}, "answer": "B", "explanation": "Breslow thickness ≥1 mm (this patient 2.8 mm) is indication for sentinel lymph node biopsy (SLNB) to stage melanoma. SLNB allows identification of regional nodal metastases and guides adjuvant therapy decisions. Wide local excision (already done diagnostically) is definitive for primary tumor; sentinel node identification determines stage and prognosis. Interferon is considered for high-risk resected disease but staging is prerequisite.", "diagram": null}, {"id": 184, "specialty": "dermatology", "tag": "medical_science_dermatology_pharmacology", "question": "A 34-year-old woman with moderate psoriasis affecting 12% BSA is started on etanercept (TNF inhibitor). After 2 weeks she develops fever, nonproductive cough, and chest pain. CXR shows bilateral perihilar infiltrates. AFB smear pending.\n\nWhat is the most likely complication?", "options": {"A": "Tuberculosis reactivation", "B": "Drug hypersensitivity reaction", "C": "Infusion reaction", "D": "Pneumocystis pneumonia", "E": "Oral acitretin 25 mg daily"}, "answer": "A", "explanation": "TNF inhibitors (etanercept, infliximab, adalimumab) significantly increase TB reactivation risk (5-10 fold). All patients require TB screening (IGRA, CXR) before TNF inhibitor initiation. The acute presentation with fever, respiratory symptoms, and CXR findings consistent with TB reactivation warrants immediate investigation including AFB smears and TB culture. Prophylactic isoniazid is required for LTBI before starting TNF inhibitor.", "diagram": null}, {"id": 185, "specialty": "dermatology", "tag": "clinical_science_dermatology_infection", "question": "A 28-year-old immunocompetent woman with genital herpes simplex virus (HSV-2) infection 2 weeks duration develops fever, meningismus, and photophobia. CSF analysis shows pleocytosis (45 WBC/μL, 60% lymphocytes), protein 65 mg/dL, glucose 52 mg/dL (serum 98). HSV PCR pending.\n\nWhat is the most appropriate initial management?", "options": {"A": "Acyclovir 10 mg/kg IV 8-hourly", "B": "Ceftriaxone and vancomycin only", "C": "Supportive care pending HSV PCR result", "D": "Acyclovir 800 mg oral 5 times daily", "E": "Patch testing to standard series"}, "answer": "A", "explanation": "HSV meningitis (often HSV-2 during genital recurrence) presents with CSF pleocytosis with lymphocytic predominance and hypoglycorrhachia. IV acyclovir 10-15 mg/kg 8-hourly should be started empirically given clinical suspicion and CSF findings consistent with viral meningitis, even pending HSV PCR confirmation. Delay increases morbidity and mortality risk. Bacterial coverage is added only if bacterial meningitis cannot be excluded.", "diagram": null}, {"id": 186, "specialty": "dermatology", "tag": "medical_science_dermatology_immunology", "question": "A 41-year-old woman with systemic lupus erythematosus (SLE) presents with photosensitive erythema over cheeks and bridge of nose, oral ulcers, and arthralgia. ANA 1:640 (homogeneous), anti-dsDNA 180 IU/mL (elevated), C3 78 mg/dL (normal >90), C4 12 mg/dL (normal >16). Urinalysis shows 2+ proteinuria, no hematuria.\n\nWhat cutaneous manifestation is most likely present?", "options": {"A": "Acute cutaneous lupus erythematosus (ACLE)", "B": "Subacute cutaneous lupus erythematosus (SCLE)", "C": "Discoid lupus erythematosus (DLE)", "D": "Lupus profundus", "E": "Skin biopsy with direct immunofluorescence"}, "answer": "A", "explanation": "Malar erythema with photosensitivity, oral ulcers, and systemic features (arthralgia, glomerulonephritis with proteinuria) is ACLE. ACLE occurs in active SLE with elevated anti-dsDNA and low complement (C3, C4). SCLE is annular/polycyclic, photosensitive but associated with anti-Ro/SSA antibodies. DLE is scarring, typically facial and scalp. Lupus profundus is subcutaneous inflammation with nodules.", "diagram": null}, {"id": 187, "specialty": "dermatology", "tag": "clinical_science_dermatology_neoplasia", "question": "A 67-year-old woman with fair skin and extensive solar damage presents with a 12 mm indurated pink nodule on the forehead with raised, rolled edges and central ulceration. Histology shows infiltrative growth pattern with perineural invasion.\n\nWhat is the main prognostic concern?", "options": {"A": "High-risk basal cell carcinoma with perineural invasion", "B": "Well-differentiated squamous cell carcinoma", "C": "Keratoacanthoma", "D": "Melanoma in situ", "E": "Photodynamic therapy"}, "answer": "A", "explanation": "Perineural invasion in skin cancer (BCC or SCC) is high-risk feature associated with recurrence, extension, and metastatic potential. The clinical description (nodule with ulceration, rolled borders, perineural invasion on histology) describes high-risk BCC or aggressive SCC. Perineural invasion requires Mohs micrographic surgery or wide excision with clear margins, possible adjuvant radiotherapy. Keratoacanthoma is typically self-resolving.", "diagram": null}, {"id": 188, "specialty": "dermatology", "tag": "medical_science_dermatology_genetics", "question": "A 42-year-old man with hereditary nonpolyposis colorectal cancer (Lynch syndrome) presents with numerous sebaceous adenomas, multiple sebaceous carcinomas on the trunk, and skin-colored papules on the eyelids. Family history of early-onset colorectal cancer.\n\nWhat genetic syndrome is most likely?", "options": {"A": "Muir-Torre syndrome", "B": "Cowden syndrome", "C": "Peutz-Jeghers syndrome", "D": "Familial adenomatous polyposis", "E": "Oral terbinafine 250 mg daily for 6 weeks"}, "answer": "A", "explanation": "Muir-Torre syndrome is a variant of Lynch syndrome (autosomal dominant mismatch repair gene mutations) characterized by sebaceous neoplasms (adenomas, carcinomas) and keratoacanthomas with increased GI and other malignancy risk. The combination of sebaceous tumors with Lynch syndrome features is pathognomonic. Cowden features hamartomas, lipomas, and trichilemmomas. Peutz-Jeghers has mucosal pigmentation.", "diagram": null}, {"id": 189, "specialty": "dermatology", "tag": "clinical_science_dermatology_bullous", "question": "A 58-year-old woman develops tense bullae on flexural skin and lower abdomen with raised, erythematous base. Direct immunofluorescence (DIF) shows linear IgG and C3 deposition along basement membrane zone. Indirect IF shows circulating IgG against bullous pemphigoid antigen BP180. Salt-split skin shows IgG at roof.\n\nWhat is the diagnosis?", "options": {"A": "Bullous pemphigoid", "B": "Pemphigus vulgaris", "C": "Dermatitis herpetiformis", "D": "Linear IgA disease", "E": "Narrowband UVB phototherapy"}, "answer": "A", "explanation": "Bullous pemphigoid (BP) is autoimmune blistering disease with antibodies against hemidesmosomes (BP180, BP230). DIF shows linear IgG/C3 along BMZ. Salt-split skin technique shows IgG at roof (subbasal laminar deposition). Anti-BP180 antibodies correlate with active disease. Pemphigus vulgaris shows intraepidermal blistering with IgG/C3 in intercellular pattern. Dermatitis herpetiformis shows granular IgA at BMZ.", "diagram": null}, {"id": 190, "specialty": "dermatology", "tag": "medical_science_dermatology_systemic", "question": "A 31-year-old woman presents with erythema nodosum (tender nodules on shins), uveitis, and hilar lymphadenopathy on CXR. ACE level elevated, serum calcium 2.78 mmol/L (elevated), urinary calcium elevated. Kveim test positive.\n\nWhat is the most appropriate confirmatory investigation?", "options": {"A": "Skin biopsy with histopathology showing noncaseating granulomas", "B": "Chest HRCT showing pulmonary parenchymal involvement", "C": "Serum angiotensin-converting enzyme and serum calcium", "D": "Transbronchial lung biopsy with bronchoalveolar lavage", "E": "Topical tacrolimus 0.1% ointment"}, "answer": "A", "explanation": "Sarcoidosis diagnosis requires compatible clinical/radiological features plus histopathological evidence of noncaseating granulomas from involved tissue. Skin biopsy of erythema nodosum may not show granulomas (it is panniculitis), but subcutaneous nodule or mediastinal lymph node biopsy would. Transbronchial biopsy is gold standard if pulmonary involvement; skin biopsy from lesion less likely to confirm. ACE and calcium support diagnosis but are not confirmatory.", "diagram": null}, {"id": 191, "specialty": "dermatology", "tag": "clinical_science_dermatology_eczema", "question": "A 6-year-old child with severe atopic dermatitis affecting >30% BSA despite moderate-potency topical corticosteroids (clobetasone butyrate) and emollients develops widespread impetigo with honey-crusted plaques. Cultures show methicillin-sensitive Staphylococcus aureus. Mother asks about avoiding use of topical steroids.\n\nWhat is the most appropriate management?", "options": {"A": "Continue topical steroids with adjunctive antimicrobial therapy; treat infection", "B": "Cease all topical steroids; use systemic antibiotics only", "C": "Switch to calcineurin inhibitors; avoid topical steroids", "D": "Admit for IV antibiotics and complete steroid cessation", "E": "Oral dapsone 100 mg daily"}, "answer": "A", "explanation": "Atopic dermatitis with secondary bacterial infection requires simultaneous treatment of both conditions. Topical steroids should continue (or escalate potency) concurrent with antimicrobial therapy (topical fusidic acid, oral antibiotics for extensive impetigo). Ceasing steroids during flare risks disease escalation and greater morbidity. Calcineurin inhibitors are adjunctive but not substitute. Antimicrobial therapy reduces infection risk without compromising AD management.", "diagram": null}, {"id": 192, "specialty": "dermatology", "tag": "medical_science_dermatology_phototherapy", "question": "A 34-year-old woman with plaque psoriasis affecting 18% BSA is started on narrowband UVB (NB-UVB) phototherapy twice weekly. After 6 weeks (12 treatments) with excellent response (75% improvement), she asks about maintenance therapy and screening.\n\nWhat is the most appropriate monitoring plan?", "options": {"A": "Annual ophthalmology assessment and skin cancer surveillance", "B": "Baseline and annual dermatology skin cancer checks", "C": "Monthly complete blood count and liver function tests", "D": "Quarterly vitamin D level monitoring", "E": "Mohs micrographic surgery"}, "answer": "B", "explanation": "NB-UVB phototherapy increases nonmelanoma skin cancer and cataracts risk with cumulative UV exposure. Annual skin cancer screening by dermatology is essential. Ophthalmology assessment baseline is recommended, then as clinically indicated (typically annual for long-term therapy). Routine blood work is not required. Vitamin D levels may improve with UVB exposure, reducing supplementation need, but routine monitoring is not mandatory.", "diagram": null}, {"id": 193, "specialty": "dermatology", "tag": "clinical_science_dermatology_urticaria", "question": "A 42-year-old woman with chronic spontaneous urticaria for 8 months (daily pruritic wheals and angioedema) refractory to standard-dose H1 antihistamines for 3 months is referred. She is not taking any medications except the antihistamine and topical emollients. Thyroid autoimmunity serologies negative. Skin prick tests negative to common allergens.\n\nWhat is the most appropriate next step in management?", "options": {"A": "Increase H1 antihistamine to high-dose (up to 4x standard dose)", "B": "Add cyclosporine", "C": "Perform extensive allergy testing", "D": "Refer for intravenous immunoglobulin (IVIG)", "E": "Intralesional triamcinolone 10 mg/mL"}, "answer": "A", "explanation": "Chronic spontaneous urticaria refractory to standard-dose H1 antihistamines is managed with high-dose H1 antagonist (cetirizine or fexofenadine up to 4x standard dose, evidence-based per guidelines) for 2-4 weeks before escalating to second-line agents (omalizumab, cyclosporine, CysA). Extensive allergy testing is not indicated in CSU. IVIG is not first-line. Omalizumab (anti-IgE) is second-line if high-dose antihistamines fail.", "diagram": null}, {"id": 194, "specialty": "dermatology", "tag": "medical_science_dermatology_rosacea", "question": "A 48-year-old woman with rosacea (persistent erythema, papules, pustules on face for 4 years) is now developing granulomatous inflammation with nodules and persistent edema of cheeks, nose, and forehead. Biopsy shows granulomatous dermatitis. Ocular involvement with keratitis is present.\n\nWhat is the most likely diagnosis?", "options": {"A": "Granulomatous rosacea with ocular involvement", "B": "Sarcoidosis with dermal involvement", "C": "Tuberculosis verrucosa cutis", "D": "Rosacea with concurrent sarcoidosis", "E": "Oral isotretinoin 0.5 mg/kg/day"}, "answer": "A", "explanation": "Granulomatous rosacea is a variant with granulomatous inflammation (sarcoid-like granulomas on histology) and nodular, fibrotic features. Ocular involvement (keratitis) is common. This progresses from typical rosacea and causes significant morbidity if untreated. Management includes systemic antibiotics (doxycycline, minocycline) and sometimes oral isotretinoin. Sarcoidosis would have systemic features; TB would show acid-fast bacilli.", "diagram": null}, {"id": 195, "specialty": "dermatology", "tag": "clinical_science_dermatology_drug_reaction", "question": "A 52-year-old man with recently diagnosed tuberculosis started on isoniazid, rifampicin, pyrazinamide, and ethambutol 3 weeks ago develops fever, facial edema, exfoliative erythrodermia affecting 85% BSA, lymphadenopathy, and hepatitis (ALT 340 U/L). Eosinophilia 3.2 × 10^9/L, atypical lymphocytes on blood film.\n\nWhat is the most likely diagnosis?", "options": {"A": "Drug reaction with eosinophilia and systemic symptoms (DRESS syndrome)", "B": "Toxic epidermal necrolysis (TEN)", "C": "Acute leukemia", "D": "Erythrodermic psoriasis flare", "E": "Cryotherapy with liquid nitrogen"}, "answer": "A", "explanation": "DRESS syndrome presents with fever, exfoliative dermatitis, facial edema, lymphadenopathy, and systemic involvement (hepatitis, hematologic abnormalities) 2-6 weeks after drug initiation. Aromatic antituberculous drugs (isoniazid, rifampicin) commonly trigger DRESS. Eosinophilia and atypical lymphocytes support diagnosis. Immediate drug cessation and systemic corticosteroids are required. TEN shows mucosal involvement and blistering, not typical lymphadenopathy.", "diagram": null}, {"id": 196, "specialty": "dermatology", "tag": "medical_science_dermatology_wound_healing", "question": "A 64-year-old man with chronic venous insufficiency, BMI 31, presents with a 5 cm ulcer on medial ankle with minimal surrounding erythema, mild serous exudate, and clean base. The ulcer has been present for 4 months without significant healing. Doppler ultrasound shows patent deep veins but incompetent superficial veins.\n\nWhat is the most appropriate compression strategy?", "options": {"A": "High-compression bandaging (30-40 mmHg at ankle) with weekly dressing changes", "B": "Light compression (15 mmHg) with frequent dressing changes", "C": "No compression due to risk of deep venous thrombosis", "D": "Compression only if ABPI >0.9", "E": "Topical calcipotriol-betamethasone combination"}, "answer": "A", "explanation": "Chronic venous leg ulcers require high-compression therapy (30-40 mmHg achieved at ankle, graduated) to reduce venous hypertension and promote healing. Doppler-confirmed patent deep veins and normal ABPI permit safe high-compression use. Light compression is subtherapeutic. No compression allows venous stasis and delayed healing. Compression is first-line management and reduces healing time significantly.", "diagram": null}, {"id": 197, "specialty": "dermatology", "tag": "clinical_science_dermatology_pigmentation", "question": "A 38-year-old man with Fitzpatrick type VI skin develops depigmented patches on dorsal hands, feet, neck, and genitals with sharp demarcation and increased sensitivity to sun exposure. Family history of autoimmune thyroiditis. Oral mucosal depigmentation noted. Vitiligo is suspected.\n\nWhat is the most likely pathogenic mechanism?", "options": {"A": "Autoimmune destruction of melanocytes with loss of Langerhans cell tolerance", "B": "Melanocyte migration defect during embryogenesis", "C": "Toxic intermediates of melanin synthesis", "D": "Genetic deletion of melanin synthase gene", "E": "Excision with 2 cm margins"}, "answer": "A", "explanation": "Vitiligo is autoimmune depigmentation with T-cell mediated destruction of melanocytes. Loss of immune tolerance (linked to HLA genes and other autoimmune conditions) drives melanocyte destruction. Genetic factors (multiple susceptibility loci) and environmental triggers (oxidative stress, trauma) combine to initiate disease. Association with thyroid autoimmunity supports autoimmune mechanism. Epigenetic silencing and intrinsic melanocyte defects are secondary factors.", "diagram": null}, {"id": 198, "specialty": "dermatology", "tag": "medical_science_dermatology_acne", "question": "A 20-year-old woman with severe acne (widespread nodules, cysts affecting face and trunk, >400 lesions) and significant psychological impact despite 3 months of isotretinoin 0.5 mg/kg/day is still developing new cystic lesions. Triglycerides 2.8 mmol/L (baseline 1.4), liver function normal.\n\nWhat is the most appropriate management?", "options": {"A": "Increase isotretinoin to 1.0 mg/kg/day", "B": "Add oral antibiotics and hormonal therapy", "C": "Continue current dose; most patients need 16-20 weeks treatment", "D": "Switch to benzoyl peroxide and retinoid monotherapy", "E": "Oral prednisolone taper over 6 weeks"}, "answer": "A", "explanation": "Severe acne requiring isotretinoin should be dosed at 1.0 mg/kg/day (cumulative dose target 120-150 mg/kg for remission). Current dose of 0.5 mg/kg/day is suboptimal. Dose escalation is safe if lipid profile is acceptable (current triglycerides elevated but <3.5 mmol/L is acceptable). Combining oral antibiotics with isotretinoin is contraindicated (reduced absorption, additional side effects). Monotherapy with retinoids is insufficient for severe nodulocystic acne.", "diagram": null}, {"id": 199, "specialty": "dermatology", "tag": "clinical_science_dermatology_infection_fungal", "question": "A 71-year-old man with history of diabetes (HbA1c 58 mmol/mol) and peripheral neuropathy develops rapidly progressive black necrotic eschar on the hard palate and oronasal bridge with surrounding erythema and swelling. Fever 38.9°C. Blood glucose 22 mmol/L. Nasal endoscopy shows black necrotic tissue with invasion into nasal mucosa.\n\nWhat is the most likely diagnosis and immediate management?", "options": {"A": "Mucormycosis; urgent surgical debridement and IV amphotericin B", "B": "Aspergillus infection; IV voriconazole monotherapy", "C": "Candida esophagitis; fluconazole therapy", "D": "Herpes zoster; acyclovir therapy", "E": "Adalimumab 40 mg SC fortnightly"}, "answer": "A", "explanation": "Rhino-orbital mucormycosis is a medical emergency presenting with oronasal black necrotic lesions, fever, and rapid progression in immunocompromised/diabetic patients. It requires immediate aggressive surgical debridement (repeated if necessary) concurrent with IV amphotericin B (lipid formulation preferred). Mortality is very high without prompt intervention. Blood glucose control is also essential. Culture/histology confirmation is secondary to urgency of treatment.", "diagram": null}, {"id": 200, "specialty": "dermatology", "tag": "medical_science_dermatology_collagen", "question": "A 36-year-old woman with systemic sclerosis (limited cutaneous SSc) and Raynaud phenomenon develops skin tightening progressing proximally. Skin biopsy shows thickened collagen bundles, perivascular inflammation, and dermal fibrosis. Serum anti-centromere antibodies positive, anti-topoisomerase I negative. ANA speckled pattern.\n\nWhat is the most appropriate treatment to prevent progression?", "options": {"A": "Mycophenolate mofetil or cyclophosphamide for skin fibrosis arrest", "B": "Bosentan for Raynaud phenomenon management", "C": "Penicillamine for collagen cross-link disruption", "D": "Systemic corticosteroids for anti-inflammatory effect", "E": "Topical permethrin 5% cream"}, "answer": "A", "explanation": "Limited SSc with progressive skin fibrosis warrants immunosuppressive therapy with mycophenolate mofetil or cyclophosphamide to prevent/arrest fibrosis progression. MMF is favored due to better tolerability. Bosentan addresses vasculopathy (Raynaud, digital ulcers) but not fibrosis. Penicillamine has fallen from favor. Systemic corticosteroids increase renal crisis risk in SSc. Immunosuppression plus PAH/Raynaud management gives best outcomes.", "diagram": null}, {"id": 201, "specialty": "dermatology", "tag": "clinical_science_dermatology_genodermatosis", "question": "A 19-year-old man with xeroderma pigmentosum (XP) presents with a 15 mm friable, ulcerated nodule on the external ear with satellite lesions. He has had multiple skin cancers removed since age 8 (BCC, SCC, melanoma). He is sun-sensitive with pigmentation changes since childhood.\n\nWhat is the most likely diagnosis for the current lesion?", "options": {"A": "Squamous cell carcinoma with aggressive features", "B": "Basal cell carcinoma", "C": "Melanoma", "D": "Keratoacanthoma", "E": "Hydroxychloroquine 200 mg BD"}, "answer": "C", "explanation": "XP patients develop multiple skin cancers at young age due to nucleotide excision repair deficiency. While BCC and SCC are most common, melanoma risk is markedly elevated (1000x relative risk). The friable, ulcerated presentation on sun-exposed site in XP is concerning for melanoma. Histological confirmation is essential. All lesions in XP patients warrant aggressive evaluation and treatment. Ocular involvement and neurodegeneration also require monitoring.", "diagram": null}, {"id": 202, "specialty": "dermatology", "tag": "medical_science_dermatology_barrier", "question": "A 3-year-old boy with atopic dermatitis is found to have a loss-of-function mutation in the filaggrin (FLG) gene on genetic testing. His parents ask about disease trajectory and other associated conditions to monitor for.\n\nWhat is the most important associated condition to monitor?", "options": {"A": "Asthma and allergic rhinitis (atopic march)", "B": "Type 1 diabetes mellitus", "C": "Celiac disease", "D": "Hashimoto thyroiditis", "E": "Imiquimod 5% cream"}, "answer": "A", "explanation": "FLG mutations impair skin barrier function, increasing TEWL and allergen penetration. This disrupts immune tolerance and predisposes to atopic march: AD → allergic rhinitis → asthma → food allergies. FLG deficiency increases risk of any atopic condition 2-4 fold. Early recognition of AD with FLG mutations warrants aggressive skin barrier management and monitoring for respiratory/allergic disease development. Type 1 diabetes, celiac, and Hashimoto are not specifically increased in FLG mutation carriers.", "diagram": null}, {"id": 203, "specialty": "dermatology", "tag": "clinical_science_dermatology_psoriasis", "question": "A 35-year-old man presents with well-demarcated, erythematous plaques with silvery scale on the extensor surfaces of his elbows and knees, and pitting of his fingernails. He also reports stiffness and swelling of his distal interphalangeal joints.\nWhich comorbidity should be specifically screened for in this patient?", "options": {"A": "Coeliac disease", "B": "Cardiovascular disease and metabolic syndrome", "C": "Chronic kidney disease", "D": "Osteoporosis", "E": "Inflammatory bowel disease"}, "answer": "B", "explanation": "Psoriasis is associated with significantly increased cardiovascular risk, including metabolic syndrome, obesity, diabetes, dyslipidaemia, and premature atherosclerosis. Current guidelines recommend cardiovascular risk assessment in moderate-to-severe psoriasis patients. The nail changes (pitting, onycholysis) and DIP joint involvement suggest concomitant psoriatic arthritis, present in approximately 30% of psoriasis patients. Systemic inflammation in psoriasis contributes to accelerated atherogenesis via shared TNF-alpha and IL-17 pathways.", "diagram": null}, {"id": 204, "specialty": "dermatology", "tag": "clinical_science_dermatology_ulcers", "question": "A 72-year-old woman with a history of deep vein thrombosis presents with a painful, shallow ulcer above the medial malleolus surrounded by haemosiderin staining, lipodermatosclerosis, and varicose eczema.\nWhat is the MOST important component of treatment?", "options": {"A": "Surgical debridement", "B": "Compression bandaging", "C": "Oral antibiotics", "D": "Topical corticosteroids", "E": "Arterial insufficiency ulcer — urgent vascular referral"}, "answer": "B", "explanation": "Venous leg ulcers are the most common type of leg ulcer and occur in the gaiter area (medial malleolus) due to chronic venous insufficiency. Compression therapy (multi-layer bandaging or stockings) is the cornerstone of management, improving venous return and promoting healing. It is essential to exclude significant arterial disease (ABPI <0.8) before applying compression. Haemosiderin staining, lipodermatosclerosis, and varicose eczema are hallmarks of chronic venous disease. Distinguishing venous from arterial and neuropathic ulcers guides appropriate treatment.", "diagram": null}, {"id": 205, "specialty": "dermatology", "tag": "clinical_science_dermatology_viral", "question": "A 78-year-old man presents with a painful, unilateral vesicular eruption in a T4 dermatomal distribution across the left chest. He is immunocompetent.\nWhat is the most significant risk factor for developing post-herpetic neuralgia?", "options": {"A": "Male sex", "B": "Chest wall involvement", "C": "Increasing age (>60 years)", "D": "Immunocompetent status", "E": "Valaciclovir 500 mg BD for 3 days"}, "answer": "C", "explanation": "Herpes zoster (shingles) results from reactivation of varicella-zoster virus (VZV) from dorsal root ganglia. Post-herpetic neuralgia (PHN) — pain persisting >90 days after rash onset — is the most common complication, occurring in up to 30% of patients over 60 years. Increasing age is the strongest risk factor. Early antiviral therapy (within 72 hours of rash onset) with valaciclovir or famciclovir reduces duration and severity of acute illness and may reduce PHN risk. The recombinant zoster vaccine (Shingrix) significantly reduces the incidence of both zoster and PHN.", "diagram": null}, {"id": 206, "specialty": "dermatology", "tag": "clinical_science_dermatology_autoimmune", "question": "A 65-year-old man presents with tense blisters on his trunk and limbs. Nikolsky sign is negative. Skin biopsy with direct immunofluorescence shows linear IgG and C3 at the dermal-epidermal junction. What is the most likely diagnosis?", "options": {"A": "Pemphigus vulgaris", "B": "Bullous pemphigoid", "C": "Dermatitis herpetiformis", "D": "Linear IgA bullous dermatosis", "E": "Epidermolysis bullosa acquisita"}, "answer": "B", "explanation": "Bullous pemphigoid presents with tense blisters (subepidermal), negative Nikolsky sign, and linear IgG/C3 at the basement membrane zone on DIF.", "diagram": null}, {"id": 207, "specialty": "dermatology", "tag": "medical_science_dermatology_skin_structure", "question": "Which layer of the epidermis contains the highest concentration of desmosomes, providing structural integrity against mechanical stress?", "options": {"A": "Stratum basale", "B": "Stratum spinosum", "C": "Stratum granulosum", "D": "Stratum corneum", "E": "Stratum lucidum"}, "answer": "B", "explanation": "The stratum spinosum (prickle cell layer) is rich in desmosomes connecting keratinocytes, providing mechanical resilience. The \"spiny\" appearance on histology reflects these desmosomal connections.", "diagram": null}, {"id": 208, "specialty": "dermatology", "tag": "clinical_science_dermatology_melanoma", "question": "A 48-year-old woman has a pigmented lesion excised from her back. Histology shows melanoma with Breslow thickness 1.2 mm, no ulceration, mitotic rate 2/mm². What is the recommended surgical margin for wider local excision?", "options": {"A": "0.5 cm", "B": "1 cm", "C": "2 cm", "D": "3 cm", "E": "No further excision needed if clear margins on initial biopsy"}, "answer": "B", "explanation": "For melanomas with Breslow thickness 1.01-2.0 mm, Australian guidelines recommend a 1-2 cm excision margin. A 1 cm margin is generally accepted for this thickness range.", "diagram": null}, {"id": 209, "specialty": "dermatology", "tag": "medical_science_dermatology_immunology", "question": "The Gell and Coombs classification of hypersensitivity reactions categorises allergic contact dermatitis as which type?", "options": {"A": "Type I (immediate, IgE-mediated)", "B": "Type II (cytotoxic, antibody-mediated)", "C": "Type III (immune complex)", "D": "Type IV (delayed, T-cell mediated)", "E": "Type V (stimulatory)"}, "answer": "D", "explanation": "Allergic contact dermatitis is a type IV delayed hypersensitivity reaction mediated by sensitised T lymphocytes responding to hapten-carrier complexes in the skin.", "diagram": null}, {"id": 210, "specialty": "dermatology", "tag": "clinical_science_dermatology_infection", "question": "A 22-year-old woman presents with a painful vesicular eruption in a T4 dermatomal distribution on the left trunk. She is otherwise well with no comorbidities. What is the most appropriate management?", "options": {"A": "Oral aciclovir 800 mg five times daily for 7 days", "B": "IV aciclovir 10 mg/kg TDS for 7 days", "C": "Topical aciclovir 5% cream five times daily", "D": "Oral prednisolone 50 mg daily for 7 days", "E": "Observation with analgesia only"}, "answer": "A", "explanation": "Herpes zoster in an immunocompetent young adult is treated with oral antiviral therapy (aciclovir or valaciclovir) commenced within 72 hours of rash onset. IV therapy is reserved for immunocompromised patients or disseminated disease.", "diagram": null}, {"id": 211, "specialty": "dermatology", "tag": "clinical_science_dermatology_drug_reaction", "question": "A patient commenced on allopurinol 4 weeks ago develops fever, a widespread morbilliform rash, facial oedema, lymphadenopathy, and eosinophilia (2.8 × 10⁹/L). ALT is 320 U/L. What is the most likely diagnosis?", "options": {"A": "Stevens-Johnson syndrome", "B": "Drug reaction with eosinophilia and systemic symptoms (DRESS)", "C": "Toxic epidermal necrolysis", "D": "Serum sickness-like reaction", "E": "Acute generalised exanthematous pustulosis (AGEP)"}, "answer": "B", "explanation": "DRESS syndrome typically presents 2-8 weeks after drug initiation with fever, rash, facial oedema, eosinophilia, lymphadenopathy, and organ involvement (hepatitis). Allopurinol is a well-known trigger.", "diagram": null}, {"id": 212, "specialty": "dermatology", "tag": "medical_science_dermatology_pathology", "question": "Acanthosis nigricans is most strongly associated with which underlying metabolic condition?", "options": {"A": "Hypothyroidism", "B": "Insulin resistance", "C": "Hyperaldosteronism", "D": "Iron overload", "E": "Vitamin D deficiency"}, "answer": "B", "explanation": "Acanthosis nigricans (velvety hyperpigmented plaques in flexures) is strongly associated with insulin resistance and hyperinsulinaemia, commonly seen in type 2 diabetes and metabolic syndrome.", "diagram": null}, {"id": 213, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_diabetes_type1", "question": "A 24-year-old woman with type 1 diabetes (T1D) on basal-bolus insulin (insulin glargine 20 units nocte, insulin lispro 8-12 units with meals) presents with severe nausea, vomiting, and abdominal pain. Capillary glucose 28.4 mmol/L, pH 7.18, HCO3- 12 mmol/L, β-hydroxybutyrate 4.8 mmol/L (normal <0.6), anion gap 16. Serum osmolality normal. She had missed insulin doses over past 2 days.\n\nWhat is the most appropriate immediate management?", "options": {"A": "IV insulin 0.1 units/kg/hr with concurrent IV fluids and electrolyte repletion", "B": "IM glucagon 1 mg for acute hyperglycemia", "C": "Oral glucose tablets and reassess in 1 hour", "D": "IV dextrose with high-dose insulin", "E": "Insulin glargine 10 units nocte"}, "answer": "A", "explanation": "Diabetic ketoacidosis (DKA) with significant ketonemia, metabolic acidosis, and anion gap requires immediate IV insulin (0.1 units/kg/hr), IV fluid replacement (typically 0.9% saline 500 mL/hr initially, adjusting for dehydration), and electrolyte correction (K+, PO4, Mg2+). Do not give dextrose until glucose <250 mg/dL. Monitor ABGs, electrolytes, and venous or arterial blood gas every 2-4 hours. ICU admission is typical.", "diagram": null}, {"id": 214, "specialty": "endocrinology", "tag": "medical_science_endocrinology_thyroid_physiology", "question": "A 48-year-old woman with Hashimoto thyroiditis on stable levothyroxine 75 μg daily (TSH 2.1 mIU/L, T4 12 pmol/L) takes an oral iron supplement containing ferrous sulfate 325 mg for presumed anemia. 3 weeks later, TSH 8.4 mIU/L, she develops fatigue and weight gain.\n\nWhat is the mechanism of altered thyroid function?", "options": {"A": "Iron forms insoluble chelate complex with levothyroxine reducing GI absorption", "B": "Iron competitively inhibits thyroid peroxidase", "C": "Ferrous sulfate stimulates TSH-receptor antibodies", "D": "Iron reduces intestinal pH increasing T4 degradation", "E": "Cabergoline 0.5 mg twice weekly"}, "answer": "A", "explanation": "Iron supplements significantly reduce levothyroxine bioavailability through chelate complex formation in the GI tract, reducing absorption by 20-60% depending on dose and timing. Take levothyroxine ≥4 hours apart from iron. Similarly affected by calcium, aluminum hydroxide, and PPIs. Ferrous sulfate does not inhibit TPO or stimulate antibodies. pH changes are minimal with iron supplementation.", "diagram": null}, {"id": 215, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_cushing", "question": "A 42-year-old woman presents with progressive truncal obesity, proximal myopathy (unable to rise from chair), purple striae on abdomen, and spontaneous bruising. BP 162/94 mmHg. Cortisol (09:00) 580 nmol/L (normal <250), 24-hour urinary cortisol 245 μg/24h (normal <50), dexamethasone suppression test (overnight 1 mg) shows cortisol 420 nmol/L (not suppressed to <50). ACTH 68 mIU/L (normal 10-50).\n\nWhat is the most likely diagnosis?", "options": {"A": "Cushing syndrome secondary to ectopic ACTH secretion", "B": "Cushing syndrome secondary to pituitary corticotroph adenoma", "C": "Primary adrenal adenoma", "D": "Pseudo-Cushing state (depression)", "E": "Oral dexamethasone suppression test"}, "answer": "B", "explanation": "Elevated cortisol (unsuppressed by dexamethasone), elevated ACTH (8-50 mIU/L range, modest elevation), and clinical Cushing features indicate ACTH-dependent Cushing. ACTH level 68 is lower than ectopic ACTH (typically >200). Normal suppressibility with dexamethasone 8 mg (stimulation protocol) and response to CRH suggests pituitary source. MRI pituitary would show microadenoma in ~50% of cases. Ectopic ACTH shows resistance to both dexamethasone doses and minimal CRH response.", "diagram": null}, {"id": 216, "specialty": "endocrinology", "tag": "medical_science_endocrinology_adrenal_insufficiency", "question": "A 34-year-old man with longstanding HIV infection (CD4 count 85 cells/μL despite antiretroviral therapy) presents with fever, hypotension (BP 92/58), and hyponatremia (Na+ 126 mmol/L). Morning cortisol 180 nmol/L (normal 200-400). Abdominal CT shows bilateral adrenal infiltration. CMV and tuberculosis PCRs pending.\n\nWhat is the most appropriate immediate management?", "options": {"A": "IV hydrocortisone 50 mg 6-hourly with saline infusion; investigate etiology", "B": "Oral prednisolone 20 mg daily", "C": "IV fluids 0.9% saline without steroid initiation pending results", "D": "Immediate adrenalectomy for bilateral disease", "E": "Thyroid ultrasound with fine needle aspiration"}, "answer": "A", "explanation": "Acute adrenal insufficiency (Addisonian crisis) with hypotension, hyponatremia, and low-normal cortisol in critically ill patient requires immediate IV hydrocortisone 50-100 mg every 6-8 hours concurrent with IV saline. Do not wait for investigations; treatment should not be delayed. The CD4 count and bilateral adrenal involvement suggest opportunistic infection (TB, CMV, fungi). Long-term replacement with glucocorticoid and mineralocorticoid follows crisis management.", "diagram": null}, {"id": 217, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_diabetes_type2", "question": "A 62-year-old man with type 2 diabetes (HbA1c 54 mmol/mol on metformin 1000 mg BD, eGFR 34 mL/min/1.73m²) is started on SGLT2 inhibitor. After 4 weeks, he develops severe genital pain, fever 38.2°C, and dysuria. Urinalysis shows pyuria without bacteriuria. Blood glucose 11.3 mmol/L. Urine culture and urinary FGFR3 test pending.\n\nWhat is the most likely diagnosis?", "options": {"A": "Fournier gangrene (necrotizing fasciitis) secondary to SGLT2 inhibitor-associated genital infection", "B": "Acute pyelonephritis", "C": "Diabetic ketoacidosis", "D": "Prostatitis from routine UTI", "E": "Bilateral adrenalectomy"}, "answer": "A", "explanation": "SGLT2 inhibitors increase urinary glucose and genital glycosuria, predisposing to polymicrobial genital infection including anaerobes. Fournier gangrene is rare but potentially life-threatening complication. Severe genital pain with fever, systemic toxicity, and lack of response to antibiotics warrants immediate surgical evaluation and imaging (CT/MRI) for assessment of tissue planes and necrosis. Immediate broad-spectrum antibiotics and urgent surgical debridement are required.", "diagram": null}, {"id": 218, "specialty": "endocrinology", "tag": "medical_science_endocrinology_thyroid_cancer", "question": "A 51-year-old woman with previous total thyroidectomy for papillary thyroid cancer (PTC), stage T2N1M0 2 years ago (no RAI given), now presents with thyroglobulin 2.8 ng/mL (suppressed TSH <0.1 mIU/L on levothyroxine 150 μg). Whole body radioiodine scan negative. Thyroglobulin antibodies negative. Neck ultrasound shows 1.2 cm hypoechoic nodule in right thyroid bed with microcalcifications.\n\nWhat is the most appropriate next step?", "options": {"A": "Ultrasound-guided fine needle aspiration biopsy (FNAB) of the nodule", "B": "Repeat radioactive iodine therapy with higher dose", "C": "MRI neck for soft tissue characterization", "D": "Continue surveillance with ultrasound every 6 months", "E": "Cinacalcet 30 mg daily"}, "answer": "A", "explanation": "Biochemical recurrence of PTC (elevated thyroglobulin) with imaging findings (suspicious nodule on ultrasound) warrants FNAB for cytopathologic diagnosis. FNAB is sensitive (>90%) for recurrent papillary cancer in thyroid bed. Positive FNAB would prompt reoperation or radioiodine (if iodine-avid). RAI without RAI uptake on prior scan is less likely to benefit initially. MRI is supportive but not diagnostic. Surveillance without tissue diagnosis is inappropriate with biochemical recurrence.", "diagram": null}, {"id": 219, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_hypogonadism", "question": "A 58-year-old man with newly diagnosed hypertension and dyslipidemia presents with erectile dysfunction, decreased libido, and reduced muscle mass. Morning testosterone (fasting, 08:00) 8.2 nmol/L (normal >10), LH 8.4 mIU/L (normal 1.5-9.3), FSH 5.2 mIU/L (normal 1.7-8.0). Prolactin normal, free T4 normal.\n\nWhat is the most likely diagnosis?", "options": {"A": "Late-onset hypogonadism (LOH) secondary to primary testicular insufficiency", "B": "Central hypogonadism (hypogonadotropic)", "C": "Microprolactinoma", "D": "Hypothyroidism", "E": "Somatostatin receptor scintigraphy"}, "answer": "A", "explanation": "Primary hypogonadism (low testosterone with elevated/normal LH and FSH) indicates testicular failure, not pituitary/hypothalamic dysfunction (secondary/central hypogonadism would have low LH/FSH). The normal prolactin and thyroid function exclude those etiologies. This is age-related primary testicular hypogonadism (late-onset hypogonadism). Consider metabolic causes (obesity, metabolic syndrome, CKD), medications, or intrinsic testicular pathology. Klinefelter syndrome, prior chemotherapy, or orchitis are possible etiologies.", "diagram": null}, {"id": 220, "specialty": "endocrinology", "tag": "medical_science_endocrinology_pcos", "question": "A 28-year-old woman with polycystic ovary syndrome (PCOS, Rotterdam criteria) and infertility for 2 years presents for management. BMI 32 kg/m². Testosterone 2.1 nmol/L (normal <2.0), LH/FSH ratio 3.2:1. Ovulatory dysfunction confirmed. Fasting glucose 5.8 mmol/L, fasting insulin 18 mIU/L (elevated), HOMA-IR 4.7 (normal <2.0).\n\nWhat is the most appropriate first-line intervention to improve fertility and metabolic parameters?", "options": {"A": "Lifestyle modification (weight loss 5-10%, increased physical activity) with metformin 500 mg BD", "B": "Letrozole or clomiphene citrate for ovulation induction", "C": "Spironolactone for anti-androgenic effect", "D": "Referral for in vitro fertilization (IVF)", "E": "Spironolactone 100 mg daily"}, "answer": "A", "explanation": "Insulin resistance (HOMA-IR 4.7) is primary pathophysiology in majority of PCOS. Lifestyle intervention (5-10% weight loss achieves ovulation in ~60% of anovulatory PCOS) combined with metformin improves insulin sensitivity, reduces hyperandrogenism, and restores ovulation. Metformin 500 mg BD-TDS is first-line pharmacotherapy. Ovulation induction (letrozole, clomiphene) is second-line after lifestyle/metformin optimization. Spironolactone addresses symptoms but not fertility. IVF is last-line.", "diagram": null}, {"id": 221, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_hypoparathyroidism", "question": "A 64-year-old woman with history of total thyroidectomy for Graves disease 8 years ago presents with paresthesias around mouth and fingers, muscle cramps, and fatigue. Calcium 1.82 mmol/L (normal 2.15-2.55), phosphate 1.82 mmol/L (normal 0.75-1.4), PTH 8 mIU/L (inappropriately low, normal 15-68), albumin normal, vitamin D 75 nmol/L (sufficient).\n\nWhat is the most appropriate management?", "options": {"A": "Calcium gluconate IV if symptomatic, then long-term oral calcium and active vitamin D (1,25-dihydroxyvitamin D3 calcitriol)", "B": "Oral vitamin D2 (ergocalciferol) monotherapy", "C": "PTH replacement therapy (PTH 1-34)", "D": "IV magnesium supplementation only", "E": "Fludrocortisone 100 µg daily"}, "answer": "A", "explanation": "Hypoparathyroidism post-thyroidectomy with symptomatic hypocalcemia requires acute IV calcium (if severe symptoms/seizure risk), then chronic oral calcium supplementation with active vitamin D (calcitriol 0.25-2 μg BD-TDS). Calcitriol is necessary because PTH deficiency prevents 1α-hydroxylation of vitamin D. Vitamin D2 alone is insufficient. PTH 1-34 is emerging but expensive; typically reserved for resistant cases. Monitor calcium, phosphate, and PTH regularly.", "diagram": null}, {"id": 222, "specialty": "endocrinology", "tag": "medical_science_endocrinology_acromegaly", "question": "A 52-year-old man with acromegaly (diagnosed by elevated IGF-1 and non-suppressed GH on oral glucose tolerance test) undergoes transsphenoidal pituitary surgery with macroscopic tumor removal confirmed. Post-op, fasting glucose 6.8 mmol/L, cortisol 280 nmol/L (normal), TSH 0.8 mIU/L, free T4 13 pmol/L. GH nadir on OGTT 1.2 mIU/L, IGF-1 norm age/sex adjusted 120% of upper normal limit.\n\nWhat does post-operative IGF-1 level indicate?", "options": {"A": "Inadequate surgical cure; residual acromegaly despite biochemical improvement", "B": "Biochemical remission requiring only clinical follow-up", "C": "Need for immediate somatostatin analogue therapy", "D": "Radiation therapy indicated", "E": "Radioiodine ablation therapy"}, "answer": "A", "explanation": "IGF-1 remains mildly elevated post-surgery (120% upper limit of normal) indicating inadequate normalization despite significant tumor debulking and GH suppression. This represents persistent/residual disease. Biochemical remission of acromegaly requires GH <1 ng/mL on OGTT AND age/sex-adjusted IGF-1 in normal range. Inadequate surgical response warrants somatostatin analogue (octreotide, lanreotide) therapy or consider repeat surgery/radiotherapy. Clinical follow-up alone would miss progression.", "diagram": null}, {"id": 223, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_hyperthyroidism", "question": "A 34-year-old woman with Graves disease (newly diagnosed, TSH 0.01 mIU/L, free T4 28 pmol/L, anti-TSHR antibodies positive) presents with atrial fibrillation (HR 118 bpm), heat intolerance, and anxiety. She declines antithyroid drugs due to concerns about side effects. Heart rate remains elevated despite beta-blockade.\n\nWhat is the most appropriate management?", "options": {"A": "Radioactive iodine (RAI) therapy with prior antithyroid drug pretreatment to deplete thyroid hormone", "B": "Proceed directly to RAI without antithyroid pretreatment", "C": "Surgical thyroidectomy", "D": "Continue beta-blockade indefinitely", "E": "Pasireotide 0.6 mg SC BD"}, "answer": "A", "explanation": "Graves disease with symptomatic thyrotoxicosis and AF unresponsive to beta-blockade requires definitive therapy. RAI is effective but must be preceded by antithyroid drug (PTU or methimazole) to deplete thyroid hormone stores and prevent thyroid storm risk. Pretreatment also reduces radiation thyroiditis. Direct RAI without pretreatment risks life-threatening thyrotoxicosis. Surgical thyroidectomy is alternative but requires same antithyroid pretreatment. Beta-blockade is temporizing only.", "diagram": null}, {"id": 224, "specialty": "endocrinology", "tag": "medical_science_endocrinology_adrenal_excess", "question": "A 35-year-old woman with hypertension (BP 158/96), hypokalemia (K+ 3.1 mmol/L), and metabolic alkalosis (HCO3- 32 mmol/L) has aldosterone 680 pmol/L (normal <400) and plasma renin activity 0.2 ng/(mL·hr) (normal 0.5-5.0). Adrenal CT shows 2 cm right adrenal nodule. Hypokalemia corrected and repeat renin still suppressed.\n\nWhat is the most likely diagnosis?", "options": {"A": "Primary hyperaldosteronism from aldosterone-producing adenoma (APA)", "B": "Secondary hyperaldosteronism from renal artery stenosis", "C": "Cushing syndrome with mineralocorticoid excess", "D": "Renovascular hypertension", "E": "Desmopressin 10 µg intranasal"}, "answer": "A", "explanation": "Primary aldosteronism (elevated aldosterone with suppressed renin and hypokalemia) in setting of adrenal nodule on imaging indicates aldosterone-producing adenoma. The aldosterone:renin ratio >1000 pmol/ng/(mL·hr) is highly specific for primary aldosteronism. Adrenal vein sampling can lateralize to confirm APA if imaging findings are ambiguous. Treatment is adrenalectomy (cures ~80% hypertension) if pure APA, or mineralocorticoid receptor antagonist if bilateral disease.", "diagram": null}, {"id": 225, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_hypoglycemia", "question": "A 52-year-old man with type 2 diabetes on gliclazide 80 mg BD and metformin 1000 mg BD presents with recurrent symptomatic hypoglycemia (glucose 3.0-3.5 mmol/L) occurring in late afternoon and occasionally nocturnal. Fasting glucose 4.8 mmol/L, HbA1c 42 mmol/mol (improved from 68). He denies missing meals.\n\nWhat is the most appropriate management?", "options": {"A": "Reduce gliclazide dose by 50% and increase meal frequency; consider de-intensification", "B": "Increase carbohydrate intake before expected hypoglycemic episodes", "C": "Add glucagon emergency kit only; continue current gliclazide dose", "D": "Switch to insulin to provide better glycemic control", "E": "Metyrapone 250 mg TDS"}, "answer": "A", "explanation": "Hypoglycemia on insulin secretagogue (gliclazide) with improved HbA1c indicates over-treatment. Dose reduction is needed to balance glycemic control against hypoglycemia risk. Current HbA1c of 42 is already at target for older adults; further glycemic reduction is unnecessary and increases hypoglycemia risk. De-intensification (reducing gliclazide, continuing metformin) is appropriate. Increasing carbohydrates worsens diabetes control. Insulin addition risks further hypoglycemia.", "diagram": null}, {"id": 226, "specialty": "endocrinology", "tag": "medical_science_endocrinology_dyslipidemia", "question": "A 48-year-old man with familial combined hyperlipidemia presents with TC 7.2 mmol/L, LDL-C 5.1 mmol/L, triglycerides 3.8 mmol/L, HDL-C 0.9 mmol/L. He is on atorvastatin 40 mg daily with suboptimal response. Liver function normal, CK normal. He declines ezetimibe due to cost concerns.\n\nWhat is the most evidence-based next step?", "options": {"A": "Escalate atorvastatin to 80 mg daily; if triglycerides persistent, add bempedoic acid", "B": "Add gemfibrozil 600 mg BD", "C": "Switch to lovastatin for superior efficacy", "D": "Add PCSK9 inhibitor immediately", "E": "Lanreotide 90 mg SC monthly"}, "answer": "A", "explanation": "Statin dose escalation (atorvastatin 40→80 mg) is standard next step in lipid optimization per guideline algorithms. Bempedoic acid (uric acid-lowering, LDL-lowering) is cost-effective option for combined hyperlipidemia with hypertriglyceridemia. Gemfibrozil + statin increases myopathy risk and is second-line for triglycerides. PCSK9 inhibitors are more expensive and reserved for statin intolerance or familial hypercholesterolemia with very high LDL. Lovastatin is less lipophilic than modern statins.", "diagram": null}, {"id": 227, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_pituitary_mass", "question": "A 44-year-old woman with headaches and bitemporal hemianopia on visual field testing is found to have 2.2 cm sellar mass on pituitary MRI. Prolactin 1850 mIU/L (normal <500), other pituitary hormones normal (TSH 1.8, ACTH 25, IGF-1 normalized). Pregnancy test negative.\n\nWhat is the most appropriate initial management?", "options": {"A": "Dopamine agonist (bromocriptine or cabergoline) for prolactinoma tumor shrinkage and symptom relief", "B": "Transsphenoidal resection immediately", "C": "External beam radiation therapy", "D": "Observation with 3-monthly MRI surveillance", "E": "Empagliflozin 10 mg daily"}, "answer": "A", "explanation": "Prolactinomas >1 cm (macroprolactinomas) with compressive symptoms (visual field defects) and very elevated prolactin (>1500) are best managed with dopamine agonist (cabergoline preferred over bromocriptine due to better tolerability and efficacy). Dopamine agonists reduce tumor size in ~80% and can relieve visual symptoms. Surgery is reserved for agonist failure or intolerance. Radiation has delayed effects and is rarely first-line. Observation with symptomatic visual loss is inappropriate.", "diagram": null}, {"id": 228, "specialty": "endocrinology", "tag": "medical_science_endocrinology_bone_metabolism", "question": "A 68-year-old woman with postmenopausal osteoporosis (T-score -2.8 at lumbar spine, -2.5 femoral neck) and fragility fracture (wrist) 3 months ago is started on alendronate 70 mg weekly. 6 weeks later, she develops severe jaw pain and a tooth becomes loose. X-rays show osteonecrosis of the mandible. She has no prior dental disease or dental procedures.\n\nWhat is the most likely mechanism of adverse effect?", "options": {"A": "Bisphosphonate-related osteonecrosis of jaw (BRONJ) from potent osteoclast suppression and impaired bone remodeling", "B": "Allergic reaction to alendronate", "C": "Vitamin D deficiency", "D": "Poor oral hygiene exacerbation", "E": "Denosumab 60 mg SC 6-monthly"}, "answer": "A", "explanation": "Bisphosphonate-related osteonecrosis of jaw (BRONJ) is rare side effect (incidence ~1:10,000-100,000) occurring with nitrogenous bisphosphonates (alendronate, risedronate, zoledronic acid). Risk increases with IV bisphosphonates, longer duration, and dental procedures. Pathophysiology involves profound osteoclast suppression preventing normal bone remodeling and healing. While rare, BRONJ is serious and warrants aggressive preventive dental care, delayed/modified bisphosphonate dosing post-extraction, and consideration of alternative agents (denosumab, anabolic agents).", "diagram": null}, {"id": 229, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_phaeochromocytoma", "question": "A 38-year-old man with resistant hypertension (BP 168/102 despite triple therapy), episodic severe headaches, profuse sweating, and palpitations is referred. 24-hour urinary metanephrines 2.8 nmol/24h (normal <1.8), plasma free metanephrines markedly elevated. CT abdomen shows 3.2 cm left adrenal mass. Plasma chromogranin A elevated (450 ng/mL).\n\nWhat is the most appropriate pre-operative management?", "options": {"A": "Alpha-blockade with phenoxybenzamine, then beta-blockade after 2-3 days, for catecholamine blockade prior to surgical resection", "B": "Beta-blockade with propranolol first, then alpha-blockade", "C": "Direct surgical resection without pharmacological preparation", "D": "Radiotherapy to shrink tumor prior to surgery", "E": "Ketoconazole 200 mg TDS"}, "answer": "A", "explanation": "Phaeochromocytoma requires careful pre-operative preparation to prevent intra-operative hypertensive crisis from catecholamine release during tumor manipulation. Alpha-blockade (phenoxybenzamine non-selective, irreversible, or doxazosin) must precede beta-blockade to prevent unopposed alpha-mediated hypertension. After 2-3 days of alpha-blockade achieving BP control, add beta-blocker (propranolol, atenolol) for tachycardia/palpitations. Beta-blockade alone risks hypertensive crisis. Surgery is definitive therapy.", "diagram": null}, {"id": 230, "specialty": "endocrinology", "tag": "medical_science_endocrinology_hypercalcemia", "question": "A 62-year-old man with stage 3b CKD (eGFR 35 mL/min/1.73m²) and secondary hyperparathyroidism (PTH 185 mIU/L, calcium 2.35 mmol/L, phosphate 1.9 mmol/L, 1,25-OH-vitamin D 35 pmol/L) is started on calcimimetic (cinacalcet 30 mg daily). After 4 weeks, calcium drops to 2.18 mmol/L, PTH 95 mIU/L.\n\nWhat is the most appropriate next step?", "options": {"A": "Continue cinacalcet at current dose; recheck labs in 4 weeks, then optimize vitamin D and phosphate binders", "B": "Increase cinacalcet to 60 mg daily for greater PTH suppression", "C": "Stop cinacalcet; add IV calcitriol infusions", "D": "Refer for parathyroidectomy given inadequate response", "E": "Recombinant human IGF-1 therapy"}, "answer": "A", "explanation": "Cinacalcet response (PTH reduction from 185→95, normalization of calcium) indicates adequate disease control. Further dose escalation is unnecessary and increases side effects (nausea, vomiting). Continue current dose with close monitoring. Address underlying CKD-MBD comprehensively: optimize vitamin D repletion (calcitriol only after PTH controlled), phosphate binders for hyperphosphatemia, and monitor trends. Parathyroidectomy is reserved for refractory tertiary hyperparathyroidism or if cinacalcet fails.", "diagram": null}, {"id": 231, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_dka_hhs", "question": "A 58-year-old man with undiagnosed type 2 diabetes presents with altered mental status, severe dehydration, and respiratory distress. Glucose 68 mmol/L, osmolality 380 mOsm/kg, pH 7.28, HCO3- 14 mmol/L, β-hydroxybutyrate 0.8 mmol/L (DKA <1 mmol/L). Serum Na+ 128 mmol/L (corrected for hyperglycemia: 128 + 0.016×(68-5.5) = 137 mmol/L), chloride 98 mmol/L, anion gap 14.\n\nWhat is the most likely diagnosis?", "options": {"A": "Hyperglycemic hyperosmolar state (HHS) with modest ketosis", "B": "Diabetic ketoacidosis (DKA)", "C": "Type B lactic acidosis", "D": "Acute kidney injury with uremia", "E": "Thiazide diuretic for nephrogenic diabetes insipidus"}, "answer": "A", "explanation": "HHS is characterized by extreme hyperglycemia (>50 mmol/L), hyperosmolality (>340), severe dehydration, modest/absent ketosis (β-OH butyrate <1 mmol/L), and normal/mild acidosis. DKA shows profound ketosis (>3 mmol/L), severe acidosis (pH <7.3), and lower glucose. This patient has HHS: extreme hyperglycemia, high osmolality, altered mental status from osmotic effect (not acidosis), and minimal ketosis. Management is cautious rehydration with 0.9-0.45% saline, low-dose insulin (0.02 units/kg/hr), and electrolyte replacement, avoiding rapid glucose correction.", "diagram": null}, {"id": 232, "specialty": "endocrinology", "tag": "medical_science_endocrinology_metabolic_syndrome", "question": "A 54-year-old man with obesity (BMI 32), hypertension (BP 146/92), dyslipidemia (TC 6.8, LDL 4.5, TG 2.1, HDL 0.95), and fasting glucose 6.4 mmol/L meets criteria for metabolic syndrome. He has no prior CVD. HOMA-IR 3.8 (elevated). 10-year CVD risk ~18%.\n\nWhat is the primary pathophysiological mechanism linking these conditions?", "options": {"A": "Insulin resistance with compensatory hyperinsulinemia driving lipid and glucose abnormalities", "B": "Primary hypertension causing secondary metabolic derangements", "C": "Genetic predisposition to dyslipidemia with secondary obesity", "D": "Hypothyroidism-induced metabolic dysfunction", "E": "Mitotane for adrenocortical carcinoma"}, "answer": "A", "explanation": "Metabolic syndrome is primarily driven by insulin resistance (IR). IR leads to compensatory hyperinsulinemia, which increases VLDL production (elevated TG), reduces HDL-C, causes visceral adiposity (obesity), and increases blood pressure. IR also impairs glucose tolerance leading to impaired fasting glycemia or type 2 diabetes. The clustering of CVD risk factors in metabolic syndrome reflects common IR pathophysiology. Treatment targets IR through weight loss, physical activity, and pharmacotherapy (metformin, thiazolidinediones).", "diagram": null}, {"id": 233, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_diabetes_insipidus", "question": "A 30-year-old woman post-transsphenoidal pituitary surgery develops polyuria (8 L/day) and polydipsia. Serum sodium is 148 mmol/L and urine osmolality is 85 mOsm/kg.\nWhat is the most appropriate diagnostic test?", "options": {"A": "24-hour urinary cortisol", "B": "Water deprivation test with desmopressin", "C": "Oral glucose tolerance test", "D": "Synacthen stimulation test", "E": "Primary polydipsia"}, "answer": "B", "explanation": "Central diabetes insipidus (CDI) is characterised by deficient ADH secretion, commonly occurring post-pituitary surgery. The water deprivation test differentiates CDI from nephrogenic DI and primary polydipsia. In CDI, urine fails to concentrate during water deprivation but concentrates >50% after exogenous desmopressin. In nephrogenic DI, urine remains dilute after desmopressin. Post-surgical CDI may be transient (days), permanent, or follow a triphasic pattern (DI → SIADH → DI). Treatment of central DI is with desmopressin (DDAVP).", "diagram": null}, {"id": 234, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_men_syndromes", "question": "A 35-year-old man presents with renal colic and hypercalcaemia. His mother had a parathyroidectomy at age 40 and his uncle was diagnosed with a pancreatic neuroendocrine tumour.\nWhich genetic syndrome should be investigated?", "options": {"A": "Von Hippel-Lindau syndrome", "B": "Multiple endocrine neoplasia type 1 (MEN1)", "C": "Multiple endocrine neoplasia type 2A (MEN2A)", "D": "Familial hypocalciuric hypercalcaemia", "E": "Multiple endocrine neoplasia type 2B (MEN2B)"}, "answer": "B", "explanation": "MEN1 (Wermer syndrome) is an autosomal dominant condition caused by mutations in the menin gene. It is characterised by tumours of the parathyroid glands (95%), pancreatic islet cells (gastrinoma, insulinoma), and anterior pituitary. Primary hyperparathyroidism causing hypercalcaemia is the most common and usually the first manifestation. MEN2A involves medullary thyroid carcinoma, phaeochromocytoma, and primary hyperparathyroidism (RET proto-oncogene). MEN2B includes medullary thyroid carcinoma, phaeochromocytoma, mucosal neuromas, and marfanoid habitus.", "diagram": null}, {"id": 235, "specialty": "endocrinology", "tag": "medical_science_endocrinology_hyperaldosteronism", "question": "A 48-year-old man has resistant hypertension despite three antihypertensive agents including a diuretic. His potassium is 3.1 mmol/L. The aldosterone-to-renin ratio (ARR) is significantly elevated.\nWhat is the most appropriate next step to confirm the diagnosis?", "options": {"A": "Adrenal CT scan", "B": "Confirmatory suppression testing (e.g. oral sodium loading or fludrocortisone suppression test)", "C": "Immediate adrenalectomy", "D": "Start spironolactone empirically", "E": "Adrenal venous sampling"}, "answer": "B", "explanation": "Primary hyperaldosteronism (Conn syndrome) is a common cause of secondary hypertension, present in 5-10% of hypertensive patients. An elevated ARR is a screening test that requires confirmation with a suppression test (e.g. oral sodium loading, saline infusion, or fludrocortisone suppression test) to demonstrate non-suppressible aldosterone production. After biochemical confirmation, adrenal CT localises the lesion. Adrenal vein sampling may be needed to distinguish unilateral adenoma (surgical) from bilateral hyperplasia (medical — spironolactone/eplerenone). Hypokalaemia occurs in only 30-50% of cases.", "diagram": null}, {"id": 236, "specialty": "endocrinology", "tag": "medical_science_endocrinology_hormones", "question": "In the hypothalamic-pituitary-thyroid axis, what is the primary negative feedback signal that suppresses TSH secretion?", "options": {"A": "T4 (thyroxine) only", "B": "T3 (triiodothyronine) converted from T4 within the pituitary", "C": "Thyroid-releasing hormone (TRH)", "D": "Reverse T3", "E": "Somatostatin from the hypothalamus"}, "answer": "B", "explanation": "TSH secretion is primarily regulated by intrapituitary conversion of T4 to T3 by type 2 deiodinase. The locally generated T3 acts on nuclear receptors to suppress TSH gene transcription.", "diagram": null}, {"id": 237, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_adrenal", "question": "A 42-year-old woman presents with hypertension, hypokalaemia (K⁺ 2.9 mmol/L), and metabolic alkalosis. Aldosterone-to-renin ratio is markedly elevated. Confirmatory salt loading test confirms primary hyperaldosteronism. CT adrenals shows a 15 mm left adrenal adenoma. What is the next most appropriate step?", "options": {"A": "Proceed to left laparoscopic adrenalectomy", "B": "Adrenal venous sampling", "C": "Commence spironolactone 100 mg daily", "D": "MRI adrenals for further characterisation", "E": "Dexamethasone suppression test"}, "answer": "B", "explanation": "Adrenal venous sampling is required before surgery to confirm lateralisation, as adrenal incidentalomas are common and CT findings may not reflect the functional source of aldosterone excess.", "diagram": null}, {"id": 238, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_diabetes", "question": "A 28-year-old woman with type 1 diabetes presents with nausea, vomiting, and abdominal pain. Investigations: glucose 32 mmol/L, pH 7.12, bicarbonate 8 mmol/L, ketones 5.8 mmol/L, K⁺ 5.6 mmol/L. Despite the elevated serum potassium, the total body potassium is:", "options": {"A": "Elevated — reflecting excess intake", "B": "Normal — the elevated level is artefactual", "C": "Depleted — potassium shifts extracellularly due to acidosis and insulin deficiency", "D": "Elevated — due to renal potassium retention in acidosis", "E": "Variable — depends on the duration of DKA"}, "answer": "C", "explanation": "In DKA, total body potassium is depleted due to osmotic diuresis and vomiting. The elevated serum K⁺ reflects extracellular shift from acidosis and insulin deficiency, masking profound intracellular depletion.", "diagram": null}, {"id": 239, "specialty": "endocrinology", "tag": "medical_science_endocrinology_calcium", "question": "Parathyroid hormone (PTH) increases serum calcium through which combination of mechanisms?", "options": {"A": "Increased renal calcium reabsorption and increased intestinal calcium absorption via direct action", "B": "Increased osteoclast-mediated bone resorption and increased renal 1-alpha-hydroxylation of 25-OH vitamin D", "C": "Decreased renal phosphate reabsorption and decreased calcitonin secretion", "D": "Increased calcitriol production and direct stimulation of intestinal calcium channels", "E": "Stimulation of osteoblast activity and reduced urinary calcium excretion"}, "answer": "B", "explanation": "PTH acts on bone (osteoclastic resorption) and kidney (stimulates 1-alpha-hydroxylase converting 25-OH vitamin D to active 1,25-(OH)₂D). The active vitamin D then increases intestinal calcium absorption indirectly.", "diagram": null}, {"id": 240, "specialty": "endocrinology", "tag": "clinical_science_endocrinology_thyroid", "question": "A 30-year-old woman with Graves disease is 8 weeks pregnant. She was previously on carbimazole which has been stopped. TSH is <0.01 mU
