0)"}, "answer": "B", "explanation": "Sarcoidosis is a TH1/TH17-driven granulomatous disease with CD4+ T cell and macrophage activation. Granulomas produce ACE (leading to hypercalcemia via calcitriol production) and inflammatory cytokines.", "diagram": null}, {"id": 401, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_occupational", "question": "A 38-year-old baker develops occupational asthma with progressive dyspnea and peak flow decline during work weeks, improving on weekends and vacations. Methacholine challenge test shows PC20 8 mg/mL (abnormal). What is the most appropriate management approach?", "options": {"A": "Continue current workplace with use of inhaled corticosteroid", "B": "Use bronchodilators only for symptom relief", "C": "Eliminate or reduce exposure to flour dust with respiratory protection", "D": "Immediate work cessation", "E": "Lymphocyte subset analysis by flow cytometry"}, "answer": "C", "explanation": "Occupational asthma management prioritizes exposure reduction through engineering controls, respiratory protection, and workplace modifications. Continued exposure despite pharmacotherapy leads to persistent airway inflammation and worse prognosis.", "diagram": null}, {"id": 402, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_vaccine", "question": "A 34-year-old woman with egg allergy (oral allergy syndrome, non-anaphylactic) requires influenza vaccination. The available vaccine contains egg protein. What is the most appropriate approach?", "options": {"A": "Absolutely contraindicated due to egg allergy", "B": "Safe to administer with observation, as inactivated influenza vaccine is safe in egg allergy", "C": "Requires skin prick testing before administration", "D": "Use only recombinant flu vaccine", "E": "Graded drug provocation test"}, "answer": "B", "explanation": "Inactivated influenza vaccine is safe in patients with egg allergy (even severe), as the egg protein is removed during processing. Anaphylaxis is extremely rare. Observation period is appropriate but not an absolute contraindication.", "diagram": null}, {"id": 403, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_food", "question": "A 3-year-old with IgE-mediated peanut allergy experienced anaphylaxis at age 2. Current management includes strict avoidance and an EpiPen prescription. Parents ask about peanut oral immunotherapy (OIT). What is the most evidence-based recommendation?", "options": {"A": "OIT is contraindicated in children with prior anaphylaxis", "B": "OIT may induce desensitization but does not reliably produce sustained unresponsiveness; risk-benefit should be discussed", "C": "OIT is curative and recommended for all children", "D": "Avoid immunotherapy; continue strict avoidance indefinitely", "E": "Haematopoietic stem cell transplant for SCID"}, "answer": "B", "explanation": "OIT can induce desensitization (raising reaction threshold) but sustained unresponsiveness is uncommon. Risk includes anaphylaxis during therapy. OIT may be considered in selected motivated families with access to experienced centers, but is not curative or risk-free.", "diagram": null}, {"id": 404, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_hypogammaglobulinemia", "question": "A 48-year-old man with recurrent sinusitis, pneumonia (Haemophilus influenzae), and diarrhea has IgG 4.2 g/L (low), IgA 0.2 g/L (low), IgM 0.4 g/L (low), and reduced B cell count. What is the most likely diagnosis?", "options": {"A": "Selective IgA deficiency", "B": "X-linked agammaglobulinemia", "C": "Common variable immunodeficiency", "D": "IgG subclass deficiency", "E": "Eculizumab for paroxysmal nocturnal haemoglobinuria"}, "answer": "C", "explanation": "CVID presents with pan-hypogammaglobulinemia (low IgG, IgA, IgM) and recurrent infections with encapsulated organisms. B cell count is reduced but not absent (distinguishes from X-linked agammaglobulinemia where B cells are absent).", "diagram": null}, {"id": 405, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_mastocytosis", "question": "A 52-year-old man with systemic mastocytosis (diagnosed by bone marrow biopsy showing >15% mast cells, CD117+ D816V mutation confirmed) presents with episodic flushing, pruritus, and hypotension. Tryptase baseline 45 ng/mL (normal <11). What is the most appropriate cytoreductive therapy?", "options": {"A": "Antihistamines and mast cell stabilizers only", "B": "Midazolam", "C": "Imatinib 400 mg daily", "D": "Interferon-alpha", "E": "Icatibant for acute hereditary angioedema"}, "answer": "C", "explanation": "The KIT D816V mutation in systemic mastocytosis is sensitive to imatinib. Imatinib 400 mg daily is recommended for advanced systemic mastocytosis with elevated tryptase and symptoms. Tyrosine kinase inhibition addresses the molecular driver of disease.", "diagram": null}, {"id": 406, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_drug_allergy", "question": "A 35-year-old man develops a widespread maculopapular rash, fever, facial oedema, and lymphadenopathy 3 weeks after starting carbamazepine for trigeminal neuralgia. Bloods show eosinophilia (2.8 x10^9/L) and ALT 280 U/L. What is the most likely diagnosis?", "options": {"A": "Stevens-Johnson syndrome", "B": "Drug reaction with eosinophilia and systemic symptoms (DRESS)", "C": "Serum sickness-like reaction", "D": "Acute generalised exanthematous pustulosis", "E": "Rituximab for refractory autoimmune cytopenias"}, "answer": "B", "explanation": "DRESS syndrome typically presents 2-8 weeks after drug initiation with fever, rash, facial oedema, lymphadenopathy, eosinophilia, and visceral involvement (commonly hepatitis). Carbamazepine is a classic trigger. The latency period and eosinophilia with organ involvement distinguish it from SJS/TEN.", "diagram": null}, {"id": 407, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_complement", "question": "A 22-year-old woman presents with recurrent episodes of Neisseria meningitidis septicaemia (3 episodes over 5 years, different serogroups). She has no other infections and is otherwise well. CH50 is undetectable. C3 and C4 levels are normal. What is the most likely underlying deficiency?", "options": {"A": "C1 inhibitor deficiency", "B": "C3 deficiency", "C": "Terminal complement component (C5-C9) deficiency", "D": "Mannose-binding lectin deficiency", "E": "Basophil activation test"}, "answer": "C", "explanation": "Recurrent Neisseria infections with undetectable CH50 but normal C3/C4 strongly suggests terminal complement component (C5-C9/membrane attack complex) deficiency. The MAC is essential for bactericidal activity against Neisseria species. CH50 requires all classical pathway components to be functional.", "diagram": null}, {"id": 408, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_angioedema", "question": "A 45-year-old woman on ramipril for 3 years presents with acute tongue and lip swelling without urticaria or pruritus. She has had two similar episodes in the past year. Tryptase is normal. C4 level is normal. She has no family history of angioedema. What is the most likely mechanism?", "options": {"A": "IgE-mediated mast cell degranulation", "B": "Bradykinin accumulation due to ACE inhibition", "C": "C1 inhibitor deficiency", "D": "Complement-mediated angioedema", "E": "Danazol prophylaxis for hereditary angioedema"}, "answer": "B", "explanation": "ACE inhibitor-induced angioedema is bradykinin-mediated, not histamine-mediated, which explains the absence of urticaria. It can occur at any point during treatment (often years after initiation). Normal C4 excludes hereditary angioedema. Management requires permanent ACE inhibitor cessation; ARBs can be used cautiously.", "diagram": null}, {"id": 409, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_autoimmunity", "question": "A 30-year-old woman with SLE develops warm autoimmune haemolytic anaemia (AIHA). Direct antiglobulin test is positive for IgG and C3d. What is the predominant mechanism of red blood cell destruction in warm AIHA?", "options": {"A": "Complement-mediated intravascular lysis via membrane attack complex", "B": "Fc receptor-mediated extravascular phagocytosis in the spleen", "C": "Natural killer cell-mediated antibody-dependent cytotoxicity", "D": "Direct complement-mediated opsonisation in the liver", "E": "Dupilumab for severe atopic dermatitis"}, "answer": "B", "explanation": "In warm AIHA, IgG-coated red blood cells are primarily destroyed by Fc receptor-bearing macrophages in the spleen (extravascular haemolysis). While complement fixation (C3d positivity) contributes to opsonisation, the dominant mechanism is splenic Fc receptor-mediated phagocytosis, not intravascular MAC-mediated lysis.", "diagram": null}, {"id": 410, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_immunodeficiency", "question": "A 5-year-old boy has had recurrent sinopulmonary infections since age 2, with recent bronchiectasis on CT. Immunoglobulins: IgG 1.8 g/L (normal 5-13), IgA <0.05 g/L, IgM 0.3 g/L. Lymphocyte subsets show normal T-cell numbers but absent CD19+ B cells. What is the most likely diagnosis?", "options": {"A": "Common variable immunodeficiency", "B": "X-linked agammaglobulinaemia", "C": "Selective IgA deficiency", "D": "Hyper-IgM syndrome", "E": "Specific IgE panel testing"}, "answer": "B", "explanation": "X-linked agammaglobulinaemia (Bruton disease) presents in boys after 6 months of age with recurrent bacterial infections, profoundly low immunoglobulins across all classes, and absent peripheral B cells. CVID typically has some B cells present. The absent CD19+ B cells are the key distinguishing feature.", "diagram": null}, {"id": 411, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_transplant", "question": "A 45-year-old renal transplant recipient develops acute graft dysfunction 8 days post-transplant. Biopsy shows tubulitis with lymphocytic infiltration of tubular epithelium and intimal arteritis. C4d staining is negative. What type of rejection is this?", "options": {"A": "Hyperacute rejection", "B": "Acute antibody-mediated rejection", "C": "Acute T-cell-mediated rejection", "D": "Chronic antibody-mediated rejection", "E": "Tacrolimus for post-transplant immunosuppression"}, "answer": "C", "explanation": "Acute T-cell-mediated rejection (Banff classification) is characterised by tubulitis (lymphocytes invading tubular epithelium) and intimal arteritis, with negative C4d staining (which would indicate antibody-mediated rejection). The timing (days to weeks post-transplant) and histological features are classic.", "diagram": null}, {"id": 412, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_vasculitis", "question": "A 60-year-old man presents with haemoptysis, rapidly progressive glomerulonephritis (creatinine 450 µmol/L), and a cavitating lung lesion. c-ANCA (PR3) is strongly positive. Renal biopsy shows pauci-immune crescentic glomerulonephritis. What is the most appropriate induction therapy?", "options": {"A": "High-dose corticosteroids alone", "B": "Cyclophosphamide and corticosteroids", "C": "Rituximab and corticosteroids", "D": "Plasma exchange alone", "E": "Plasma exchange for anti-GBM disease"}, "answer": "C", "explanation": "For severe GPA (granulomatosis with polyangiitis) with organ-threatening disease, rituximab with corticosteroids is now considered equivalent or preferred to cyclophosphamide-based induction (RAVE and RITUXVAS trials). Rituximab avoids cyclophosphamide toxicity and is particularly favoured in patients of reproductive age or with relapsing disease.", "diagram": null}, {"id": 413, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_hereditary_angioedema", "question": "A 25-year-old woman presents with recurrent episodes of facial and laryngeal swelling without urticaria that do not respond to adrenaline or antihistamines. Her mother has similar episodes. C4 level is markedly low between attacks.\nWhat is the most likely diagnosis?", "options": {"A": "ACE inhibitor-induced angioedema", "B": "Hereditary angioedema (C1 esterase inhibitor deficiency)", "C": "Idiopathic angioedema", "D": "Allergic angioedema", "E": "Idiopathic angioedema — trial of higher-dose antihistamines"}, "answer": "B", "explanation": "Hereditary angioedema (HAE) is an autosomal dominant condition caused by deficiency (Type I) or dysfunction (Type II) of C1 esterase inhibitor (C1-INH), leading to unregulated bradykinin production. Key features include recurrent angioedema without urticaria that is unresponsive to adrenaline, antihistamines, and corticosteroids. C4 is consistently low (excellent screening test). Acute attacks are treated with C1-INH concentrate, icatibant (bradykinin B2 receptor antagonist), or fresh frozen plasma. Long-term prophylaxis includes C1-INH replacement, lanadelumab, or danazol. Family screening is essential.", "diagram": null}, {"id": 414, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_eosinophilic", "question": "A 35-year-old woman with asthma presents with peripheral eosinophilia (3.5 × 10⁹/L), migratory pulmonary infiltrates, and new-onset mononeuritis multiplex. P-ANCA is positive and biopsy of a sural nerve shows eosinophilic infiltration and necrotising vasculitis.\nWhat is the most likely diagnosis?", "options": {"A": "Churg-Strauss syndrome (eosinophilic granulomatosis with polyangiitis)", "B": "Hypereosinophilic syndrome", "C": "Allergic bronchopulmonary aspergillosis", "D": "Granulomatosis with polyangiitis (Wegener's)", "E": "Hypereosinophilic syndrome with cardiac involvement"}, "answer": "A", "explanation": "Eosinophilic granulomatosis with polyangiitis (EGPA, formerly Churg-Strauss syndrome) is characterised by the triad of asthma, eosinophilia, and systemic vasculitis. It typically progresses through three phases: allergic (asthma, rhinitis), eosinophilic (tissue eosinophilia, migratory pulmonary infiltrates), and vasculitic (small vessel vasculitis affecting nerves, heart, and skin). P-ANCA (anti-MPO) is positive in ~40% of cases. Mononeuritis multiplex is a common vasculitic manifestation. Treatment involves corticosteroids and cyclophosphamide or mepolizumab (anti-IL-5) for severe disease.", "diagram": null}, {"id": 415, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_anaphylaxis", "question": "A 30-year-old man develops urticaria, wheeze, stridor, and hypotension (BP 70/40 mmHg) 5 minutes after eating peanuts. What is the first-line treatment?", "options": {"A": "IV hydrocortisone 200 mg", "B": "IM adrenaline 0.5 mg (1:1000)", "C": "IV chlorpheniramine 10 mg", "D": "Nebulised salbutamol 5 mg", "E": "IV adrenaline 1 mg (1:10,000)"}, "answer": "B", "explanation": "IM adrenaline (0.5 mg of 1:1000 into anterolateral thigh) is the first-line treatment for anaphylaxis. Delay in adrenaline administration is the most common cause of anaphylaxis-related death.", "diagram": null}, {"id": 416, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_immune_response", "question": "Which immunoglobulin class is the first to be produced during a primary immune response?", "options": {"A": "IgG", "B": "IgA", "C": "IgM", "D": "IgE", "E": "IgD"}, "answer": "C", "explanation": "IgM is the first antibody produced in a primary immune response (appearing within days). Class switching to IgG occurs later with T-cell help. IgM is also the largest immunoglobulin, forming pentamers.", "diagram": null}, {"id": 417, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_immunodeficiency", "question": "A 25-year-old man has had recurrent sinopulmonary infections since childhood. Investigations show very low serum IgG, IgA, and IgM with absent B cells on flow cytometry. T-cell numbers and function are normal. What is the most likely diagnosis?", "options": {"A": "Common variable immunodeficiency (CVID)", "B": "X-linked agammaglobulinaemia (Bruton disease)", "C": "Selective IgA deficiency", "D": "Hyper-IgM syndrome", "E": "Severe combined immunodeficiency (SCID)"}, "answer": "B", "explanation": "X-linked agammaglobulinaemia (Bruton) is characterised by absent B cells due to BTK gene mutation, causing absent/very low all immunoglobulin classes with intact T-cell immunity, presenting in early childhood.", "diagram": null}, {"id": 418, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_complement", "question": "Deficiency of which early classical complement component is most strongly associated with systemic lupus erythematosus?", "options": {"A": "C1q", "B": "C3", "C": "C5", "D": "Factor B", "E": "Mannose-binding lectin (MBL)"}, "answer": "A", "explanation": "C1q deficiency has the strongest association with SLE (>90% develop lupus-like disease). Early classical pathway components (C1q, C2, C4) are important for clearance of immune complexes and apoptotic cells.", "diagram": null}, {"id": 419, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_drug_allergy", "question": "A 40-year-old woman with a documented IgE-mediated penicillin allergy (anaphylaxis to amoxicillin 5 years ago) requires antibiotics for infective endocarditis. The organism is only sensitive to penicillin. What is the most appropriate approach?", "options": {"A": "Use a carbapenem as a safe alternative", "B": "Perform penicillin skin testing followed by graded drug challenge if negative", "C": "Administer penicillin with prophylactic adrenaline pre-medication", "D": "Desensitise without prior skin testing", "E": "Use vancomycin as equivalent alternative"}, "answer": "B", "explanation": "Penicillin skin testing should be performed first. If negative (majority of patients with remote penicillin allergy have negative testing), graded challenge can proceed. If positive, formal desensitisation protocol is required.", "diagram": null}, {"id": 420, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_autoimmunity", "question": "Which HLA class II allele has the strongest genetic association with type 1 diabetes mellitus?", "options": {"A": "HLA-B27", "B": "HLA-DR3/DR4", "C": "HLA-DQ2", "D": "HLA-A3", "E": "HLA-C*06:02"}, "answer": "B", "explanation": "HLA-DR3 and HLA-DR4 (and the DQ8 allele in linkage disequilibrium with DR4) confer the strongest genetic risk for type 1 diabetes. DR3/DR4 heterozygotes have the highest risk.", "diagram": null}, {"id": 421, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_hereditary_angioedema", "question": "A 35-year-old woman presents with recurrent episodes of facial and laryngeal swelling without urticaria. C4 level is persistently low between attacks. C1 esterase inhibitor level is low and functional activity is reduced. What is the diagnosis?", "options": {"A": "ACE inhibitor-induced angioedema", "B": "Hereditary angioedema type I", "C": "Hereditary angioedema type II", "D": "Acquired C1 esterase inhibitor deficiency", "E": "Idiopathic angioedema"}, "answer": "B", "explanation": "HAE type I (85% of cases) has low C1-INH level and function with low C4 between attacks. Type II has normal/elevated C1-INH level but reduced function. Absence of urticaria distinguishes HAE from allergic angioedema.", "diagram": null}, {"id": 422, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_transplant", "question": "A renal transplant recipient 3 months post-transplant develops rising creatinine. Biopsy shows tubulitis and interstitial lymphocytic infiltration. What is the most likely diagnosis?", "options": {"A": "Acute antibody-mediated rejection", "B": "Acute T-cell mediated rejection", "C": "Calcineurin inhibitor nephrotoxicity", "D": "BK virus nephropathy", "E": "Recurrent primary disease"}, "answer": "B", "explanation": "Tubulitis (lymphocytes invading tubular epithelium) with interstitial lymphocytic infiltration is the hallmark of acute T-cell mediated (cellular) rejection, the most common form of acute rejection.", "diagram": null}, {"id": 423, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_preeclampsia", "question": "A 34-year-old primigravida at 32 weeks gestation has BP 158/98 mmHg (previously 110/68), proteinuria 2+ on dipstick, and upper abdominal pain. Platelets 135,000/μL, AST 68 U/L, creatinine 1.1 mg/dL. What is the most appropriate immediate management?", "options": {"A": "Expectant management with serial monitoring", "B": "Urgent delivery via planned cesarean section", "C": "IV magnesium sulfate for seizure prophylaxis and urgent delivery", "D": "Oral labetalol and expectant management", "E": "Magnesium sulfate for eclampsia prophylaxis"}, "answer": "C", "explanation": "This patient has severe preeclampsia with symptoms (epigastric pain) and HELLP features (low platelets, elevated transaminases). Magnesium sulfate for seizure prophylaxis and urgent delivery are indicated at ≥32 weeks with severe preeclampsia.", "diagram": null}, {"id": 424, "specialty": "medical_obstetrics", "tag": "medical_science_medical_obstetrics_physiological", "question": "A 28-year-old G2P1 at 26 weeks gestation has anemia with Hb 9.2 g/dL (baseline 12.5), MCV 84 fL, iron studies showing low ferritin (5 ng/mL) and low iron saturation (14%). She has no bleeding. What is the most likely cause of anemia in pregnancy?", "options": {"A": "Hemodilution alone", "B": "Iron deficiency due to increased iron demands with inadequate supplementation", "C": "Vitamin B12 deficiency", "D": "Folate deficiency", "E": "Labetalol for acute severe hypertension in pregnancy"}, "answer": "B", "explanation": "Iron deficiency is the most common cause of anemia in pregnancy due to 800-1000 mg increased total iron requirement. Low ferritin and low iron saturation confirm iron deficiency. Hemodilution contributes but doesn't fully explain this degree of anemia.", "diagram": null}, {"id": 425, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_gestational_diabetes", "question": "A 35-year-old G3P2 at 24 weeks gestation undergoes 75-g OGTT: fasting 95 mg/dL, 1-hour 168 mg/dL, 2-hour 145 mg/dL. One value is abnormal. What is the most appropriate next step?", "options": {"A": "Diagnose gestational diabetes and initiate dietary management", "B": "Repeat OGTT in 1 week", "C": "Dietary counseling and home glucose monitoring; repeat testing in 4 weeks", "D": "No further testing required", "E": "Anti-D immunoglobulin administration"}, "answer": "A", "explanation": "Gestational diabetes is diagnosed with ≥1 abnormal value on 75-g OGTT (fasting ≥92, 1-hr ≥180, 2-hr ≥153 mg/dL). This patient meets one criterion and should initiate dietary and exercise counseling, glucose monitoring, and follow-up monitoring.", "diagram": null}, {"id": 426, "specialty": "medical_obstetrics", "tag": "medical_science_medical_obstetrics_medication", "question": "A 31-year-old woman with epilepsy is pregnant (9 weeks gestation) and takes phenytoin as monotherapy (concentration 18 μg/mL, therapeutic). What is the most concerning fetal risk?", "options": {"A": "Neonatal hemorrhage only", "B": "Fetal hydantoin syndrome (growth restriction, cardiac defects, orofacial clefts, intellectual disability)", "C": "Maternal seizure activity is the primary concern", "D": "No increased risk with adequate seizure control", "E": "Antenatal corticosteroids for fetal lung maturity"}, "answer": "B", "explanation": "Phenytoin is teratogenic, causing fetal hydantoin syndrome with characteristic features. Lamotrigine or levetiracetam are preferred in pregnancy. However, stopping seizure prophylaxis risks maternal seizures, which harm the fetus, so careful risk-benefit assessment is needed.", "diagram": null}, {"id": 427, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_rh_disease", "question": "A 28-year-old Rh-negative woman at 32 weeks gestation with no sensitization (indirect Coombs negative) has a car accident with vaginal bleeding. Kleihauer-Betke test shows fetal-maternal hemorrhage of 12 mL fetal red cells. How much anti-D should be administered?", "options": {"A": "250 IU (50 μg) IM", "B": "500 IU (100 μg) IM", "C": "1500 IU (300 μg) IM", "D": "2000 IU (400 μg) IM", "E": "Nifedipine for tocolysis"}, "answer": "C", "explanation": "Standard anti-D dosing is 500 IU (100 μg) per mL of fetal red cells or 1000 IU per 2 mL. For 12 mL fetal RBCs, approximately 6000 IU is needed; 1500 IU (300 μg) is a commonly used dose. Exact calculation: (12 × 500) IU / 4 = 1500 IU.", "diagram": null}, {"id": 428, "specialty": "medical_obstetrics", "tag": "medical_science_medical_obstetrics_infection", "question": "A 24-year-old primigravida at 18 weeks gestation is found to have Toxoplasma gondii seropositivity (IgG and IgM positive). Amniocentesis with PCR testing is negative. What is the most appropriate management regarding fetal transmission risk?", "options": {"A": "No risk of transmission at 18 weeks; no treatment needed", "B": "High risk of congenital toxoplasmosis; immediate treatment with spiramycin", "C": "1-2% risk of transmission at this gestation; offer spiramycin to reduce transmission", "D": "15-20% risk of transmission; recommend termination of pregnancy", "E": "Low-molecular-weight heparin for VTE prophylaxis"}, "answer": "C", "explanation": "Transmission risk is inversely related to gestational age: ~15% at <13 weeks, 1-2% at 16-20 weeks, 60%+ at >30 weeks. Spiramycin reduces transmission risk by ~40%. Amniocentesis at ≥18 weeks with negative PCR is reassuring but doesn't exclude infection.", "diagram": null}, {"id": 429, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_labor", "question": "A 32-year-old G2P1 with dichorionic diamniotic twins is at 35+6 weeks with spontaneous rupture of membranes (SROM) in the first twin. Fetal heart rate tracings are reassuring. What is the most appropriate management?", "options": {"A": "Expectant management with close monitoring for infection and labor", "B": "Immediate delivery by cesarean section", "C": "Immediate delivery by vaginal delivery attempt", "D": "Prophylactic antibiotics and expectant management with close monitoring", "E": "Intravenous iron infusion for iron deficiency anaemia"}, "answer": "D", "explanation": "SROM in multiple gestation at 35+6 weeks warrants admission with monitoring for labor and infection. Prophylactic antibiotics (typically ampicillin/amoxicillin and azithromycin) reduce infection risk. Delivery timing depends on labor onset and maternal-fetal status.", "diagram": null}, {"id": 430, "specialty": "medical_obstetrics", "tag": "medical_science_medical_obstetrics_hypertension", "question": "A 29-year-old G1P0 with chronic hypertension (on lisinopril 10 mg daily prior to pregnancy) is now at 8 weeks gestation. What is the most appropriate antihypertensive management?", "options": {"A": "Continue lisinopril as it is safe in pregnancy", "B": "Switch to labetalol or nifedipine for chronic hypertension management", "C": "Discontinue all antihypertensives; reassess at 20 weeks", "D": "Switch to atenolol for blood pressure control", "E": "Ursodeoxycholic acid for obstetric cholestasis"}, "answer": "B", "explanation": "ACE inhibitors (lisinopril) are teratogenic in 1st trimester and should be discontinued. Labetalol, nifedipine, and methyldopa are safe in pregnancy. Atenolol is associated with fetal growth restriction and should be avoided if possible.", "diagram": null}, {"id": 431, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_thromboembolism", "question": "A 35-year-old G3P2 at 28 weeks gestation presents with acute left leg swelling, pain, and calf tenderness. Doppler ultrasound confirms deep vein thrombosis. She has no prior thromboembolism. What is the most appropriate management?", "options": {"A": "IV unfractionated heparin, then transition to LMWH for duration of pregnancy and 6 weeks postpartum", "B": "Warfarin initiation for anticoagulation", "C": "Watchful waiting with compression stockings", "D": "IVCF placement", "E": "Insulin infusion for diabetic ketoacidosis in pregnancy"}, "answer": "A", "explanation": "VTE in pregnancy requires parenteral anticoagulation (UFH or LMWH). LMWH is preferred due to longer half-life and subcutaneous dosing, but UFH allows easier reversal if labor is imminent. Warfarin is avoided (fetal effects). Duration is through pregnancy and 6 weeks postpartum (minimum).", "diagram": null}, {"id": 432, "specialty": "medical_obstetrics", "tag": "medical_science_medical_obstetrics_placentation", "question": "A 38-year-old G4P3 with history of two prior cesarean sections is found on ultrasound at 28 weeks to have placenta previa (low-lying, completely covering cervix). What is the indication for delivery timing and mode?", "options": {"A": "Elective delivery at 39 weeks by planned cesarean section", "B": "Cesarean delivery at 37 weeks due to recurrent previa", "C": "Expectant management with planned vaginal delivery if bleeding doesn't occur", "D": "Immediate delivery due to presumed abnormal placentation", "E": "Methyldopa for chronic hypertension in pregnancy"}, "answer": "A", "explanation": "Previa covering the internal cervical os requires planned cesarean delivery. Timing is typically 38-39 weeks (avoiding prematurity) unless preterm bleeding occurs. Given history of multiple cesareans, risk of abnormal placentation (accreta) increases, requiring careful surgical planning.", "diagram": null}, {"id": 433, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_postpartum", "question": "A 34-year-old woman at 3 days postpartum after vaginal delivery of a 3800-g infant develops fever 38.9°C, tachycardia (HR 112), lower abdominal tenderness, and excessive lochia. Hb 92 g/L (was 105 g/L antenatally). What is the most likely diagnosis?", "options": {"A": "Mastitis", "B": "Urinary tract infection", "C": "Postpartum endometritis", "D": "Normal postpartum inflammatory response", "E": "Plasma exchange for thrombotic thrombocytopenic purpura"}, "answer": "C", "explanation": "Postpartum endometritis presents with fever (typically 48-72 hours postpartum), uterine tenderness, excessive/foul lochia, and tachycardia. Anemia from hemorrhage is common. Empiric broad-spectrum antibiotics covering gram-negative rods, gram-positive cocci, and anaerobes are indicated.", "diagram": null}, {"id": 434, "specialty": "medical_obstetrics", "tag": "medical_science_medical_obstetrics_lactation", "question": "A 28-year-old exclusively breastfeeding mother at 6 weeks postpartum with hypertension needs antihypertensive therapy. She is on lisinopril 10 mg daily (started during pregnancy, continued postpartum). What is the most appropriate action?", "options": {"A": "Continue lisinopril; it is safe during breastfeeding", "B": "Switch to nifedipine (preferred in breastfeeding)", "C": "Discontinue antihypertensives while breastfeeding", "D": "Switch to atenolol", "E": "Azathioprine for lupus flare in pregnancy"}, "answer": "A", "explanation": "ACE inhibitors like lisinopril are safe during breastfeeding. Though minimal amounts appear in breast milk, there is negligible risk to infants. Continuation is appropriate and cost-effective.", "diagram": null}, {"id": 435, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_fetal_assessment", "question": "A 36-year-old G2P1 with Type 1 diabetes at 38 weeks gestation is seen for routine antenatal care. Last HbA1c 7.2%. Fetal biophysical profile score is 8/8 with normal NST and amniotic fluid volume. What is the most appropriate recommendation regarding delivery timing?", "options": {"A": "Plan elective induction at 37 weeks due to maternal diabetes", "B": "Plan elective cesarean delivery at 39 weeks", "C": "Expectant management; allow spontaneous labor or induction at 39+0 weeks", "D": "Plan delivery at 38 weeks given suboptimal glycemic control", "E": "Propylthiouracil in first trimester for Graves disease"}, "answer": "A", "explanation": "Diabetic pregnancies have increased perinatal mortality, stillbirth, and neonatal complications. Most guidelines recommend delivery at 37-38 weeks (once fetal lung maturity confirmed or assumed) rather than waiting to term. Elective induction at 37 weeks is appropriate.", "diagram": null}, {"id": 436, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_cardiac", "question": "A 30-year-old woman at 28 weeks gestation with known mitral stenosis (valve area 1.0 cm²) presents with acute dyspnoea and pulmonary oedema. Heart rate 130 bpm (atrial fibrillation), BP 110/70 mmHg, O2 saturation 88%. What is the most appropriate immediate management?", "options": {"A": "Urgent percutaneous mitral balloon valvuloplasty", "B": "IV metoprolol for rate control and IV furosemide", "C": "Electrical cardioversion", "D": "Urgent caesarean delivery", "E": "Intravenous labetalol infusion"}, "answer": "B", "explanation": "In mitral stenosis with acute AF and pulmonary oedema during pregnancy, the priority is rate control (beta-blockers preferred) and diuresis. Tachycardia shortens diastolic filling time, worsening obstruction. IV metoprolol provides rapid rate control. Electrical cardioversion is reserved for haemodynamic instability.", "diagram": null}, {"id": 437, "specialty": "medical_obstetrics", "tag": "medical_science_medical_obstetrics_haematology", "question": "A 32-year-old woman at 34 weeks gestation presents with headache, BP 165/105 mmHg, platelet count 65 x10^9/L, AST 320 U/L, LDH 850 U/L, and blood film shows schistocytes. Creatinine is 110 µmol/L. What is the most likely diagnosis?", "options": {"A": "Thrombotic thrombocytopenic purpura", "B": "HELLP syndrome", "C": "Acute fatty liver of pregnancy", "D": "Haemolytic uraemic syndrome", "E": "Platelet transfusion for HELLP syndrome"}, "answer": "B", "explanation": "HELLP syndrome (Haemolysis, Elevated Liver enzymes, Low Platelets) is a severe form of preeclampsia. The combination of hypertension, microangiopathic haemolysis (schistocytes, elevated LDH), elevated transaminases, and thrombocytopenia in the third trimester is classic. TTP would not typically cause hypertension and elevated transaminases.", "diagram": null}, {"id": 438, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_thyroid", "question": "A 28-year-old woman at 10 weeks gestation presents with hyperemesis gravidarum. TSH is <0.01 mU/L, free T4 is 32 pmol/L (9-19). She has no goitre, no ophthalmopathy, and TSH receptor antibodies are negative. What is the most appropriate management?", "options": {"A": "Start propylthiouracil immediately", "B": "Start carbimazole", "C": "Supportive management of hyperemesis; recheck thyroid function at 14-16 weeks", "D": "Radioiodine ablation after delivery", "E": "Levothyroxine dose adjustment in pregnancy"}, "answer": "C", "explanation": "Gestational transient thyrotoxicosis is caused by hCG cross-reactivity with TSH receptors and is self-limiting, resolving by 14-20 weeks as hCG levels decline. Negative TSH receptor antibodies exclude Graves disease. Antithyroid drugs are not indicated; treatment focuses on hyperemesis management.", "diagram": null}, {"id": 439, "specialty": "medical_obstetrics", "tag": "medical_science_medical_obstetrics_renal", "question": "A 26-year-old woman at 32 weeks gestation presents with BP 155/100 mmHg, protein:creatinine ratio 120 mg/mmol, and serum uric acid 0.48 mmol/L. She has pre-existing IgA nephropathy with baseline creatinine 95 µmol/L; current creatinine is 130 µmol/L. What feature most reliably distinguishes preeclampsia superimposed on CKD from worsening CKD alone?", "options": {"A": "Rising creatinine", "B": "New-onset thrombocytopenia or elevated liver enzymes", "C": "Worsening proteinuria", "D": "Elevated uric acid", "E": "Aspirin 150 mg nocte for preeclampsia prevention"}, "answer": "B", "explanation": "In women with pre-existing CKD and proteinuria, worsening proteinuria and rising creatinine can occur from either condition. New-onset thrombocytopenia, elevated liver enzymes, or other features of end-organ damage are the most reliable markers of superimposed preeclampsia, as these are not features of CKD progression alone.", "diagram": null}, {"id": 440, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_vte", "question": "A 29-year-old woman at 14 weeks gestation presents with left leg swelling and pain. D-dimer is elevated. Compression ultrasound confirms proximal DVT of the left common femoral vein. She has no drug allergies. What is the most appropriate anticoagulation?", "options": {"A": "Warfarin with target INR 2.0-3.0", "B": "Low-molecular-weight heparin (enoxaparin) at therapeutic dose", "C": "Rivaroxaban 15 mg BD for 3 weeks then 20 mg daily", "D": "Unfractionated heparin infusion for the remainder of pregnancy", "E": "Continuous insulin infusion during labour"}, "answer": "B", "explanation": "LMWH is the anticoagulant of choice for VTE in pregnancy. Warfarin is teratogenic (especially weeks 6-12) and causes fetal bleeding risk. DOACs (rivaroxaban, apixaban) cross the placenta and are contraindicated. LMWH should continue throughout pregnancy and for at least 6 weeks postpartum (minimum total 3 months).", "diagram": null}, {"id": 441, "specialty": "medical_obstetrics", "tag": "medical_science_medical_obstetrics_diabetes", "question": "A 33-year-old woman with pre-existing type 1 diabetes is at 8 weeks gestation. Her HbA1c is 72 mmol/mol (8.7%). She is on insulin pump therapy. She asks about risks to the pregnancy. What is the most significant fetal risk associated with poor first-trimester glycaemic control?", "options": {"A": "Macrosomia", "B": "Congenital cardiac malformations", "C": "Neonatal hypoglycaemia", "D": "Shoulder dystocia", "E": "Enoxaparin therapeutic dose for acute VTE"}, "answer": "B", "explanation": "Poor glycaemic control in the first trimester (organogenesis period, weeks 3-8) is most strongly associated with congenital malformations, particularly cardiac defects (VSD, transposition). The risk increases linearly with HbA1c. Macrosomia and neonatal hypoglycaemia relate to later pregnancy hyperglycaemia.", "diagram": null}, {"id": 442, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_liver", "question": "A 35-year-old woman at 36 weeks gestation presents with 2 weeks of progressive pruritus affecting palms and soles, worse at night. LFTs: ALT 65 U/L, ALP 280 U/L (elevated for pregnancy), GGT normal, bilirubin 22 µmol/L. Bile acids are 45 µmol/L (normal <10). Hepatitis serology is negative. What is the most appropriate management?", "options": {"A": "Ursodeoxycholic acid and planned delivery at 37 weeks", "B": "Reassurance and delivery at term", "C": "Cholestyramine and expectant management", "D": "Immediate induction of labour", "E": "Folic acid 5 mg daily for women on antiepileptics"}, "answer": "A", "explanation": "Intrahepatic cholestasis of pregnancy with bile acids ≥40 µmol/L carries increased risk of stillbirth. Management includes ursodeoxycholic acid for symptom relief and planned delivery at 37 weeks to mitigate fetal risk. Higher bile acid levels (≥100 µmol/L) may warrant earlier delivery.", "diagram": null}, {"id": 443, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_epilepsy", "question": "A 28-year-old woman with epilepsy on sodium valproate is planning her first pregnancy. She has been seizure-free for 3 years.\nWhat is the MOST important preconception counselling recommendation?", "options": {"A": "Continue valproate throughout pregnancy as seizure control is the priority", "B": "Switch to a safer antiepileptic drug (e.g. lamotrigine or levetiracetam) before conception", "C": "Stop all antiepileptic medication immediately", "D": "Delay pregnancy until she has been seizure-free for 10 years", "E": "Continue valproate with close monitoring"}, "answer": "B", "explanation": "Sodium valproate is a known teratogen with the highest risk among antiepileptic drugs — causing neural tube defects (1-2%), cardiac malformations, and neurodevelopmental impairment (reduced IQ, autism spectrum disorder) in up to 30-40% of exposed children. Women of childbearing age should ideally be switched to safer alternatives (lamotrigine or levetiracetam) well before conception to ensure seizure stability on the new regimen. High-dose folic acid (5 mg daily) should be started at least 3 months preconception. Abrupt cessation risks status epilepticus, which is dangerous for both mother and fetus.", "diagram": null}, {"id": 444, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_psychiatric", "question": "A 32-year-old woman, 3 days postpartum, presents with agitation, confusion, grandiose delusions, visual hallucinations, and rapid mood fluctuations. She has no psychiatric history.\nWhat is the most likely diagnosis?", "options": {"A": "Postpartum depression", "B": "Baby blues", "C": "Postpartum psychosis", "D": "Delirium secondary to infection", "E": "Postpartum depression with psychotic features"}, "answer": "C", "explanation": "Postpartum psychosis is a psychiatric emergency occurring in 1-2 per 1000 births, typically within the first 2 weeks postpartum. It presents with rapid onset of psychotic symptoms including delusions, hallucinations, confusion, and mood lability. Risk factors include bipolar disorder and previous postpartum psychosis. It requires urgent psychiatric assessment and typically inpatient admission (ideally a mother-baby unit). Treatment includes antipsychotics, mood stabilisers, and sometimes ECT. There is a significant risk of recurrence (25-50% in subsequent pregnancies). Organic causes (infection, thyroid dysfunction) must be excluded.", "diagram": null}, {"id": 445, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_asthma", "question": "A 30-year-old woman at 24 weeks gestation presents with an acute asthma exacerbation. She is unable to complete sentences, with a respiratory rate of 28/min, SpO2 93%, and peak flow 45% of predicted.\nWhat is the correct approach to managing severe asthma in pregnancy?", "options": {"A": "Avoid systemic corticosteroids due to teratogenic risk", "B": "Treat identically to non-pregnant patients — salbutamol nebulisers, ipratropium, and systemic corticosteroids", "C": "Use only inhaled medications to protect the fetus", "D": "Deliver the baby emergently to improve maternal oxygenation", "E": "Avoid systemic corticosteroids — use inhaled medications only"}, "answer": "B", "explanation": "Severe asthma in pregnancy should be treated aggressively using the same stepwise approach as in non-pregnant patients. Uncontrolled asthma poses a greater risk to the fetus (hypoxia, growth restriction, preterm delivery) than the medications used to treat it. Inhaled beta-agonists, inhaled corticosteroids, systemic corticosteroids, and magnesium sulfate are all considered safe in pregnancy. Oxygen should be maintained >95% to ensure adequate fetal oxygenation. Prednisolone is preferred over dexamethasone (which crosses the placenta more readily). Continuous fetal monitoring should accompany treatment in viable gestations.", "diagram": null}, {"id": 446, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_preeclampsia", "question": "A 32-year-old primigravida at 34 weeks gestation presents with BP 168/110 mmHg, headache, and proteinuria (protein:creatinine ratio 80 mg/mmol). Platelets 92 × 10⁹/L, ALT 180 U/L, creatinine 110 µmol/L. What is the most important immediate management?", "options": {"A": "Oral methyldopa 250 mg TDS and outpatient review in 1 week", "B": "IV magnesium sulfate and plan delivery", "C": "Commence labetalol and aim for vaginal delivery at 37 weeks", "D": "Urgent caesarean section within 30 minutes", "E": "Plasma exchange for thrombotic microangiopathy"}, "answer": "B", "explanation": "Severe preeclampsia with HELLP features (low platelets, elevated ALT) at 34 weeks requires IV magnesium sulfate for seizure prophylaxis and delivery planning. Corticosteroids for fetal lung maturity should be given if not already administered.", "diagram": null}, {"id": 447, "specialty": "medical_obstetrics", "tag": "medical_science_medical_obstetrics_physiology", "question": "Which cardiovascular change is a normal physiological adaptation of pregnancy?", "options": {"A": "Increased systemic vascular resistance", "B": "Decreased cardiac output", "C": "Increased plasma volume by 40-50%", "D": "Decreased heart rate", "E": "Increased blood viscosity"}, "answer": "C", "explanation": "Normal pregnancy involves plasma volume expansion of 40-50%, increased cardiac output (30-50%), decreased SVR, and mild tachycardia. These adaptations support uteroplacental perfusion.", "diagram": null}, {"id": 448, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_vte", "question": "A 28-year-old woman at 20 weeks gestation presents with acute left leg DVT confirmed on compression ultrasound. What is the most appropriate anticoagulation?", "options": {"A": "Warfarin with target INR 2-3", "B": "Enoxaparin therapeutic dose weight-adjusted", "C": "Rivaroxaban 15 mg BD for 3 weeks then 20 mg daily", "D": "Unfractionated heparin infusion for the remainder of pregnancy", "E": "Aspirin 150 mg daily"}, "answer": "B", "explanation": "LMWH (enoxaparin) is the anticoagulant of choice in pregnancy. Warfarin crosses the placenta (teratogenic, especially first trimester). DOACs are contraindicated in pregnancy.", "diagram": null}, {"id": 449, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_diabetes", "question": "A 35-year-old woman with gestational diabetes diagnosed at 28 weeks has failed to achieve glycaemic targets (fasting glucose >5.5 mmol/L, 2-hour postprandial >7.0 mmol/L) after 2 weeks of dietary modification. What is the most appropriate pharmacotherapy?", "options": {"A": "Metformin 500 mg BD", "B": "Insulin (basal and/or bolus regimen)", "C": "Gliclazide 40 mg daily", "D": "Empagliflozin 10 mg daily", "E": "Exenatide 10 µg SC BD"}, "answer": "B", "explanation": "Insulin is the preferred pharmacotherapy for gestational diabetes that fails dietary management. Metformin can be used but crosses the placenta. SGLT2 inhibitors and sulfonylureas (other than glibenclamide in some guidelines) are not recommended.", "diagram": null}, {"id": 450, "specialty": "medical_obstetrics", "tag": "medical_science_medical_obstetrics_prescribing", "question": "Which antiepileptic drug carries the highest risk of neural tube defects when used in the first trimester of pregnancy?", "options": {"A": "Lamotrigine", "B": "Levetiracetam", "C": "Sodium valproate", "D": "Carbamazepine", "E": "Topiramate"}, "answer": "C", "explanation": "Sodium valproate carries the highest teratogenic risk among antiepileptics, with neural tube defect rates of 1-2% (vs 0.1% background) and up to 40% risk of neurodevelopmental disorders. It should be avoided in women of childbearing potential.", "diagram": null}, {"id": 451, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_thyroid", "question": "A woman at 12 weeks gestation has TSH 8.2 mU/L [0.1-4.0] and free T4 8 pmol/L [9-19] with positive TPO antibodies. She is asymptomatic. What is the most appropriate management?", "options": {"A": "Observe and recheck thyroid function at 20 weeks", "B": "Commence levothyroxine", "C": "Commence carbimazole", "D": "Iodine supplementation only", "E": "Propylthiouracil 50 mg TDS"}, "answer": "B", "explanation": "Overt hypothyroidism in pregnancy (elevated TSH with low free T4) requires levothyroxine replacement. Untreated maternal hypothyroidism is associated with adverse pregnancy outcomes and impaired fetal neurodevelopment.", "diagram": null}, {"id": 452, "specialty": "medical_obstetrics", "tag": "clinical_science_medical_obstetrics_infections", "question": "A 30-year-old woman at 16 weeks gestation is found to be hepatitis B surface antigen (HBsAg) positive on routine antenatal screening. HBeAg is positive, HBV DNA is 8 × 10⁷ IU/mL. What intervention most effectively reduces the risk of vertical transmission?", "options": {"A": "Elective caesarean section", "B": "Tenofovir disoproxil fumarate from 28-32 weeks gestation plus neonatal immunoprophylaxis", "C": "Neonatal hepatitis B immunoglobulin and vaccination alone", "D": "Lamivudine from 20 weeks gestation", "E": "Interferon-alpha from second trimester"}, "answer": "B", "explanation": "High maternal HBV DNA (>200,000 IU/mL) confers significant vertical transmission risk despite neonatal immunoprophylaxis. Tenofovir from 28-32 weeks reduces viral load and combined with neonatal HBIG + vaccine achieves >95% prevention.", "diagram": null}, {"id": 453, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_lung_cancer", "question": "A 62-year-old male smoker presents with a 4-week history of cough and dyspnoea. CXR shows a 3cm left upper lobe mass with ipsilateral hilar lymphadenopathy. CT shows no distant metastases. PET-CT confirms FDG uptake in lung and hilum only. He has FEV1 0.8L (25% predicted). Which best describes his fitness for multimodal therapy?", "options": {"A": "Suitable only for best supportive care due to poor lung function", "B": "Appropriate for neoadjuvant chemotherapy followed by surgery if adequate response", "C": "Candidate for concurrent chemoradiation despite FEV1, given localized disease", "D": "Should receive immunotherapy as monotherapy to avoid pulmonary toxicity", "E": "Pembrolizumab 200 mg IV 3-weekly"}, "answer": "C", "explanation": "Stage IIIA NSCLC with borderline lung function is an established indication for concurrent chemoradiation. While FEV1 <1L is concerning, the localized disease burden and lack of metastases make aggressive treatment justified. Pulmonary function can be further assessed, but monotherapy alone is insufficient for this stage.", "diagram": null}, {"id": 454, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_breast_cancer_hormonal", "question": "A 51-year-old postmenopausal woman with HR+/HER2- breast cancer on letrozole for 2 years develops hot flushes, vaginal dryness, and mood disturbance attributed to aromatase inhibitor side effects. She has no contraindications. What is the most appropriate next step?", "options": {"A": "Switch to tamoxifen with consideration for vasomotor symptom management", "B": "Continue letrozole and add megestrol acetate for symptom relief", "C": "Cease hormonal therapy and rely on baseline radiotherapy tolerance", "D": "Switch to fulvestrant and add SSRI for vasomotor symptoms", "E": "Tamoxifen 20 mg daily for 5 years"}, "answer": "A", "explanation": "Switching between hormonal agents (e.g., aromatase inhibitor to tamoxifen) is evidence-based for improving tolerability in HR+ breast cancer. Tamoxifen often produces different side effect profiles. Megestrol can cause weight gain and thromboembolic complications. Extended therapy interruption compromises disease control.", "diagram": null}, {"id": 455, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_chemotherapy_toxicity", "question": "A 58-year-old woman with ovarian cancer receives her 4th cycle of carboplatin-paclitaxel. She presents with acute-onset dyspnoea, chest discomfort, and hypoxia (SpO2 88%). Troponin is mildly elevated. Which agent is most likely responsible?", "options": {"A": "Carboplatin (cumulative dose-related peripheral neuropathy)", "B": "Paclitaxel (taxane-associated acute myocarditis)", "C": "Both agents equally likely given cumulative dose", "D": "Neither; presentation suggests pulmonary embolism unrelated to chemotherapy", "E": "Dexrazoxane for anthracycline cardioprotection"}, "answer": "B", "explanation": "Taxanes, particularly paclitaxel, are associated with acute myocarditis and arrhythmias, typically presenting within hours to days of infusion. Acute cardiotoxicity can present with troponin elevation and dyspnoea. Carboplatin is primarily associated with delayed nephrotoxicity and neuropathy.", "diagram": null}, {"id": 456, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_colorectal_metastatic", "question": "A 65-year-old man with metastatic colorectal cancer (liver only, RAS wild-type, MSS) has received FOLFOX + bevacizumab for 8 months with near-complete response. He develops grade 3 hypertension and proteinuria (2g/24h). What is most appropriate?", "options": {"A": "Discontinue bevacizumab and switch to cetuximab monotherapy", "B": "Continue bevacizumab with antihypertensive optimization and monitor for ARDS", "C": "Hold bevacizumab temporarily, optimize blood pressure, consider re-challenge", "D": "Switch chemotherapy backbone to FOLFIRI while maintaining bevacizumab", "E": "FOLFOX chemotherapy regimen"}, "answer": "C", "explanation": "Bevacizumab-induced hypertension and proteinuria are manageable toxicities that often improve with dose modification and antihypertensive therapy. Temporary cessation with blood pressure optimization and subsequent re-challenge is recommended. Stopping bevacizumab entirely may compromise ongoing disease control.", "diagram": null}, {"id": 457, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_melanoma_immunotherapy", "question": "A 52-year-old woman with stage IIIC cutaneous melanoma receives adjuvant nivolumab. After 3 months, she develops arthralgias, elevated CRP (45 mg/L), and mild dyspnoea. Chest imaging is normal. What is most likely?", "options": {"A": "Immune-related myositis with early respiratory involvement", "B": "Immune-related arthritis with possible early pneumonitis", "C": "Nivolumab-induced rheumatoid arthritis indistinguishable from idiopathic RA", "D": "Tumour recurrence with systemic inflammatory response", "E": "Nivolumab plus ipilimumab combination"}, "answer": "B", "explanation": "Immune checkpoint inhibitor-related arthritis is a common immune-related adverse event affecting 2-5% of patients. Elevated inflammatory markers and arthralgias are characteristic. Dyspnoea with normal imaging suggests early immune-related pneumonitis. The temporal relationship to nivolumab is key.", "diagram": null}, {"id": 458, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_germ_cell_tumours", "question": "A 28-year-old man with stage IIB testicular seminoma (ITC good-risk) completes 3 cycles of BEP chemotherapy. Post-treatment imaging shows residual 2.5cm retroperitoneal mass with normalised tumour markers. What is standard next step?", "options": {"A": "Surveillance CT imaging; residual masses <3cm often mature teratoma or fibrosis", "B": "Immediate surgical resection of residual mass to exclude teratoma", "C": "Repeat chemotherapy if any radiological residual disease remains", "D": "Radiotherapy to residual mass regardless of normalised markers", "E": "Granulocyte colony-stimulating factor prophylaxis"}, "answer": "A", "explanation": "In seminoma with normalised markers post-chemotherapy, residual masses 1-3cm can represent fibrosis or mature teratoma and often regress. Surveillance imaging is standard. Masses <2cm require monitoring, 2-3cm warrant follow-up imaging at 8-12 weeks. Resection is reserved for enlarging masses.", "diagram": null}, {"id": 459, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_lymphoma_hodgkin", "question": "A 34-year-old woman with classical Hodgkin lymphoma (stage IIA) achieves complete remission after ABVD. She is PET-negative at end of treatment and planning pregnancy in 12 months. Which best reflects pregnancy counselling?", "options": {"A": "Pregnancy is contraindicated due to ABVD-induced genetic mutations", "B": "Pregnancy is safe; ABVD at therapeutic doses does not impair fertility or cause long-term fetal risk", "C": "Fertility assessment and egg preservation should be discussed before ABVD initiation", "D": "Preconception testing for BRCA1/2 is mandatory before conception", "E": "Zoledronic acid for bone metastases"}, "answer": "B", "explanation": "Women achieving remission after ABVD for Hodgkin lymphoma have preserved fertility and can safely conceive. ABVD is not highly gonadotoxic at standard doses (unlike alkylating agents). Fertility counselling pre-treatment is appropriate. BRCA testing is not routinely indicated.", "diagram": null}, {"id": 460, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_palliative_systemic_therapy", "question": "A 71-year-old man with metastatic gastric adenocarcinoma (HER2-negative) presents with dysphagia, weight loss (8kg/3 months), ECOG 2, and bilirubin 1.8x ULN. Which is most appropriate initial therapy?", "options": {"A": "Triplet chemotherapy (cisplatin/5-FU/epirubicin) for potential cure", "B": "Palliative 5-FU monotherapy or best supportive care, depending on patient goals", "C": "Doublet chemotherapy (capecitabine/cisplatin) if renal function permits", "D": "Immunotherapy (pembrolizumab) given PD-L1 expression in gastric cancer", "E": "Capecitabine maintenance therapy"}, "answer": "B", "explanation": "ECOG 2 performance status with constitutional symptoms and mild hepatic impairment indicates limited tolerance for intensive chemotherapy. Frailty assessment and goals of care discussion are paramount. Triplet regimens require ECOG 0-1. Monotherapy or BSC aligns with patient-centred care for advanced symptomatic disease.", "diagram": null}, {"id": 461, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_molecular_testing", "question": "A 45-year-old woman with nonsquamous NSCLC (adenocarcinoma) has EGFR L858R mutation and is commenced on erlotinib. After 9 months of excellent response, she develops acquired resistance with rising CEA and new brain metastases. EGFR T790M is not detected. What is most likely mechanism?", "options": {"A": "MET amplification or other on-target resistance mechanism", "B": "TP53 mutation acquired during treatment course", "C": "HER2 overexpression emergence", "D": "Complete loss of EGFR mutation (reversion to wild-type)", "E": "Surgical debulking followed by chemotherapy"}, "answer": "A", "explanation": "Second-line resistance to EGFR inhibitors in the absence of T790M (detected in ~50% of resistance cases) often involves MET amplification, PI3K pathway activation, or EMT. Brain metastases develop via both on-target (acquired resistance) and off-target (sanctuary site) mechanisms. HER2 overexpression is less mechanistically linked to TKI resistance.", "diagram": null}, {"id": 462, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_treatment_complications", "question": "A 55-year-old man with metastatic renal cell carcinoma on sunitinib develops fatigue, dyspnoea, and new systolic murmur. Echo shows LVEF 35% (baseline 55%). What is primary mechanism of cardiotoxicity?", "options": {"A": "VEGFR inhibition causing myocardial ischaemia via coronary vasoconstriction", "B": "Off-target PDGFR inhibition causing myocardial fibrosis", "C": "Type II cardiotoxicity from direct myocyte injury; VEGF pathway crucial for cardiomyocyte survival", "D": "Hypertension-related left ventricular hypertrophy and systolic dysfunction", "E": "Erlotinib for EGFR-mutant NSCLC"}, "answer": "C", "explanation": "Sunitinib-induced cardiotoxicity is primarily Type II (non-anthracycline), involving direct VEGF pathway inhibition and loss of myocyte survival signals. VEGF signalling is essential for endothelial and cardiac myocyte function. The acute LVEF decline reflects direct myocyte injury, not purely pressure overload.", "diagram": null}, {"id": 463, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_screening_prevention", "question": "A 38-year-old woman with BRCA1 mutation and contralateral breast cancer (prior ipsilateral at age 42) seeks guidance on ovarian cancer screening. Which aligns with current best practice?", "options": {"A": "Annual transvaginal ultrasound with CA-125 screening is highly effective", "B": "Risk-reducing salpingo-oophorectomy (RRSO) is recommended, typically by age 40-45", "C": "Intensive surveillance can reliably detect early ovarian cancer in BRCA1 carriers", "D": "No intervention needed; BRCA1 carriers have <10% ovarian cancer risk", "E": "Rasburicase for tumour lysis syndrome prophylaxis"}, "answer": "B", "explanation": "RRSO is the most effective intervention to reduce ovarian/fallopian tube cancer in BRCA1/2 carriers, recommended by age 40-45 or after completion of childbearing. Screening has not demonstrated survival benefit. BRCA1 carriers have 40-50% lifetime ovarian cancer risk. RRSO provides dual benefit of ovarian cancer prevention.", "diagram": null}, {"id": 464, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_rare_malignancies", "question": "A 42-year-old woman presents with night sweats, generalised lymphadenopathy, and hepatosplenomegaly. Blood film shows >30% atypical lymphocytes with eosinophilia (3.2 x 10^9/L). Flow cytometry confirms CD4+ T-cell clonality. Which is most likely?", "options": {"A": "Acute infectious mononucleosis with reactive atypical lymphocytes", "B": "Peripheral T-cell lymphoma, not otherwise specified (PTCL-NOS)", "C": "Angioimmunoblastic T-cell lymphoma (AITL) with associated eosinophilia", "D": "Cutaneous T-cell lymphoma (mycosis fungoides) with systemic involvement", "E": "Pegfilgrastim after myelosuppressive chemotherapy"}, "answer": "C", "explanation": "AITL presents with systemic B symptoms, lymphadenopathy, hepatosplenomegaly, and clonal CD4+ T-cells. Eosinophilia is a characteristic feature reflecting Th2 skewing. CD21+ B-cells are often expanded. Mycosis fungoides typically presents with cutaneous disease first. Infectious mononucleosis shows polyclonal lymphocytes.", "diagram": null}, {"id": 465, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_symptom_management", "question": "A 68-year-old man with advanced prostate cancer metastatic to bone develops sudden-onset severe back pain with bilateral leg weakness and urinary retention. Urgent MRI spine shows epidural tumour compression at T8. Which is most appropriate?", "options": {"A": "High-dose dexamethasone and urgent radiotherapy; surgical decompression if >80% spinal cord compression", "B": "Urgent surgical decompression followed by radiotherapy given acute neurological deficit", "C": "Chemotherapy to tumour to relieve compression over weeks", "D": "Conservative management with analgesics pending specialist review", "E": "Bevacizumab for metastatic colorectal cancer"}, "answer": "B", "explanation": "Acute spinal cord compression with significant neurological deficit (bilateral weakness, urinary retention) requires urgent surgical decompression for optimal functional outcome. Prognosis is best when surgery performed within 24-48 hours of symptom onset. Radiotherapy is adjunctive post-operatively. Dexamethasone is supportive but insufficient alone.", "diagram": null}, {"id": 466, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_surveillance", "question": "A 52-year-old man completes curative-intent treatment for stage II colorectal cancer. He is disease-free at 2 years. What is appropriate follow-up regimen for detecting recurrence?", "options": {"A": "Annual CT chest/abdomen/pelvis and colonoscopy for 5 years; CEA monitoring optional", "B": "3-monthly CT for years 1-3, then 6-monthly for years 3-5; CEA every 3 months if previously elevated", "C": "Colonoscopy at 1 year, 3 years, 5 years; CT imaging only if symptoms develop", "D": "Routine clinical follow-up with symptom assessment; no scheduled imaging unless symptomatic", "E": "Abiraterone plus prednisolone for castrate-resistant prostate cancer"}, "answer": "C", "explanation": "For stage II colorectal cancer, surveillance focuses on detecting local recurrence and metachronous cancer. Colonoscopy at 1, 3, and 5 years is standard per ASCO guidelines. CT imaging is not routinely recommended for asymptomatic surveillance in stage II disease; intensive imaging does not improve outcomes.", "diagram": null}, {"id": 467, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_immunotherapy_selection", "question": "A 62-year-old man with stage IIIC cutaneous melanoma (BRAF wild-type, MSI-stable) has profound immunosuppression (CD4 count 80/μL) from undiagnosed HIV. Which is most appropriate?", "options": {"A": "Start adjuvant nivolumab; checkpoint inhibitors are safe in severe immunosuppression", "B": "Defer adjuvant systemic therapy pending immune reconstitution on antiretroviral therapy", "C": "Initiate antiretroviral therapy; once CD4 >200, consider nivolumab with careful monitoring", "D": "Offer adjuvant BRAF inhibitor (despite wild-type status) as safer alternative to immunotherapy", "E": "Trastuzumab for HER2-positive breast cancer"}, "answer": "B", "explanation": "Severe immunosuppression (CD4 <100) is associated with increased irAE risk and potential loss of immunotherapy benefit. Prioritising immune reconstitution with antiretroviral therapy is crucial first step. Once CD4 >200-300, checkpoint inhibitors can be cautiously initiated with enhanced monitoring. BRAF inhibitors are not indicated.", "diagram": null}, {"id": 468, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_organ_dysfunction", "question": "A 70-year-old woman with advanced epithelial ovarian cancer and creatinine 1.8 mg/dL (eGFR 25 mL/min, baseline normal 2 months prior) is counselled for platinum-based chemotherapy. Renal ultrasound is normal. What is most appropriate next step?", "options": {"A": "Proceed with standard carboplatin dosing per Calvert formula; renal impairment is relative contraindication only", "B": "Defer chemotherapy pending nephrological evaluation of acute kidney injury aetiology", "C": "Proceed with dose-reduced carboplatin and avoid cisplatin; monitor renal function closely", "D": "Switch to non-platinum regimen (docetaxel/doxorubicin) given renal impairment", "E": "Sunitinib for metastatic renal cell carcinoma"}, "answer": "B", "explanation": "Acute rise in creatinine over 2 months with normal ultrasound requires investigation (intrinsic renal disease vs. obstructive uropathy from cancer). Platinum agents are significantly nephrotoxic and contraindicated in established renal impairment without understanding aetiology. Nephrological assessment may reveal tumour-related obstruction or intrinsic disease.", "diagram": null}, {"id": 469, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_brain_metastases", "question": "A 54-year-old woman with metastatic adenocarcinoma (lung primary) presents with new-onset headaches, focal neurological deficits, and MRI showing 3 cerebral lesions (largest 2.5cm) without significant cerebral oedema. Performance status ECOG 1. Which management is appropriate?", "options": {"A": "Whole-brain radiotherapy (WBRT) monotherapy for all lesions", "B": "Stereotactic radiosurgery (SRS) for all 3 lesions followed by WBRT boost", "C": "Surgical resection of largest lesion followed by SRS for other 2 lesions and consider SRS boost", "D": "Systemic chemotherapy alone without brain-directed radiation", "E": "Carboplatin-paclitaxel doublet chemotherapy"}, "answer": "C", "explanation": "Three brain metastases with one dominant lesion (>2.5cm) and good performance status is indication for surgical resection of largest lesion followed by SRS to remaining lesions. SRS boost improves local control vs. SRS alone. WBRT carries significant neurocognitive toxicity and is deferred. Systemic therapy is adjunctive.", "diagram": null}, {"id": 470, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_immunotherapy_efficacy", "question": "A 63-year-old woman with PD-L1-positive (70%) metastatic non-squamous NSCLC (no EGFR/ALK mutations) has excellent baseline performance status (ECOG 0). Which statement best reflects first-line therapy?", "options": {"A": "Platinum doublet chemotherapy remains gold-standard first-line regardless of PD-L1 status", "B": "PD-L1 monotherapy (pembrolizumab monotherapy) is appropriate first-line option for high PD-L1 expression", "C": "Platinum doublet chemotherapy plus PD-L1 inhibitor for all patients regardless of expression", "D": "Targeted therapy with EGFR inhibitor despite negative mutation status based on PD-L1 expression", "E": "Enzalutamide for metastatic prostate cancer"}, "answer": "B", "explanation": "High PD-L1 expression (TPS ≥50%) in metastatic non-squamous NSCLC without driver mutations is indication for pembrolizumab monotherapy as first-line, with superior outcomes vs. chemotherapy. KEYNOTE-024 trial demonstrated improved PFS and OS with pembrolizumab monotherapy. Chemotherapy is reserved for PD-L1-negative patients or lower expression levels.", "diagram": null}, {"id": 471, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_biomarker_testing", "question": "A 48-year-old woman with newly diagnosed metastatic colorectal cancer (stage IV, liver metastases) has tumour biopsied. Testing shows: KRAS wild-type, BRAF wild-type, MSI-stable, CMS4 subtype, high mutational burden. Which therapy is most appropriate?", "options": {"A": "Anti-EGFR monoclonal antibody (cetuximab or panitumumab) as single agent", "B": "Combination chemotherapy (FOLFOXIRI) plus bevacizumab", "C": "Anti-PD-L1 checkpoint inhibitor given high mutational burden", "D": "Triplet chemotherapy (FOLFOXIRI) plus anti-EGFR plus bevacizumab", "E": "Rituximab-CHOP for diffuse large B-cell lymphoma"}, "answer": "B", "explanation": "RAS wild-type, BRAF wild-type, MSI-stable metastatic colorectal cancer with high mutational burden benefits from FOLFOXIRI plus bevacizumab for intensive induction. Anti-EGFR monotherapy is insufficient for metastatic disease. MSI-stable status limits benefit of checkpoint inhibitors. High mutational burden suggests aggressive disease requiring combination approach.", "diagram": null}, {"id": 472, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_clinical_trial", "question": "A 58-year-old man with treatment-naive metastatic urothelial carcinoma (visceral metastases, good PS, normal renal function, negative PD-L1) is being enrolled in a randomized trial of cisplatin/gemcitabine vs. atezolizumab monotherapy. Which approach aligns with evidence-based first-line treatment?", "options": {"A": "Cisplatin/gemcitabine doublet is appropriate first-line regardless of trial arm allocation", "B": "Atezolizumab monotherapy is preferred over cisplatin/gemcitabine based on IMvigor130 trial", "C": "Neither cisplatin/gemcitabine nor monotherapy atezolizumab is appropriate; needs triplet chemotherapy", "D": "Trial enrollment is reasonable but chemotherapy choice should not be influenced by trial design", "E": "Lorlatinib for ALK-positive NSCLC"}, "answer": "A", "explanation": "Cisplatin/gemcitabine doublet chemotherapy remains gold-standard first-line for metastatic urothelial carcinoma in fit patients. IMvigor130 showed atezolizumab monotherapy is inferior to chemotherapy in this setting (negative trial). PD-L1 negative status further supports chemotherapy over checkpoint inhibitor monotherapy. Trial enrollment does not change evidence-based standard.", "diagram": null}, {"id": 473, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_paraneoplastic", "question": "A 62-year-old male smoker presents with proximal muscle weakness that improves with repeated activity, dry mouth, and a lung mass on chest X-ray. Nerve conduction studies show low CMAP amplitudes that increment >100% with rapid repetitive stimulation.\nWhat is the most likely paraneoplastic syndrome?", "options": {"A": "Myasthenia gravis", "B": "Lambert-Eaton myasthenic syndrome (LEMS)", "C": "Polymyositis", "D": "Cushing syndrome", "E": "Dermatomyositis"}, "answer": "B", "explanation": "Lambert-Eaton myasthenic syndrome (LEMS) is a paraneoplastic syndrome associated with small cell lung cancer (50-60% of LEMS cases). It is caused by antibodies against presynaptic voltage-gated calcium channels (VGCC), reducing acetylcholine release. Unlike myasthenia gravis, LEMS features proximal weakness that initially improves with activity (post-tetanic potentiation), autonomic dysfunction (dry mouth, constipation), and hyporeflexia that improves after exercise. The characteristic EMG finding is incrementing CMAP amplitudes with rapid repetitive stimulation. Other paraneoplastic syndromes include SIADH, Cushing syndrome, cerebellar degeneration, and hypercalcaemia (PTHrP).", "diagram": null}, {"id": 474, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_staging", "question": "A 55-year-old woman is diagnosed with non-small cell lung cancer. Staging investigations reveal a 4 cm primary tumour with ipsilateral mediastinal lymph node involvement but no distant metastases.\nAccording to TNM staging principles, what is the importance of accurate staging?", "options": {"A": "It determines only the choice of chemotherapy regimen", "B": "It guides treatment decisions, determines prognosis, and enables comparison of outcomes across clinical trials", "C": "It is only relevant for surgical planning", "D": "It is primarily used for billing and administrative purposes", "E": "It determines only the choice of chemotherapy regimen"}, "answer": "B", "explanation": "The TNM (Tumour, Node, Metastasis) staging system is fundamental in oncology for: (1) guiding treatment decisions — e.g. surgery for early stage, chemoradiation for locally advanced, systemic therapy for metastatic disease; (2) estimating prognosis — stage is the strongest predictor of survival for most cancers; (3) enabling standardised communication between clinicians; and (4) facilitating comparison of outcomes in clinical trials. In this patient, a 4 cm tumour with ipsilateral mediastinal nodes but no metastases suggests Stage IIIA disease, which may be amenable to concurrent chemoradiation ± immunotherapy rather than surgery alone.", "diagram": null}, {"id": 475, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_oncological_emergency", "question": "A 58-year-old man with known metastatic prostate cancer presents with severe back pain, bilateral lower limb weakness (MRC grade 3), urinary retention, and a sensory level at T10.\nWhat is the most critical first step in management?", "options": {"A": "Urgent MRI whole spine and high-dose dexamethasone", "B": "Serum PSA level", "C": "Bone scan", "D": "CT abdomen and pelvis", "E": "CT abdomen and pelvis with contrast"}, "answer": "A", "explanation": "Malignant spinal cord compression (MSCC) is an oncological emergency. The most critical initial steps are high-dose dexamethasone (to reduce peritumoural oedema) and urgent MRI of the whole spine (to localise and assess the extent of compression — multiple levels are common). Treatment must be initiated within hours to preserve neurological function, as outcomes correlate strongly with pre-treatment neurological status. Definitive treatment includes radiotherapy (most common), surgical decompression (selected cases), or both. Back pain in a patient with known malignancy should always prompt urgent assessment for MSCC.", "diagram": null}, {"id": 476, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_lung", "question": "A 62-year-old non-smoker is diagnosed with stage IV non-small cell lung cancer (adenocarcinoma). Molecular testing reveals an EGFR exon 19 deletion. PD-L1 TPS is 80%. What is the most appropriate first-line systemic therapy?", "options": {"A": "Pembrolizumab monotherapy", "B": "Carboplatin-pemetrexed-pembrolizumab", "C": "Osimertinib", "D": "Gefitinib", "E": "Docetaxel monotherapy"}, "answer": "C", "explanation": "Osimertinib is the preferred first-line treatment for EGFR-mutant (exon 19 deletion or L858R) NSCLC regardless of PD-L1 status. EGFR TKIs take priority over immunotherapy in EGFR-mutant tumours.", "diagram": null}, {"id": 477, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_biology", "question": "Tumour lysis syndrome is characterised by which combination of metabolic abnormalities?", "options": {"A": "Hyperkalaemia, hyperphosphataemia, hyperuricaemia, hypocalcaemia", "B": "Hypokalaemia, hypophosphataemia, hypouricaemia, hypercalcaemia", "C": "Hyperkalaemia, hypophosphataemia, hyperuricaemia, hypercalcaemia", "D": "Hypokalaemia, hyperphosphataemia, hyperuricaemia, hypocalcaemia", "E": "Hypernatraemia, hyperkalaemia, metabolic alkalosis, hypocalcaemia"}, "answer": "A", "explanation": "TLS releases intracellular contents: potassium (hyperkalaemia), phosphate (hyperphosphataemia), nucleic acids (hyperuricaemia). Hyperphosphataemia causes secondary hypocalcaemia through calcium-phosphate precipitation.", "diagram": null}, {"id": 478, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_breast", "question": "A 55-year-old postmenopausal woman is diagnosed with ER+/PR+/HER2-negative early breast cancer (T2N1M0). She has had surgery and completed adjuvant chemotherapy. What is the most appropriate endocrine therapy?", "options": {"A": "Tamoxifen 20 mg daily for 5 years", "B": "Aromatase inhibitor (e.g. anastrozole or letrozole) for 5 years", "C": "Combined tamoxifen and aromatase inhibitor", "D": "No endocrine therapy — chemotherapy is sufficient", "E": "Goserelin plus tamoxifen"}, "answer": "B", "explanation": "In postmenopausal women with ER+ breast cancer, aromatase inhibitors are preferred over tamoxifen due to superior disease-free survival. Tamoxifen is first-line in premenopausal women.", "diagram": null}, {"id": 479, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_staging", "question": "In cancer staging using the TNM system, what does the \"N\" component assess?", "options": {"A": "Neural invasion by tumour cells", "B": "Number of distant metastatic sites", "C": "Regional lymph node involvement", "D": "Degree of tumour necrosis", "E": "Neuroendocrine differentiation status"}, "answer": "C", "explanation": "TNM staging: T = tumour size/local extent, N = regional lymph node involvement (number and location), M = distant metastases. N staging guides surgical planning and prognosis.", "diagram": null}, {"id": 480, "specialty": "medical_oncology", "tag": "clinical_science_medical_oncology_emergency", "question": "A 58-year-old man with known metastatic prostate cancer presents with acute back pain, bilateral leg weakness (MRC grade 3), and urinary retention. MRI spine shows a T8 vertebral metastasis with epidural spinal cord compression. What is the most important immediate treatment?", "options": {"A": "Urgent surgical decompression referral", "B": "High-dose dexamethasone (16 mg IV stat)", "C": "Urgent radiotherapy within 24 hours", "D": "Bisphosphonate infusion", "E": "Commence chemotherapy for the underlying malignancy"}, "answer": "B", "explanation": "High-dose dexamethasone is the most important immediate treatment for malignant spinal cord compression to reduce oedema and preserve neurological function, followed by urgent consideration of surgery and/or radiotherapy.", "diagram": null}, {"id": 481, "specialty": "medical_oncology", "tag": "clin
