ical_science_medical_oncology_screening", "question": "A 52-year-old woman with no family history of bowel cancer asks about colorectal cancer screening. According to Australian guidelines for average-risk individuals, what is the recommended screening strategy?", "options": {"A": "Colonoscopy every 10 years from age 50", "B": "Faecal immunochemical test (FIT) every 2 years from age 50", "C": "Flexible sigmoidoscopy every 5 years from age 45", "D": "CT colonography every 3 years from age 50", "E": "Colonoscopy every 5 years from age 45"}, "answer": "B", "explanation": "The Australian National Bowel Cancer Screening Program recommends faecal immunochemical testing (FIT) every 2 years for average-risk individuals aged 50-74.", "diagram": null}, {"id": 482, "specialty": "medical_oncology", "tag": "medical_science_medical_oncology_immunotherapy", "question": "Immune checkpoint inhibitors such as pembrolizumab exert their anti-tumour effect by blocking which receptor on T cells?", "options": {"A": "CTLA-4", "B": "PD-1", "C": "CD28", "D": "LAG-3", "E": "TIGIT"}, "answer": "B", "explanation": "Pembrolizumab and nivolumab are anti-PD-1 monoclonal antibodies. PD-1 (on T cells) interacts with PD-L1 (on tumour cells) to suppress T-cell activity. Blocking PD-1 restores anti-tumour immunity.", "diagram": null}, {"id": 483, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_pain", "question": "A 68-year-old man with metastatic pancreatic cancer has severe visceral abdominal pain despite morphine 60 mg oral BD and breakthrough doses. He reports nausea and drowsiness. Pain is constant and deep. What is the most appropriate next step in pain management?", "options": {"A": "Increase morphine dose by 50%", "B": "Rotate to oxycodone at equianalgesic dose", "C": "Refer for coeliac plexus block", "D": "Add gabapentin for visceral neuropathy", "E": "Intrathecal morphine pump for refractory pain"}, "answer": "C", "explanation": "Coeliac plexus block is highly effective for refractory visceral pain from pancreatic cancer, providing superior pain relief with reduced opioid requirements compared to escalating systemic opioids alone. Current evidence supports early referral for interventional procedures when visceral pain is poorly controlled.", "diagram": null}, {"id": 484, "specialty": "palliative_medicine", "tag": "medical_science_palliative_medicine_opioid_pharmacology", "question": "A 72-year-old woman with advanced COPD and renal impairment (eGFR 18 mL/min) requires opioid analgesia for painful vertebral fractures. Which opioid carries the greatest risk of toxicity in this clinical context?", "options": {"A": "Morphine", "B": "Fentanyl", "C": "Buprenorphine", "D": "Hydromorphone", "E": "Methadone for opioid rotation"}, "answer": "A", "explanation": "Morphine is metabolised to morphine-6-glucuronide (M6G), a pharmacologically active metabolite that accumulates in renal impairment, causing prolonged sedation, respiratory depression, and myoclonus. Fentanyl and buprenorphine are safer alternatives as they have no active renally-cleared metabolites.", "diagram": null}, {"id": 485, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_breathlessness", "question": "A 55-year-old woman with advanced pulmonary fibrosis (FVC 35% predicted) has refractory breathlessness at rest despite maximal medical therapy and supplemental oxygen. She is distressed and anxious. What is the most evidence-based pharmacological intervention for symptomatic relief?", "options": {"A": "Nebulised morphine 2.5 mg QID", "B": "Oral low-dose morphine 2.5 mg QID", "C": "Midazolam 2.5 mg sublingual PRN", "D": "Dexamethasone 4 mg daily", "E": "Nebulised furosemide for refractory breathlessness"}, "answer": "B", "explanation": "Low-dose oral or parenteral opioids have the strongest evidence base for relieving refractory breathlessness in advanced disease. Nebulised opioids have not shown superiority over systemic administration. Benzodiazepines are second-line, primarily for breathlessness-associated anxiety.", "diagram": null}, {"id": 486, "specialty": "palliative_medicine", "tag": "medical_science_palliative_medicine_antiemetics", "question": "A 62-year-old woman with ovarian cancer and peritoneal carcinomatosis develops nausea and vomiting with colicky abdominal pain. CT shows partial small bowel obstruction at multiple levels. She is not a surgical candidate. What is the most appropriate antiemetic strategy?", "options": {"A": "Metoclopramide 10 mg TDS", "B": "Ondansetron 4 mg TDS with dexamethasone", "C": "Hyoscine butylbromide with haloperidol", "D": "Cyclizine 50 mg TDS", "E": "Octreotide for malignant bowel obstruction"}, "answer": "C", "explanation": "In inoperable malignant bowel obstruction, a combination of antisecretory agent (hyoscine butylbromide) to reduce secretions and colic, plus haloperidol as a centrally-acting antiemetic, is the recommended approach. Prokinetics like metoclopramide are contraindicated in complete obstruction as they may worsen colic.", "diagram": null}, {"id": 487, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_delirium", "question": "A 78-year-old man with advanced lung cancer develops terminal agitation in the last 48 hours of life. He is moaning, restless, and pulling at bed clothes. He is on a morphine infusion at a stable dose. Reversible causes have been excluded. What is the most appropriate management?", "options": {"A": "Increase morphine infusion by 30%", "B": "Commence midazolam subcutaneous infusion", "C": "Administer haloperidol 2.5 mg SC stat and PRN", "D": "Commence levomepromazine 6.25 mg SC BD", "E": "Propofol infusion for refractory terminal agitation"}, "answer": "B", "explanation": "Terminal agitation refractory to antipsychotics or where rapid sedation is needed is best managed with midazolam continuous subcutaneous infusion. This provides proportionate palliative sedation. Haloperidol is first-line for delirium but may be insufficient in terminal agitation. Increasing opioids without pain escalation would be inappropriate.", "diagram": null}, {"id": 488, "specialty": "palliative_medicine", "tag": "medical_science_palliative_medicine_syringe_driver", "question": "A palliative care patient requires subcutaneous medications via syringe driver. The current prescription includes morphine 30 mg, midazolam 10 mg, and metoclopramide 30 mg over 24 hours. Glycopyrronium 1.2 mg is to be added for respiratory secretions. Which drug combination would be incompatible?", "options": {"A": "Morphine and midazolam", "B": "Morphine and glycopyrronium", "C": "Metoclopramide and glycopyrronium", "D": "Midazolam and glycopyrronium", "E": "Dexamethasone for superior vena cava obstruction"}, "answer": "C", "explanation": "Metoclopramide (a prokinetic) and glycopyrronium (an anticholinergic antisecretory) have opposing pharmacological actions and should not be combined. Glycopyrronium would negate the prokinetic effect of metoclopramide. Additionally, there may be physical incompatibility in the syringe driver.", "diagram": null}, {"id": 489, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_hypercalcaemia", "question": "A 65-year-old woman with metastatic breast cancer (bony metastases) presents with confusion, polyuria, constipation, and nausea. Corrected calcium is 3.4 mmol/L. Creatinine is 165 µmol/L. She is estimated to have weeks to months prognosis. What is the most appropriate initial management?", "options": {"A": "IV normal saline rehydration followed by IV zoledronic acid", "B": "Oral prednisolone 40 mg daily", "C": "Subcutaneous calcitonin 4 IU/kg BD", "D": "Furosemide 40 mg IV stat", "E": "Tranexamic acid for malignant bleeding"}, "answer": "A", "explanation": "Malignant hypercalcaemia is first treated with aggressive IV saline rehydration to restore renal perfusion, followed by IV bisphosphonate (zoledronic acid preferred over pamidronate for efficacy and convenience). Calcitonin provides rapid but transient benefit as a bridge. Loop diuretics are no longer routinely recommended.", "diagram": null}, {"id": 490, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_spinal_cord_compression", "question": "A 58-year-old man with known prostate cancer presents with 3 days of progressive back pain, leg weakness (MRC grade 3 bilaterally), and urinary retention. MRI shows epidural spinal cord compression at T8 with cord signal change. What is the most appropriate immediate management?", "options": {"A": "Urgent surgical decompression", "B": "Dexamethasone 16 mg IV stat followed by urgent radiotherapy", "C": "Dexamethasone 16 mg IV stat followed by urgent surgical assessment", "D": "Emergency radiotherapy within 24 hours", "E": "Ketamine infusion for opioid-resistant pain"}, "answer": "C", "explanation": "Malignant spinal cord compression with neurological deficit requires immediate high-dose dexamethasone and urgent surgical assessment. Surgery (posterior decompression and stabilisation) followed by radiotherapy offers better outcomes than radiotherapy alone for patients with a single level of compression and reasonable prognosis (Patchell trial).", "diagram": null}, {"id": 491, "specialty": "palliative_medicine", "tag": "medical_science_palliative_medicine_communication", "question": "A 52-year-old woman with newly diagnosed inoperable cholangiocarcinoma asks \"How long do I have?\" Median survival for her stage is 6 months. Evidence on prognostic communication suggests which approach?", "options": {"A": "Provide the median survival statistic directly", "B": "Avoid giving any timeframe to preserve hope", "C": "Offer a range (e.g. months to a year) while acknowledging uncertainty", "D": "Defer to the oncologist for prognostic discussions", "E": "Dexmedetomidine for palliative sedation"}, "answer": "C", "explanation": "Evidence supports providing prognostic information as a range rather than a single number, while explicitly acknowledging uncertainty. This approach respects patient autonomy, allows planning, and maintains realistic hope. Studies show patients generally want prognostic information but it should be delivered sensitively and tailored to readiness.", "diagram": null}, {"id": 492, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_emergencies", "question": "A 70-year-old man with advanced oesophageal cancer develops massive haematemesis at home. He is on the palliative care register with an advance care plan declining hospital admission. He is conscious and distressed. What is the most appropriate immediate action by the palliative care team?", "options": {"A": "Activate ambulance for emergency transfer", "B": "Administer IV tranexamic acid 1 g", "C": "Administer midazolam 5-10 mg SC/buccal for symptom relief", "D": "Apply direct pressure and reassess", "E": "Phenobarbital for refractory seizures at end of life"}, "answer": "C", "explanation": "In a catastrophic terminal haemorrhage in a patient with a clear advance care plan declining hospitalisation, the priority is rapid symptom relief and anxiolysis. Midazolam provides sedation to alleviate distress. Dark towels should be used, and the patient should not be left alone. This is a recognised palliative emergency protocol.", "diagram": null}, {"id": 493, "specialty": "palliative_medicine", "tag": "medical_science_palliative_medicine_nutrition", "question": "A 75-year-old man with advanced dementia is no longer eating or drinking. His family requests PEG tube insertion. ESPEN guidelines and evidence regarding artificial nutrition in advanced dementia suggest:", "options": {"A": "PEG feeding improves survival and quality of life", "B": "PEG feeding reduces aspiration pneumonia risk", "C": "PEG feeding does not improve survival, functional status, or reduce aspiration risk", "D": "PEG feeding should be offered to all patients who cannot maintain oral intake", "E": "Total parenteral nutrition"}, "answer": "C", "explanation": "Multiple studies and systematic reviews demonstrate that PEG feeding in advanced dementia does not improve survival, functional status, nutritional parameters, or reduce pressure ulcers or aspiration pneumonia. Careful hand feeding is the recommended approach, prioritising comfort and dignity.", "diagram": null}, {"id": 494, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_respiratory_secretions", "question": "A 82-year-old woman with end-stage heart failure is actively dying. She develops noisy respiratory secretions (\"death rattle\") causing family distress. She is unconscious and appears comfortable. What is the most appropriate first-line management?", "options": {"A": "Oropharyngeal suctioning", "B": "Glycopyrronium 0.2 mg SC stat", "C": "Repositioning and family communication about the nature of secretions", "D": "Nebulised hypertonic saline", "E": "Atropine eye drops sublingually for secretions"}, "answer": "C", "explanation": "Evidence shows that repositioning (semi-prone or lateral) and educating the family that the \"death rattle\" does not indicate distress to the patient are the most appropriate first-line interventions. Antisecretory agents (glycopyrronium, hyoscine) have limited evidence of benefit and do not remove existing secretions. Suctioning is distressing and generally ineffective.", "diagram": null}, {"id": 495, "specialty": "palliative_medicine", "tag": "medical_science_palliative_medicine_corticosteroids", "question": "A 55-year-old woman with cerebral metastases from melanoma is on dexamethasone 16 mg daily for raised intracranial pressure. After 3 weeks, her symptoms are well-controlled with radiotherapy planned. What is the most appropriate steroid management?", "options": {"A": "Continue current dose until radiotherapy is complete", "B": "Gradually taper by 2 mg every 3-5 days", "C": "Stop dexamethasone abruptly as duration is less than 3 weeks", "D": "Switch to prednisolone equivalent dose", "E": "Prednisolone 50 mg daily with rapid taper"}, "answer": "B", "explanation": "After 3 weeks of high-dose corticosteroids, gradual tapering is essential to prevent adrenal crisis and symptom rebound. Typical regimens reduce by 2 mg every 3-5 days, guided by symptom control. Abrupt cessation risks adrenal insufficiency. The lowest effective dose should be maintained during radiotherapy.", "diagram": null}, {"id": 496, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_seizures", "question": "A 48-year-old woman with glioblastoma multiforme develops status epilepticus at home. She is on the palliative care pathway. IV access is not available. What is the most appropriate first-line rescue medication?", "options": {"A": "Rectal diazepam 10 mg", "B": "Buccal midazolam 10 mg", "C": "Subcutaneous phenobarbital 200 mg", "D": "Intramuscular lorazepam 4 mg", "E": "Phenytoin IV loading for status epilepticus"}, "answer": "B", "explanation": "Buccal midazolam is the recommended first-line rescue treatment for community-based seizures when IV access is unavailable. It has equivalent efficacy to IV diazepam and is easier to administer than rectal preparations. It can also be given intranasally. Subcutaneous midazolam is an alternative in palliative care settings.", "diagram": null}, {"id": 497, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_wound_care", "question": "A 62-year-old woman with locally advanced breast cancer has a fungating chest wall tumour with malodour, bleeding, and exudate. What topical agent is most effective for managing odour?", "options": {"A": "Honey-based dressings", "B": "Topical metronidazole gel 0.8%", "C": "Activated charcoal dressings alone", "D": "Silver sulfadiazine cream", "E": "Topical sucralfate for fungating wound"}, "answer": "B", "explanation": "Topical metronidazole is the most effective treatment for malodorous fungating wounds, targeting the anaerobic bacteria responsible for odour. It is applied directly to the wound or soaked into dressings. Activated charcoal dressings help as an adjunct but do not address the underlying cause.", "diagram": null}, {"id": 498, "specialty": "palliative_medicine", "tag": "medical_science_palliative_medicine_opioid_conversion", "question": "A patient on oral morphine 120 mg/24h requires conversion to a subcutaneous morphine infusion due to intractable vomiting. Using standard conversion ratios, what is the appropriate 24-hour subcutaneous morphine dose?", "options": {"A": "30 mg/24h", "B": "40 mg/24h", "C": "60 mg/24h", "D": "80 mg/24h", "E": "Oxycodone at 1.5x oral morphine equivalent"}, "answer": "B", "explanation": "The oral to subcutaneous morphine conversion ratio is approximately 2:1 to 3:1 (Australian guidelines typically use 3:1, UK palliative care guidelines use 2:1). Using the commonly applied 3:1 ratio: 120 mg oral ÷ 3 = 40 mg SC/24h. The 2:1 ratio would give 60 mg. A conservative approach starting at the lower dose (40 mg) with breakthrough doses available is safest.", "diagram": null}, {"id": 499, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_advance_care", "question": "A 65-year-old man with motor neurone disease wishes to document his preferences for future care, including refusal of mechanical ventilation. He has full decision-making capacity. What is the most legally robust document for this purpose?", "options": {"A": "Advance care plan documented in medical notes", "B": "Advance care directive / advance decision to refuse treatment", "C": "Enduring power of attorney for health", "D": "Verbal instruction to next of kin", "E": "Statutory declaration witnessed by two adults"}, "answer": "B", "explanation": "An advance care directive (or advance decision to refuse treatment) is the most legally binding document for refusing specific treatments. It must be made by a competent adult, be specific about treatments refused, and for life-sustaining treatments, must be in writing, signed, and witnessed. It takes precedence over clinical opinion when valid and applicable.", "diagram": null}, {"id": 500, "specialty": "palliative_medicine", "tag": "medical_science_palliative_medicine_cachexia", "question": "A 58-year-old man with advanced non-small cell lung cancer has lost 12% body weight over 3 months. He has poor appetite, early satiety, and raised CRP. Serum albumin is 25 g/L. What is the primary mechanism driving cancer cachexia?", "options": {"A": "Inadequate caloric intake due to anorexia", "B": "Pro-inflammatory cytokine-mediated metabolic derangement", "C": "Tumour consumption of nutrients (metabolic steal)", "D": "Malabsorption from GI involvement", "E": "Megestrol acetate for appetite stimulation"}, "answer": "B", "explanation": "Cancer cachexia is primarily driven by pro-inflammatory cytokines (TNF-α, IL-6, IL-1) causing systemic metabolic derangement including increased protein catabolism, lipolysis, insulin resistance, and acute phase protein production. Simple caloric supplementation alone cannot reverse cachexia, distinguishing it from starvation.", "diagram": null}, {"id": 501, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_depression", "question": "A 50-year-old woman with advanced ovarian cancer reports persistent low mood, anhedonia, guilt, and poor concentration for 4 weeks. She says \"I wish I could just go to sleep and not wake up.\" She has an estimated prognosis of 3-6 months. What is the most appropriate pharmacological treatment?", "options": {"A": "Fluoxetine 20 mg daily", "B": "Mirtazapine 15 mg nocte", "C": "Dexamethasone 2 mg daily", "D": "Methylphenidate 5 mg mane", "E": "Duloxetine 60 mg daily"}, "answer": "B", "explanation": "Mirtazapine is often preferred in palliative care depression as it has additional benefits of appetite stimulation, weight gain, anxiolysis, and sedation (helping insomnia). Its onset of action for some symptoms (appetite, sleep) is faster than SSRIs. In patients with very short prognosis, psychostimulants (methylphenidate) may be considered for rapid effect.", "diagram": null}, {"id": 502, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_ethical", "question": "A 45-year-old man with ALS and intact cognition requests withdrawal of non-invasive ventilation that he is dependent on, understanding this will lead to his death. He has been assessed as having full decision-making capacity. What is the ethical and legal position?", "options": {"A": "This constitutes assisted suicide and cannot be performed", "B": "The request must be approved by an ethics committee", "C": "Withdrawal of treatment at a competent patient's request is lawful; adequate symptom management must be provided", "D": "The treating team can override this request if they believe it is not in his best interest", "E": "Withdrawal of non-invasive ventilation without symptom control"}, "answer": "C", "explanation": "A competent patient has the legal right to refuse or withdraw any medical treatment, including life-sustaining treatment. This is distinct from assisted suicide or euthanasia. The medical team must provide adequate symptom management (opioids, benzodiazepines) to ensure comfort during withdrawal. This is well-established in common law and medical ethics.", "diagram": null}, {"id": 503, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_constipation", "question": "A 65-year-old woman with advanced pancreatic cancer is commenced on regular morphine for pain. After 5 days, she develops abdominal distension and has not opened her bowels for 4 days.\nWhat is the most appropriate approach to bowel management?", "options": {"A": "Reduce the morphine dose to relieve constipation", "B": "Start regular prophylactic laxatives — a stimulant plus softener combination", "C": "Wait until constipation resolves spontaneously", "D": "Commence total parenteral nutrition", "E": "Increase the morphine dose to improve bowel motility"}, "answer": "B", "explanation": "Opioid-induced constipation (OIC) is an almost universal side effect that does not develop tolerance (unlike nausea and sedation). All patients starting regular opioids should be commenced on prophylactic laxatives — typically a combination of a stimulant (senna, bisacodyl) plus a softener (docusate, macrogol). Adequate hydration and mobility should be encouraged where possible. For refractory OIC, peripheral opioid receptor antagonists (naloxegol, methylnaltrexone) can be used. The morphine dose should not be reduced if it is providing adequate pain relief — instead, the constipation should be managed aggressively.", "diagram": null}, {"id": 504, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_nausea_vomiting", "question": "A 70-year-old man with metastatic bowel cancer and carcinomatosis peritonei develops persistent nausea and vomiting with abdominal distension. CT confirms malignant bowel obstruction with multiple levels of obstruction.\nWhat is the most appropriate pharmacological management?", "options": {"A": "Prokinetic agents (metoclopramide)", "B": "Combination of hyoscine butylbromide (antisecretory) and haloperidol (antiemetic) ± octreotide", "C": "High-dose oral PPI", "D": "Aggressive IV fluid resuscitation alone", "E": "High-dose metoclopramide via continuous infusion"}, "answer": "B", "explanation": "Inoperable malignant bowel obstruction is managed conservatively in the palliative setting with a combination approach: antisecretory agents (hyoscine butylbromide or octreotide) to reduce intestinal secretions and colicky pain, plus antiemetics (haloperidol or cyclizine) for nausea. Prokinetic agents like metoclopramide are contraindicated in complete bowel obstruction as they can worsen colic and increase the risk of perforation. Dexamethasone may help reduce peritumoural oedema and improve partial obstruction. A venting nasogastric tube or gastrostomy may provide symptomatic relief. The goal is comfort rather than cure.", "diagram": null}, {"id": 505, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_terminal_restlessness", "question": "A 75-year-old woman with end-stage lung cancer is in the last hours of life. She is moaning, picking at her bedclothes, and appears agitated despite adequate pain management. Reversible causes have been excluded.\nWhat is the most appropriate medication for terminal restlessness?", "options": {"A": "Haloperidol 5 mg IV", "B": "Midazolam by continuous subcutaneous infusion", "C": "Naloxone", "D": "Dexamethasone", "E": "Haloperidol 2 mg SC PRN"}, "answer": "B", "explanation": "Terminal restlessness (terminal agitation) in the last hours to days of life, after exclusion of reversible causes (urinary retention, faecal impaction, pain, medication toxicity), is managed with benzodiazepines — midazolam is preferred due to its short onset, subcutaneous compatibility, and anxiolytic/sedative properties. It can be given as intermittent SC boluses or continuous subcutaneous infusion (CSCI) via syringe driver. If agitation has a prominent delirium component with hallucinations, a low-dose antipsychotic (levomepromazine or haloperidol) can be added. This is distinct from palliative sedation, which involves intentional reduction of consciousness for refractory symptoms.", "diagram": null}, {"id": 506, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_pain", "question": "A patient with metastatic pancreatic cancer is on sustained-release morphine 60 mg BD with good background pain control but requires 4-5 breakthrough doses daily. Each breakthrough dose should be what fraction of the total 24-hour opioid dose?", "options": {"A": "One-quarter (25%)", "B": "One-sixth (approximately 16%)", "C": "One-tenth (10%)", "D": "One-half (50%)", "E": "One-third (33%)"}, "answer": "B", "explanation": "Breakthrough (rescue) dose of oral morphine is typically one-sixth (1/6) of the total 24-hour opioid dose. For this patient: total 24h = 120 mg, breakthrough = 20 mg immediate-release morphine.", "diagram": null}, {"id": 507, "specialty": "palliative_medicine", "tag": "medical_science_palliative_medicine_opioids", "question": "When converting from oral morphine to subcutaneous morphine, what dose ratio should be used?", "options": {"A": "1:1 (no dose reduction needed)", "B": "2:1 (oral dose is halved for subcutaneous)", "C": "3:1 (oral dose is divided by three for subcutaneous)", "D": "10:1 (oral dose is divided by ten for subcutaneous)", "E": "5:1 (oral dose is divided by five for subcutaneous)"}, "answer": "C", "explanation": "Oral to subcutaneous morphine conversion ratio is approximately 3:1 (or 2:1 in some guidelines). Subcutaneous morphine has higher bioavailability than oral, so the dose is reduced.", "diagram": null}, {"id": 508, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_nausea", "question": "A palliative care patient with inoperable bowel obstruction from peritoneal carcinomatosis has persistent nausea and vomiting. A nasogastric tube has been declined. What is the most appropriate pharmacological management?", "options": {"A": "Oral metoclopramide 10 mg TDS", "B": "Subcutaneous octreotide and hyoscine butylbromide", "C": "Oral ondansetron 8 mg BD", "D": "High-dose oral laxatives", "E": "IV erythromycin for prokinetic effect"}, "answer": "B", "explanation": "In inoperable malignant bowel obstruction, octreotide (reduces GI secretions) combined with hyoscine butylbromide (antisecretory, antispasmodic) via subcutaneous infusion is recommended. Prokinetics (metoclopramide) are contraindicated in complete obstruction.", "diagram": null}, {"id": 509, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_dyspnoea", "question": "A 72-year-old man with end-stage COPD and metastatic lung cancer has refractory breathlessness despite maximal bronchodilator therapy and supplemental oxygen. What is the most appropriate pharmacological approach to palliate his dyspnoea?", "options": {"A": "Increase supplemental oxygen to 15 L/min via non-rebreather mask", "B": "Low-dose oral morphine (2.5-5 mg QID)", "C": "Oral diazepam 5 mg TDS", "D": "Nebulised furosemide 20 mg QID", "E": "Dexamethasone 8 mg daily"}, "answer": "B", "explanation": "Low-dose opioids are the evidence-based treatment for refractory breathlessness in palliative care. Morphine reduces the sensation of dyspnoea centrally without significant respiratory depression at low doses.", "diagram": null}, {"id": 510, "specialty": "palliative_medicine", "tag": "medical_science_palliative_medicine_physiology", "question": "Which physiological change typically occurs in the active dying phase (last hours to days of life)?", "options": {"A": "Increased urine output", "B": "Cheyne-Stokes (periodic) breathing pattern", "C": "Increased appetite and thirst", "D": "Hypertension and tachycardia", "E": "Hypothermia of the core with warm extremities"}, "answer": "B", "explanation": "Cheyne-Stokes breathing (cyclic crescendo-decrescendo pattern with apnoeic periods) is common in the active dying phase, reflecting brainstem dysfunction and altered chemoreceptor sensitivity.", "diagram": null}, {"id": 511, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_ethics", "question": "A 68-year-old woman with advanced motor neurone disease has an advance care directive declining intubation and mechanical ventilation. She develops acute respiratory failure. Her family requests intubation. What is the most appropriate course of action?", "options": {"A": "Intubate as the family requests — they are the next of kin", "B": "Follow the advance care directive and provide comfort measures", "C": "Seek an urgent ethics committee opinion before acting", "D": "Contact the patient's GP for a second opinion", "E": "Trial of non-invasive ventilation as a compromise"}, "answer": "B", "explanation": "A valid advance care directive represents the patient's autonomous wishes and takes legal precedence over family requests. The clinical team should follow the directive and provide symptom-focused comfort care.", "diagram": null}, {"id": 512, "specialty": "palliative_medicine", "tag": "clinical_science_palliative_medicine_secretions", "question": "A dying patient develops noisy upper airway secretions (\"death rattle\"). The patient appears comfortable but the family is distressed. What is the most appropriate first-line pharmacological intervention?", "options": {"A": "Oropharyngeal suctioning", "B": "Subcutaneous glycopyrronium 200 µg", "C": "Nebulised hypertonic saline", "D": "IV furosemide 40 mg", "E": "Atropine 1% eye drops sublingually"}, "answer": "B", "explanation": "Glycopyrronium (or hyoscine butylbromide) given subcutaneously reduces new secretion production. Suctioning is distressing and generally ineffective. Family reassurance that the patient is not distressed is equally important.", "diagram": null}, {"id": 513, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_paracetamol", "question": "A 22-year-old woman presents 6 hours after ingesting 30 g of paracetamol in a single overdose. She is asymptomatic. Serum paracetamol level is 180 mg/L (above the treatment line on the Rumack-Matthew nomogram). ALT 35 U/L, INR 1.0, creatinine 62 µmol/L. What is the most appropriate management?", "options": {"A": "Activated charcoal 50 g orally", "B": "Commence IV N-acetylcysteine (NAC) protocol", "C": "Observe for 12 hours and recheck ALT", "D": "Oral methionine 2.5 g followed by repeat levels", "E": "Oral methionine as alternative to NAC"}, "answer": "B", "explanation": "IV N-acetylcysteine is indicated as the paracetamol level is above the treatment line at 6 hours. NAC is most effective when started within 8 hours of ingestion but has benefit up to 24 hours. Activated charcoal is only useful within 1-2 hours of ingestion. NAC replenishes glutathione stores, preventing accumulation of the toxic metabolite NAPQI.", "diagram": null}, {"id": 514, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_cytochrome", "question": "A 65-year-old man on warfarin (stable INR 2.5) is prescribed fluconazole 200 mg daily for oesophageal candidiasis. One week later, his INR is 6.8 with gum bleeding. What is the primary mechanism of this interaction?", "options": {"A": "Displacement of warfarin from albumin binding sites", "B": "Inhibition of CYP2C9 by fluconazole", "C": "Reduced vitamin K absorption due to antifungal effect on gut flora", "D": "Inhibition of warfarin renal excretion", "E": "Fresh frozen plasma for immediate INR reversal"}, "answer": "B", "explanation": "Fluconazole is a potent inhibitor of CYP2C9, the primary enzyme responsible for metabolising the more potent S-enantiomer of warfarin. This reduces warfarin clearance, causing accumulation and supratherapeutic anticoagulation. This is one of the most clinically significant drug interactions in medicine.", "diagram": null}, {"id": 515, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_lithium", "question": "A 58-year-old woman on long-term lithium therapy presents with coarse tremor, ataxia, dysarthria, and confusion. Lithium level is 3.2 mmol/L (therapeutic 0.6-1.0). She was recently started on a new medication. Creatinine is 210 µmol/L (baseline 85). Which recently added medication most likely precipitated lithium toxicity?", "options": {"A": "Amlodipine", "B": "Indapamide", "C": "Metformin", "D": "Paracetamol", "E": "Continuous venovenous haemodiafiltration"}, "answer": "B", "explanation": "Thiazide and thiazide-like diuretics (including indapamide) reduce lithium renal clearance by causing sodium and volume depletion, leading to increased proximal tubular lithium reabsorption. This is a predictable and dangerous interaction. Other precipitants include NSAIDs, ACE inhibitors, and dehydration.", "diagram": null}, {"id": 516, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_receptor", "question": "A 30-year-old man with anaphylaxis receives intramuscular adrenaline 0.5 mg (1:1000). His symptoms improve within minutes. Which receptor is primarily responsible for reversing bronchospasm in anaphylaxis?", "options": {"A": "Alpha-1 adrenergic receptor", "B": "Beta-1 adrenergic receptor", "C": "Beta-2 adrenergic receptor", "D": "Muscarinic M3 receptor antagonism", "E": "Subcutaneous adrenaline 0.3 mg auto-injector"}, "answer": "C", "explanation": "Beta-2 adrenergic receptor activation causes bronchial smooth muscle relaxation, reversing bronchospasm in anaphylaxis. Alpha-1 activation provides peripheral vasoconstriction (treating hypotension), while beta-1 activation increases cardiac output. Adrenaline acts on all three, addressing the multiple pathophysiological components simultaneously.", "diagram": null}, {"id": 517, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_digoxin", "question": "A 78-year-old woman on digoxin 250 µg daily for atrial fibrillation presents with nausea, visual disturbance (yellow-green halos), and bradycardia (HR 42 bpm). Digoxin level is 4.2 nmol/L (therapeutic 1.0-2.6). K 5.8 mmol/L. ECG shows complete heart block. What is the most appropriate treatment?", "options": {"A": "Atropine 0.6 mg IV", "B": "Temporary transvenous pacing", "C": "Digoxin-specific antibody fragments (Digibind)", "D": "IV calcium gluconate for hyperkalaemia", "E": "Temporary transvenous pacing"}, "answer": "C", "explanation": "Digoxin-specific antibody fragments (DigiFab) are the definitive treatment for severe digoxin toxicity with haemodynamically significant arrhythmias. Hyperkalaemia in digoxin toxicity is caused by inhibition of Na/K-ATPase and responds to antibody fragments. IV calcium is relatively contraindicated as it may worsen digoxin-induced arrhythmias.", "diagram": null}, {"id": 518, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_pharmacogenomics", "question": "A 45-year-old man of Han Chinese descent is to commence carbamazepine for trigeminal neuralgia. Pre-prescription pharmacogenomic testing is recommended. Which HLA allele is most strongly associated with carbamazepine-induced Stevens-Johnson syndrome/toxic epidermal necrolysis in this population?", "options": {"A": "HLA-B*5701", "B": "HLA-B*1502", "C": "HLA-B*5801", "D": "HLA-A*3101", "E": "Genetic counselling regarding HLA testing"}, "answer": "B", "explanation": "HLA-B*1502 is strongly associated with carbamazepine-induced SJS/TEN in Southeast Asian populations (Han Chinese, Thai, Malaysian). The FDA recommends testing before prescribing carbamazepine in at-risk populations. HLA-B*5701 is associated with abacavir hypersensitivity, and HLA-B*5801 with allopurinol hypersensitivity.", "diagram": null}, {"id": 519, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_tricyclic", "question": "A 19-year-old man presents 2 hours after ingesting 3 g of amitriptyline. He is drowsy with dilated pupils, HR 130 bpm, BP 95/60 mmHg, temperature 38.5°C. ECG shows sinus tachycardia with QRS duration 160 ms. What is the most appropriate immediate intervention?", "options": {"A": "Activated charcoal 50 g", "B": "IV sodium bicarbonate 8.4% (100 mL bolus)", "C": "IV physostigmine 2 mg slowly", "D": "IV magnesium sulfate 2 g", "E": "Intravenous lipid emulsion rescue therapy"}, "answer": "B", "explanation": "Widened QRS (>100 ms) in tricyclic antidepressant overdose indicates sodium channel blockade and high risk of arrhythmia and seizures. IV sodium bicarbonate is the specific antidote, providing sodium loading to overcome channel blockade and alkalinisation to reduce free drug binding. Target pH 7.45-7.55.", "diagram": null}, {"id": 520, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_antibiotic_resistance", "question": "A hospital microbiology lab reports increasing carbapenem-resistant Klebsiella pneumoniae (KPC). The primary mechanism of carbapenem resistance in KPC-producing organisms is:", "options": {"A": "Alteration of penicillin-binding proteins", "B": "Production of a class A serine carbapenemase (KPC enzyme)", "C": "Efflux pump overexpression", "D": "Loss of outer membrane porins (OprD)", "E": "Meropenem-vaborbactam for KPC"}, "answer": "B", "explanation": "KPC (Klebsiella pneumoniae carbapenemase) is a class A serine beta-lactamase that efficiently hydrolyses all beta-lactams including carbapenems. It is plasmid-mediated, facilitating horizontal gene transfer. Loss of OprD porins is the primary mechanism in Pseudomonas aeruginosa carbapenem resistance, not Enterobacteriaceae.", "diagram": null}, {"id": 521, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_serotonin", "question": "A 40-year-old woman on venlafaxine 225 mg daily presents with agitation, tremor, myoclonus, diaphoresis, temperature 39.2°C, and diarrhoea 4 hours after her GP added tramadol for back pain. HR 120 bpm, BP 160/95 mmHg. What is the most appropriate management?", "options": {"A": "Dantrolene 1 mg/kg IV", "B": "Cyproheptadine 12 mg orally stat then 4 mg Q6H", "C": "Bromocriptine 2.5 mg orally TDS", "D": "Cooling measures and benzodiazepines only", "E": "Dantrolene for neuroleptic malignant syndrome"}, "answer": "B", "explanation": "Serotonin syndrome from the combination of venlafaxine (SNRI) and tramadol (serotonergic opioid) is treated with cessation of serotonergic agents, supportive care, and cyproheptadine (a serotonin antagonist). Dantrolene is for neuroleptic malignant syndrome. Benzodiazepines are adjunctive but cyproheptadine is the specific antidote.", "diagram": null}, {"id": 522, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_renal_dosing", "question": "A 70-year-old woman (weight 55 kg, creatinine 160 µmol/L) requires gentamicin for serious Gram-negative sepsis. Her calculated CrCl is 22 mL/min. Regarding aminoglycoside dosing in renal impairment, which statement is correct?", "options": {"A": "Reduce the dose proportionally to CrCl and give at standard intervals", "B": "Give the standard loading dose and extend the dosing interval", "C": "Reduce both dose and frequency by 50%", "D": "Aminoglycosides are contraindicated at CrCl <30 mL/min", "E": "Therapeutic drug monitoring with trough levels"}, "answer": "B", "explanation": "Aminoglycosides exhibit concentration-dependent killing and a significant post-antibiotic effect. The loading dose should not be reduced (as adequate peak concentrations are needed for efficacy), but the dosing interval must be extended in renal impairment to allow drug clearance and prevent trough accumulation and toxicity. Therapeutic drug monitoring is essential.", "diagram": null}, {"id": 523, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_iron", "question": "A 2-year-old child presents 3 hours after ingesting an unknown quantity of his mother's ferrous sulfate tablets. He has had 2 episodes of vomiting. Serum iron is 90 µmol/L (normal <30), abdominal X-ray shows multiple radio-opaque tablets in the stomach. What is the most appropriate management?", "options": {"A": "Whole bowel irrigation with polyethylene glycol", "B": "Oral activated charcoal", "C": "IV desferrioxamine infusion", "D": "Observe and repeat serum iron in 4 hours", "E": "Whole bowel irrigation with polyethylene glycol"}, "answer": "C", "explanation": "Serum iron >90 µmol/L indicates severe iron poisoning requiring IV desferrioxamine chelation. Activated charcoal does not bind iron effectively. While whole bowel irrigation may be considered for remaining tablets, the priority with this serum level is immediate chelation therapy. Desferrioxamine chelates free iron for renal excretion.", "diagram": null}, {"id": 524, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_enzyme_induction", "question": "A 35-year-old woman with epilepsy on carbamazepine and sodium valproate is prescribed the combined oral contraceptive pill. She reports a breakthrough seizure 2 weeks later. Valproate levels are subtherapeutic. What is the most likely explanation?", "options": {"A": "Carbamazepine auto-induction has increased its own metabolism", "B": "The OCP has inhibited valproate absorption", "C": "Carbamazepine has induced CYP enzymes increasing valproate metabolism", "D": "Valproate has inhibited carbamazepine metabolism causing toxicity-related non-compliance", "E": "Phenytoin loading dose for seizure prophylaxis"}, "answer": "C", "explanation": "Carbamazepine is a potent inducer of CYP3A4 and other hepatic enzymes, which increases the metabolism of valproate (and many other drugs including the OCP). The addition of the OCP is a red herring; the more likely cause of subtherapeutic valproate is enzyme induction by carbamazepine, which may have been ongoing or potentiated.", "diagram": null}, {"id": 525, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_beta_blocker", "question": "A 55-year-old man presents after ingesting 5 g of propranolol. He is obtunded with HR 35 bpm, BP 70/40 mmHg, and blood glucose 2.8 mmol/L. He is not responding to IV atropine or isoprenaline. What is the most appropriate next step?", "options": {"A": "IV adrenaline infusion", "B": "High-dose insulin-euglycaemia therapy", "C": "IV glucagon 5 mg bolus", "D": "Temporary transvenous pacing", "E": "Intravenous adrenaline infusion"}, "answer": "C", "explanation": "IV glucagon is the specific antidote for severe beta-blocker overdose refractory to atropine and catecholamines. Glucagon activates adenylyl cyclase via a non-adrenergic pathway, bypassing blocked beta receptors to increase heart rate and contractility. High-dose insulin therapy is used if glucagon fails.", "diagram": null}, {"id": 526, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_warfarin", "question": "A medical student asks about warfarin pharmacology. Which clotting factors are dependent on vitamin K for their synthesis and are affected by warfarin?", "options": {"A": "Factors II, V, IX, X", "B": "Factors II, VII, IX, X", "C": "Factors II, VII, VIII, X", "D": "Factors V, VII, IX, XI", "E": "Prothrombin complex concentrate"}, "answer": "B", "explanation": "Warfarin inhibits vitamin K epoxide reductase, preventing gamma-carboxylation of factors II, VII, IX, and X (plus proteins C and S). Factor VII has the shortest half-life (~6 hours), explaining why PT/INR rises first. Factor II has the longest half-life (~60 hours), which is why full anticoagulation takes 5-7 days.", "diagram": null}, {"id": 527, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_organophosphate", "question": "A 45-year-old farmer presents after exposure to an organophosphate insecticide. He has miosis, excessive salivation, bronchorrhoea, bradycardia, and muscle fasciculations. What is the most appropriate immediate pharmacological management?", "options": {"A": "Atropine 1.2 mg IV repeated until secretions dry", "B": "Pralidoxime 30 mg/kg IV over 20 minutes", "C": "Atropine 1.2 mg IV plus pralidoxime 30 mg/kg IV", "D": "Glycopyrronium 0.2 mg IV", "E": "Obidoxime as alternative oxime"}, "answer": "C", "explanation": "Organophosphate poisoning requires both atropine (muscarinic antagonist to control secretions, bronchospasm, bradycardia) and pralidoxime (oxime that reactivates acetylcholinesterase at nicotinic junctions, treating muscle weakness and fasciculations). Atropine alone does not address nicotinic effects. Pralidoxime must be given early before \"ageing\" occurs.", "diagram": null}, {"id": 528, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_drug_metabolism", "question": "A 28-year-old woman is a known CYP2D6 ultra-rapid metaboliser. She is prescribed codeine 30 mg for post-surgical pain. What is the clinical significance of her genotype?", "options": {"A": "Codeine will be ineffective due to rapid clearance", "B": "She will convert codeine to morphine more rapidly, increasing toxicity risk", "C": "She will have normal codeine response", "D": "She will require higher doses of codeine for adequate analgesia", "E": "Tramadol as alternative analgesic"}, "answer": "B", "explanation": "CYP2D6 ultra-rapid metabolisers convert codeine to its active metabolite morphine much faster and to a greater extent than normal metabolisers, leading to supratherapeutic morphine levels and risk of respiratory depression. Codeine is contraindicated in known ultra-rapid metabolisers. Alternative analgesics should be used.", "diagram": null}, {"id": 529, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_ethylene_glycol", "question": "A 35-year-old man presents confused after drinking an unknown liquid from a container in his garage. ABG: pH 7.15, bicarbonate 8 mmol/L, anion gap 28. Osmolar gap is 35 mOsm/kg. Urinalysis shows calcium oxalate crystals. What specific antidote should be administered?", "options": {"A": "IV ethanol infusion", "B": "IV fomepizole (4-methylpyrazole)", "C": "IV sodium bicarbonate only", "D": "Haemodialysis alone", "E": "IV ethanol infusion as alternative antidote"}, "answer": "B", "explanation": "Fomepizole (4-methylpyrazole) is the preferred antidote for ethylene glycol poisoning, inhibiting alcohol dehydrogenase to prevent conversion to toxic metabolites (glycolic acid, oxalic acid). It is preferred over ethanol due to predictable pharmacokinetics and fewer side effects. Haemodialysis is also indicated for severe poisoning but as an adjunct.", "diagram": null}, {"id": 530, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_teratogenicity", "question": "A 30-year-old woman with epilepsy is planning pregnancy. She is on sodium valproate 600 mg BD with good seizure control. Regarding valproate teratogenicity, which statement is most accurate?", "options": {"A": "Risk of major malformations is approximately 1-2%", "B": "The primary risk is cardiac malformations", "C": "Valproate carries a dose-dependent risk of neural tube defects and neurodevelopmental impairment of approximately 10% for major malformations", "D": "High-dose folic acid eliminates the teratogenic risk", "E": "Lamotrigine as alternative antiepileptic"}, "answer": "C", "explanation": "Sodium valproate has the highest teratogenicity risk of all antiepileptic drugs, with approximately 10% risk of major congenital malformations (especially neural tube defects, cardiac, and craniofacial) and up to 30-40% risk of neurodevelopmental impairment. The risk is dose-dependent. Current guidelines recommend avoiding valproate in women of childbearing potential.", "diagram": null}, {"id": 531, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_calcium_channel", "question": "A 60-year-old man presents after ingesting 40 x 10 mg amlodipine tablets. He is hypotensive (BP 70/40 mmHg), HR 55 bpm, and peripherally vasodilatated. He has not responded to IV fluids and IV calcium gluconate. What is the next most appropriate treatment?", "options": {"A": "IV noradrenaline infusion", "B": "High-dose insulin-euglycaemia therapy (1 unit/kg/hr)", "C": "IV glucagon 5 mg", "D": "IV lipid emulsion (Intralipid) 20%", "E": "Intravenous noradrenaline infusion"}, "answer": "B", "explanation": "High-dose insulin-euglycaemia therapy (HIET) is the recommended treatment for severe calcium channel blocker overdose refractory to fluids and calcium. Insulin acts as an inotrope in this setting by improving myocardial glucose utilisation. The dose (1 unit/kg/hr with dextrose infusion) is much higher than for glucose management.", "diagram": null}, {"id": 532, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_addiction", "question": "A 32-year-old man with opioid use disorder is commenced on buprenorphine-naloxone (Suboxone) for maintenance therapy. He uses heroin the day before his first dose and develops acute withdrawal symptoms shortly after taking buprenorphine. What is the mechanism of this precipitated withdrawal?", "options": {"A": "Naloxone component blocks opioid receptors", "B": "Buprenorphine displaces the full agonist due to higher receptor affinity but has lower intrinsic activity", "C": "Buprenorphine inhibits endogenous endorphin release", "D": "Cross-sensitivity reaction between heroin and buprenorphine", "E": "Naltrexone for relapse prevention"}, "answer": "B", "explanation": "Buprenorphine is a high-affinity partial mu-opioid receptor agonist. When given to a patient with recent full agonist (heroin) use, buprenorphine displaces the full agonist from receptors due to its higher binding affinity, but provides less receptor activation (lower intrinsic activity), precipitating acute withdrawal. The naloxone component is poorly bioavailable sublingually.", "diagram": null}, {"id": 533, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_toxidrome_anticholinergic", "question": "A 19-year-old man is brought to the emergency department after ingesting an unknown substance. He has dilated pupils, dry flushed skin, tachycardia, urinary retention, absent bowel sounds, and is agitated with visual hallucinations. Temperature is 38.5°C.\nWhich toxidrome does this presentation represent?", "options": {"A": "Sympathomimetic", "B": "Anticholinergic", "C": "Serotonin syndrome", "D": "Opioid", "E": "Cholinergic toxidrome"}, "answer": "B", "explanation": "The anticholinergic toxidrome is characterised by the classic mnemonic: 'Blind as a bat (mydriasis), dry as a bone (anhidrosis, dry mucous membranes), red as a beet (flushed skin), mad as a hatter (agitation, delirium, hallucinations), hot as a hare (hyperthermia), full as a flask (urinary retention), and slow as a turtle (decreased bowel sounds)'. Common causes include antihistamines, tricyclic antidepressants, atropine, and certain plants (Datura). Management is supportive with benzodiazepines for agitation. Physostigmine (a cholinesterase inhibitor) is the specific antidote for severe cases. Sympathomimetic toxidrome differs by the presence of diaphoresis.", "diagram": null}, {"id": 534, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_alcohol_withdrawal", "question": "A 55-year-old man with a long history of alcohol dependence presents 48 hours after his last drink with tremor, diaphoresis, tachycardia, and visual hallucinations. His CIWA-Ar score is 22.\nWhat is the most appropriate treatment?", "options": {"A": "Oral haloperidol", "B": "IV chlordiazepoxide or diazepam using a symptom-triggered protocol", "C": "IV phenytoin prophylaxis", "D": "Oral naltrexone", "E": "Oral haloperidol for agitation"}, "answer": "B", "explanation": "Alcohol withdrawal is a potentially life-threatening condition. The CIWA-Ar (Clinical Institute Withdrawal Assessment for Alcohol - revised) scale guides treatment: scores >20 indicate severe withdrawal requiring benzodiazepines. Long-acting benzodiazepines (diazepam, chlordiazepoxide) are preferred, using symptom-triggered dosing protocols which result in lower total doses and shorter treatment duration compared to fixed-dose regimens. Seizures typically occur at 12-48 hours and delirium tremens at 48-72 hours post-cessation. IV thiamine must be given before glucose to prevent Wernicke encephalopathy. Antipsychotics lower the seizure threshold and should not be first-line.", "diagram": null}, {"id": 535, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_therapeutic_monitoring", "question": "A 70-year-old woman on long-term lithium therapy for bipolar disorder presents with tremor, confusion, and diarrhoea. She was recently started on an NSAID for osteoarthritis pain. Her lithium level is 2.1 mmol/L (therapeutic range 0.6-1.0 mmol/L).\nWhat is the most likely mechanism of lithium toxicity?", "options": {"A": "Hepatic enzyme induction by the NSAID", "B": "Reduced renal lithium clearance due to NSAID-induced prostaglandin inhibition", "C": "Increased gastrointestinal absorption of lithium", "D": "Protein binding displacement", "E": "Increased hepatic lithium metabolism by the NSAID"}, "answer": "B", "explanation": "NSAIDs reduce renal prostaglandin synthesis, which decreases renal blood flow and glomerular filtration rate, leading to reduced lithium clearance and toxicity. Lithium has a narrow therapeutic index (0.6-1.0 mmol/L) making it particularly susceptible to drug interactions. Other medications that increase lithium levels include ACE inhibitors, ARBs, and thiazide diuretics. Lithium toxicity manifests as coarse tremor, ataxia, confusion, diarrhoea, and can progress to seizures, renal failure, and cardiac arrhythmias. Management includes cessation of lithium and the offending drug, IV fluids, and haemodialysis for severe toxicity (>2.5 mmol/L or neurological symptoms).", "diagram": null}, {"id": 536, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_overdose", "question": "A 22-year-old woman presents 2 hours after ingesting 30 g of paracetamol. She is asymptomatic. Serum paracetamol level at 4 hours is above the treatment line on the modified Rumack-Matthew nomogram. What is the most appropriate management?", "options": {"A": "Activated charcoal only", "B": "IV N-acetylcysteine (NAC) protocol", "C": "Oral methionine", "D": "Observation with repeat levels in 4 hours", "E": "Urgent liver transplant assessment"}, "answer": "B", "explanation": "IV NAC is the standard antidote for paracetamol poisoning when levels are above the treatment line. It is most effective when commenced within 8 hours of ingestion but has benefit even later.", "diagram": null}, {"id": 537, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_pharmacokinetics", "question": "A drug has a half-life of 6 hours and is administered by regular oral dosing. Approximately how long will it take to reach steady-state plasma concentration?", "options": {"A": "6 hours", "B": "12 hours", "C": "24 hours (4 half-lives)", "D": "30 hours (5 half-lives)", "E": "48 hours (8 half-lives)"}, "answer": "D", "explanation": "Steady state is reached after approximately 4-5 half-lives regardless of dosing interval. For a drug with t½ = 6 hours, steady state ≈ 5 × 6 = 30 hours.", "diagram": null}, {"id": 538, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_toxidrome", "question": "A patient presents with agitation, hyperthermia (39.5°C), clonus, hyperreflexia, mydriasis, and diarrhoea. They recently started fluoxetine and were given tramadol for pain. What is the most likely diagnosis?", "options": {"A": "Neuroleptic malignant syndrome", "B": "Serotonin syndrome", "C": "Anticholinergic toxidrome", "D": "Malignant hyperthermia", "E": "Sympathomimetic toxidrome"}, "answer": "B", "explanation": "Serotonin syndrome presents with the triad of neuromuscular hyperactivity (clonus, hyperreflexia), autonomic dysfunction (hyperthermia, diarrhoea), and altered mental state. SSRI + tramadol is a common precipitant.", "diagram": null}, {"id": 539, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_drug_interactions", "question": "Warfarin metabolism is primarily mediated by which cytochrome P450 enzyme?", "options": {"A": "CYP3A4", "B": "CYP2D6", "C": "CYP2C9", "D": "CYP1A2", "E": "CYP2E1"}, "answer": "C", "explanation": "The more potent S-enantiomer of warfarin is primarily metabolised by CYP2C9. Drugs inhibiting CYP2C9 (e.g. fluconazole, amiodarone) significantly increase warfarin effect and bleeding risk.", "diagram": null}, {"id": 540, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_withdrawal", "question": "A 52-year-old man with alcohol dependence develops tremor, diaphoresis, tachycardia, and visual hallucinations 48 hours after his last drink. CIWA-Ar score is 22. What is the most appropriate pharmacological management?", "options": {"A": "IV phenytoin loading dose", "B": "Oral diazepam using a symptom-triggered regimen", "C": "Haloperidol 5 mg IM", "D": "IV ethanol infusion", "E": "Oral baclofen 10 mg TDS"}, "answer": "B", "explanation": "Benzodiazepines (diazepam or chlordiazepoxide) using a symptom-triggered protocol guided by CIWA-Ar scoring is the standard treatment for moderate-severe alcohol withdrawal. Phenytoin does not prevent alcohol withdrawal seizures.", "diagram": null}, {"id": 541, "specialty": "pharmacology_toxicology", "tag": "medical_science_pharmacology_toxicology_mechanisms", "question": "Which mechanism best explains why aminoglycoside antibiotics (e.g. gentamicin) cause nephrotoxicity?", "options": {"A": "Inhibition of renal prostaglandin synthesis", "B": "Direct tubular toxicity via accumulation in proximal tubular cells", "C": "Crystal deposition in renal tubules", "D": "Afferent arteriolar vasoconstriction", "E": "Immune complex deposition in glomeruli"}, "answer": "B", "explanation": "Aminoglycosides are taken up by proximal tubular cells via megalin-mediated endocytosis and accumulate in lysosomes, causing direct cellular injury and acute tubular necrosis. Risk increases with trough level elevation.", "diagram": null}, {"id": 542, "specialty": "pharmacology_toxicology", "tag": "clinical_science_pharmacology_toxicology_monitoring", "question": "A patient on lithium 900 mg daily for bipolar disorder presents with tremor, nausea, and ataxia. Serum lithium level is 2.1 mmol/L [0.6-0.8 maintenance]. Creatinine is 180 µmol/L (baseline 90). What is the most important immediate management?", "options": {"A": "Reduce lithium dose by 50% and recheck in 1 week", "B": "Cease lithium, commence IV normal saline, and monitor renal function", "C": "Continue lithium and add ondansetron for nausea", "D": "Urgent haemodialysis", "E": "Activated charcoal administration"}, "answer": "B", "explanation": "Lithium toxicity (>1.5 mmol/L with symptoms) requires immediate cessation, aggressive IV fluid resuscitation, and close monitoring. Haemodialysis is reserved for severe toxicity (>2.5 mmol/L) or renal failure not responding to fluids.", "diagram": null}, {"id": 543, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_asthma", "question": "A 28-year-old woman with asthma presents to ED with severe breathlessness, unable to complete sentences. Peak flow is 28% predicted. She has received 3 nebulised salbutamol doses, ipratropium, and IV hydrocortisone. She remains in distress with O2 saturation 90%, pH 7.35, pCO2 42 mmHg. What is the most appropriate next step?", "options": {"A": "Continue nebulised salbutamol and observe", "B": "IV magnesium sulfate 2 g over 20 minutes", "C": "IV aminophylline loading dose", "D": "Intubation and mechanical ventilation", "E": "Intubation and mechanical ventilation"}, "answer": "B", "explanation": "IV magnesium sulfate is recommended for acute severe/life-threatening asthma not responding to initial bronchodilator therapy. A normal pCO2 in severe asthma indicates fatigue and impending respiratory failure. IV magnesium provides bronchial smooth muscle relaxation via calcium channel antagonism. If no improvement, ICU escalation is needed.", "diagram": null}, {"id": 544, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_copd", "question": "A 68-year-old man with severe COPD (FEV1 32% predicted) and cor pulmonale is on long-term oxygen therapy. ABG on 2 L/min O2: pH 7.34, pCO2 62 mmHg, pO2 65 mmHg, HCO3 36 mmol/L. What does the elevated bicarbonate indicate?", "options": {"A": "Acute respiratory acidosis", "B": "Chronic respiratory acidosis with metabolic compensation", "C": "Metabolic alkalosis from diuretic therapy", "D": "Mixed respiratory and metabolic alkalosis", "E": "Domiciliary non-invasive ventilation"}, "answer": "B", "explanation": "The elevated bicarbonate (36 mmol/L) with elevated pCO2 and near-normal pH indicates chronic respiratory acidosis with appropriate renal metabolic compensation. The kidneys retain bicarbonate over 3-5 days to buffer the chronic hypercapnia. In acute respiratory acidosis, bicarbonate would be near-normal (24-26 mmol/L).", "diagram": null}, {"id": 545, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_pe", "question": "A 45-year-old woman 10 days post knee replacement presents with acute pleuritic chest pain and dyspnoea. HR 115 bpm, BP 85/55 mmHg, O2 saturation 88%. Bedside echocardiogram shows RV dilatation with septal bowing. Troponin is elevated. What is the most appropriate immediate management?", "options": {"A": "CTPA to confirm diagnosis before treatment", "B": "Systemic thrombolysis with alteplase 100 mg", "C": "Therapeutic anticoagulation with heparin and IV fluids", "D": "Catheter-directed thrombolysis", "E": "Catheter-directed thrombolysis"}, "answer": "B", "explanation": "This presentation is consistent with massive (high-risk) pulmonary embolism with haemodynamic compromise. Systemic thrombolysis is indicated for massive PE with shock, as it reduces RV afterload and improves haemodynamics. Waiting for CTPA in a haemodynamically unstable patient risks deterioration. Bedside echo findings with the clinical picture are sufficient to justify thrombolysis.", "diagram": null}, {"id": 546, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_ild", "question": "A 65-year-old man presents with progressive exertional dyspnoea over 18 months. HRCT shows basal and peripheral predominant honeycombing with traction bronchiectasis and minimal ground glass opacity. What is the most likely UIP pattern diagnosis?", "options": {"A": "Nonspecific interstitial pneumonia", "B": "Idiopathic pulmonary fibrosis", "C": "Cryptogenic organising pneumonia", "D": "Hypersensitivity pneumonitis", "E": "Lung transplant assessment referral"}, "answer": "B", "explanation": "The HRCT pattern of basal and peripheral predominant honeycombing with traction bronchiectasis and minimal ground glass opacity is the definitive UIP (usual interstitial pneumonia) pattern, which in the appropriate clinical context (older male, no identifiable cause) is diagnostic of idiopathic pulmonary fibrosis without the need for surgical lung biopsy.", "diagram": null}, {"id": 547, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_pneumothorax", "question": "A 22-year-old tall, thin man presents with sudden left-sided chest pain and dyspnoea. Chest X-ray shows a large (>2 cm rim) left primary spontaneous pneumothorax. He is haemodynamically stable with O2 saturation 96%. This is his first episode. What is the recommended first-line management?", "options": {"A": "Observation and follow-up chest X-ray", "B": "Needle aspiration", "C": "Small-bore chest drain (Seldinger technique)", "D": "Large-bore intercostal drain", "E": "Video-assisted thoracoscopic surgery (VATS) pleurodesis"}, "answer": "B", "explanation": "BTS guidelines recommend needle aspiration as first-line management for large primary spontaneous pneumothorax in stable patients. If aspiration fails (lung does not re-expand or recurrence within hours), a small-bore chest drain is inserted. Large-bore drains are not required for primary spontaneous pneumothorax.", "diagram": null}, {"id": 548, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_osa", "question": "A 52-year-old man (BMI 38) presents with excessive daytime somnolence, witnessed apnoeas, and morning headaches. Epworth Sleepiness Scale score is 16/24. Polysomnography shows AHI of 45 events/hour with predominantly obstructive events and minimum O2 saturation 72%. What is the most appropriate first-line treatment?", "options": {"A": "Mandibular advancement device", "B": "Continuous positive airway pressure (CPAP)", "C": "Uvulopalatopharyngoplasty", "D": "Weight loss programme with positional therapy", "E": "Uvulopalatopharyngoplasty"}, "answer": "B", "explanation": "CPAP is the gold standard first-line treatment for moderate-to-severe obstructive sleep apnoea (AHI >15, or >5 with symptoms). It acts as a pneumatic splint to maintain upper airway patency. An AHI of 45 is severe OSA. Weight loss is important as an adjunct but is insufficient as sole therapy for severe OSA.", "diagram": null}, {"id": 549, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_pleural_effusion", "question": "A 60-year-old woman with breast cancer develops a large right pleural effusion. Pleural fluid analysis: pH 7.45, protein 48 g/L, LDH 180 U/L (serum LDH 250), glucose 5.2 mmol/L, cytology positive for adenocarcinoma cells. She is symptomatic with recurrent effusion after two therapeutic aspirations. What is the most appropriate management?", "options": {"A": "Repeated therapeutic thoracentesis as needed", "B": "Indwelling pleural catheter (IPC)", "C": "Chemical pleurodesis with talc slurry via chest drain", "D": "Decortication surgery", "E": "Thoracoscopy with pleural biopsy"}, "answer": "B", "explanation": "For recurrent symptomatic malignant pleural effusion, both IPC and talc pleurodesis are first-line options (TIME2 trial showed equivalence). IPC is preferred in patients with trapped lung, poor performance status, or those wanting to avoid hospitalisation. Given recurrence after two aspirations and active malignancy, IPC offers ongoing drainage with outpatient management.", "diagram": null}, {"id": 550, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_tb", "question": "A 35-year-old man from India presents with 3 weeks of productive cough, night sweats, and weight loss. Chest X-ray shows right upper lobe cavitation. Sputum AFB smear is positive. He is HIV-negative. What is the standard initial treatment regimen for drug-susceptible pulmonary tuberculosis?", "options": {"A": "Rifampicin, isoniazid, ethambutol for 6 months", "B": "Rifampicin, isoniazid, pyrazinamide, ethambutol for 2 months then rifampicin and isoniazid for 4 months", "C": "Rifampicin, isoniazid, pyrazinamide for 6 months", "D": "Rifampicin and isoniazid for 9 months", "E": "Moxifloxacin-based MDR-TB regimen"}, "answer": "B", "explanation": "The standard WHO-recommended regimen for drug-susceptible TB is 2 months of intensive phase (RHZE: rifampicin, isoniazid, pyrazinamide, ethambutol) followed by 4 months of continuation phase (RH: rifampicin, isoniazid). Ethambutol is included in the intensive phase pending drug susceptibility results.", "diagram": null}, {"id": 551, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_lung_cancer", "question": "A 62-year-old woman with stage IIIA non-small cell lung cancer (adenocarcinoma) is found to have an EGFR exon 19 deletion on molecular testing. She has good performance status (ECOG 1). PET-CT shows no distant metastases. What is the most appropriate treatment approach?", "options": {"A": "Concurrent chemoradiotherapy alone", "B": "Surgical resection followed by adjuvant chemotherapy", "C": "Concurrent chemoradiotherapy followed by durvalumab maintenance", "D": "Concurrent chemoradiotherapy followed by osimertinib maintenance", "E": "Pembrolizumab monotherapy for PD-L1 >50%"}, "answer": "D", "explanation": "For unresectable stage III NSCLC with EGFR mutations, the LAURA trial demonstrated that osimertinib (third-generation EGFR TKI) as maintenance after chemoradiotherapy significantly improves progression-free survival compared to placebo. This is preferred over durvalumab (immunotherapy) in EGFR-mutant tumours, as EGFR-mutant NSCLC responds poorly to checkpoint inhibitors.", "diagram": null}, {"id": 552, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_physiology", "question": "A medical student asks about the ventilation-perfusion (V/Q) relationship. In an upright individual at rest, what is the V/Q ratio at the apex of the lung compared to the base?", "options": {"A": "Higher V/Q at the apex (approximately 3.0) compared to the base (approximately 0.6)", "B": "Lower V/Q at the apex compared to the base", "C": "V/Q ratio is uniform throughout the lung", "D": "Higher V/Q at the base due to gravity-dependent blood flow", "E": "Inhaled nitric oxide for V/Q assessment"}, "answer": "A", "explanation": "In the upright position, both ventilation and perfusion increase from apex to base due to gravity, but perfusion increases proportionally more than ventilation. This results in a higher V/Q ratio at the apex (~3.0) and lower at the base (~0.6). The overall average V/Q ratio for the whole lung is approximately 0.8.", "diagram": null}, {"id": 553, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_bronchiectasis", "question": "A 45-year-old woman with non-cystic fibrosis bronchiectasis has had 4 exacerbations requiring antibiotics in the past year. Sputum cultures consistently grow Pseudomonas aeruginosa. She is on regular airway clearance and pulmonary rehabilitation. FEV1 is 55% predicted. What is the most appropriate additional management?", "options": {"A": "Long-term oral azithromycin 250 mg three times weekly", "B": "Long-term inhaled tobramycin (nebulised)", "C": "Long-term oral ciprofloxacin 500 mg BD", "D": "Inhaled colistin nebulised BD", "E": "Nebulised hypertonic saline for airway clearance"}, "answer": "A", "explanation": "Long-term macrolide therapy (azithromycin 250 mg three times weekly) is recommended for patients with non-CF bronchiectasis and ≥3 exacerbations per year, regardless of Pseudomonas status. ERS guidelines recommend macrolides as first-line for exacerbation reduction. Inhaled antibiotics are considered if macrolides fail or are contraindicated.", "diagram": null}, {"id": 554, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_cystic_fibrosis", "question": "A 25-year-old man with cystic fibrosis (homozygous F508del mutation) has progressive lung disease with FEV1 45% predicted. He asks about CFTR modulator therapy. Which regimen is most appropriate for his genotype?", "options": {"A": "Ivacaftor monotherapy", "B": "Lumacaftor-ivacaftor", "C": "Elexacaftor-tezacaftor-ivacaftor (Trikafta)", "D": "CFTR modulators are not effective for F508del mutation", "E": "Lumacaftor-ivacaftor (Orkambi)"}, "answer": "C", "explanation": "Elexacaftor-tezacaftor-ivacaftor (Trikafta/Kaftrio) is the most effective CFTR modulator for patients with at least one F508del allele. It combines a next-generation corrector (elexacaftor), corrector (tezacaftor), and potentiator (ivacaftor) to improve CFTR protein folding, trafficking, and channel function, with dramatic improvements in FEV1 and quality of life.", "diagram": null}, {"id": 555, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_sarcoidosis", "question": "A 35-year-old African American woman presents with bilateral hilar lymphadenopathy, erythema nodosum, and anterior uveitis. Serum ACE is elevated. Calcium is 2.85 mmol/L. Pulmonary function tests show a restrictive pattern with reduced DLCO. Bronchoscopy with transbronchial biopsy shows non-caseating granulomas. What Scadding stage is her chest X-ray most likely to show?", "options": {"A": "Stage I — bilateral hilar lymphadenopathy alone", "B": "Stage II — bilateral hilar lymphadenopathy with pulmonary infiltrates", "C": "Stage III — pulmonary infiltrates without lymphadenopathy", "D": "Stage IV — pulmonary fibrosis", "E": "Infliximab for refractory sarcoidosis"}, "answer": "B", "explanation": "Given bilateral hilar lymphadenopathy with restrictive PFTs and reduced DLCO suggesting parenchymal involvement, this is most consistent with Scadding Stage II (BHL with pulmonary infiltrates). Stage I would not explain the restrictive defect. Löfgren syndrome (BHL, erythema nodosum, polyarthralgia) has a good prognosis.", "diagram": null}, {"id": 556, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_ventilation", "question": "A patient with COPD exacerbation is commenced on non-invasive ventilation (NIV). ABG pre-NIV: pH 7.25, pCO2 75 mmHg, pO2 55 mmHg on 2 L/min. NIV settings: IPAP 16 cmH2O, EPAP 6 cmH2O. What is the primary physiological mechanism by which NIV improves ventilation in acute hypercapnic respiratory failure?", "options": {"A": "Increasing FiO2 delivery", "B": "Unloading respiratory muscles and augmenting tidal volume", "C": "Recruiting collapsed alveoli to improve V/Q matching", "D": "Increasing respiratory rate through stimulation", "E": "High-flow nasal cannula oxygen therapy"}, "answer": "B", "explanation": "The primary mechanism of NIV in hypercapnic respiratory failure is unloading fatigued respiratory muscles by providing inspiratory pressure support (the difference between IPAP and EPAP = pressure support of 10 cmH2O), which augments tidal volume and improves alveolar ventilation. EPAP provides some PEEP effect to counterbalance intrinsic PEEP and maintain airway patency.", "diagram": null}, {"id": 557, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_occupational", "question": "A 55-year-old man who worked as a shipyard insulation installer for 25 years presents with progressive dyspnoea. HRCT shows bilateral pleural plaques, diffuse pleural thickening, and lower lobe interstitial fibrosis. What is the most likely diagnosis?", "options": {"A": "Silicosis", "B": "Asbestosis with benign asbestos-related pleural disease", "C": "Mesothelioma", "D": "Coal workers pneumoconiosis", "E": "Compensation claim assessment"}, "answer": "B", "explanation": "The combination of occupational asbestos exposure (shipyard insulation), pleural plaques, diffuse pleural thickening, and lower lobe interstitial fibrosis is classic for asbestosis with benign asbestos-related pleural disease. Asbestosis causes lower zone predominant fibrosis, distinguishing it from silicosis and coal workers pneumoconiosis (upper zone predominant).", "diagram": null}, {"id": 558, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_immunology", "question": "A 42-year-old woman presents with recurrent episodes of cough, dyspnoea, and fever 4-6 hours after exposure to her pet budgerigars. HRCT during an acute episode shows diffuse ground glass opacities and mosaic attenuation. What type of hypersensitivity reaction is responsible?", "options": {"A": "Type I (IgE-mediated)", "B": "Type II (antibody-mediated cytotoxic)", "C": "Type III (immune complex-mediated) and Type IV (delayed T-cell-mediated)", "D": "Type IV (delayed T-cell-mediated) alone", "E": "Serum precipitins and avoidance of antigen exposure"}, "answer": "C", "explanation": "Hypersensitivity pneumonitis (previously extrinsic allergic alveolitis) involves both Type III (immune complex deposition, responsible for acute symptoms 4-8 hours post-exposure) and Type IV (T-cell mediated granulomatous inflammation, responsible for chronic disease) hypersensitivity reactions. Bird fancier's lung is a classic cause.", "diagram": null}, {"id": 559, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_altitude", "question": "A 30-year-old trekker develops headache, nausea, ataxia, and confusion at 4500 metres altitude. O2 saturation is 70%. What is the most appropriate immediate treatment for high altitude cerebral oedema?", "options": {"A": "Acetazolamide 250 mg BD", "B": "Dexamethasone 8 mg IV/IM stat and immediate descent", "C": "Nifedipine 20 mg modified-release TDS", "D": "Supplemental oxygen only and observe", "E": "Portable hyperbaric chamber (Gamow bag)"}, "answer": "B", "explanation": "High altitude cerebral oedema (HACE) is a life-threatening emergency. Immediate treatment includes dexamethasone (reduces vasogenic cerebral oedema) and mandatory descent. Supplemental oxygen and portable hyperbaric chambers (Gamow bag) are adjuncts. Acetazolamide is for prevention/mild AMS, and nifedipine is for HAPE. Delay in descent risks death.", "diagram": null}, {"id": 560, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_eosinophilic", "question": "A 50-year-old woman with severe eosinophilic asthma (blood eosinophils 800 cells/µL) remains uncontrolled on high-dose ICS/LABA, tiotropium, and oral prednisolone 10 mg daily. She has had 4 exacerbations in the past year. What is the most appropriate biologic therapy?", "options": {"A": "Omalizumab (anti-IgE)", "B": "Mepolizumab (anti-IL-5)", "C": "Dupilumab (anti-IL-4Rα)", "D": "Tezepelumab (anti-TSLP)", "E": "Benralizumab (anti-IL-5Rα)"}, "answer": "B", "explanation": "Mepolizumab is an anti-IL-5 monoclonal antibody that is first-line biologic therapy for severe eosinophilic asthma with blood eosinophils ≥300 cells/µL. It significantly reduces exacerbations and allows oral corticosteroid dose reduction. While dupilumab and tezepelumab are also effective, mepolizumab has the strongest evidence base specifically for eosinophilic phenotype.", "diagram": null}, {"id": 561, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_narcolepsy", "question": "A 22-year-old man presents with excessive daytime sleepiness, cataplexy (sudden bilateral knee weakness triggered by laughter), sleep paralysis, and hypnagogic hallucinations. Multiple sleep latency test shows mean sleep latency of 3 minutes with 4 sleep-onset REM periods. What is the underlying pathophysiology?",
