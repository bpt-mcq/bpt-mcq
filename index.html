"options": {"A": "Reduced melatonin secretion from the pineal gland", "B": "Loss of hypocretin (orexin)-producing neurons in the lateral hypothalamus", "C": "Damage to the reticular activating system", "D": "Autoimmune destruction of suprachiasmatic nucleus", "E": "Sodium oxybate for cataplexy"}, "answer": "B", "explanation": "Narcolepsy type 1 (with cataplexy) is caused by selective loss of hypocretin (orexin)-producing neurons in the lateral hypothalamus, likely through an autoimmune mechanism (strong HLA-DQB1*06:02 association). CSF hypocretin-1 levels are typically undetectable (<110 pg/mL). This distinguishes it from narcolepsy type 2 (without cataplexy, normal CSF hypocretin).", "diagram": null}, {"id": 562, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_respiratory_failure", "question": "A 68-year-old man with severe COPD presents with increasing dyspnoea. ABG shows pH 7.28, PaCO2 72 mmHg, PaO2 52 mmHg, HCO3 34 mmol/L on room air.\nWhat type of respiratory failure is this and what does the elevated bicarbonate indicate?", "options": {"A": "Type 1 respiratory failure with metabolic alkalosis", "B": "Acute type 2 respiratory failure without chronic compensation", "C": "Acute-on-chronic type 2 respiratory failure", "D": "Type 1 respiratory failure with respiratory acidosis", "E": "Acute type 1 respiratory failure"}, "answer": "C", "explanation": "This is acute-on-chronic type 2 (hypercapnic) respiratory failure. The elevated PaCO2 (>45 mmHg) with hypoxaemia defines type 2 failure. The elevated bicarbonate (34 mmol/L) indicates chronic renal compensation for longstanding CO2 retention (metabolic alkalosis), while the low pH (7.28) indicates an acute deterioration superimposed on chronic hypercapnia. In acute type 2 failure, the bicarbonate would be normal. This distinction guides management — non-invasive ventilation (NIV/BiPAP) is first-line for acute hypercapnic respiratory failure in COPD (pH <7.35 with PaCO2 >45), reducing intubation rates and mortality.", "diagram": null}, {"id": 563, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_pulmonary_hypertension", "question": "A 50-year-old woman with systemic sclerosis and progressive exertional dyspnoea has confirmed pulmonary arterial hypertension on right heart catheterisation (mPAP 38 mmHg, PAWP 10 mmHg, PVR 6 Wood units).\nWhat is the MOST appropriate initial targeted therapy?", "options": {"A": "Calcium channel blockers for all patients", "B": "Combination endothelin receptor antagonist plus PDE5 inhibitor", "C": "Oral anticoagulation alone", "D": "Supplemental oxygen alone", "E": "Calcium channel blockers for all PAH patients"}, "answer": "B", "explanation": "Current guidelines recommend upfront combination therapy with an endothelin receptor antagonist (ERA, e.g. ambrisentan or macitentan) plus a PDE5 inhibitor (e.g. sildenafil or tadalafil) for most patients with PAH. This approach is based on the AMBITION trial showing superior outcomes with combination therapy vs monotherapy. Calcium channel blockers are only appropriate for the minority (~5%) who demonstrate acute vasoreactivity on right heart catheterisation. Additional therapies include prostacyclin pathway agents (e.g. selexipag, IV epoprostenol) for severe or refractory disease. Supportive measures include diuretics, oxygen, and supervised exercise rehabilitation.", "diagram": null}, {"id": 564, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_niv", "question": "A 72-year-old man with motor neurone disease and type 2 respiratory failure presents with orthopnoea, morning headaches, and daytime somnolence. His FVC is 45% predicted and overnight oximetry shows significant nocturnal desaturation.\nWhat is the most appropriate respiratory intervention?", "options": {"A": "Invasive mechanical ventilation via tracheostomy", "B": "Non-invasive ventilation (NIV) at night", "C": "Continuous positive airway pressure (CPAP)", "D": "Supplemental oxygen alone", "E": "Continuous positive airway pressure (CPAP)"}, "answer": "B", "explanation": "Non-invasive ventilation (NIV), typically bilevel positive airway pressure (BiPAP), is the standard of care for hypoventilation in motor neurone disease (MND). It improves symptoms (orthopnoea, morning headaches, daytime somnolence) and extends survival. NIV is typically initiated when FVC falls below 50% predicted or when symptoms of nocturnal hypoventilation develop. CPAP is not appropriate as it does not augment ventilation. Supplemental oxygen alone can worsen hypercapnia. Invasive ventilation via tracheostomy is generally not recommended in MND due to poor quality of life outcomes, though patient preferences should be respected. NIV is also used in obesity hypoventilation, neuromuscular diseases, and chest wall disorders.", "diagram": null}, {"id": 565, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_copd", "question": "A 68-year-old man with COPD (FEV1 35% predicted) presents with acute exacerbation. ABG on room air: pH 7.28, pCO₂ 72 mmHg, pO₂ 52 mmHg, HCO₃⁻ 32 mmol/L. He is drowsy but rousable. What is the most appropriate respiratory support?", "options": {"A": "High-flow oxygen via non-rebreather mask at 15 L/min", "B": "Non-invasive ventilation (BiPAP)", "C": "Immediate intubation and mechanical ventilation", "D": "Controlled oxygen via nasal prongs at 2 L/min only", "E": "Doxapram IV infusion"}, "answer": "B", "explanation": "Acute hypercapnic respiratory failure (pH <7.35, pCO₂ >45) in COPD exacerbation is an indication for NIV (BiPAP). NIV reduces intubation rates and mortality. The patient is still conscious, so intubation is not immediately needed.", "diagram": null}, {"id": 566, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_physiology", "question": "In a patient with pulmonary embolism, what is the primary mechanism causing hypoxaemia?", "options": {"A": "V/Q mismatch (ventilation-perfusion mismatch)", "B": "Diffusion impairment", "C": "Hypoventilation", "D": "Right-to-left shunt", "E": "Reduced inspired oxygen concentration"}, "answer": "A", "explanation": "PE creates dead space (ventilated but unperfused lung). Reflex bronchoconstriction and redistribution of blood flow to other areas causes V/Q mismatch, which is the primary mechanism of hypoxaemia.", "diagram": null}, {"id": 567, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_asthma", "question": "A 25-year-old woman with asthma uses her salbutamol inhaler 4-5 times per week and wakes with cough 2-3 nights per month. Her FEV1 is 82% predicted. According to stepwise asthma management, what treatment should be added?", "options": {"A": "Continue salbutamol PRN only", "B": "Low-dose inhaled corticosteroid (e.g. budesonide 200 µg BD)", "C": "Long-acting beta-agonist alone", "D": "Oral prednisolone short course", "E": "Oral montelukast as monotherapy"}, "answer": "B", "explanation": "Symptoms >2 times/week or nocturnal symptoms indicate at least partly controlled asthma requiring regular low-dose inhaled corticosteroid as Step 2 therapy, rather than reliever-only management.", "diagram": null}, {"id": 568, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_gas_exchange", "question": "A patient has a markedly reduced DLCO (diffusing capacity for carbon monoxide) but normal spirometry and lung volumes. Which condition is most likely?", "options": {"A": "Asthma", "B": "Pulmonary vascular disease (e.g. pulmonary hypertension)", "C": "Obesity hypoventilation syndrome", "D": "Neuromuscular weakness", "E": "Chronic bronchitis"}, "answer": "B", "explanation": "Isolated reduced DLCO with normal spirometry and volumes suggests pulmonary vascular disease (reduced capillary blood volume) or early interstitial lung disease. Pulmonary hypertension impairs gas transfer without affecting airflow or volumes.", "diagram": null}, {"id": 569, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_pleural", "question": "A 45-year-old man presents with pleuritic chest pain and breathlessness. Chest X-ray shows a large right-sided pleural effusion. Diagnostic thoracentesis reveals: protein 48 g/L, LDH 650 U/L (serum LDH 280 U/L), pH 7.15, glucose 1.8 mmol/L. What is the most likely diagnosis?", "options": {"A": "Transudative effusion from heart failure", "B": "Empyema", "C": "Malignant effusion", "D": "Parapneumonic effusion (uncomplicated)", "E": "Tuberculous pleurisy"}, "answer": "B", "explanation": "Exudative effusion (protein >30, LDH ratio >0.6) with pH <7.2 and glucose <2.2 mmol/L indicates complicated parapneumonic effusion/empyema requiring intercostal drain insertion.", "diagram": null}, {"id": 570, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_sleep", "question": "A 50-year-old man with BMI 38 kg/m² reports excessive daytime sleepiness, witnessed apnoeas, and morning headaches. Epworth Sleepiness Scale is 16/24. Polysomnography shows AHI 42 events/hour. What is the first-line treatment?", "options": {"A": "Mandibular advancement device", "B": "Continuous positive airway pressure (CPAP)", "C": "Weight loss and positional therapy only", "D": "Uvulopalatopharyngoplasty", "E": "Supplemental nocturnal oxygen"}, "answer": "B", "explanation": "CPAP is first-line therapy for moderate-severe obstructive sleep apnoea (AHI >15). It acts as a pneumatic splint, preventing upper airway collapse during sleep. Weight loss is adjunctive.", "diagram": null}, {"id": 571, "specialty": "respiratory_sleep", "tag": "medical_science_respiratory_sleep_lung_anatomy", "question": "Which cell type is responsible for producing surfactant in the alveoli?", "options": {"A": "Type I pneumocytes", "B": "Type II pneumocytes", "C": "Clara (Club) cells", "D": "Alveolar macrophages", "E": "Goblet cells"}, "answer": "B", "explanation": "Type II pneumocytes produce surfactant (dipalmitoylphosphatidylcholine), which reduces alveolar surface tension and prevents collapse. They also serve as progenitor cells for type I pneumocytes.", "diagram": null}, {"id": 572, "specialty": "respiratory_sleep", "tag": "clinical_science_respiratory_sleep_ild", "question": "A 65-year-old man presents with progressive breathlessness over 2 years and fine bibasal inspiratory crackles. HRCT shows bilateral subpleural honeycombing, traction bronchiectasis, and minimal ground-glass opacity. What is the most likely diagnosis?", "options": {"A": "Nonspecific interstitial pneumonia (NSIP)", "B": "Idiopathic pulmonary fibrosis (IPF/UIP pattern)", "C": "Hypersensitivity pneumonitis", "D": "Sarcoidosis", "E": "Cryptogenic organising pneumonia (COP)"}, "answer": "B", "explanation": "Bilateral subpleural honeycombing with traction bronchiectasis in a UIP (usual interstitial pneumonia) pattern on HRCT in an older male is diagnostic of IPF without the need for biopsy.", "diagram": null}, {"id": 573, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_ra", "question": "A 45-year-old woman presents with 4 months of symmetrical small joint polyarthritis affecting MCPs and PIPs bilaterally, 90 minutes of morning stiffness, and fatigue. RF is positive (85 IU/mL) and anti-CCP is strongly positive (>300 U/mL). CRP 42 mg/L. X-rays show periarticular osteopenia and marginal erosions in the 2nd and 3rd MCPs bilaterally. What is the most appropriate initial DMARD therapy?", "options": {"A": "Hydroxychloroquine monotherapy", "B": "Methotrexate 15 mg weekly with folic acid", "C": "Sulfasalazine 1 g BD", "D": "Adalimumab (anti-TNF) as first-line", "E": "Leflunomide 20 mg daily"}, "answer": "B", "explanation": "Methotrexate is the anchor DMARD and recommended first-line therapy for rheumatoid arthritis by EULAR and ACR guidelines. It should be commenced early (within 3 months of symptom onset) at an adequate dose (15 mg/week, escalating to 25 mg). Folic acid supplementation reduces side effects. Biologic DMARDs are reserved for inadequate response to conventional DMARDs.", "diagram": null}, {"id": 574, "specialty": "rheumatology", "tag": "medical_science_rheumatology_sle", "question": "A 28-year-old woman with SLE on hydroxychloroquine and prednisolone presents with proteinuria (3.5 g/day), active urinary sediment (RBC casts), and creatinine 130 µmol/L. Renal biopsy shows diffuse proliferative glomerulonephritis (ISN/RPS Class IV). C3 and C4 are low. Anti-dsDNA is elevated. What is the most appropriate induction therapy?", "options": {"A": "Mycophenolate mofetil 3 g/day with corticosteroids", "B": "High-dose corticosteroids alone", "C": "Cyclophosphamide (Euro-Lupus protocol) with corticosteroids", "D": "Belimumab with hydroxychloroquine", "E": "Cyclophosphamide (NIH protocol) with corticosteroids"}, "answer": "A", "explanation": "For Class IV lupus nephritis, both mycophenolate mofetil and cyclophosphamide are effective induction therapies. Current EULAR/ERA-EDTA guidelines recommend MMF as preferred first-line due to comparable efficacy with a better safety profile (fewer infections, preserved fertility). The ALMS trial demonstrated non-inferiority of MMF to cyclophosphamide.", "diagram": null}, {"id": 575, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_gout", "question": "A 62-year-old man with CKD stage 3 (eGFR 38 mL/min) presents with acute monoarthritis of the first MTP joint. Joint aspirate confirms negatively birefringent monosodium urate crystals. He has a documented NSAID allergy (anaphylaxis) and is on warfarin. What is the most appropriate acute treatment?", "options": {"A": "Prednisolone 30 mg daily for 5 days", "B": "Colchicine 0.5 mg TDS", "C": "Intra-articular corticosteroid injection", "D": "Anakinra 100 mg SC daily for 3 days", "E": "Febuxostat 80 mg daily"}, "answer": "C", "explanation": "Intra-articular corticosteroid injection is the optimal choice for acute monoarticular gout when NSAIDs are contraindicated (allergy, CKD, anticoagulation). It provides rapid, targeted relief without systemic side effects. Oral prednisolone is an alternative but carries more systemic effects. Colchicine requires dose reduction in CKD and may interact with warfarin via CYP3A4.", "diagram": null}, {"id": 576, "specialty": "rheumatology", "tag": "medical_science_rheumatology_spondyloarthritis", "question": "A 25-year-old man presents with 2 years of inflammatory low back pain (worse with rest, improves with exercise, morning stiffness >30 minutes). MRI of sacroiliac joints shows bilateral bone marrow oedema. HLA-B27 is positive. CRP is elevated. X-rays of sacroiliac joints are normal. What is the diagnosis according to ASAS criteria?", "options": {"A": "Ankylosing spondylitis", "B": "Non-radiographic axial spondyloarthritis", "C": "Mechanical low back pain", "D": "Reactive arthritis", "E": "Apremilast 30 mg BD"}, "answer": "B", "explanation": "Under ASAS classification criteria, this patient has axial spondyloarthritis meeting the imaging arm (sacroiliitis on MRI) plus one SpA feature (HLA-B27 positive). As plain X-rays are normal (no structural sacroiliitis), the correct classification is non-radiographic axial SpA. Ankylosing spondylitis requires radiographic sacroiliitis on X-ray (modified New York criteria).", "diagram": null}, {"id": 577, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_vasculitis", "question": "A 72-year-old woman presents with new-onset severe temporal headache, jaw claudication, and visual blurring in her right eye. ESR is 95 mm/hr, CRP 85 mg/L, platelets 480 x10^9/L. Temporal artery biopsy shows transmural granulomatous inflammation with giant cells. What is the most appropriate immediate management?", "options": {"A": "Prednisolone 40 mg daily", "B": "IV methylprednisolone 1 g daily for 3 days followed by oral prednisolone", "C": "Prednisolone 60 mg daily", "D": "Tocilizumab 162 mg SC weekly", "E": "Methotrexate 20 mg weekly with tocilizumab"}, "answer": "B", "explanation": "Giant cell arteritis with visual symptoms (threatened visual loss) is an ophthalmic emergency requiring IV methylprednisolone pulses (1 g/day for 3 days) to prevent irreversible bilateral blindness. Oral steroids alone provide insufficient drug levels for this urgency. Tocilizumab (GiACTA trial) is used as a steroid-sparing agent in maintenance, not acute management.", "diagram": null}, {"id": 578, "specialty": "rheumatology", "tag": "medical_science_rheumatology_myositis", "question": "A 55-year-old woman presents with progressive proximal muscle weakness over 3 months. CK is 8500 U/L. EMG shows myopathic changes. Anti-Jo-1 antibodies are positive. She also has interstitial lung disease on HRCT, Raynaud phenomenon, and mechanic's hands. What syndrome does this constellation describe?", "options": {"A": "Dermatomyositis with overlap features", "B": "Antisynthetase syndrome", "C": "Inclusion body myositis", "D": "Polymyositis with secondary lung involvement", "E": "High-dose IV immunoglobulin"}, "answer": "B", "explanation": "Antisynthetase syndrome is characterised by myositis, interstitial lung disease, arthritis, Raynaud phenomenon, mechanic's hands, and fever, with positive antisynthetase antibodies (anti-Jo-1 being the most common). It is a distinct entity from pure dermatomyositis or polymyositis and has specific treatment and prognostic implications.", "diagram": null}, {"id": 579, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_scleroderma", "question": "A 48-year-old woman with limited cutaneous systemic sclerosis (positive anti-centromere antibody) develops progressive exertional dyspnoea. Echocardiogram estimates PA systolic pressure at 55 mmHg. Right heart catheterisation confirms mean PAP 38 mmHg with PAWP 12 mmHg and PVR 6 Wood units. What is the diagnosis?", "options": {"A": "Left heart disease with secondary pulmonary hypertension", "B": "Pulmonary arterial hypertension", "C": "Pulmonary hypertension due to interstitial lung disease", "D": "Chronic thromboembolic pulmonary hypertension", "E": "Bosentan for digital ulcers"}, "answer": "B", "explanation": "Right heart catheterisation confirms pre-capillary pulmonary hypertension (mean PAP >20 mmHg, PAWP ≤15 mmHg, PVR >2 WU). In the context of limited cutaneous SSc with anti-centromere antibodies, this is Group 1 pulmonary arterial hypertension (PAH). PAH is a leading cause of death in lcSSc. Annual screening with echocardiography is recommended.", "diagram": null}, {"id": 580, "specialty": "rheumatology", "tag": "medical_science_rheumatology_crystal", "question": "A 65-year-old woman presents with acute knee arthritis. Synovial fluid analysis shows positively birefringent rhomboid crystals under polarised light microscopy. What is the crystal composition?", "options": {"A": "Monosodium urate", "B": "Calcium pyrophosphate dihydrate", "C": "Hydroxyapatite", "D": "Calcium oxalate", "E": "Colchicine 0.5 mg BD for prophylaxis"}, "answer": "B", "explanation": "Calcium pyrophosphate dihydrate (CPPD) crystals are positively birefringent and typically rhomboid-shaped under compensated polarised light microscopy. This contrasts with monosodium urate crystals (gout), which are negatively birefringent and needle-shaped. CPPD deposition disease (pseudogout) commonly affects the knee and is associated with chondrocalcinosis on X-ray.", "diagram": null}, {"id": 581, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_osteoporosis", "question": "A 65-year-old postmenopausal woman sustains a vertebral compression fracture after minimal trauma. DEXA scan shows T-score -3.2 at lumbar spine. She has a history of oesophageal stricture and cannot take oral bisphosphonates. Calcium and vitamin D levels are replete. What is the most appropriate first-line therapy?", "options": {"A": "Denosumab 60 mg SC 6-monthly", "B": "IV zoledronic acid 5 mg annually", "C": "Teriparatide 20 µg SC daily", "D": "Raloxifene 60 mg daily", "E": "Teriparatide 20 µg SC daily"}, "answer": "B", "explanation": "IV zoledronic acid is the appropriate first-line alternative when oral bisphosphonates are contraindicated (oesophageal disease). It provides equivalent fracture reduction with annual dosing. Denosumab is an alternative but has rebound vertebral fracture risk on cessation. Teriparatide is reserved for very severe osteoporosis or bisphosphonate failure.", "diagram": null}, {"id": 582, "specialty": "rheumatology", "tag": "medical_science_rheumatology_immunology", "question": "A 40-year-old man with ankylosing spondylitis has an inadequate response to two different NSAIDs and physiotherapy over 3 months. His BASDAI score is 6.5 and CRP remains elevated. What is the most appropriate next-line therapy?", "options": {"A": "Methotrexate 20 mg weekly", "B": "Sulfasalazine 2 g daily", "C": "TNF inhibitor (adalimumab or etanercept)", "D": "IL-17A inhibitor (secukinumab)", "E": "Baricitinib (JAK inhibitor)"}, "answer": "C", "explanation": "TNF inhibitors are first-line biologic therapy for axial spondyloarthritis with inadequate NSAID response (ASAS-EULAR recommendations). Conventional DMARDs (methotrexate, sulfasalazine) are ineffective for axial disease. IL-17A inhibitors (secukinumab, ixekizumab) are an alternative first-line biologic but TNF inhibitors have longer track record and more evidence.", "diagram": null}, {"id": 583, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_psoriatic", "question": "A 38-year-old man with psoriasis presents with asymmetric oligoarthritis affecting the right knee and left 3rd DIP joint, with dactylitis of the left 4th toe and nail pitting. He has no axial symptoms. What pattern of psoriatic arthritis does this represent?", "options": {"A": "Symmetric polyarthritis", "B": "Oligoarticular (asymmetric)", "C": "Distal predominant", "D": "Arthritis mutilans", "E": "Ustekinumab (anti-IL-12/23)"}, "answer": "B", "explanation": "This presentation with fewer than 5 joints involved asymmetrically (knee and single DIP), with dactylitis, is most consistent with the oligoarticular (asymmetric) pattern of psoriatic arthritis. While DIP involvement is present, the predominant pattern is oligoarticular. Dactylitis and nail disease are characteristic features of PsA.", "diagram": null}, {"id": 584, "specialty": "rheumatology", "tag": "medical_science_rheumatology_antiphospholipid", "question": "A 30-year-old woman presents with her third consecutive first-trimester miscarriage. She has livedo reticularis. Lupus anticoagulant is positive on two occasions 14 weeks apart. Anti-cardiolipin IgG is strongly positive. aPTT is prolonged. What is the most appropriate management for her next pregnancy?", "options": {"A": "Low-dose aspirin alone", "B": "Prophylactic LMWH alone", "C": "Low-dose aspirin plus prophylactic LMWH throughout pregnancy", "D": "Warfarin throughout pregnancy", "E": "Hydroxychloroquine 200 mg BD"}, "answer": "C", "explanation": "Obstetric antiphospholipid syndrome with recurrent miscarriage is managed with combination low-dose aspirin (commenced preconception) plus prophylactic-dose LMWH (from positive pregnancy test). This combination significantly improves live birth rates compared to aspirin alone. Warfarin is teratogenic and contraindicated in the first trimester.", "diagram": null}, {"id": 585, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_pmr", "question": "A 72-year-old woman presents with 6 weeks of bilateral shoulder and hip girdle pain with stiffness lasting 2 hours each morning. She cannot raise her arms above her head. CRP 65 mg/L, ESR 78 mm/hr. CK is normal. No temporal headache or visual symptoms. What is the most appropriate initial treatment?", "options": {"A": "Prednisolone 15 mg daily", "B": "Prednisolone 60 mg daily", "C": "Methotrexate 15 mg weekly", "D": "Ibuprofen 400 mg TDS", "E": "Tocilizumab 8 mg/kg IV monthly"}, "answer": "A", "explanation": "Polymyalgia rheumatica is treated with low-dose prednisolone (12.5-25 mg/day, typically 15 mg). A dramatic response within 1-3 days is characteristic and supports the diagnosis. Higher doses (40-60 mg) suggest GCA or an alternative diagnosis. NSAIDs alone are insufficient. Methotrexate is reserved as a steroid-sparing agent for relapsing disease.", "diagram": null}, {"id": 586, "specialty": "rheumatology", "tag": "medical_science_rheumatology_connective_tissue", "question": "A 35-year-old woman presents with Raynaud phenomenon, swollen fingers, sclerodactyly, myositis, and arthritis. Anti-U1 RNP antibody is positive at high titre. ANA is positive (speckled pattern). Anti-dsDNA and anti-Sm are negative. What is the most likely diagnosis?", "options": {"A": "Systemic lupus erythematosus", "B": "Mixed connective tissue disease", "C": "Systemic sclerosis", "D": "Overlap myositis", "E": "Azathioprine 2 mg/kg/day"}, "answer": "B", "explanation": "Mixed connective tissue disease (MCTD) is characterised by features overlapping SLE, systemic sclerosis, and myositis, with high-titre anti-U1 RNP antibodies as the serological hallmark. Raynaud phenomenon is almost universal. The absence of anti-dsDNA and anti-Sm helps distinguish MCTD from SLE.", "diagram": null}, {"id": 587, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_septic_arthritis", "question": "A 55-year-old man with diabetes presents with an acutely swollen, hot, tender right knee. He is febrile (38.8°C). Synovial fluid: WCC 85,000 cells/µL (>90% neutrophils), no crystals seen, Gram stain shows Gram-positive cocci in clusters. Blood cultures are pending. What is the most appropriate management?", "options": {"A": "IV flucloxacillin and urgent arthroscopic washout", "B": "Oral flucloxacillin and outpatient follow-up", "C": "IV vancomycin pending culture results", "D": "Joint aspiration alone and IV ceftriaxone", "E": "Ceftriaxone 2 g IV daily"}, "answer": "A", "explanation": "Septic arthritis requires urgent joint washout (arthroscopic or open) combined with empiric IV antibiotics targeting Staphylococcus aureus (the most common causative organism). Gram-positive cocci in clusters suggest S. aureus; flucloxacillin is first-line unless MRSA risk factors present. Delay in surgical drainage worsens outcomes.", "diagram": null}, {"id": 588, "specialty": "rheumatology", "tag": "medical_science_rheumatology_biologics", "question": "A 50-year-old man with rheumatoid arthritis on methotrexate and adalimumab develops reactivation tuberculosis. He had a negative QuantiFERON-Gold test before starting biologic therapy 2 years ago. What is the mechanism by which TNF inhibitors increase TB risk?", "options": {"A": "Direct suppression of T-cell proliferation", "B": "Disruption of granuloma formation and maintenance", "C": "Inhibition of macrophage phagocytosis", "D": "Reduction in neutrophil chemotaxis", "E": "Isoniazid prophylaxis before starting biologic"}, "answer": "B", "explanation": "TNF-α is critical for granuloma formation and maintenance, which is the primary host defence mechanism for containing Mycobacterium tuberculosis. TNF inhibitors disrupt granuloma integrity, allowing reactivation of latent TB. This is why pre-biologic screening for latent TB (QuantiFERON or tuberculin skin test) is mandatory, though false negatives can occur.", "diagram": null}, {"id": 589, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_behcets", "question": "A 30-year-old Turkish man presents with recurrent oral ulcers (6 episodes/year), genital ulcers, anterior uveitis, and erythema nodosum. Pathergy test is positive. What is the most likely diagnosis?", "options": {"A": "Reactive arthritis", "B": "Behçet disease", "C": "Crohn disease with extraintestinal manifestations", "D": "Herpes simplex with erythema multiforme", "E": "Colchicine 0.5 mg TDS"}, "answer": "B", "explanation": "Behçet disease is characterised by recurrent oral and genital ulceration, ocular inflammation (uveitis), skin manifestations (erythema nodosum, pseudofolliculitis), and positive pathergy test. It is most prevalent along the ancient Silk Road (Turkey, Middle East, East Asia). Pathergy test (papule >2mm at needle prick site at 24-48h) is relatively specific.", "diagram": null}, {"id": 590, "specialty": "rheumatology", "tag": "medical_science_rheumatology_bone", "question": "A 60-year-old man presents with progressive bone pain, skull enlargement, and hearing loss. ALP is 850 U/L (normal <130) with normal calcium, phosphate, and PTH. X-ray of the skull shows mixed lytic and sclerotic lesions with cortical thickening. What is the most likely diagnosis?", "options": {"A": "Multiple myeloma", "B": "Paget disease of bone", "C": "Primary hyperparathyroidism", "D": "Metastatic prostate cancer", "E": "IV zoledronic acid 5 mg annually"}, "answer": "B", "explanation": "Paget disease of bone presents with elevated ALP (bone turnover marker), normal calcium and phosphate, and characteristic X-ray findings of mixed lytic/sclerotic lesions with cortical thickening and bone enlargement. Skull, pelvis, and long bones are commonly affected. Complications include hearing loss (temporal bone involvement), nerve compression, and rarely osteosarcoma.", "diagram": null}, {"id": 591, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_anca_vasculitis", "question": "A 55-year-old man presents with haemoptysis, rapidly progressive renal failure (creatinine 380 µmol/L), and purpura. Urinalysis shows RBC casts. p-ANCA (MPO) is strongly positive. Renal biopsy shows pauci-immune crescentic glomerulonephritis. ANCA-associated vasculitis is diagnosed. What is the most likely specific diagnosis?", "options": {"A": "Granulomatosis with polyangiitis (GPA)", "B": "Microscopic polyangiitis (MPA)", "C": "Eosinophilic granulomatosis with polyangiitis (EGPA)", "D": "IgA vasculitis", "E": "Rituximab 1 g IV at day 0 and day 14"}, "answer": "B", "explanation": "Microscopic polyangiitis is the most common ANCA-associated vasculitis associated with p-ANCA/MPO. It presents with pulmonary-renal syndrome (pulmonary haemorrhage and crescentic GN) without the granulomatous upper airway involvement seen in GPA. GPA is more commonly associated with c-ANCA/PR3.", "diagram": null}, {"id": 592, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_juvenile", "question": "A 4-year-old girl presents with 3 months of persistent arthritis in both knees and the right ankle, daily spiking fevers to 40°C with a salmon-coloured evanescent rash, hepatosplenomegaly, and generalised lymphadenopathy. Ferritin is 12,000 µg/L. What is the most likely diagnosis?", "options": {"A": "Systemic juvenile idiopathic arthritis", "B": "Acute lymphoblastic leukaemia", "C": "Kawasaki disease", "D": "Familial Mediterranean fever", "E": "Anakinra 100 mg SC daily"}, "answer": "A", "explanation": "Systemic JIA (Still disease) presents with quotidian (daily spiking) fevers, evanescent salmon-coloured rash, arthritis, serositis, lymphadenopathy, and hepatosplenomegaly. Markedly elevated ferritin is characteristic and raises concern for macrophage activation syndrome (MAS), a life-threatening complication. IL-1 and IL-6 inhibitors are now first-line biologic therapy.", "diagram": null}, {"id": 593, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_fibromyalgia", "question": "A 42-year-old woman presents with widespread musculoskeletal pain for 6 months, fatigue, non-restorative sleep, and cognitive difficulties. Examination reveals multiple tender points but no joint swelling. All blood tests including inflammatory markers, autoantibodies, and thyroid function are normal.\nWhat is the most likely diagnosis?", "options": {"A": "Rheumatoid arthritis", "B": "Systemic lupus erythematosus", "C": "Fibromyalgia", "D": "Polymyalgia rheumatica", "E": "Polymyalgia rheumatica"}, "answer": "C", "explanation": "Fibromyalgia is a chronic widespread pain syndrome characterised by pain, fatigue, non-restorative sleep, and cognitive dysfunction ('fibro fog') in the absence of inflammatory or structural pathology. Diagnosis is clinical — the 2010/2011 ACR criteria use the Widespread Pain Index (WPI) and Symptom Severity Scale (SSS) rather than formal tender point examination. Normal inflammatory markers and autoantibodies help exclude inflammatory conditions. Management is multimodal: patient education, graded exercise, cognitive behavioural therapy, and pharmacotherapy (amitriptyline, duloxetine, pregabalin). Opioids and NSAIDs are generally ineffective and should be avoided.", "diagram": null}, {"id": 594, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_osteoarthritis", "question": "A 65-year-old overweight woman presents with pain and stiffness in both knees, worse after activity and at the end of the day, with brief morning stiffness (<30 minutes). X-rays show joint space narrowing, osteophytes, subchondral sclerosis, and subchondral cysts.\nWhich management approach has the STRONGEST evidence for symptom improvement?", "options": {"A": "Disease-modifying antirheumatic drugs (DMARDs)", "B": "Weight loss combined with exercise therapy", "C": "Long-term oral corticosteroids", "D": "Glucosamine and chondroitin supplementation", "E": "Disease-modifying antirheumatic drugs (DMARDs)"}, "answer": "B", "explanation": "Osteoarthritis (OA) is the most common joint disease. Unlike inflammatory arthritis, there are no DMARDs for OA. The strongest evidence for symptom improvement is for weight loss (5-10% of body weight) combined with regular exercise (strengthening, aerobic, and aquatic). Paracetamol has limited efficacy; topical NSAIDs are preferred over oral NSAIDs due to lower systemic side effects. Intra-articular corticosteroid injections provide short-term relief. Glucosamine/chondroitin evidence is inconsistent. Total joint replacement is considered for severe, refractory cases. OA is characterised by mechanical pain (worse with use, better with rest), brief morning stiffness, and characteristic radiographic findings.", "diagram": null}, {"id": 595, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_sjogren", "question": "A 48-year-old woman presents with dry eyes requiring frequent artificial tears, dry mouth with difficulty swallowing dry food, fatigue, and bilateral parotid gland enlargement. Blood tests show positive anti-Ro (SSA) and anti-La (SSB) antibodies, elevated ESR, and hypergammaglobulinaemia.\nWhat is the most serious long-term complication of this condition?", "options": {"A": "Dental caries", "B": "Corneal ulceration", "C": "B-cell non-Hodgkin lymphoma", "D": "Osteoporosis", "E": "Dental caries from xerostomia"}, "answer": "C", "explanation": "Sjögren syndrome is a chronic autoimmune condition characterised by lymphocytic infiltration of exocrine glands (salivary and lacrimal), causing sicca symptoms (dry eyes and dry mouth). Anti-Ro/SSA and anti-La/SSB antibodies are characteristic. The most serious long-term complication is B-cell non-Hodgkin lymphoma (particularly MALT lymphoma), occurring in approximately 5% of patients — a 15-20 fold increased risk. Warning signs include persistent parotid enlargement, lymphadenopathy, and falling immunoglobulin levels. Systemic manifestations can include interstitial lung disease, renal tubular acidosis, peripheral neuropathy, and vasculitis. Management is primarily symptomatic for sicca symptoms, with immunosuppression for systemic disease.", "diagram": null}, {"id": 596, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_ra", "question": "A 45-year-old woman is diagnosed with rheumatoid arthritis (positive anti-CCP, RF positive, erosions on hand X-ray). She has no contraindications to treatment. What is the most appropriate initial disease-modifying therapy?", "options": {"A": "Prednisolone 25 mg daily as monotherapy", "B": "Methotrexate 15 mg weekly with folic acid", "C": "Adalimumab 40 mg fortnightly", "D": "Hydroxychloroquine 200 mg BD alone", "E": "Sulfasalazine 1 g BD as monotherapy"}, "answer": "B", "explanation": "Methotrexate is the first-line DMARD for rheumatoid arthritis. It should be commenced early in erosive disease. Biologics are reserved for inadequate response to conventional DMARDs.", "diagram": null}, {"id": 597, "specialty": "rheumatology", "tag": "medical_science_rheumatology_pathophysiology", "question": "Which autoantibody is most specific for systemic lupus erythematosus?", "options": {"A": "Antinuclear antibody (ANA)", "B": "Anti-double-stranded DNA (anti-dsDNA)", "C": "Rheumatoid factor (RF)", "D": "Anti-Ro (SSA)", "E": "Anti-Smith (anti-Sm)"}, "answer": "B", "explanation": "Anti-dsDNA antibodies are highly specific for SLE (>95% specificity) and correlate with disease activity, particularly lupus nephritis. ANA is sensitive but not specific (positive in many conditions).", "diagram": null}, {"id": 598, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_gout", "question": "A 58-year-old man with recurrent gout (4 attacks/year) and tophaceous deposits is commenced on allopurinol. He develops an acute gout flare 3 weeks into therapy. What is the most appropriate management of the flare?", "options": {"A": "Increase allopurinol dose to treat the flare", "B": "Cease allopurinol and treat flare with colchicine or NSAID", "C": "Continue allopurinol and treat flare with colchicine or NSAID", "D": "Switch to febuxostat", "E": "Add probenecid to the allopurinol"}, "answer": "C", "explanation": "Allopurinol should NOT be stopped during an acute flare, as fluctuations in urate levels can prolong or worsen attacks. The flare should be treated with colchicine, NSAIDs, or corticosteroids while continuing urate-lowering therapy.", "diagram": null}, {"id": 599, "specialty": "rheumatology", "tag": "medical_science_rheumatology_immunology", "question": "Which cytokine is the primary target of tocilizumab, used in the treatment of rheumatoid arthritis and giant cell arteritis?", "options": {"A": "TNF-alpha", "B": "IL-1", "C": "IL-6", "D": "IL-17", "E": "IL-23"}, "answer": "C", "explanation": "Tocilizumab is a monoclonal antibody against the IL-6 receptor. IL-6 drives systemic inflammation, acute phase response, and joint destruction in RA. It is also first-line biologic for GCA.", "diagram": null}, {"id": 600, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_vasculitis", "question": "A 72-year-old woman presents with new-onset temporal headache, jaw claudication, and visual disturbance. ESR is 92 mm/hr, CRP 85 mg/L. What is the most appropriate immediate management before temporal artery biopsy?", "options": {"A": "Await biopsy results before starting treatment", "B": "Commence high-dose prednisolone (1 mg/kg) immediately", "C": "Commence methotrexate 15 mg weekly", "D": "Oral ibuprofen 400 mg TDS for symptom relief", "E": "Tocilizumab alone without corticosteroids"}, "answer": "B", "explanation": "Giant cell arteritis with visual symptoms is a medical emergency. High-dose corticosteroids (prednisolone 1 mg/kg or IV methylprednisolone if vision loss) must be started immediately — do not delay for biopsy, which remains positive for 1-2 weeks after steroid initiation.", "diagram": null}, {"id": 601, "specialty": "rheumatology", "tag": "clinical_science_rheumatology_sle", "question": "A 28-year-old woman with SLE develops nephrotic-range proteinuria and active urinary sediment. Renal biopsy shows class IV diffuse proliferative lupus nephritis. Anti-dsDNA is elevated, C3 and C4 are low. What is the most appropriate induction therapy?", "options": {"A": "Hydroxychloroquine and low-dose prednisolone only", "B": "Mycophenolate mofetil with corticosteroids", "C": "Azathioprine with corticosteroids", "D": "Rituximab monotherapy", "E": "Belimumab monotherapy"}, "answer": "B", "explanation": "Class IV lupus nephritis requires aggressive induction with either mycophenolate mofetil or cyclophosphamide plus corticosteroids. MMF is now preferred first-line due to comparable efficacy with better side-effect profile.", "diagram": null}, {"id": 602, "specialty": "rheumatology", "tag": "medical_science_rheumatology_joint", "question": "Monosodium urate crystals seen on polarised light microscopy of synovial fluid from a gouty joint appear as:", "options": {"A": "Positively birefringent rhomboid crystals", "B": "Negatively birefringent needle-shaped crystals", "C": "Non-birefringent amorphous crystals", "D": "Positively birefringent needle-shaped crystals", "E": "Weakly negatively birefringent rhomboid crystals"}, "answer": "B", "explanation": "MSU crystals in gout are needle-shaped and negatively birefringent (yellow when parallel to the compensator axis). CPPD crystals (pseudogout) are rhomboid and positively birefringent.", "diagram": null}];

  var SPECIALTIES = {"infectious_diseases": "Infectious Diseases", "gastroenterology": "Gastroenterology", "haematology": "Haematology", "cardiology": "Cardiology", "dermatology": "Dermatology", "endocrinology": "Endocrinology", "nephrology": "Nephrology", "neurology": "Neurology", "general_medicine": "General Medicine", "genetic_metabolic": "Genetic & Metabolic Medicine", "geriatric_medicine": "Geriatric Medicine", "immunology_allergy": "Immunology & Allergy", "medical_obstetrics": "Medical Obstetrics", "medical_oncology": "Medical Oncology", "palliative_medicine": "Palliative Medicine", "pharmacology_toxicology": "Pharmacology & Toxicology", "respiratory_sleep": "Respiratory & Sleep Medicine", "rheumatology": "Rheumatology"};

  var LEVELS = [
    {title:'Medical Student', min:0},
    {title:'Intern', min:100},
    {title:'Resident', min:300},
    {title:'Registrar', min:600},
    {title:'Advanced Trainee', min:1000},

  var XP_CORRECT = 10;

  var S = loadS();
  var quizState = null;

  function initS() {
    return { answers:{}, xp:0, streak:0, lastDate:null, dailyCount:0, dailyDate:null, achievements:{} };
  }
  function loadS() {
    try {
      var r = localStorage.getItem('bpt5');
      if (r) {
        var parsed = JSON.parse(r);
        if (!parsed.achievements) parsed.achievements = {};
        return parsed;
      }
    } catch(e) {}
    return initS();
  }
  function saveS() {
    try { localStorage.setItem('bpt5', JSON.stringify(S)); } catch(e) {}
  }
  function todayStr() { return new Date().toISOString().slice(0,10); }
  function updateStreak() {
    var today = todayStr();
    if (S.lastDate === today) return;
    var yest = new Date(Date.now()-86400000).toISOString().slice(0,10);
    S.streak = (S.lastDate === yest) ? S.streak + 1 : 1;
    S.lastDate = today;
  }
  function bumpDaily() {
    var today = todayStr();
    if (S.dailyDate !== today) { S.dailyDate = today; S.dailyCount = 0; }
    S.dailyCount++;
  }
  function getLevel(xp) {
    var lv = LEVELS[0];
    for (var i = LEVELS.length-1; i >= 0; i--) { if (xp >= LEVELS[i].min) { lv = LEVELS[i]; break; } }
    return lv;
  }
  function getNextLevel(xp) {
    for (var i = 0; i < LEVELS.length; i++) { if (LEVELS[i].min > xp) return LEVELS[i]; }
    return null;
  }

  // Split tag into category and subtopic
  function tagParts(tag) {
    var p = tag.split('_');
    // pattern: clinical_science_infectious_diseases_SUBTOPIC
    //          medical_science_infectious_diseases_SUBTOPIC
    var cat = p[0]; // 'clinical' or 'medical'
    var sub = p[p.length-1];
    return {
      category: cat === 'clinical' ? 'Clinical Science' : 'Medical Science',
      subtopic: sub.charAt(0).toUpperCase() + sub.slice(1)
    };
  }

  function getTopics() {
    var map = {};
    QUESTIONS.forEach(function(q) {
      if (!map[q.tag]) map[q.tag] = {tag:q.tag, total:0, done:0, correct:0};
      map[q.tag].total++;
      if (S.answers[q.id] !== undefined) {
        map[q.tag].done++;
        if (S.answers[q.id]) map[q.tag].correct++;
      }
    });
    return Object.values(map);
  }

  function updateNav() {
    var done = Object.keys(S.answers).length;
    var total = QUESTIONS.length;
    var txt = done + '/' + total + ' answered';
    if (S.streak > 0) txt += ' · ' + S.streak + 'd streak';
    document.getElementById('nav-info').textContent = txt;
  }

  // ---- ROUTING ----
  function showPage(name) {
    var main = document.getElementById('main');
    while (main.firstChild) main.removeChild(main.firstChild);
    document.onkeydown = null;
    updateNav();
    if (name === 'home') renderLanding();
    else if (name === 'topics') renderTopics();
    else if (name === 'quiz') renderQuiz();
    else if (name === 'progress') renderProgress();
  }

  // ---- LANDING ----
  function getSpecKeys() { return Object.keys(SPECIALTIES); }

    // Stats strip (compact)

  // ---- TOPICS ----
  function renderTopics() {
    var main = document.getElementById('main');

    var ptop = document.createElement('div'); ptop.className = 'progress-top';
    var back = document.createElement('button'); back.className = 'back-btn'; back.textContent = '← Back';
    back.addEventListener('click', function(){ showPage('home'); });
    var h2 = document.createElement('h2'); h2.textContent = 'Select a Topic';
    ptop.appendChild(back); ptop.appendChild(h2);
    main.appendChild(ptop);

    // Group topics: by specialty first, then by category (Clinical/Medical)
    var topics = getTopics();
    var specKeys = getSpecKeys();

    // If multiple specialties, group by specialty → category → topics
    // If single specialty, group by category directly
    var bySpec = {};
    topics.forEach(function(t){
      // Determine specialty from tag
      var tp = t.tag.split('_');
      var specKey = 'general';
      if (tp.indexOf('diseases') !== -1) {
        var di = tp.indexOf('diseases');
        specKey = tp[di-1] + '_diseases';
      } else if (tp.length > 2) {
        specKey = tp[2];
      }
      if (!bySpec[specKey]) bySpec[specKey] = {};
      var cat = tagParts(t.tag).category;
      if (!bySpec[specKey][cat]) bySpec[specKey][cat] = [];
      bySpec[specKey][cat].push(t);
    });

    // Sort each group alphabetically
    Object.keys(bySpec).forEach(function(sk){
      Object.keys(bySpec[sk]).forEach(function(cat){
        bySpec[sk][cat].sort(function(a,b){
          return tagParts(a.tag).subtopic.localeCompare(tagParts(b.tag).subtopic);
        });
      });
    });

    // Render
    specKeys.forEach(function(sk) {
      if (!bySpec[sk]) return;
      var cats = bySpec[sk];

      // Count total Qs in this specialty
      var specTotal = 0;
      var specDone = 0;
      Object.keys(cats).forEach(function(c){ cats[c].forEach(function(t){ specTotal += t.total; specDone += t.done; }); });

          updateStreak(); saveS();

        });

      specCard.appendChild(specInfo);

      // Category sections — collapsed by default

  }

  // ---- QUIZ ----
  function showModeModal(tag) {
    pendingTopic = tag;
    document.getElementById('modeModal').classList.add('active');
  }

  function startTopicWithMode(tag, mode) {
    var qs = QUESTIONS.filter(function(q){ return q.tag === tag; });
    var ordered;

    if (mode === 'random') {
      // Shuffle all questions from this topic
      ordered = qs.slice().sort(function(){ return Math.random() - 0.5; });
    } else {
      // Practice mode: unattempted first, then attempted
      var unattempted = qs.filter(function(q){ return S.answers[q.id] === undefined; });
      var attempted = qs.filter(function(q){ return S.answers[q.id] !== undefined; });
      ordered = unattempted.concat(attempted);
    }

    quizState = { tag:tag, questions:ordered, idx:0, selected:null, submitted:false, sessionXP:0, sessionCorrect:0, sessionWrong:[], mode:mode };
    updateStreak();
    saveS();
    showPage('quiz');
  }

  function startTopic(tag) {
    startTopicWithMode(tag, 'practice');
  }

    var barBg = document.createElement('div'); barBg.className = 'quiz-progress-bg';
    var barFill = document.createElement('div'); barFill.className = 'quiz-progress-fill';
    barFill.style.width = Math.round(idx/total*100) + '%';
    barBg.appendChild(barFill); barWrap.appendChild(barBg);

    var saveBadge = document.createElement('div');
    saveBadge.className = 'quiz-save-badge';
    var sdot = document.createElement('span'); sdot.className = 'save-dot';
    sdot.style.cssText = 'width:6px;height:6px;';
    saveBadge.appendChild(sdot);
    saveBadge.appendChild(document.createTextNode('Saved'));

    topBar.appendChild(homeLink);
    topBar.appendChild(counter);
    topBar.appendChild(barWrap);
    topBar.appendChild(saveBadge);
    main.appendChild(topBar);

    // Question card
    var qcard = document.createElement('div');
    qcard.className = 'q-card';

    var qtag = document.createElement('div');
    qtag.className = 'q-topic-tag';
    qtag.textContent = tagParts(q.tag).subtopic;
    qcard.appendChild(qtag);

    // Split question into vignette + stem (last sentence starting with question word)
    var qtext = q.question;
    // Try to split at the last line break or sentence that starts with a question
    var lines = qtext.split('\n');
    var stemLine = '';
    var vignette = qtext;
    if (lines.length > 1) {
      var last = lines[lines.length-1].trim();
      if (last.length > 10 && /^(What|Which|How|Who|Where|When|Select|Choose)/i.test(last)) {
        stemLine = last;
        vignette = lines.slice(0, lines.length-1).join('\n').trim();
      }
    }

    var vigEl = document.createElement('div');
    vigEl.className = 'q-vignette';
    vigEl.textContent = stemLine ? vignette : qtext;
    qcard.appendChild(vigEl);

    if (stemLine) {
      var stemEl = document.createElement('div');
      stemEl.className = 'q-stem';
      stemEl.textContent = stemLine;
      qcard.appendChild(stemEl);
    }

    // Diagram
    if (q.diagram && DIAGRAMS[q.diagram]) {
      var diagBox = document.createElement('div');
      diagBox.className = 'diagram-box';
      diagBox.innerHTML = DIAGRAMS[q.diagram];
      qcard.appendChild(diagBox);
    }

    // Options
    var opts = document.createElement('ul');
    opts.className = 'options-list';
    var letters = ['A','B','C','D','E'];
    letters.forEach(function(letter) {
      if (!q.options[letter]) return;
      var li = document.createElement('li');
      var btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.dataset.letter = letter;
      var lspan = document.createElement('span'); lspan.className = 'opt-letter'; lspan.textContent = letter;
      var tspan = document.createElement('span'); tspan.textContent = q.options[letter];
      btn.appendChild(lspan); btn.appendChild(tspan);
      (function(l){ btn.addEventListener('click', function(){ if (!quizState.submitted) selectOpt(l); }); })(letter);
      li.appendChild(btn); opts.appendChild(li);
    });
    qcard.appendChild(opts);

    // Keyboard hint
    var hint = document.createElement('div');
    hint.className = 'q-keyboard-hint';
    hint.textContent = 'Keyboard: A–E to select · Enter to submit';
    qcard.appendChild(hint);

    main.appendChild(qcard);

    // Submit button
    var sub = document.createElement('button');
    sub.className = 'btn-primary';
    sub.id = 'submit-btn';
    sub.textContent = 'Submit Answer';
    sub.disabled = true;
    var submitHandler = function(){ submitAns(q); };
    sub.addEventListener('click', submitHandler);
    sub._submitHandler = submitHandler;
    main.appendChild(sub);

    // Feedback
    var fb = document.createElement('div');
    fb.id = 'feedback';
    main.appendChild(fb);

    quizState.selected = null;
    quizState.submitted = false;

    // Keyboard handler
    document.onkeydown = function(e) {
      var key = e.key.toUpperCase();
      if (['A','B','C','D','E'].indexOf(key) !== -1 && !quizState.submitted) {
        if (q.options[key]) selectOpt(key);
      } else if (e.key === 'Enter') {
        var btn = document.getElementById('submit-btn');
        if (btn && !btn.disabled) btn.click();
      }
    };
  }

  function selectOpt(letter) {
    quizState.selected = letter;
    document.querySelectorAll('.opt-btn').forEach(function(b){
      b.classList.remove('selected');
      if (b.dataset.letter === letter) b.classList.add('selected');
    });
    document.getElementById('submit-btn').disabled = false;
  }

  function submitAns(q) {
    if (!quizState.selected || quizState.submitted) return;
    quizState.submitted = true;
    var sel = quizState.selected;
    var correct = (sel === q.answer);

    S.answers[q.id] = correct;
    bumpDaily();
    if (correct) {
      S.xp += XP_CORRECT;
      quizState.sessionXP += XP_CORRECT;
      quizState.sessionCorrect++;
    } else {
      quizState.sessionWrong.push({q:q, selected:sel});
    }
    updateNav();
    saveS();

    document.querySelectorAll('.opt-btn').forEach(function(b){
      b.disabled = true;
      if (b.dataset.letter === q.answer) b.classList.add('correct');
      else if (b.dataset.letter === sel && !correct) b.classList.add('wrong');
      b.classList.remove('selected');
    });

    var fbDiv = document.getElementById('feedback');
    var box = document.createElement('div');
    box.className = 'feedback-box ' + (correct ? 'correct-fb' : 'wrong-fb');
    var lbl = document.createElement('div'); lbl.className = 'fb-label';
    lbl.textContent = correct ? 'Correct' : 'Incorrect';
    box.appendChild(lbl);
    if (!correct) {
      var ans = document.createElement('div'); ans.className = 'fb-answer';
      ans.textContent = 'Correct answer: ' + q.answer + '. ' + q.options[q.answer];
      box.appendChild(ans);
    }
    var exp = document.createElement('p'); exp.textContent = q.explanation;
    box.appendChild(exp);

    // Report Error button — opens pre-filled Google Form
    var reportBtn = document.createElement('a');
    reportBtn.className = 'report-btn';
    reportBtn.textContent = 'Report error';
    reportBtn.target = '_blank';
    reportBtn.rel = 'noopener';
    var formUrl = 'https://docs.google.com/forms/d/e/1FAIpQLSd1UfeDUIt47vaKwrO5ftLwMT2g-2Om7wnGbZatiojTNTlYeg/viewform?usp=pp_url'
      + '&entry.304507661=' + encodeURIComponent('Q' + q.id)
      + '&entry.913413518=' + encodeURIComponent(SPECIALTIES[q.specialty] || q.specialty);
    reportBtn.href = formUrl;
    box.appendChild(reportBtn);

    fbDiv.appendChild(box);

    // Check achievements
    var newAch = checkAchievements();
    if (newAch.length > 0) {
      newAch.forEach(function(a){
        var achNote = document.createElement('div');
        achNote.style.cssText = 'background:#f1f8f1;border:1px solid #2e7d32;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:0.85rem;color:#2e7d32;font-weight:600;';
        achNote.textContent = 'Achievement unlocked: ' + a.name;
        fbDiv.appendChild(achNote);
      });
    }

    var submitBtn = document.getElementById('submit-btn');
    submitBtn.textContent = quizState.idx < quizState.questions.length - 1 ? 'Next Question' : 'View Results';
    submitBtn.disabled = false;
    submitBtn.removeEventListener('click', submitBtn._submitHandler);
    submitBtn.addEventListener('click', nextQ);

    // Update keyboard: Enter advances
    document.onkeydown = function(e) {
      if (e.key === 'Enter') nextQ();
    };
  }

  function nextQ() {
    quizState.idx++;
    showPage('quiz');
  }

  function checkAchievements() {
    var newlyUnlocked = [];
    ACHIEVEMENTS.forEach(function(a){
      if (!S.achievements[a.id] && a.check()) {
        S.achievements[a.id] = todayStr();
        newlyUnlocked.push(a);
      }
    });
    if (newlyUnlocked.length > 0) saveS();
    return newlyUnlocked;

  // ---- RADAR CHART ----
  function getSpecStats() {
    var stats = {};
    var specKeys = Object.keys(SPECIALTIES);
    specKeys.forEach(function(sk){
      stats[sk] = { total:0, done:0, correct:0 };
    });
    QUESTIONS.forEach(function(q){
      if (stats[q.specialty]) {
        stats[q.specialty].total++;
        if (S.answers[q.id] !== undefined) {
          stats[q.specialty].done++;
          if (S.answers[q.id]) stats[q.specialty].correct++;
        }
      }
    });
    return stats;
  }

  function renderRadar(container) {
    var stats = getSpecStats();
    var specKeys = Object.keys(SPECIALTIES);
    var n = specKeys.length;

    // Subtitle
    var sub = document.createElement('p');
    sub.className = 'radar-subtitle';
    sub.textContent = 'Coverage shows questions attempted; accuracy shows correctness of those attempted.';
    container.appendChild(sub);

    if (n < 3) {
      var p = document.createElement('p');
      p.style.cssText = 'font-size:0.85rem;color:var(--muted);text-align:center;padding:20px;';
      p.textContent = 'Radar chart will appear when 3+ specialties are available (' + n + ' currently).';
      container.appendChild(p);
      return;
    }

    // Dynamic sizing based on number of specialties
    var size = Math.max(320, Math.min(420, 260 + n * 20));
    var cx = size / 2;
    var cy = size / 2;
    var radius = size * 0.34;
    var labelPad = Math.max(28, 18 + n * 2);
    var angleStep = (2 * Math.PI) / n;

    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', size + 20);
    svg.setAttribute('viewBox', '0 0 ' + size + ' ' + (size + 20));
    svg.setAttribute('class', 'radar-svg');
    svg.style.maxWidth = size + 'px';

    // Grid rings with % labels
    [0.25, 0.5, 0.75, 1.0].forEach(function(ring){
      var pts = [];
      for (var i = 0; i < n; i++) {
        var angle = -Math.PI/2 + i * angleStep;
        pts.push((cx + radius * ring * Math.cos(angle)).toFixed(1) + ',' + (cy + radius * ring * Math.sin(angle)).toFixed(1));
      }
      var poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      poly.setAttribute('points', pts.join(' '));
      poly.setAttribute('fill', ring === 1.0 ? 'rgba(0,0,0,0.015)' : 'none');
      poly.setAttribute('stroke', '#d8dde6');
      poly.setAttribute('stroke-width', ring === 1.0 ? '1.2' : '0.6');
      if (ring < 1.0) poly.setAttribute('stroke-dasharray', '3,3');
      svg.appendChild(poly);

      // Ring percentage label on first axis
      var ringLbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      ringLbl.setAttribute('x', (cx + 3).toFixed(1));
      ringLbl.setAttribute('y', (cy - radius * ring - 2).toFixed(1));
      ringLbl.setAttribute('font-size', '8'); ringLbl.setAttribute('fill', '#aab3be');
      ringLbl.textContent = Math.round(ring * 100) + '%';
      svg.appendChild(ringLbl);
    });

    // Axes and labels
    for (var i = 0; i < n; i++) {
      var angle = -Math.PI/2 + i * angleStep;
      var x2 = cx + radius * Math.cos(angle);
      var y2 = cy + radius * Math.sin(angle);
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', cx); line.setAttribute('y1', cy);
      line.setAttribute('x2', x2.toFixed(1)); line.setAttribute('y2', y2.toFixed(1));
      line.setAttribute('stroke', '#d8dde6'); line.setAttribute('stroke-width', '0.6');
      svg.appendChild(line);

      // Label — position dynamically, wrap long names
      var lx = cx + (radius + labelPad) * Math.cos(angle);
      var ly = cy + (radius + labelPad) * Math.sin(angle);
      var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', lx.toFixed(1)); text.setAttribute('y', ly.toFixed(1));
      text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
      text.setAttribute('font-size', n > 8 ? '9' : '10.5');
      text.setAttribute('fill', '#4a5568'); text.setAttribute('font-weight', '600');
      var label = SPECIALTIES[specKeys[i]];
      // Smart wrap: if label has 2+ words and is long, split into 2 tspans
      var words = label.split(' ');
      if (words.length >= 2 && label.length > 12) {
        var mid = Math.ceil(words.length / 2);
        var line1 = words.slice(0, mid).join(' ');
        var line2 = words.slice(mid).join(' ');
        var ts1 = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
        ts1.setAttribute('x', lx.toFixed(1)); ts1.setAttribute('dy', '-0.5em');
        ts1.textContent = line1;
        var ts2 = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
        ts2.setAttribute('x', lx.toFixed(1)); ts2.setAttribute('dy', '1.15em');
        ts2.textContent = line2;
        text.appendChild(ts1); text.appendChild(ts2);
      } else {
        text.textContent = label;
      }
      svg.appendChild(text);
    }

    // Coverage polygon
    var covPts = [];
    for (var i = 0; i < n; i++) {
      var angle = -Math.PI/2 + i * angleStep;
      var sk = specKeys[i];
      var covVal = stats[sk].total > 0 ? stats[sk].done / stats[sk].total : 0;
      covPts.push((cx + radius * covVal * Math.cos(angle)).toFixed(1) + ',' + (cy + radius * covVal * Math.sin(angle)).toFixed(1));
    }
    var covPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    covPoly.setAttribute('points', covPts.join(' '));
    covPoly.setAttribute('fill', 'rgba(46,125,159,0.12)');
    covPoly.setAttribute('stroke', '#2e7d9f');
    covPoly.setAttribute('stroke-width', '2');
    svg.appendChild(covPoly);

    // Accuracy polygon
    var accPts = [];
    for (var i = 0; i < n; i++) {
      var angle = -Math.PI/2 + i * angleStep;
      var sk = specKeys[i];
      var accVal = stats[sk].done > 0 ? stats[sk].correct / stats[sk].done : 0;
      accPts.push((cx + radius * accVal * Math.cos(angle)).toFixed(1) + ',' + (cy + radius * accVal * Math.sin(angle)).toFixed(1));
    }
    var accPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    accPoly.setAttribute('points', accPts.join(' '));
    accPoly.setAttribute('fill', 'rgba(46,125,50,0.12)');
    accPoly.setAttribute('stroke', '#2e7d32');
    accPoly.setAttribute('stroke-width', '2');
    svg.appendChild(accPoly);

    // Data points with value labels
    for (var i = 0; i < n; i++) {
      var angle = -Math.PI/2 + i * angleStep;
      var sk = specKeys[i];
      var covVal = stats[sk].total > 0 ? stats[sk].done / stats[sk].total : 0;
      var accVal = stats[sk].done > 0 ? stats[sk].correct / stats[sk].done : 0;
      [{ val:covVal, color:'#2e7d9f' }, { val:accVal, color:'#2e7d32' }].forEach(function(d){
        if (d.val > 0) {
          var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.setAttribute('cx', (cx + radius * d.val * Math.cos(angle)).toFixed(1));
          dot.setAttribute('cy', (cy + radius * d.val * Math.sin(angle)).toFixed(1));
          dot.setAttribute('r', '3.5'); dot.setAttribute('fill', d.color);
          dot.setAttribute('stroke', '#fff'); dot.setAttribute('stroke-width', '1.5');
          svg.appendChild(dot);
        }
      });
    }

    container.appendChild(svg);

    // Legend
    var legend = document.createElement('div');
    legend.className = 'radar-legend';
    [{ color:'#2e7d9f', label:'Coverage (% attempted)' }, { color:'#2e7d32', label:'Accuracy (% correct)' }].forEach(function(l){
      var item = document.createElement('span');
      var dot = document.createElement('span');
      dot.className = 'radar-legend-dot';
      dot.style.backgroundColor = l.color;
      item.appendChild(dot);
      item.appendChild(document.createTextNode(l.label));
      legend.appendChild(item);
    });
    container.appendChild(legend);

    // Per-specialty numeric breakdown below chart
    var pctRow = document.createElement('div');
    pctRow.className = 'radar-pct-labels';
    specKeys.forEach(function(sk){
      var s = stats[sk];
      var covPct = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
      var accPct = s.done > 0 ? Math.round(s.correct / s.done * 100) : 0;
      var item = document.createElement('span');
      item.className = 'radar-pct-item';
      item.innerHTML = '<strong>' + (SPECIALTIES[sk].length > 16 ? SPECIALTIES[sk].substring(0, 14) + '..' : SPECIALTIES[sk]) + '</strong>: ' + covPct + '% / ' + accPct + '%';
      pctRow.appendChild(item);
    });
    container.appendChild(pctRow);
  }

  function renderAchievements(parent) {
    checkAchievements();
    var section = document.createElement('div');
    section.className = 'achievements-section';
    var h3 = document.createElement('h3');
    var unlocked = ACHIEVEMENTS.filter(function(a){ return S.achievements[a.id]; }).length;
    h3.textContent = 'Badges (' + unlocked + '/' + ACHIEVEMENTS.length + ')';
    section.appendChild(h3);

    var subText = document.createElement('p');
    subText.className = 'achievements-sub';
    subText.textContent = 'Collect badges inspired by the pioneers of medicine. Progress from Intern \u2192 Registrar \u2192 Consultant.';
    section.appendChild(subText);

    var tierLabels = { intern: 'Intern', registrar: 'Registrar', consultant: 'Consultant' };
    var tierColors = { intern: '#78909c', registrar: '#1976d2', consultant: '#f9a825' };
    var tierFills = { intern: '#90a4ae', registrar: '#42a5f5', consultant: '#fdd835' };

    ['intern', 'registrar', 'consultant'].forEach(function(tier){
      var tierAchs = ACHIEVEMENTS.filter(function(a){ return a.tier === tier; });
      if (tierAchs.length === 0) return;
      var tierUnlocked = tierAchs.filter(function(a){ return S.achievements[a.id]; }).length;
      var pct = Math.round(tierUnlocked / tierAchs.length * 100);

      // Tier header with progress bar
      var hdr = document.createElement('div');
      hdr.className = 'tier-header';
      var lbl = document.createElement('span');
      lbl.className = 'tier-label';
      lbl.style.color = tierColors[tier];
      lbl.textContent = tierLabels[tier];
      var bar = document.createElement('div');
      bar.className = 'tier-progress-bar';
      var fill = document.createElement('div');
      fill.className = 'tier-progress-fill';
      fill.style.width = pct + '%';
      fill.style.background = tierFills[tier];
      bar.appendChild(fill);
      var cnt = document.createElement('span');
      cnt.className = 'tier-progress-count';
      cnt.textContent = tierUnlocked + '/' + tierAchs.length;
      hdr.appendChild(lbl); hdr.appendChild(bar); hdr.appendChild(cnt);
      section.appendChild(hdr);

      // Badge grid
      var grid = document.createElement('div');
      grid.className = 'achievement-grid';
      tierAchs.forEach(function(a){
        var isUnlocked = !!S.achievements[a.id];
        var badge = document.createElement('div');
        badge.className = 'achievement-badge ' + (isUnlocked ? 'unlocked' : 'locked') + ' tier-' + tier;

        var ring = document.createElement('div');
        ring.className = 'badge-ring';
        var emoji = document.createElement('span');
        emoji.className = 'badge-emoji';
        emoji.textContent = a.icon;
        ring.appendChild(emoji);
        badge.appendChild(ring);

        var name = document.createElement('div');
        name.className = 'badge-name';
        name.textContent = isUnlocked ? a.name : '???';
        badge.appendChild(name);

        if (isUnlocked) {
          var date = document.createElement('div');
          date.className = 'badge-date';
          date.textContent = S.achievements[a.id];
          badge.appendChild(date);
        }

        // Tooltip
        var tip = document.createElement('div');
        tip.className = 'badge-tooltip';
        tip.textContent = isUnlocked ? a.desc : a.desc.split('.')[0] + '.';
        badge.appendChild(tip);

        grid.appendChild(badge);
      });
      section.appendChild(grid);
    });

    parent.appendChild(section);
  }

  // ---- PROGRESS ----
  function renderProgress() {
    var main = document.getElementById('main');

    var ptop = document.createElement('div'); ptop.className = 'progress-top';
    var back = document.createElement('button'); back.className = 'back-btn'; back.textContent = '← Back';
    back.addEventListener('click', function(){ showPage('home'); });
    var h2 = document.createElement('h2'); h2.textContent = 'Progress';
    ptop.appendChild(back); ptop.appendChild(h2);
    main.appendChild(ptop);

    // Level
    var level = getLevel(S.xp);
    var nextLvl = getNextLevel(S.xp);
    var xpPct = 100, xpLbl = S.xp + ' XP';
    if (nextLvl) {
      xpPct = Math.round((S.xp-level.min)/(nextLvl.min-level.min)*100);
      xpLbl = S.xp + ' / ' + nextLvl.min + ' XP to ' + nextLvl.title;
    }
    var lvRow = document.createElement('div'); lvRow.className = 'level-row';
    var lvLeft = document.createElement('div');
    var lvName = document.createElement('div'); lvName.className = 'level-name'; lvName.textContent = level.title;
    var lvLbl = document.createElement('div'); lvLbl.className = 'xp-label'; lvLbl.textContent = xpLbl;
    lvLeft.appendChild(lvName); lvLeft.appendChild(lvLbl);
    var lvBar = document.createElement('div'); lvBar.className = 'level-xp-bar';
    var lvBg = document.createElement('div'); lvBg.className = 'progress-bar-bg';
    var lvFill = document.createElement('div'); lvFill.className = 'progress-bar-fill'; lvFill.style.width = xpPct + '%';
    lvBg.appendChild(lvFill); lvBar.appendChild(lvBg);
    lvRow.appendChild(lvLeft); lvRow.appendChild(lvBar);
    main.appendChild(lvRow);

    // Stats
    var total = QUESTIONS.length;
    var done = Object.keys(S.answers).length;
    var correct = Object.values(S.answers).filter(function(v){return v;}).length;
    var acc = done > 0 ? Math.round(correct/done*100) : 0;
    var grid = document.createElement('div'); grid.className = 'stats-summary';
    [{val:done+'/'+total,lbl:'Answered'},{val:correct,lbl:'Correct'},{val:acc+'%',lbl:'Accuracy'},{val:S.streak,lbl:'Day Streak'}].forEach(function(s){
      var ms = document.createElement('div'); ms.className = 'mini-stat';
      var v = document.createElement('div'); v.className = 'val'; v.textContent = s.val;
      var l = document.createElement('div'); l.className = 'lbl'; l.textContent = s.lbl;
      ms.appendChild(v); ms.appendChild(l); grid.appendChild(ms);
    });
    main.appendChild(grid);

    // Radar chart
    var radarWrap = document.createElement('div');
    radarWrap.className = 'radar-container';
    var radarH3 = document.createElement('h3');
    radarH3.textContent = 'Performance by Specialty';
    radarWrap.appendChild(radarH3);
    renderRadar(radarWrap);
    main.appendChild(radarWrap);

    // Achievements
    renderAchievements(main);

    // Compact specialty summary — Clinical Science vs Medical Science per specialty
    var specSummaryLabel = document.createElement('div');
    specSummaryLabel.className = 'section-label';
    specSummaryLabel.style.marginTop = '20px';
    specSummaryLabel.textContent = 'Performance by Specialty';
    main.appendChild(specSummaryLabel);

    var specKeys = Object.keys(SPECIALTIES);
    var summaryGrid = document.createElement('div');
    summaryGrid.className = 'spec-summary-grid';

    specKeys.forEach(function(sk){
      // Gather stats split by Clinical Science vs Medical Science
      var clinical = { done:0, correct:0, total:0 };
      var medical = { done:0, correct:0, total:0 };
      QUESTIONS.forEach(function(q){
        if (q.specialty !== sk) return;
        var cat = tagParts(q.tag).category;
        var bucket = cat === 'Clinical Science' ? clinical : medical;
        bucket.total++;
        if (S.answers[q.id] !== undefined) {
          bucket.done++;
          if (S.answers[q.id]) bucket.correct++;
        }
      });

      var row = document.createElement('div');
      row.className = 'spec-summary-row';

      var nameEl = document.createElement('div');
      nameEl.className = 'spec-summary-name';
      nameEl.textContent = SPECIALTIES[sk];
      row.appendChild(nameEl);

      // Clinical Science stat
      var csStat = document.createElement('div');
      csStat.className = 'spec-summary-stat';
      var csVal = document.createElement('div');
      csVal.className = 'stat-val';
      if (clinical.total > 0) {
        var csPct = clinical.done > 0 ? Math.round(clinical.correct / clinical.done * 100) : 0;
        csVal.textContent = csPct + '%';
        csVal.style.color = csPct >= 70 ? 'var(--success)' : csPct >= 50 ? '#e65100' : 'var(--error)';
      } else {
        csVal.textContent = '—';
        csVal.style.color = 'var(--muted)';
      }
      var csLbl = document.createElement('div');
      csLbl.className = 'stat-lbl';
      csLbl.textContent = 'Clinical' + (clinical.total > 0 ? ' (' + clinical.done + '/' + clinical.total + ')' : '');
      csStat.appendChild(csVal);
      csStat.appendChild(csLbl);
      row.appendChild(csStat);

      // Medical Science stat
      var msStat = document.createElement('div');
      msStat.className = 'spec-summary-stat';
      var msVal = document.createElement('div');
      msVal.className = 'stat-val';
      if (medical.total > 0) {
        var msPct = medical.done > 0 ? Math.round(medical.correct / medical.done * 100) : 0;
        msVal.textContent = msPct + '%';
        msVal.style.color = msPct >= 70 ? 'var(--success)' : msPct >= 50 ? '#e65100' : 'var(--error)';
      } else {
        msVal.textContent = '—';
        msVal.style.color = 'var(--muted)';
      }
      var msLbl = document.createElement('div');
      msLbl.className = 'stat-lbl';
      msLbl.textContent = 'Medical' + (medical.total > 0 ? ' (' + medical.done + '/' + medical.total + ')' : '');
      msStat.appendChild(msVal);
      msStat.appendChild(msLbl);
      row.appendChild(msStat);

      // Overall for this specialty
      var allDone = clinical.done + medical.done;
      var allCorrect = clinical.correct + medical.correct;
      var allTotal = clinical.total + medical.total;
      var overallStat = document.createElement('div');
      overallStat.className = 'spec-summary-stat';
      var overVal = document.createElement('div');
      overVal.className = 'stat-val';
      if (allDone > 0) {
        var overPct = Math.round(allCorrect / allDone * 100);
        overVal.textContent = overPct + '%';
        overVal.style.color = overPct >= 70 ? 'var(--success)' : overPct >= 50 ? '#e65100' : 'var(--error)';
      } else {
        overVal.textContent = '—';
        overVal.style.color = 'var(--muted)';
      }
      var overLbl = document.createElement('div');
      overLbl.className = 'stat-lbl';
      overLbl.textContent = 'Overall (' + allDone + '/' + allTotal + ')';
      overallStat.appendChild(overVal);
      overallStat.appendChild(overLbl);
      row.appendChild(overallStat);

      summaryGrid.appendChild(row);
    });

    main.appendChild(summaryGrid);

    // Reset Progress
    var resetSection = document.createElement('div');
    resetSection.className = 'reset-section';
    var resetP = document.createElement('p');
    resetP.textContent = 'Want to start fresh? This will clear all answers, XP, streaks, and badges.';
    resetSection.appendChild(resetP);

    var resetBtn = document.createElement('button');
    resetBtn.className = 'reset-btn';
    resetBtn.textContent = 'Reset All Progress';
    resetSection.appendChild(resetBtn);

    var confirmBox = document.createElement('div');
    confirmBox.className = 'reset-confirm';
    var confirmP = document.createElement('p');
    confirmP.textContent = 'Are you sure? This cannot be undone.';
    confirmBox.appendChild(confirmP);
    var confirmBtns = document.createElement('div');
    confirmBtns.className = 'reset-confirm-btns';
    var yesBtn = document.createElement('button');
    yesBtn.className = 'reset-confirm-yes';
    yesBtn.textContent = 'Yes, reset everything';
    var noBtn = document.createElement('button');
    noBtn.className = 'reset-confirm-no';
    noBtn.textContent = 'Cancel';
    confirmBtns.appendChild(yesBtn);
    confirmBtns.appendChild(noBtn);
    confirmBox.appendChild(confirmBtns);
    resetSection.appendChild(confirmBox);

    resetBtn.addEventListener('click', function(){
      confirmBox.style.display = 'block';
      resetBtn.style.display = 'none';
    });
    noBtn.addEventListener('click', function(){
      confirmBox.style.display = 'none';
      resetBtn.style.display = '';
    });
    yesBtn.addEventListener('click', function(){
      S = initS();
      saveS();
      showPage('home');
    });

    main.appendChild(resetSection);
  }

  // MODAL
  document.getElementById('modalPractice').addEventListener('click', function() {
    document.getElementById('modeModal').classList.remove('active');
    startTopicWithMode(pendingTopic, 'practice');
  });
  document.getElementById('modalRandom').addEventListener('click', function() {
    document.getElementById('modeModal').classList.remove('active');
    startTopicWithMode(pendingTopic, 'random');
  });
  document.getElementById('modalCancel').addEventListener('click', function() {
    document.getElementById('modeModal').classList.remove('active');
    pendingTopic = null;
  });

  // NAV
  document.getElementById('nav-progress-link').addEventListener('click', function(){ showPage('progress'); });
  document.getElementById('nav-brand').addEventListener('click', function(){ quizState = null; showPage('home'); });

  showPage('home');
})();
</script>
