bleeding risk. This is standard practice for bleeding peptic ulcer disease, regardless of cause. Aspirin may be reintroduced after healing if cardiac indication remains.", "diagram": null}, {"id": 315, "specialty": "general_medicine", "tag": "medical_science_general_medicine_renal", "question": "A 58-year-old with eGFR 35 mL/min/1.73m² and diabetic nephropathy on metformin 1000mg BD is found to have serum creatinine rising from 1.8 to 2.1 mg/dL over 4 weeks. What is the most appropriate action regarding metformin?", "options": {"A": "Continue metformin unchanged", "B": "Reduce metformin to 500 mg BD", "C": "Discontinue metformin immediately", "D": "Increase metformin to improve glycemic control", "E": "Urgent renal replacement therapy"}, "answer": "C", "explanation": "Metformin is contraindicated when eGFR <30 mL/min/1.73m² due to lactic acidosis risk. At eGFR 35, metformin should be avoided or used with extreme caution. Discontinuation is appropriate; alternative agents (SGLT2i, GLP1-RA) are preferred and renoprotective.", "diagram": null}, {"id": 316, "specialty": "general_medicine", "tag": "medical_science_general_medicine_hypertension_target", "question": "A 72-year-old man with hypertension, prior TIA, eGFR 42, and albuminuria is currently on lisinopril and amlodipine, with BP 148/85. What BP target is most appropriate based on current evidence?", "options": {"A": "<140/90 mmHg", "B": "<130/80 mmHg", "C": "<120/80 mmHg", "D": "<110/70 mmHg", "E": "Activated charcoal within 1 hour of ingestion"}, "answer": "B", "explanation": "For older adults with prior cerebrovascular disease, chronic kidney disease, and albuminuria, a target BP of 130/80 is supported by SPRINT subgroup analyses and reduces cardiovascular events compared to standard targets.", "diagram": null}, {"id": 317, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_gait_imbalance", "question": "A 76-year-old man with mild cognitive impairment presents with gait slowing, difficulty with turns, and recent falls despite normal neurological exam. Brain MRI shows ventricular dilatation and widened subarachnoid spaces. What is the most likely diagnosis?", "options": {"A": "Parkinson's disease", "B": "Normal pressure hydrocephalus", "C": "Spinocerebellar ataxia", "D": "Amyloid-related imaging abnormalities", "E": "Cardioversion for unstable tachyarrhythmia"}, "answer": "B", "explanation": "The classic triad of NPH comprises gait disturbance (magnetic gait), cognitive decline, and urinary incontinence. Imaging shows hydrocephalus without cortical atrophy. Gait is often more impaired than cognitive findings.", "diagram": null}, {"id": 318, "specialty": "general_medicine", "tag": "medical_science_general_medicine_pharmacology", "question": "A 64-year-old with recurrent DVT despite therapeutic warfarin (INR 2.5-3.0) is switched to DOAC (apixaban). Regarding warfarin cessation and apixaban initiation, what is the safest approach?", "options": {"A": "Stop warfarin, start apixaban same day", "B": "Stop warfarin, overlap with apixaban for 5 days", "C": "Continue warfarin 2 days, then start apixaban", "D": "Stop warfarin, wait 2 days, then start apixaban", "E": "CT aortogram for suspected dissection"}, "answer": "A", "explanation": "When switching from warfarin to DOAC, it is safe and appropriate to start DOAC while stopping warfarin on the same day if INR is therapeutic (2-3). No overlap period is needed due to rapid DOAC onset. Bridging is unnecessary.", "diagram": null}, {"id": 319, "specialty": "general_medicine", "tag": "medical_science_general_medicine_acid_base", "question": "A 45-year-old man with type 1 diabetes presents obtunded. ABG: pH 7.18, pCO2 12 mmHg, HCO3 4 mmol/L, Na 138, K 5.8, Cl 102, glucose 32 mmol/L, lactate 1.2 mmol/L. Serum ketones strongly positive. Calculated anion gap is 32, delta ratio 1.75. What does the delta ratio indicate?", "options": {"A": "Pure high anion gap metabolic acidosis", "B": "Mixed high anion gap metabolic acidosis and metabolic alkalosis", "C": "Mixed high anion gap and normal anion gap metabolic acidosis", "D": "Respiratory alkalosis with metabolic compensation", "E": "Hypertonic saline for severe hyponatraemia"}, "answer": "B", "explanation": "A delta ratio >1.6 suggests a concurrent metabolic alkalosis in addition to the high anion gap metabolic acidosis. This patient likely has pre-existing vomiting or volume contraction raising the baseline bicarbonate.", "diagram": null}, {"id": 320, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_syncope", "question": "A 72-year-old woman presents after witnessed syncope while standing in a queue. She had no prodrome. ECG shows sinus rhythm at 68 bpm with a PR interval of 280 ms, narrow QRS, and intermittent Mobitz type II second-degree AV block. Echocardiogram is normal. What is the most appropriate management?", "options": {"A": "Reassurance and lifestyle advice", "B": "Dual-chamber permanent pacemaker insertion", "C": "Loop recorder insertion for further characterisation", "D": "Electrophysiology study before deciding on pacing", "E": "Arterial blood gas with co-oximetry"}, "answer": "B", "explanation": "Mobitz type II AV block carries a high risk of progression to complete heart block and is a class I indication for permanent pacemaker insertion, regardless of symptoms. A dual-chamber device is preferred over single-chamber ventricular pacing.", "diagram": null}, {"id": 321, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_vte", "question": "A 68-year-old woman who is 5 days post total hip replacement develops acute dyspnoea and pleuritic chest pain. Her heart rate is 110 bpm, SpO2 91% on room air, and the Wells score is 7 (high probability).\nWhat is the most appropriate initial management while awaiting CTPA?", "options": {"A": "Await CTPA results before treating", "B": "Commence therapeutic anticoagulation with low-molecular-weight heparin", "C": "Start aspirin and observe", "D": "Administer IV thrombolysis immediately", "E": "D-dimer testing"}, "answer": "B", "explanation": "In patients with a high clinical probability of pulmonary embolism (Wells score >6), therapeutic anticoagulation should be commenced immediately while awaiting confirmatory imaging, provided there are no contraindications. Low-molecular-weight heparin (e.g. enoxaparin) is preferred for initial anticoagulation. CTPA is the gold standard diagnostic test. Thrombolysis is reserved for massive PE with haemodynamic instability (systolic BP <90 mmHg). Risk stratification using PESI or sPESI scores guides subsequent management intensity and duration of anticoagulation (minimum 3 months, with consideration of extended therapy for unprovoked PE).", "diagram": null}, {"id": 322, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_perioperative", "question": "A 72-year-old man with ischaemic heart disease and type 2 diabetes on metformin and gliclazide is scheduled for elective bowel surgery under general anaesthesia. His eGFR is 45 mL/min/1.73m².\nWhat is the most appropriate perioperative medication management?", "options": {"A": "Continue all medications unchanged", "B": "Withhold metformin 24-48 hours before surgery; withhold gliclazide on the morning of surgery", "C": "Stop all diabetes medications one week before surgery", "D": "Switch to insulin infusion one week before surgery", "E": "Continue all medications including metformin"}, "answer": "B", "explanation": "Metformin should be withheld 24-48 hours before major surgery due to the risk of lactic acidosis, particularly in the setting of reduced renal function, hypotension, or contrast administration. It should not be restarted until renal function is confirmed stable post-operatively. Sulfonylureas (gliclazide) should be withheld on the day of surgery due to hypoglycaemia risk during fasting. Blood glucose should be monitored and a variable-rate insulin infusion commenced if needed. This patient's reduced eGFR increases the risk of metformin accumulation.", "diagram": null}, {"id": 323, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_obesity", "question": "A 45-year-old woman with a BMI of 42 kg/m² has type 2 diabetes (HbA1c 8.2%), obstructive sleep apnoea, and osteoarthritis of both knees. She has failed to achieve sustained weight loss with lifestyle modification and pharmacotherapy.\nWhat intervention has the best evidence for sustained weight loss and diabetes remission in this patient?", "options": {"A": "Very-low-calorie diet (VLCD) alone", "B": "Bariatric (metabolic) surgery", "C": "Intensive exercise program", "D": "Orlistat therapy", "E": "Intensive exercise program alone"}, "answer": "B", "explanation": "Bariatric surgery is the most effective intervention for sustained weight loss and metabolic improvement in patients with BMI ≥40 (or ≥35 with obesity-related comorbidities). It achieves significantly greater weight loss than non-surgical approaches and produces diabetes remission in 30-60% of patients depending on the procedure. Common procedures include sleeve gastrectomy and Roux-en-Y gastric bypass. Lifelong nutritional supplementation and follow-up are required. Newer GLP-1 receptor agonists (semaglutide, tirzepatide) offer significant non-surgical weight loss options but long-term data are still emerging.", "diagram": null}, {"id": 324, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_sepsis", "question": "A 55-year-old man presents with fever 39.2°C, HR 118 bpm, BP 82/48 mmHg, RR 28, lactate 4.2 mmol/L. He is diagnosed with septic shock from a urinary source. After 30 mL/kg IV crystalloid, BP remains 78/46 mmHg. What is the most appropriate next step?", "options": {"A": "Administer further 30 mL/kg IV crystalloid bolus", "B": "Commence noradrenaline infusion", "C": "Administer IV hydrocortisone 50 mg QID", "D": "Insert central venous catheter and measure ScvO₂", "E": "Commence dobutamine infusion"}, "answer": "B", "explanation": "In septic shock unresponsive to initial fluid resuscitation (30 mL/kg crystalloid), noradrenaline is the first-line vasopressor per Surviving Sepsis guidelines.", "diagram": null}, {"id": 325, "specialty": "general_medicine", "tag": "medical_science_general_medicine_statistics", "question": "A screening test for a disease has sensitivity 95% and specificity 70%. In a population with disease prevalence of 1%, what best describes the positive predictive value?", "options": {"A": "Very high (>90%)", "B": "Moderate (40-60%)", "C": "Low (approximately 3%)", "D": "Unable to determine without the negative predictive value", "E": "Moderate-high (20-30%)"}, "answer": "C", "explanation": "With low prevalence (1%), even high sensitivity produces many false positives. PPV = (0.95 × 0.01) / [(0.95 × 0.01) + (0.30 × 0.99)] ≈ 0.0095/0.306 ≈ 3.1%. Low prevalence dramatically reduces PPV.", "diagram": null}, {"id": 326, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_vte", "question": "A 65-year-old woman presents 6 hours post-onset with acute right leg swelling. Wells score is 3 (high probability). D-dimer is elevated. What is the most appropriate next investigation?", "options": {"A": "CT pulmonary angiogram", "B": "Compression ultrasound of the right leg", "C": "Repeat D-dimer in 24 hours", "D": "Venography", "E": "MRI venography"}, "answer": "B", "explanation": "With high pre-test probability for DVT (Wells ≥2), compression ultrasonography is the first-line imaging investigation. D-dimer is only useful to exclude DVT in low/moderate probability.", "diagram": null}, {"id": 327, "specialty": "general_medicine", "tag": "medical_science_general_medicine_epidemiology", "question": "In a randomised controlled trial, 100 patients receive drug A and 100 receive placebo. Over 5 years, 10 patients on drug A and 30 on placebo experience the primary endpoint. What is the number needed to treat (NNT)?", "options": {"A": "3", "B": "5", "C": "10", "D": "20", "E": "15"}, "answer": "B", "explanation": "ARR = control event rate − treatment event rate = 30% − 10% = 20%. NNT = 1/ARR = 1/0.20 = 5. Five patients need treatment for 5 years to prevent one event.", "diagram": null}, {"id": 328, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_delirium", "question": "An 82-year-old woman post hip fracture repair develops acute confusion, inattention, and fluctuating consciousness on post-operative day 2. She was cognitively intact pre-operatively. Which assessment tool is most appropriate to confirm the diagnosis of delirium?", "options": {"A": "Mini-Mental State Examination (MMSE)", "B": "Confusion Assessment Method (CAM)", "C": "Montreal Cognitive Assessment (MoCA)", "D": "Addenbrooke Cognitive Examination (ACE-III)", "E": "Glasgow Coma Scale (GCS)"}, "answer": "B", "explanation": "The Confusion Assessment Method (CAM) is the validated bedside tool for delirium diagnosis, assessing acute onset, fluctuation, inattention, and altered level of consciousness or disorganised thinking.", "diagram": null}, {"id": 329, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_shock", "question": "A 45-year-old man is brought to ED after a motor vehicle accident. BP 70/40 mmHg, HR 130 bpm, cold peripheries, JVP flat, estimated blood loss 1.5 L. What type of shock is this?", "options": {"A": "Cardiogenic", "B": "Distributive", "C": "Hypovolaemic", "D": "Obstructive", "E": "Neurogenic"}, "answer": "C", "explanation": "Hypotension with tachycardia, cold peripheries, flat JVP, and significant blood loss is classic haemorrhagic (hypovolaemic) shock. Flat JVP distinguishes it from cardiogenic and obstructive causes.", "diagram": null}, {"id": 330, "specialty": "general_medicine", "tag": "medical_science_general_medicine_acid_base", "question": "A patient presents with pH 7.52, pCO₂ 48 mmHg, and HCO₃⁻ 38 mmol/L. What is the primary acid-base disturbance?", "options": {"A": "Respiratory alkalosis", "B": "Metabolic alkalosis with respiratory compensation", "C": "Respiratory acidosis with metabolic compensation", "D": "Mixed metabolic and respiratory alkalosis", "E": "Normal acid-base status"}, "answer": "B", "explanation": "Alkalotic pH with elevated bicarbonate indicates primary metabolic alkalosis. The elevated pCO₂ represents appropriate respiratory compensation (hypoventilation to retain CO₂).", "diagram": null}, {"id": 331, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_electrolytes", "question": "A 60-year-old man on bendroflumethiazide presents with muscle weakness. K⁺ 2.4 mmol/L, Mg²⁺ 0.5 mmol/L [0.7-1.0]. Despite IV and oral potassium replacement, the potassium remains low at 2.6 mmol/L after 24 hours. What is the most important additional intervention?", "options": {"A": "Switch to amiloride", "B": "Replace magnesium", "C": "Administer IV sodium bicarbonate", "D": "Increase potassium replacement rate", "E": "Commence spironolactone"}, "answer": "B", "explanation": "Hypomagnesaemia causes refractory hypokalaemia by promoting renal potassium wasting via ROMK channels. Magnesium must be corrected before potassium levels will normalise.", "diagram": null}, {"id": 332, "specialty": "general_medicine", "tag": "clinical_science_general_medicine_periop", "question": "A 70-year-old man with stable angina, eGFR 38 mL/min, and HbA1c 62 mmol/mol is scheduled for elective hip replacement. He takes metformin 1 g BD, ramipril 10 mg daily, and aspirin 100 mg daily. Which medication should be withheld on the day of surgery?", "options": {"A": "Aspirin", "B": "Ramipril", "C": "Metformin", "D": "All three medications", "E": "None — continue all medications"}, "answer": "C", "explanation": "Metformin should be withheld on the day of surgery and for 48 hours post-operatively due to risk of lactic acidosis with perioperative renal impairment, particularly with eGFR <45 mL/min.", "diagram": null}, {"id": 333, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_presentation", "question": "A 6-year-old boy with normal development until age 4 now has progressive neurodegeneration, ataxia, hepatosplenomegaly, and cherry-red macula on fundoscopy. Lysosomal acid lipase activity is <10% of normal. What is the most likely diagnosis?", "options": {"A": "Gaucher disease", "B": "Niemann-Pick disease type C", "C": "Wolman disease", "D": "Niemann-Pick disease type B", "E": "Enzyme replacement therapy with agalsidase beta"}, "answer": "C", "explanation": "Wolman disease presents with severe lysosomal acid lipase deficiency, leading to progressive neurodegeneration, hepatosplenomegaly, and early death (usually by 2-3 years). Late-onset forms (cholesteryl ester storage disease) have better prognosis. Cherry-red macula suggests lysosomal storage affecting retina.", "diagram": null}, {"id": 334, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_metabolism", "question": "A newborn has elevated plasma methionine (450 μmol/L, normal <40) and homocysteine (180 μmol/L, normal <15), normal vitamin B12, normal folate, and normal homocystinuria urine screen. What is the most likely diagnosis?", "options": {"A": "Homocystinuria due to cystathionine beta-synthase deficiency", "B": "Methylmalonic acidemia", "C": "Methionine synthase deficiency", "D": "Vitamin B12 absorption defect", "E": "Haematopoietic stem cell transplantation"}, "answer": "A", "explanation": "Classic homocystinuria from CBS deficiency presents with elevated both methionine and homocysteine. Normal urine screening suggests classic rather than atypical presentation. B12 and folate defects elevate homocysteine but not methionine.", "diagram": null}, {"id": 335, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_diagnosis", "question": "A 15-year-old girl with family history of sudden cardiac death (paternal grandfather age 35) presents with syncope during exercise. ECG shows prominent S waves in V1-V3, deep Q waves in lateral leads, and LV hypertrophy. Echo shows LVWT 21mm. What is the most appropriate next investigation?", "options": {"A": "Cardiac MRI", "B": "Holter monitor", "C": "Stress testing", "D": "Coronary angiography", "E": "Substrate reduction therapy with miglustat"}, "answer": "A", "explanation": "This clinical and ECG presentation is highly suggestive of hypertrophic cardiomyopathy (HCM), likely familial given family history. Cardiac MRI provides tissue characterization, defines fibrosis, and helps stratify sudden cardiac death risk. Genetic testing is also indicated.", "diagram": null}, {"id": 336, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_organic_acid", "question": "A 3-month-old with recurrent vomiting, lethargy, and poor feeding has elevated urine organic acids showing methylmalonic acid and propionylcarnitine. Plasma amino acids show elevated glycine and low carnitine. What is the enzyme defect?", "options": {"A": "Methylmalonyl-CoA mutase", "B": "Isovaleryl-CoA dehydrogenase", "C": "Proprionyl-CoA carboxylase", "D": "Carnitine palmitoyltransferase I", "E": "Dietary phenylalanine restriction"}, "answer": "A", "explanation": "This presentation is classic for methylmalonic acidemia (MMA) due to methylmalonyl-CoA mutase deficiency (vitamin B12-responsive form) or functional B12 deficiency. Elevated methylmalonic acid is pathognomonic. Propionylcarnitine accumulates due to metabolic block.", "diagram": null}, {"id": 337, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_family_screening", "question": "A 42-year-old man is diagnosed with familial hypercholesterolemia (heterozygous, LDL 350 mg/dL), with prior MI at age 38. His children (ages 8 and 11) are asymptomatic. What is the most appropriate approach to their management?", "options": {"A": "Lipid screening and consider statins if LDL >300", "B": "Lipid screening at age 16, no medication until adulthood", "C": "Genetic counseling and lipid screening at age 2, consider statins if LDL >190", "D": "No screening until age 18", "E": "Nitisinone for hereditary tyrosinaemia"}, "answer": "C", "explanation": "Children of parents with familial hypercholesterolemia should be screened early (by age 2) due to high cardiovascular risk, especially with premature family history. Statins are indicated in childhood if LDL remains elevated after lifestyle measures.", "diagram": null}, {"id": 338, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_urea_cycle", "question": "A 5-day-old neonate develops lethargy, hyperventilation, and seizures. Plasma ammonia is 280 μmol/L (normal <50). Plasma amino acids show elevated glutamine and low citrulline. What is the most likely diagnosis?", "options": {"A": "Ornithine transcarbamylase (OTC) deficiency", "B": "Carbamoyl phosphate synthetase deficiency", "C": "Argininosuccinase deficiency", "D": "Arginine deficiency", "E": "Liver transplantation for metabolic rescue"}, "answer": "A", "explanation": "OTC deficiency is the most common urea cycle disorder, presenting with neonatal hyperammonemia and seizures. Low citrulline (substrate accumulation) and elevated glutamine (ammonia scavenging) are characteristic. OTC is X-linked (males more severely affected).", "diagram": null}, {"id": 339, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_lipid", "question": "A 28-year-old woman with recurrent acute pancreatitis (3 episodes in 2 years) has triglycerides 850 mg/dL, LDL 45 mg/dL, HDL 18 mg/dL. Family history includes early coronary artery disease. Genetic testing shows lipoprotein lipase gene mutation. What is the primary management goal?", "options": {"A": "Maximize atorvastatin dosing", "B": "Triglyceride reduction to <200 mg/dL with fibrates and omega-3 fatty acids", "C": "PCSK9 inhibitor therapy", "D": "Lipoprotein apheresis referral", "E": "Sodium benzoate for hyperammonaemia"}, "answer": "B", "explanation": "Type I hyperlipoproteinemia (lipoprotein lipase deficiency) requires dietary fat restriction (<20g/day) and triglyceride reduction with fibrates and/or omega-3 to prevent recurrent pancreatitis. Statins are less effective due to low LDL.", "diagram": null}, {"id": 340, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_storage", "question": "A 3-year-old boy has recurrent bacterial infections, hepatosplenomegaly, and bone marrow examination shows foamy macrophages. Chitotriosidase activity is markedly elevated. Gaucher enzyme (glucocerebrosidase) activity is 15% of normal. What is the inheritance pattern?", "options": {"A": "Autosomal dominant", "B": "Autosomal recessive", "C": "X-linked recessive", "D": "Mitochondrial", "E": "Cysteamine for cystinosis"}, "answer": "B", "explanation": "Gaucher disease is autosomal recessive. Low glucocerebrosidase activity leads to gaucher cell accumulation (foamy macrophages). Elevated chitotriosidase is a biomarker. Type 1 (non-neuropathic) is most common and compatible with this presentation.", "diagram": null}, {"id": 341, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_carrier_screening", "question": "A 32-year-old Ashkenazi Jewish woman planning pregnancy has family history of Tay-Sachs disease (sister affected). Genetic testing shows she is heterozygous (HexA enzyme activity 50% normal). What is her risk of having an affected child?", "options": {"A": "0% (carrier cannot have affected children)", "B": "25% if partner is also a carrier", "C": "100% of children will be carriers", "D": "50% of children will be affected", "E": "Biotin supplementation for biotinidase deficiency"}, "answer": "B", "explanation": "As a confirmed carrier (heterozygous, reduced HexA activity), her risk depends on partner's carrier status. If partner is also a carrier (probability higher in Ashkenazi population), 25% of children will be affected. Partner screening is essential.", "diagram": null}, {"id": 342, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_treatment", "question": "An 8-year-old with Type 3 Gaucher disease (neuronopathic form) with hepatosplenomegaly and chronic lung disease is started on glucocerebrosidase therapy (imiglucerase). What is the primary goal of enzyme replacement therapy?", "options": {"A": "Halt and reverse neurological manifestations", "B": "Reduce non-CNS organomegaly and stabilize organ function", "C": "Cure the genetic defect", "D": "Replace deficient glucocerebrosidase in brain", "E": "Gene therapy with adeno-associated viral vector"}, "answer": "B", "explanation": "ERT reduces hepatosplenomegaly, improves bone manifestations, and stabilizes organ function in neuronopathic Gaucher disease, but does not cross the blood-brain barrier effectively to treat CNS involvement. Substrate reduction therapy (miglustat) may have some CNS benefit.", "diagram": null}, {"id": 343, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_prenatal", "question": "A 28-year-old woman with cystic fibrosis (homozygous DF508) is pregnant. Her partner is from the general population with no known CF family history. What is the risk that their child will have cystic fibrosis?", "options": {"A": "0% (CF is not inherited in this scenario)", "B": "25% (autosomal recessive)", "C": "50% (all children will be carriers)", "D": "2-5% (general population carrier frequency squared)", "E": "Chaperone therapy with migalastat"}, "answer": "C", "explanation": "The affected mother (CF) will pass CF alleles to all children. If partner is not a carrier (likely at ~4% carrier frequency in general population), all children will be carriers (heterozygous) but not affected. Risk of CF in offspring depends on partner carrier status.", "diagram": null}, {"id": 344, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_mitochondrial", "question": "A 6-year-old with progressive muscle weakness, lactic acidosis (lactate 8 mmol/L), and Ragged-red fibers on muscle biopsy has suspected mitochondrial myopathy. Which investigation is most specific for mitochondrial DNA mutation?", "options": {"A": "Serum lactate levels", "B": "Muscle biopsy with electron microscopy", "C": "Genetic sequencing of mitochondrial DNA", "D": "Respiratory chain enzyme assays", "E": "Carnitine supplementation"}, "answer": "C", "explanation": "Mitochondrial DNA sequencing is the most specific diagnostic test for confirmed mitochondrial myopathies. While muscle biopsy findings support the diagnosis, genetic confirmation is essential. Maternal inheritance pattern supports mtDNA defects.", "diagram": null}, {"id": 345, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_iron_overload", "question": "A 45-year-old man of Northern European ancestry presents with fatigue, arthralgia of the 2nd and 3rd metacarpophalangeal joints, and elevated ferritin (1200 µg/L) with transferrin saturation of 62%. HFE gene testing confirms homozygous C282Y mutation. Which organ complication should be screened for as a priority?", "options": {"A": "Dilated cardiomyopathy", "B": "Hepatocellular carcinoma", "C": "Adrenal insufficiency", "D": "Renal tubular acidosis", "E": "Pancreatic exocrine insufficiency"}, "answer": "B", "explanation": "Hereditary haemochromatosis (HFE C282Y homozygosity) causes progressive iron deposition in the liver, leading to cirrhosis and significantly increased risk of hepatocellular carcinoma — the leading cause of death in established haemochromatosis. Screening with liver ultrasound and AFP is recommended.", "diagram": null}, {"id": 346, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_therapy_decision", "question": "A 5-year-old with mucopolysaccharidosis type II (Hunter syndrome) has hepatosplenomegaly, joint stiffness, and early cardiac valve involvement. Enzyme replacement therapy with idursulfase is being considered. What is the most important consideration regarding enzyme replacement efficacy?", "options": {"A": "It reverses all organ damage if started early", "B": "It does not cross the blood-brain barrier, so neurological decline will continue", "C": "It completely replaces deficient enzyme permanently", "D": "It requires lifelong IV infusions every 1-2 weeks", "E": "Mannose supplementation for CDG-Ib"}, "answer": "B", "explanation": "ERT improves non-CNS manifestations (organomegaly, cardiac involvement, mobility) but does not effectively cross the blood-brain barrier. Patients with neurological involvement (attenuated vs severe form) may still experience neurological progression.", "diagram": null}, {"id": 347, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_family_implications", "question": "A 35-year-old man is newly diagnosed with hereditary hemochromatosis (HFE H63D homozygous). His wife and two adult children are asymptomatic. What is the most appropriate next step in family management?", "options": {"A": "Screen wife and children for HFE mutations; if negative, no follow-up needed", "B": "Screen wife and children for iron studies and HFE mutations", "C": "Family genetic counseling and screening of first-degree relatives", "D": "All of above", "E": "Plasma exchange for acute metabolic crisis"}, "answer": "D", "explanation": "While HFE H63D homozygosity carries lower penetrance than C282Y, family screening including iron studies and genetic testing is standard. Genetic counseling helps clarify inheritance and penetrance variations.", "diagram": null}, {"id": 348, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_porphyria", "question": "A 28-year-old woman presents with recurrent episodes of severe abdominal pain, vomiting, and confusion triggered by fasting and oral contraceptive use. During an attack, urine turns dark on standing. Urine porphobilinogen is markedly elevated. What is the most likely diagnosis?", "options": {"A": "Variegate porphyria", "B": "Acute intermittent porphyria", "C": "Porphyria cutanea tarda", "D": "Hereditary coproporphyria", "E": "Haem arginate for acute porphyria"}, "answer": "B", "explanation": "Acute intermittent porphyria presents with neurovisceral crises (abdominal pain, neuropsychiatric symptoms) without cutaneous features. Markedly elevated urinary PBG during attacks is diagnostic. Common precipitants include fasting, drugs (especially P450 inducers), and hormonal changes.", "diagram": null}, {"id": 349, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_mitochondrial", "question": "A 22-year-old man presents with progressive external ophthalmoplegia, ptosis, and proximal myopathy. Muscle biopsy shows ragged red fibres on Gomori trichrome stain. Serum lactate is elevated. Genetic testing reveals a single large-scale mitochondrial DNA deletion. What is the inheritance pattern of this condition?", "options": {"A": "Autosomal dominant", "B": "Autosomal recessive", "C": "Maternal inheritance", "D": "Sporadic (de novo)", "E": "Coenzyme Q10 supplementation"}, "answer": "D", "explanation": "Single large-scale mitochondrial DNA deletions causing Kearns-Sayre syndrome or progressive external ophthalmoplegia are typically sporadic (de novo) events, not maternally inherited. Point mutations in mtDNA follow maternal inheritance, but large deletions arise spontaneously during oogenesis or early embryogenesis.", "diagram": null}, {"id": 350, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_wilson", "question": "A 19-year-old man presents with tremor, dysarthria, and personality change over 6 months. Slit-lamp examination reveals Kayser-Fleischer rings. Serum ceruloplasmin is 0.08 g/L (0.20-0.60), 24-hour urinary copper is 180 µg (normal <40), and ALT is 85 U/L. Liver biopsy copper content is 320 µg/g dry weight (normal <50). What is the most appropriate initial treatment?", "options": {"A": "Zinc acetate monotherapy", "B": "D-penicillamine with pyridoxine supplementation", "C": "Liver transplantation", "D": "Trientine with dietary copper restriction only", "E": "Trientine for Wilson disease"}, "answer": "B", "explanation": "D-penicillamine is a first-line chelation agent for symptomatic Wilson disease. Pyridoxine supplementation is co-prescribed as penicillamine is an anti-metabolite of vitamin B6. Zinc monotherapy is reserved for presymptomatic patients or maintenance after initial chelation.", "diagram": null}, {"id": 351, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_urea_cycle", "question": "A 3-day-old neonate presents with poor feeding, lethargy, and seizures. Plasma ammonia is 850 µmol/L (normal <80). Plasma amino acids show markedly elevated glutamine and low citrulline. Urinary orotic acid is elevated. What is the most likely enzyme deficiency?", "options": {"A": "Carbamoyl phosphate synthetase I", "B": "Ornithine transcarbamylase", "C": "Argininosuccinate synthetase", "D": "Arginase", "E": "Sodium phenylbutyrate for urea cycle defects"}, "answer": "B", "explanation": "Ornithine transcarbamylase (OTC) deficiency is the most common urea cycle disorder. Low citrulline with elevated orotic acid distinguishes OTC deficiency from CPS I deficiency (which also has low citrulline but low/normal orotic acid). OTC deficiency is X-linked.", "diagram": null}, {"id": 352, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_ehlers_danlos", "question": "A 25-year-old woman presents with recurrent joint dislocations, easy bruising, and chronic musculoskeletal pain. She has velvety hyperextensible skin with atrophic scarring. Beighton score is 7/9. Echocardiogram shows mild mitral valve prolapse. Genetic testing reveals a COL5A1 mutation. What type of Ehlers-Danlos syndrome is this?", "options": {"A": "Hypermobile type", "B": "Classical type", "C": "Vascular type", "D": "Kyphoscoliotic type", "E": "Zinc acetate for maintenance therapy"}, "answer": "B", "explanation": "Classical EDS (types I/II) is characterised by skin hyperextensibility with atrophic scarring, joint hypermobility, and tissue fragility. COL5A1 mutations confirm classical type. Hypermobile EDS lacks significant skin fragility and has no confirmed genetic marker. Vascular EDS involves COL3A1 mutations.", "diagram": null}, {"id": 353, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_haemochromatosis", "question": "A 50-year-old man of Northern European descent is diagnosed with hereditary haemochromatosis (HFE C282Y homozygous) complicated by biopsy-proven cirrhosis, diabetes mellitus, and skin hyperpigmentation. Ferritin 2500 µg/L, transferrin saturation 72%. He has now commenced weekly venesection. Which complication of haemochromatosis carries the highest attributable mortality in patients with established cirrhosis?", "options": {"A": "Dilated cardiomyopathy with heart failure", "B": "Yersinia or Vibrio vulnificus septicaemia", "C": "Hepatocellular carcinoma", "D": "Hypogonadotrophic hypogonadism", "E": "Progressive destructive arthropathy"}, "answer": "C", "explanation": "In haemochromatosis with established cirrhosis, hepatocellular carcinoma (HCC) is the leading cause of death — risk is 20-200× baseline and persists even after successful iron depletion. Six-monthly ultrasound ± AFP surveillance is indicated. Cardiomyopathy is serious but responds to iron depletion if caught early. Iron-loving organisms (Yersinia, Vibrio vulnificus, Listeria) cause sporadic fatal infections but are uncommon. Hypogonadism causes morbidity but not mortality.", "diagram": null}, {"id": 354, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_pharmacogenomics", "question": "A 65-year-old man of Han Chinese descent is about to commence carbamazepine for trigeminal neuralgia. Before prescribing, his doctor orders HLA-B*15:02 testing.\nWhat is the purpose of this pharmacogenomic test?", "options": {"A": "To predict drug efficacy", "B": "To identify risk of Stevens-Johnson syndrome / toxic epidermal necrolysis", "C": "To determine the optimal drug dose", "D": "To assess for drug-drug interactions", "E": "To determine the optimal drug dose"}, "answer": "B", "explanation": "HLA-B*15:02 is strongly associated with carbamazepine-induced Stevens-Johnson syndrome (SJS) and toxic epidermal necrolysis (TEN), particularly in Southeast Asian populations including Han Chinese, Thai, and Malaysian individuals. Screening is recommended before prescribing carbamazepine in at-risk populations. Similarly, HLA-B*58:01 screening is recommended before allopurinol in certain populations to prevent SJS/TEN. Pharmacogenomics is an increasingly important component of personalised medicine, guiding drug selection and dosing based on genetic variants affecting drug metabolism (e.g. CYP2D6, CYP2C19) and adverse reaction risk.", "diagram": null}, {"id": 355, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_genetic_counselling", "question": "A 28-year-old woman whose brother has cystic fibrosis (CF) is planning pregnancy. Her partner has no family history of CF. Carrier testing shows she carries one copy of the deltaF508 mutation. Her partner's carrier screen is negative.\nWhat is the approximate residual risk that their child will have CF?", "options": {"A": "1 in 4 (25%)", "B": "1 in 100", "C": "Approximately 1 in 400-600", "D": "Zero — the partner is not a carrier", "E": "Zero — the partner is not a carrier"}, "answer": "C", "explanation": "Even with a negative carrier screen, there is a residual risk due to the limitations of screening panels which detect only the most common CFTR mutations (typically covering 85-90% of mutations in the relevant population). If the partner's negative screen covers ~90% of mutations, the residual carrier risk is approximately 1 in 25. The chance of the child having CF = mother's carrier risk (1) × partner's residual carrier risk (~1/25) × 1/4 = approximately 1 in 100 for the partner being a carrier, making the child's CF risk approximately 1 in 400-600. Genetic counselling is essential for communicating residual risk and reproductive options including prenatal testing and preimplantation genetic diagnosis.", "diagram": null}, {"id": 356, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_inheritance", "question": "A woman is a carrier of an X-linked recessive condition. Her partner is unaffected. What is the probability that their son will be affected?", "options": {"A": "0%", "B": "25%", "C": "50%", "D": "100%", "E": "75%"}, "answer": "C", "explanation": "A carrier mother has one affected X chromosome. Each son has a 50% chance of inheriting the affected X (and being affected), since males have only one X chromosome.", "diagram": null}, {"id": 357, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_wilson", "question": "A 22-year-old man presents with tremor, dysarthria, and personality change. Slit-lamp examination reveals Kayser-Fleischer rings. Serum caeruloplasmin is low, 24-hour urinary copper is elevated. What is the first-line treatment?", "options": {"A": "Zinc acetate monotherapy", "B": "D-penicillamine with pyridoxine", "C": "Trientine with pyridoxine", "D": "Liver transplantation", "E": "Ammonium tetrathiomolybdate"}, "answer": "B", "explanation": "D-penicillamine (a copper chelator) with pyridoxine supplementation (to prevent B6 deficiency) is established first-line treatment for symptomatic Wilson disease. Trientine is used if D-penicillamine is not tolerated.", "diagram": null}, {"id": 358, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_testing", "question": "Which genetic phenomenon best explains why some individuals carrying a pathogenic BRCA1 mutation develop breast cancer while others do not?", "options": {"A": "Variable expressivity", "B": "Incomplete penetrance", "C": "Anticipation", "D": "Genomic imprinting", "E": "Mosaicism"}, "answer": "B", "explanation": "Incomplete penetrance means not all individuals with a pathogenic genotype express the phenotype. BRCA1 has approximately 70% lifetime penetrance for breast cancer, meaning 30% of carriers will not develop it.", "diagram": null}, {"id": 359, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_lysosomal", "question": "A 35-year-old man presents with acroparaesthesiae, angiokeratomas, corneal verticillata, and progressive renal impairment. Alpha-galactosidase A enzyme activity is markedly reduced. What is the diagnosis?", "options": {"A": "Gaucher disease", "B": "Fabry disease", "C": "Niemann-Pick disease type C", "D": "Pompe disease", "E": "Hunter syndrome (MPS II)"}, "answer": "B", "explanation": "Fabry disease is an X-linked lysosomal storage disorder caused by deficiency of alpha-galactosidase A, leading to accumulation of globotriaosylceramide (Gb3) in vascular endothelium, kidneys, heart, and nervous system.", "diagram": null}, {"id": 360, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_trinucleotide", "question": "Trinucleotide repeat expansion disorders such as Huntington disease demonstrate a phenomenon where successive generations show earlier disease onset and increasing severity. This is called:", "options": {"A": "Incomplete penetrance", "B": "Anticipation", "C": "Pleiotropy", "D": "Epistasis", "E": "Founder effect"}, "answer": "B", "explanation": "Anticipation occurs when trinucleotide repeat expansions increase in size with successive generations (particularly during paternal meiosis in Huntington disease), leading to earlier onset and more severe phenotype.", "diagram": null}, {"id": 361, "specialty": "genetic_metabolic", "tag": "clinical_science_genetic_metabolic_porphyria", "question": "A 28-year-old woman presents with severe abdominal pain, tachycardia, and dark urine. She was recently started on the combined oral contraceptive pill. Urine porphobilinogen (PBG) is markedly elevated. What is the most appropriate acute management?", "options": {"A": "IV haem arginate (haemin)", "B": "Oral chlorpromazine for pain relief", "C": "IV morphine and fluids only", "D": "Plasmapheresis", "E": "High-carbohydrate IV dextrose infusion as sole therapy"}, "answer": "A", "explanation": "Acute intermittent porphyria presents with neurovisceral crises precipitated by drugs (OCP), fasting, or hormonal changes. IV haem arginate inhibits ALA synthase, the rate-limiting enzyme, reducing porphyrin precursor production.", "diagram": null}, {"id": 362, "specialty": "genetic_metabolic", "tag": "medical_science_genetic_metabolic_mitochondrial", "question": "Mitochondrial DNA disorders are exclusively inherited from the mother. Which feature of mitochondrial genetics best explains the variable phenotype seen within the same family?", "options": {"A": "X-linked inheritance pattern", "B": "Heteroplasmy", "C": "Genomic imprinting", "D": "Uniparental disomy", "E": "Trinucleotide repeat instability"}, "answer": "B", "explanation": "Heteroplasmy refers to the coexistence of normal and mutant mitochondrial DNA within cells. The proportion of mutant mtDNA varies between tissues and individuals, explaining phenotypic variability in maternal relatives.", "diagram": null}, {"id": 363, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_falls", "question": "An 82-year-old woman with hypertension (on amlodipine and lisinopril), osteoporosis, and mild cognitive impairment falls while getting up at night to void. Hip X-ray shows an intertrochanteric fracture. Besides fracture management, what is the most important intervention to prevent recurrent falls?", "options": {"A": "Prescribe a walker", "B": "Review and deprescribe antihypertensives if possible", "C": "Nighttime catheter placement", "D": "Bed rest to avoid further falls", "E": "Comprehensive geriatric assessment"}, "answer": "B", "explanation": "Antihypertensive-induced orthostatic hypotension is a major modifiable fall risk factor in older adults. Careful deprescribing and reassessing BP targets (often <140/90 in this age group) can reduce orthostasis and falls. Physical aids support but don't address root cause.", "diagram": null}, {"id": 364, "specialty": "geriatric_medicine", "tag": "medical_science_geriatric_medicine_polypharmacy", "question": "A 79-year-old man with cognitive decline, depression (on sertraline 100mg daily), benign prostatic hyperplasia (on oxybutynin 5mg TID), and Parkinson's disease (on benztropine) is hospitalized with delirium. What is the most likely medication contributor?", "options": {"A": "Sertraline anticholinergic effects", "B": "Oxybutynin and benztropine additive anticholinergic effects", "C": "Parkinson's disease progression", "D": "Age-related cognitive decline", "E": "Home-based occupational therapy review"}, "answer": "B", "explanation": "Oxybutynin and benztropine both have significant anticholinergic effects; combined use increases delirium risk in older adults. Anticholinergic burden is a major contributor to delirium. Deprescribing these medications or using alternatives is appropriate.", "diagram": null}, {"id": 365, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_frailty", "question": "An 87-year-old woman with mild frailty (unintentional weight loss 2kg/year, low physical activity, exhaustion) is found to have a new thyroid nodule on imaging done for other reasons. TSH 2.1 mIU/L, FT4 normal. What is the most appropriate approach to nodule management?", "options": {"A": "Thyroid ultrasound and FNA biopsy", "B": "Conservative observation without further imaging", "C": "Left thyroid lobectomy", "D": "Repeat imaging in 6 months", "E": "Medication reconciliation and deprescribing review"}, "answer": "B", "explanation": "In asymptomatic older adults with limited life expectancy and normal thyroid function, thyroid nodules rarely warrant aggressive evaluation unless there are specific symptoms or imaging features suggesting malignancy. Observation is appropriate.", "diagram": null}, {"id": 366, "specialty": "geriatric_medicine", "tag": "medical_science_geriatric_medicine_aging_physiology", "question": "An 81-year-old man with normal renal function (eGFR 68) and diabetes is started on a new antibiotic (gentamicin) at standard dosing. What age-related physiological change most significantly increases his nephrotoxicity risk?", "options": {"A": "Increased glomerular filtration rate", "B": "Decreased renal blood flow and glomerulosclerosis", "C": "Increased urinary pH", "D": "Enhanced drug metabolism", "E": "Cognitive stimulation therapy"}, "answer": "B", "explanation": "Age-related renal changes include decreased renal blood flow, glomerulosclerosis, and reduced nephron number. These changes increase drug accumulation and toxicity risk even at normal eGFR. Dose adjustment is often needed despite 'normal' eGFR.", "diagram": null}, {"id": 367, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_delirium", "question": "A 78-year-old admitted to hospital with community-acquired pneumonia develops acute confusion, sundowning, and psychomotor retardation on day 2 of hospitalization despite appropriate antibiotic therapy. O2 sat 94% on 2L, glucose 7.2 mmol/L, normal sodium. What is the most likely contributing factor?", "options": {"A": "Depression", "B": "Hospital-acquired delirium from environmental and medication factors", "C": "Progressing pneumonia", "D": "Dementia", "E": "Falls prevention exercise programme (OTAGO)"}, "answer": "B", "explanation": "Delirium develops acutely in hospitalized older adults due to environmental factors (noise, sleep disruption, loss of routine), medication (anticholinergics, sedatives, opioids), and deconditioning rather than underlying pneumonia progression. Addressing modifiable factors is key.", "diagram": null}, {"id": 368, "specialty": "geriatric_medicine", "tag": "medical_science_geriatric_medicine_drug_metabolism", "question": "An 85-year-old woman on chronic diazepam 5mg nightly has become increasingly confused and falls frequently. Renal and hepatic function are normal. What is the most appropriate management?", "options": {"A": "Increase diazepam to 10mg for better sleep", "B": "Continue current dose and add fall prevention aids", "C": "Gradual tapering and discontinuation of diazepam", "D": "Switch to a longer-acting benzodiazepine", "E": "Advance care planning discussion"}, "answer": "C", "explanation": "Long-acting benzodiazepines like diazepam accumulate in older adults due to age-related pharmacokinetic changes (reduced clearance, increased volume of distribution). Gradual tapering reduces delirium and fall risk. Alternatives (melatonin, CBT) are preferred for insomnia.", "diagram": null}, {"id": 369, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_multimorbidity", "question": "A 76-year-old with heart failure (EF 35%), type 2 diabetes, CKD stage 3b, and hypertension is prescribed a new SGLT2 inhibitor (dapagliflozin). Which comorbid condition most directly benefits from SGLT2i beyond glucose control?", "options": {"A": "Hypertension alone", "B": "Heart failure with reduced ejection fraction", "C": "CKD progression alone", "D": "Type 2 diabetes alone", "E": "Cholinesterase inhibitor therapy"}, "answer": "B", "explanation": "SGLT2 inhibitors reduce HF-related hospitalizations and mortality in HFrEF, independent of glycemia. They also provide renoprotection and mild BP reduction, making them ideal in this multimorbid patient.", "diagram": null}, {"id": 370, "specialty": "geriatric_medicine", "tag": "medical_science_geriatric_medicine_bone_health", "question": "An 80-year-old woman with osteoporosis (T-score -3.2), prior hip fracture (5 years ago), and chronic kidney disease stage 3b (calcium 8.2, phosphate 4.1, corrected; 25-OH vitamin D 45 nmol/L) is reassessed for osteoporosis therapy. Current therapy is alendronate 70mg weekly. What is the most appropriate next step?", "options": {"A": "Continue alendronate indefinitely", "B": "Stop alendronate after 5 years and reassess", "C": "Add teriparatide", "D": "Switch to IV zoledronic acid annually", "E": "Subcutaneous fluid replacement"}, "answer": "B", "explanation": "After 5 years of bisphosphonate therapy in older adults with prior fracture, reassessment is recommended (DEXA, fracture risk reassessment). Continuation is individualized based on recurrent fracture risk. Alternative agents may be considered if inadequate response.", "diagram": null}, {"id": 371, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_advance_care", "question": "An 88-year-old man with advanced dementia, comorbidities, and loss of swallowing ability due to progression is hospitalized with aspiration pneumonia. Son asks about PEG tube placement for nutrition. What is the most evidence-based recommendation?", "options": {"A": "PEG placement improves survival and should be offered", "B": "PEG prevents aspiration and is recommended in advanced dementia", "C": "PEG provision does not improve outcomes and may cause complications; comfort-focused care is recommended", "D": "PEG is only appropriate if patient previously expressed desire for it", "E": "Palliative care referral"}, "answer": "C", "explanation": "Evidence shows PEG placement does not prolong survival or prevent aspiration pneumonia in advanced dementia. It increases complications (infection, migration). Comfort-focused feeding (hand-feeding, oral care) is preferred. Goals-of-care discussions are essential.", "diagram": null}, {"id": 372, "specialty": "geriatric_medicine", "tag": "medical_science_geriatric_medicine_cognition", "question": "A 79-year-old man with declining cognition performs well on general knowledge but has difficulty with short-term recall, orientation, and visuospatial tasks. MMSE 20/30. Brain MRI shows cortical atrophy without focal infarcts. What is the most likely diagnosis?", "options": {"A": "Normal aging", "B": "Mild cognitive impairment (amnestic type)", "C": "Alzheimer's disease", "D": "Vascular cognitive impairment", "E": "Continence assessment and management plan"}, "answer": "B", "explanation": "Pattern of cognitive decline with memory impairment greater than other domains, preserved general knowledge, and MRI without stroke suggests MCI (amnestic type), which may progress to AD. MMSE 20-24 is consistent with mild impairment.", "diagram": null}, {"id": 373, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_syncope", "question": "An 84-year-old man with syncope and near-syncope episodes (3 in past 2 months) has orthostatic vital signs: supine BP 118/72, standing BP 105/60 at 1 minute. Carotid sinus massage causes 3-second asystole. Heart rate is 58 bpm at rest. What is the most appropriate initial therapy?", "options": {"A": "Pacemaker insertion", "B": "Midodrine or fludrocortisone", "C": "Increase fluid intake and teach counterpressure maneuvers", "D": "Beta-blocker to reduce vasodepressor response", "E": "Nutritional supplementation with dietitian review"}, "answer": "B", "explanation": "This patient has carotid sinus hypersensitivity with cardioinhibitory response (asystole). Pacemaker is considered for cardioinhibitory response with symptoms refractory to conservative measures (fluids, compression, patient education). Midodrine or fludrocortisone may help.", "diagram": null}, {"id": 374, "specialty": "geriatric_medicine", "tag": "medical_science_geriatric_medicine_prescribing", "question": "An 84-year-old woman with mild cognitive impairment, recurrent falls, and urinary frequency is reviewed in your geriatric clinic. Her GP recently started oxybutynin 5mg BD for overactive bladder. She now reports worsening confusion and two further falls in the past week. Which mechanism best explains these adverse effects?", "options": {"A": "Alpha-1 adrenergic blockade causing orthostatic hypotension", "B": "Central and peripheral muscarinic receptor antagonism", "C": "Serotonergic excess in the raphe nuclei", "D": "GABA-A receptor potentiation causing over-sedation", "E": "Histamine H2 receptor blockade causing decreased gastric acid secretion"}, "answer": "B", "explanation": "Oxybutynin is a non-selective muscarinic antagonist that crosses the blood-brain barrier. Central M1 receptor blockade causes cognitive impairment and delirium, while peripheral anticholinergic effects include dry mouth, constipation, and urinary retention. It is listed in the Beers Criteria as potentially inappropriate in older adults, especially those with cognitive impairment.", "diagram": null}, {"id": 375, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_infection", "question": "An 86-year-old woman in a nursing home presents with fever 38.1°C, confusion, tachycardia (HR 98), and no localizing symptoms. Urinalysis with leukocyte esterase 2+, nitrites positive; urine culture pending. Blood cultures are negative. What is the most appropriate management?", "options": {"A": "Start broad-spectrum antibiotics immediately", "B": "Await urine culture and initiate empiric urinary tract infection treatment if indicated", "C": "Observe without antibiotics as asymptomatic bacteriuria is common", "D": "Repeat urinalysis in 48 hours", "E": "Delirium prevention bundle implementation"}, "answer": "B", "explanation": "In older adults, asymptomatic bacteriuria is common and should not be treated. However, this patient has fever and confusion (systemic symptoms) with positive UA, suggesting UTI. Empiric treatment is reasonable while awaiting culture, but treatment should be guided by culture if possible.", "diagram": null}, {"id": 376, "specialty": "geriatric_medicine", "tag": "medical_science_geriatric_medicine_nutrition_hydration", "question": "An 81-year-old man with advanced COPD, poor appetite, and weight loss is found to have albumin 28 g/L (low), BMI 19.5, and no dysphagia. What is the most evidence-based nutritional intervention to improve protein intake and preserve function?", "options": {"A": "Tube feeding (NG or PEG)", "B": "Oral nutritional supplements (ONS) 1-2 servings daily between meals", "C": "High-protein diet alone", "D": "Parenteral nutrition", "E": "Referral to aged care assessment team"}, "answer": "B", "explanation": "Oral nutritional supplements are first-line, evidence-based, and improve nutritional status and clinical outcomes in malnourished older adults without dysphagia. Tube feeding carries complications and is less preferred. High-protein diet alone often insufficient when intake is poor.", "diagram": null}, {"id": 377, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_sexuality", "question": "An 76-year-old man in a nursing home is observed being sexually intimate with a female resident who has moderate dementia (MMSE 18). The man denies coercion. What is the most appropriate institutional response?", "options": {"A": "Support autonomy and allow the relationship to continue", "B": "Separate the residents and investigate capacity and consent", "C": "Involve only the man's family in discussions", "D": "Place the woman in isolation to prevent encounters", "E": "Hip protector prescription"}, "answer": "B", "explanation": "Dementia raises concerns about consent capacity. Assessment of both residents' capacity to consent is necessary. If the woman cannot consent due to cognitive impairment, it constitutes sexual abuse despite the man's perception. Protecting vulnerable residents is an ethical and legal obligation.", "diagram": null}, {"id": 378, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_delirium", "question": "An 82-year-old woman admitted for hip fracture repair develops acute confusion on postoperative day 2. She is agitated, pulling at lines, and seeing insects on the wall. CAM score is positive. Medications include oxycodone 5 mg QID, paracetamol 1 g QID, and enoxaparin. Na 134, K 4.2, creatinine 98, CRP 45. What is the most appropriate first-line pharmacological intervention?", "options": {"A": "Haloperidol 0.5 mg oral", "B": "Olanzapine 5 mg oral", "C": "Midazolam 2.5 mg IM", "D": "Non-pharmacological measures first; medication only if severe distress or danger", "E": "Melatonin for sleep-wake cycle disturbance"}, "answer": "D", "explanation": "Current evidence (including NICE and Australian guidelines) recommends non-pharmacological interventions as first-line for delirium management: reorientation, sleep hygiene, minimising tethers, and addressing precipitants. Antipsychotics are reserved for patients with severe distress or who pose a danger to themselves or others.", "diagram": null}, {"id": 379, "specialty": "geriatric_medicine", "tag": "medical_science_geriatric_medicine_pharmacology", "question": "An 85-year-old man with CKD stage 4 (eGFR 22), heart failure, and osteoarthritis is taking ramipril, bisoprolol, furosemide, and regular ibuprofen prescribed by his GP for knee pain. He presents with acute kidney injury (creatinine risen from 180 to 340 µmol/L) and hyperkalaemia (K 6.2 mmol/L). Which combination most likely precipitated this deterioration?", "options": {"A": "Ramipril and bisoprolol", "B": "Ibuprofen and ramipril", "C": "Furosemide and bisoprolol", "D": "Ibuprofen and furosemide", "E": "Withdrawal of anticholinergic medications"}, "answer": "B", "explanation": "The \"triple whammy\" of NSAIDs, ACE inhibitors/ARBs, and diuretics is a well-recognised cause of acute kidney injury in older adults. NSAIDs inhibit prostaglandin-mediated afferent arteriolar vasodilation while ACEi/ARBs reduce efferent tone, critically reducing glomerular filtration pressure.", "diagram": null}, {"id": 380, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_falls", "question": "A 79-year-old woman presents after her third fall in 6 months. She describes feeling lightheaded when standing from a chair. Lying BP 148/82 mmHg HR 72; standing BP (3 minutes) 112/60 mmHg HR 78. Medications: amlodipine 10 mg, doxazosin 4 mg, sertraline 50 mg, oxybutynin 5 mg BD. What single medication change would most likely reduce her falls risk?", "options": {"A": "Cease amlodipine", "B": "Cease doxazosin", "C": "Cease sertraline", "D": "Cease oxybutynin", "E": "Postural blood pressure monitoring protocol"}, "answer": "B", "explanation": "Doxazosin (alpha-blocker) is the medication most likely contributing to symptomatic orthostatic hypotension. Alpha-blockers have the strongest association with orthostatic hypotension among her medications. While sertraline and oxybutynin contribute to falls risk via other mechanisms, the predominant symptom here is postural dizziness.", "diagram": null}, {"id": 381, "specialty": "geriatric_medicine", "tag": "medical_science_geriatric_medicine_frailty", "question": "A 78-year-old man is assessed preoperatively for elective aortic valve replacement. He walks slowly (gait speed 0.6 m/s), has unintentional weight loss of 5 kg over 6 months, reports exhaustion, has low grip strength, and low physical activity. His Clinical Frailty Scale score is 6. How many Fried frailty phenotype criteria does he meet and what is the classification?", "options": {"A": "3 criteria — frail", "B": "4 criteria — frail", "C": "5 criteria — frail", "D": "2 criteria — pre-frail", "E": "Frailty-adjusted surgical risk assessment"}, "answer": "C", "explanation": "He meets all 5 Fried frailty phenotype criteria: slow gait speed, unintentional weight loss, self-reported exhaustion, low grip strength, and low physical activity. Meeting 3 or more criteria defines frailty; meeting 1-2 defines pre-frailty. This carries significant implications for surgical risk stratification.", "diagram": null}, {"id": 382, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_deprescribing", "question": "A 90-year-old woman in residential care has advanced dementia (MMSE 8/30) and recurrent aspiration pneumonia. She is on atorvastatin 40 mg, metformin 1 g BD (HbA1c 48 mmol/mol), alendronate 70 mg weekly, donepezil 10 mg, and pantoprazole 40 mg daily. Applying deprescribing principles, which medication is the highest priority to cease?", "options": {"A": "Atorvastatin", "B": "Alendronate", "C": "Donepezil", "D": "Pantoprazole", "E": "Restorative care programme"}, "answer": "A", "explanation": "Statins for primary prevention have a time-to-benefit of 2-5 years and offer minimal benefit in advanced dementia with limited life expectancy. Atorvastatin should be the highest priority to cease. Alendronate is also reasonable to stop (swallowing difficulty, aspiration risk with oral bisphosphonates), but the statin has the clearest lack of benefit.", "diagram": null}, {"id": 383, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_incontinence", "question": "An 80-year-old woman in a residential care facility presents with urinary incontinence. She reports a strong, sudden urge to urinate followed by involuntary leakage before she can reach the toilet. Post-void residual volume is 30 mL.\nWhat is the most appropriate first-line management?", "options": {"A": "Indwelling urinary catheter", "B": "Bladder retraining and pelvic floor exercises", "C": "Alpha-blocker therapy", "D": "Intermittent self-catheterisation", "E": "Oxybutynin 5 mg TDS"}, "answer": "B", "explanation": "Urge incontinence is the most common type in elderly women, characterised by detrusor overactivity causing a strong, sudden urge followed by involuntary leakage. First-line management is conservative: bladder retraining (timed voiding, urge suppression techniques) and pelvic floor muscle training. Anticholinergic medications (oxybutynin, solifenacin) are second-line but should be used cautiously in the elderly due to cognitive side effects, dry mouth, constipation, and falls risk. Mirabegron (beta-3 agonist) has fewer anticholinergic side effects. The low post-void residual excludes overflow incontinence.", "diagram": null}, {"id": 384, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_elder_abuse", "question": "A 78-year-old man with mild dementia presents with unexplained bruising in various stages of healing, weight loss, and poor hygiene. He appears fearful when his son, who is his primary carer, is in the room. The son appears agitated and dismissive of concerns.\nWhat is the most appropriate initial action?", "options": {"A": "Discharge the patient with community nursing follow-up", "B": "Interview the patient alone and assess for elder abuse", "C": "Contact police immediately", "D": "Prescribe antidepressants for suspected depression", "E": "Prescribe anxiolytic medication for the carer"}, "answer": "B", "explanation": "Elder abuse (physical, psychological, financial, neglect, or sexual) affects an estimated 5-10% of older adults. Key risk factors include cognitive impairment, social isolation, carer stress, and carer substance use. Unexplained injuries in various stages of healing, malnutrition, poor hygiene, and fearful behaviour are red flags. The initial step is to interview the patient alone in a safe environment to assess their account and wishes. Mandatory reporting requirements vary by jurisdiction. A multidisciplinary approach involving social work, geriatric medicine, and legal services is essential. Documentation should be thorough and objective.", "diagram": null}, {"id": 385, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_functional_decline", "question": "An 82-year-old woman is admitted with a hip fracture. Prior to admission, she lived independently. During her hospital stay, she becomes deconditioned and develops hospital-acquired delirium.\nWhich intervention has the BEST evidence for preventing functional decline during hospitalisation?", "options": {"A": "Strict bed rest until the fracture is healed", "B": "Early mobilisation with a multidisciplinary rehabilitation program", "C": "Benzodiazepines for sleep", "D": "Restraints to prevent falls", "E": "Strict bed rest for 2 weeks then gradual mobilisation"}, "answer": "B", "explanation": "Early mobilisation and multidisciplinary rehabilitation are the most effective interventions for preventing and reversing functional decline in hospitalised older adults. Hospital-associated deconditioning occurs rapidly in the elderly — even 3-5 days of bed rest can lead to significant muscle loss and functional deterioration. Orthogeriatric co-management models (orthopaedic surgery + geriatric medicine) have been shown to reduce mortality, delirium, length of stay, and improve functional outcomes after hip fracture. Restraints and benzodiazepines worsen delirium and should be avoided.", "diagram": null}, {"id": 386, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_delirium", "question": "An 85-year-old man in a nursing home develops acute confusion, reduced oral intake, and urinary incontinence over 24 hours. His medications include oxybutynin 5 mg TDS, temazepam 10 mg nocte, and atenolol 25 mg daily. Which medication is the most likely contributor to his delirium?", "options": {"A": "Atenolol", "B": "Oxybutynin", "C": "All three equally", "D": "None — delirium is unlikely to be drug-related", "E": "Temazepam"}, "answer": "B", "explanation": "Oxybutynin is a strongly anticholinergic medication that commonly precipitates delirium in older patients. Anticholinergic burden is a major modifiable risk factor for delirium in the elderly.", "diagram": null}, {"id": 387, "specialty": "geriatric_medicine", "tag": "medical_science_geriatric_medicine_pharmacology", "question": "Which pharmacokinetic change in older adults is the most clinically significant factor increasing the risk of drug toxicity?", "options": {"A": "Increased gastric pH reducing drug absorption", "B": "Reduced hepatic first-pass metabolism", "C": "Reduced renal clearance of drugs and active metabolites", "D": "Increased volume of distribution for water-soluble drugs", "E": "Reduced plasma protein binding increasing free drug levels"}, "answer": "C", "explanation": "Age-related decline in GFR is the most important pharmacokinetic change, leading to accumulation of renally excreted drugs and metabolites (e.g. digoxin, lithium, DOACs, gentamicin).", "diagram": null}, {"id": 388, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_falls", "question": "A 79-year-old woman presents after her third fall in 6 months. She has postural hypotension (lying BP 148/82, standing BP 112/64 mmHg at 3 minutes). Medications include amlodipine 10 mg, ramipril 10 mg, doxazosin 4 mg, and bendroflumethiazide 2.5 mg. Which medication should be discontinued first?", "options": {"A": "Amlodipine", "B": "Ramipril", "C": "Doxazosin", "D": "Bendroflumethiazide", "E": "Cease all antihypertensives simultaneously"}, "answer": "C", "explanation": "Doxazosin (alpha-blocker) is the most likely cause of orthostatic hypotension and has the weakest evidence for cardiovascular benefit in this age group. Deprescribing alpha-blockers is prioritised in falls prevention.", "diagram": null}, {"id": 389, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_dementia", "question": "An 80-year-old woman with moderate Alzheimer disease (MMSE 16/30) is reviewed. She is on donepezil 10 mg daily. Her family reports worsening aggression and hitting staff in her aged care facility. What is the most appropriate initial management?", "options": {"A": "Commence risperidone 0.5 mg BD", "B": "Increase donepezil to 23 mg daily", "C": "Identify and address potential triggers (pain, constipation, infection, environmental)", "D": "Commence memantine 5 mg daily", "E": "Haloperidol 1 mg TDS"}, "answer": "C", "explanation": "Behavioural and psychological symptoms of dementia (BPSD) should first be managed by identifying and treating underlying causes (pain, delirium, constipation, urinary retention) and non-pharmacological strategies before considering antipsychotics.", "diagram": null}, {"id": 390, "specialty": "geriatric_medicine", "tag": "medical_science_geriatric_medicine_ageing", "question": "Which physiological change is a normal part of ageing rather than a pathological process?", "options": {"A": "Resting tachycardia", "B": "Reduced maximal heart rate response to exercise", "C": "Significantly elevated blood pressure (>180/100 mmHg)", "D": "New-onset atrial fibrillation", "E": "Progressive cognitive impairment affecting daily function"}, "answer": "B", "explanation": "Reduced maximal heart rate with exercise is a normal physiological change of ageing, due to decreased beta-adrenergic responsiveness and sinoatrial node fibrosis. Resting HR typically remains unchanged.", "diagram": null}, {"id": 391, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_capacity", "question": "An 82-year-old man with mild cognitive impairment refuses a recommended above-knee amputation for critical limb ischaemia. He understands his diagnosis, the proposed treatment, alternatives, and consequences of refusal, and can communicate his decision. What is the most appropriate course of action?", "options": {"A": "Proceed with surgery as it is life-saving", "B": "Respect his decision as he has demonstrated capacity", "C": "Request a guardian to make the decision", "D": "Obtain a psychiatric assessment to override his refusal", "E": "Delay the decision for 72 hours and reassess"}, "answer": "B", "explanation": "Capacity assessment requires understanding the information, retaining it, weighing it, and communicating a decision. If all criteria are met, the patient has capacity and their decision must be respected, even if it seems unwise.", "diagram": null}, {"id": 392, "specialty": "geriatric_medicine", "tag": "clinical_science_geriatric_medicine_polypharmacy", "question": "A 78-year-old woman takes 12 medications. She has recurrent falls, confusion, and declining renal function. Using the STOPP/START criteria, which class of medication is most commonly identified as potentially inappropriate in older adults?", "options": {"A": "Proton pump inhibitors beyond 8 weeks without clear indication", "B": "Statins for primary prevention in patients >85 years", "C": "Long-acting benzodiazepines", "D": "All of the above", "E": "Low-dose aspirin for primary prevention in over-70s"}, "answer": "D", "explanation": "STOPP criteria identify all three as potentially inappropriate: PPIs without indication, statins for primary prevention in very elderly, and long-acting benzodiazepines (fall risk, cognitive impairment). Polypharmacy review should address all.", "diagram": null}, {"id": 393, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_anaphylaxis", "question": "A 34-year-old woman with known peanut allergy is accidentally exposed and develops facial angioedema, stridor, hypotension (BP 88/52), and wheezing within 15 minutes. She carries an EpiPen. What is the most appropriate immediate management?", "options": {"A": "Administer IM epinephrine 0.3-0.5 mg, establish IV access, and arrange transfer to hospital", "B": "Give IV antihistamine and observe for 30 minutes", "C": "Oral diphenhydramine only", "D": "Wait for ambulance before treatment", "E": "Subcutaneous allergen immunotherapy"}, "answer": "A", "explanation": "Anaphylaxis with hypotension and airway involvement requires immediate IM epinephrine as first-line therapy (0.3-0.5 mg IM in anterolateral thigh). IV access, antihistamines, and corticosteroids are adjuncts. Transport to hospital for observation is mandatory.", "diagram": null}, {"id": 394, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_mechanism", "question": "A 22-year-old with atopic dermatitis (IgE-mediated) is found to have elevated serum IgE (650 IU/mL) and specific IgE to dust mites elevated. What immunological mechanism drives the itch-scratch cycle perpetuation?", "options": {"A": "TH1 cell predominance with IFN-gamma overproduction", "B": "TH2 cell predominance with IL-4 and IL-13 overproduction", "C": "Complement activation leading to mast cell degranulation", "D": "Deficient CD8+ cytotoxic T cell response", "E": "Omalizumab for chronic spontaneous urticaria"}, "answer": "B", "explanation": "Atopic dermatitis is driven by TH2 cell polarization and cytokine overproduction (IL-4, IL-13, IL-31), leading to IgE production, barrier dysfunction, and pruritis. The itch-scratch cycle perpetuates inflammation.", "diagram": null}, {"id": 395, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_immunotherapy", "question": "A 45-year-old man with severe seasonal allergic rhinitis refractory to antihistamines and intranasal corticosteroids is considering immunotherapy. He has tree pollen, dust mite, and cat dander allergies. What is the most appropriate type of immunotherapy?", "options": {"A": "Oral sublingual immunotherapy (SLIT) for all allergens", "B": "Subcutaneous allergen immunotherapy (SCIT) targeting relevant allergens", "C": "Omalizumab (anti-IgE monoclonal antibody)", "D": "High-dose IV immunoglobulin", "E": "Prophylactic C1 esterase inhibitor concentrate"}, "answer": "B", "explanation": "SCIT is more effective for multiple environmental allergens and severe disease. SLIT is less effective for environmental allergens and more suitable for pollen. Omalizumab is adjunctive, not primary therapy for rhinitis.", "diagram": null}, {"id": 396, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_immune_dysfunction", "question": "A 6-year-old boy with recurrent sinopulmonary infections (S. aureus, Haemophilus, Neisseria) has low CD4+ T cell count (450/μL, normal >1000), low CD8+ count (180/μL), low B cell count (85/μL), but normal immunoglobulin levels. What is the most likely diagnosis?", "options": {"A": "X-linked severe combined immunodeficiency (SCID)", "B": "DiGeorge syndrome (22q11 deletion)", "C": "Common variable immunodeficiency (CVID)", "D": "Selective IgA deficiency", "E": "Intravenous immunoglobulin replacement therapy"}, "answer": "B", "explanation": "DiGeorge syndrome (velocardiofacial syndrome) presents with T cell lymphopenia (CD4/CD8 reduction), partial B cell lymphopenia, and recurrent infections. Normal immunoglobulins help distinguish from CVID. SCID typically presents with more severe phenotype in infancy.", "diagram": null}, {"id": 397, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_drug_allergy", "question": "A 58-year-old with penicillin allergy (anaphylaxis 20 years ago) requires treatment for Streptococcus pneumoniae pneumonia. Skin prick testing and penicillin graded challenge (starting with low doses) are negative. What is the safest approach to antibiotic selection?", "options": {"A": "Avoid all beta-lactams and use fluoroquinolone", "B": "Safely re-introduce penicillin given negative allergy workup", "C": "Use cephalosporin with <1% cross-reactivity risk", "D": "Use vancomycin as safest option", "E": "Oral food challenge under supervision"}, "answer": "B", "explanation": "Approximately 10% of patients with self-reported penicillin allergy have true IgE-mediated allergy. Negative skin testing and graded challenge testing strongly support safe penicillin use. Allergy loss over time is common. Re-introduction is safe and provides optimal coverage.", "diagram": null}, {"id": 398, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_complement", "question": "A 32-year-old woman with recurrent episodes of acute angioedema without urticaria and normal complement C4 levels has normal C1-esterase inhibitor (C1-INH) antigen and activity levels. What is the most likely diagnosis?", "options": {"A": "Hereditary angioedema type 1 (C1-INH deficiency)", "B": "Hereditary angioedema type 2 (C1-INH dysfunction)", "C": "Acquired angioedema", "D": "Hereditary angioedema with normal C1-INH (HAE-nC1INH)", "E": "Skin prick testing to standard aeroallergens"}, "answer": "D", "explanation": "HAE-nC1INH (type 3) presents with angioedema without urticaria and normal C1-INH antigen and function. Mutations in F12 (Factor XII), PLG (plasminogen), or other genes are identified. C4 may be normal or low.", "diagram": null}, {"id": 399, "specialty": "immunology_allergy", "tag": "clinical_science_immunology_allergy_urticaria", "question": "A 28-year-old woman has chronic spontaneous urticaria for 8 weeks despite regular cetirizine 10mg daily. She has no identified triggers, normal thyroid function, and negative skin prick testing. What is the most appropriate next step in management?", "options": {"A": "Increase cetirizine to 40-50 mg daily", "B": "Add cyclosporine", "C": "Add omalizumab (anti-IgE)", "D": "Discontinue antihistamines and use topical corticosteroids", "E": "Serum tryptase level measurement"}, "answer": "A", "explanation": "Non-sedating antihistamines up to 4-fold higher doses are recommended for inadequately controlled chronic urticaria. Omalizumab is second-line if high-dose antihistamines fail. Cyclosporine is third-line.", "diagram": null}, {"id": 400, "specialty": "immunology_allergy", "tag": "medical_science_immunology_allergy_th1_response", "question": "A 42-year-old man with sarcoidosis has elevated serum ACE levels, hypercalcemia (corrected calcium 2.72 mmol/L), and pulmonary infiltrates. Which immune mechanism is primarily responsible for granuloma formation and disease?", "options": {"A": "TH2-mediated humoral immunity", "B": "TH1 and TH17-mediated granulomatous inflammation", "C": "Antibody complex deposition (type III hypersensitivity)", "D": "Cytotoxic T cell (CTL) predominance", "E": "Complement function assay (CH50 and AP5
