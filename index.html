ases. PET-CT reveals no regional lymphadenopathy. He is cardiopulmonary fit with FEV1 75% predicted.\n\nWhat is the most appropriate initial therapeutic approach?", "options": {"A": "Oesophagectomy without neoadjuvant therapy", "B": "Neoadjuvant chemoradiotherapy followed by surgical resection", "C": "Definitive chemoradiotherapy without surgery", "D": "Endoscopic mucosal resection", "E": "Transhiatal oesophagectomy without reconstruction"}, "answer": "B", "explanation": "Locally advanced oesophageal adenocarcinoma (cT3 or node-positive without distant metastases) is best managed with neoadjuvant chemoradiotherapy (CROSS protocol) followed by oesophagectomy. This approach improves R0 resection rates and overall survival compared to surgery alone. EMR is reserved for early mucosal disease (T1a). Definitive chemoradiation is used when surgery is not feasible.", "diagram": null}, {"id": 94, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_management", "question": "A 34-year-old woman with known Crohn disease affecting the terminal ileum presents with worsening abdominal pain, fevers, and a tender right iliac fossa mass. CT abdomen shows a 5 cm intra-abdominal abscess adjacent to a thickened terminal ileum. CRP 186 mg/L [<5].\n\nWhat is the most appropriate initial management?", "options": {"A": "Commence infliximab", "B": "Urgent right hemicolectomy", "C": "Percutaneous abscess drainage and intravenous antibiotics", "D": "High-dose oral prednisolone", "E": "Delayed resection after 6 weeks of conservative management"}, "answer": "C", "explanation": "Intra-abdominal abscesses complicating Crohn disease should be drained (percutaneously if technically feasible) and treated with IV antibiotics before definitive management of the underlying disease. Initiating biologics (infliximab) in the setting of undrained sepsis risks worsening infection. Surgery may be needed subsequently but is not first-line with a drainable collection. Corticosteroids are contraindicated in the presence of sepsis.", "diagram": null}, {"id": 95, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_management", "question": "A 72-year-old man on aspirin 100 mg daily and apixaban 5 mg BD for atrial fibrillation presents with acute onset upper abdominal pain and two episodes of haematemesis (blood-stained). Current medications: apixaban, bisoprolol, omeprazole 20 mg daily. Vitals: BP 98/62 mmHg, HR 108 bpm. Haemoglobin 87 g/L (baseline 110 g/L). Urgent gastroscopy reveals a 2 cm posterior gastric ulcer with a visible vessel and overlying clot. No stigmata of recent bleeding observed. Surrounding gastric mucosa shows multiple small erosions consistent with NSAIDs (he denies NSAID use).\n\nWhat is the most appropriate immediate endoscopic management?", "options": {"A": "No endoscopic therapy; high-dose IV proton pump inhibitor only", "B": "Injection of dilute adrenaline alone", "C": "Dual endoscopic therapy (adrenaline injection plus thermal coagulation or clips)", "D": "Endoscopic band ligation", "E": "Endoscopic stenting with covered metal stent"}, "answer": "C", "explanation": "Forrest IIa ulcers (visible vessel without active bleeding) carry a high rebleeding risk (~40%) and require endoscopic haemostasis. Dual therapy (adrenaline injection combined with a second modality such as thermal coagulation or clips) is superior to monotherapy. Adrenaline alone is insufficient. Band ligation is used for variceal bleeding. IV PPI is adjunctive, not a substitute for endoscopic therapy in high-risk stigmata.", "diagram": null}, {"id": 96, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_diagnosis", "question": "A 45-year-old woman presents with a 4-month history of watery diarrhoea, flushing, and episodic wheezing. She reports 5 kg weight loss. Examination reveals hepatomegaly with a palpable nodular liver edge. 24-hour urinary 5-HIAA is markedly elevated.\n\nWhat is the most likely diagnosis?", "options": {"A": "VIPoma", "B": "Carcinoid syndrome secondary to metastatic neuroendocrine tumour", "C": "Systemic mastocytosis", "D": "Zollinger-Ellison syndrome", "E": "Somatostatin-secreting neuroendocrine tumour"}, "answer": "B", "explanation": "The triad of diarrhoea, flushing, and wheezing with elevated urinary 5-HIAA is classic for carcinoid syndrome. Carcinoid syndrome occurs when serotonin-producing neuroendocrine tumour products bypass hepatic metabolism — typically due to liver metastases (explaining the nodular hepatomegaly). VIPoma causes secretory diarrhoea but not flushing. Systemic mastocytosis can cause flushing but 5-HIAA is not elevated. ZES causes peptic ulceration and diarrhoea but not flushing.", "diagram": null}, {"id": 97, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_diagnosis", "question": "A 28-year-old man presents with a 3-month history of bloody diarrhoea (8–10 stools daily), nocturnal symptoms, abdominal cramping, and 4 kg weight loss. Temperature 37.2°C, haemoglobin 92 g/L, albumin 32 g/L, CRP 85 mg/L, faecal calprotectin 2800 µg/g. Colonoscopy shows continuous erythema and ulceration from rectum to splenic flexure with normal ileoscopy. No skip lesions identified. Rectal biopsy demonstrates crypt distortion, surface ulceration, and increased chronic inflammation confined to the mucosa and submucosa. CT enterography shows mural thickening without mesenteric fat stranding.\n\nWhat is the diagnosis?", "options": {"A": "Crohn colitis", "B": "Left-sided ulcerative colitis", "C": "Infectious colitis due to Clostridioides difficile", "D": "Ischaemic colitis", "E": "Acute severe colitis secondary to enteric infection"}, "answer": "B", "explanation": "Continuous mucosal inflammation extending proximally from the rectum without skip lesions or terminal ileum involvement is characteristic of ulcerative colitis. Left-sided UC extends to but not beyond the splenic flexure. Crohn colitis typically causes patchy, transmural inflammation with skip lesions. C. difficile colitis is usually diffuse and non-specific endoscopically. Ischaemic colitis favours watershed areas and spares the rectum.", "diagram": null}, {"id": 98, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_diagnosis", "question": "A 55-year-old woman with type 2 diabetes and obesity presents with abnormal liver function tests: ALT 98 U/L [<40], AST 72 U/L [<35], GGT 120 U/L [<55], ALP 95 U/L [30–110]. She denies alcohol use. Hepatitis B and C serology are negative. Ferritin is 380 µg/L [20–200]. Liver ultrasound shows diffuse increased echogenicity.\n\nWhat is the most likely diagnosis?", "options": {"A": "Haemochromatosis", "B": "Autoimmune hepatitis", "C": "Metabolic dysfunction-associated steatotic liver disease (MASLD)", "D": "Primary biliary cholangitis", "E": "Hereditary haemochromatosis with secondary cirrhosis"}, "answer": "C", "explanation": "In a patient with metabolic risk factors (T2DM, obesity), elevated transaminases with AST:ALT ratio <1, mildly raised ferritin (common in metabolic syndrome as an acute-phase reactant), negative viral serology, and ultrasound showing steatosis, MASLD (formerly NAFLD) is the most likely diagnosis. Haemochromatosis typically presents with transferrin saturation >45%. PBC causes a cholestatic pattern with raised ALP and positive anti-mitochondrial antibodies.", "diagram": null}, {"id": 99, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_investigation", "question": "A 62-year-old man presents with progressive dysphagia over 3 months, initially to solids, now to liquids. He has lost 6 kg. He has a history of long-standing gastro-oesophageal reflux. Upper endoscopy is arranged.\n\nWhich additional investigation is most important for staging if malignancy is confirmed?", "options": {"A": "Barium swallow", "B": "Endoscopic ultrasound (EUS)", "C": "Serum CA 19-9", "D": "Capsule endoscopy", "E": "Chromoendoscopy with narrow-band imaging (NBI)"}, "answer": "B", "explanation": "Endoscopic ultrasound (EUS) is the most accurate modality for local T and N staging of oesophageal cancer. It determines depth of tumour invasion and regional lymph node involvement, which is critical for determining resectability and the need for neoadjuvant therapy. CT is used for distant staging. Barium swallow may show a stricture but does not stage. CA 19-9 is neither sensitive nor specific for oesophageal cancer.", "diagram": null}, {"id": 100, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_investigation", "question": "A 40-year-old woman presents with recurrent epigastric pain, diarrhoea, and weight loss. She has had two duodenal ulcers in the past 12 months despite PPI therapy. Fasting serum gastrin is 1200 pg/mL [<100].\n\nWhat is the most appropriate next investigation?", "options": {"A": "Secretin stimulation test", "B": "Urea breath test for H. pylori", "C": "CT abdomen with contrast", "D": "Faecal elastase", "E": "Immunosuppression with azathioprine and infliximab"}, "answer": "A", "explanation": "A markedly elevated fasting gastrin (>10x normal) with recurrent ulceration despite PPI therapy is highly suspicious for Zollinger-Ellison syndrome (gastrinoma). The secretin stimulation test is the confirmatory test — in ZES, IV secretin paradoxically increases gastrin by >120 pg/mL (normally gastrin falls or stays flat). CT/MRI is for tumour localisation, not diagnosis. H. pylori should be tested but does not explain this degree of hypergastrinaemia.", "diagram": null}, {"id": 101, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_complications", "question": "A 48-year-old man with known alcohol-related cirrhosis (Child-Pugh C) presents with increasing abdominal distension over 2 weeks. Diagnostic paracentesis shows an ascitic fluid neutrophil count of 380 cells/mm³ and ascitic albumin of 8 g/L. Serum albumin is 24 g/L.\n\nWhat is the most appropriate immediate treatment?", "options": {"A": "Therapeutic large-volume paracentesis with albumin infusion", "B": "Intravenous ceftriaxone", "C": "Oral spironolactone and furosemide", "D": "Transjugular intrahepatic portosystemic shunt (TIPS)", "E": "Variceal band ligation with albumin infusion"}, "answer": "B", "explanation": "An ascitic fluid neutrophil count >250 cells/mm³ is diagnostic of spontaneous bacterial peritonitis (SBP), regardless of culture results. Empiric IV antibiotics (ceftriaxone or cefotaxime) must be commenced immediately as SBP carries significant mortality. Albumin infusion is also given (day 1 and day 3) to prevent hepatorenal syndrome, but antibiotics are the priority. Diuretics and TIPS are for managing the ascites itself, not the acute infection.", "diagram": null}, {"id": 102, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_complications", "question": "A 56-year-old woman with biopsy-proven cirrhosis secondary to autoimmune hepatitis (on azathioprine 100 mg daily, prednisolone 10 mg daily) attends clinic asymptomatic. Child-Pugh score 5 (compensated). Recent endoscopy 8 weeks ago showed oesophageal varices without red wale signs. Platelet count 110 x 10^9/L, bilirubin 28 µmol/L, albumin 36 g/L. She is haemodynamically stable with no prior variceal bleeding.\n\nWhat is the most appropriate management strategy?", "options": {"A": "Endoscopic variceal band ligation", "B": "Non-selective beta-blocker (propranolol or carvedilol)", "C": "Prophylactic TIPS insertion", "D": "No intervention; repeat endoscopy in 12 months", "E": "Combination therapy with beta-blocker and isosorbide mononitrate"}, "answer": "B", "explanation": "Primary prophylaxis for medium/large oesophageal varices (grade II or above) without red signs is non-selective beta-blocker therapy (propranolol or carvedilol). These reduce portal pressure and halve the risk of first variceal bleed. Band ligation is an alternative for primary prophylaxis if beta-blockers are contraindicated or not tolerated, but beta-blockers are first-line. TIPS is reserved for refractory bleeding. Observation alone is inappropriate for medium varices.", "diagram": null}, {"id": 103, "specialty": "gastroenterology", "tag": "medical_science_gastroenterology_pharmacology", "question": "A 62-year-old man with Crohn disease refractory to azathioprine is commenced on infliximab. He has a history of latent tuberculosis treated 2 years ago.\n\nWhat is the primary mechanism of action of infliximab?", "options": {"A": "Inhibition of interleukin-12 and interleukin-23", "B": "Blockade of alpha-4 integrin on leukocytes", "C": "Neutralisation of tumour necrosis factor-alpha", "D": "Inhibition of Janus kinase (JAK) signalling", "E": "Inhibition of T-cell co-stimulation via CD28-B7 blockade"}, "answer": "C", "explanation": "Infliximab is a chimeric monoclonal antibody that binds to and neutralises TNF-alpha, a key pro-inflammatory cytokine in the pathogenesis of Crohn disease. It binds both soluble and membrane-bound TNF-alpha, inducing apoptosis of TNF-expressing inflammatory cells. IL-12/23 blockade is the mechanism of ustekinumab. Alpha-4 integrin blockade is vedolizumab/natalizumab. JAK inhibition is the mechanism of tofacitinib and upadacitinib.", "diagram": null}, {"id": 104, "specialty": "gastroenterology", "tag": "medical_science_gastroenterology_pharmacology", "question": "A 45-year-old woman with ulcerative colitis maintained on mesalazine develops a flare requiring oral prednisolone. After remission is achieved, azathioprine is introduced as a steroid-sparing agent.\n\nWhich investigation should be performed before commencing azathioprine?", "options": {"A": "HLA-B27 genotyping", "B": "Thiopurine methyltransferase (TPMT) activity", "C": "Anti-nuclear antibody titre", "D": "Serum tryptase level", "E": "Cytochrome P450 3A4 interaction screening"}, "answer": "B", "explanation": "TPMT enzyme activity must be measured before starting azathioprine or 6-mercaptopurine. Patients with low or absent TPMT activity are at high risk of severe myelosuppression due to accumulation of cytotoxic thioguanine nucleotides. Homozygous TPMT deficiency (1 in 300) is an absolute contraindication. Heterozygotes require dose reduction. NUDT15 genotyping is also increasingly used, particularly in patients of Asian ancestry.", "diagram": null}, {"id": 105, "specialty": "gastroenterology", "tag": "medical_science_gastroenterology_pharmacology", "question": "A 70-year-old man with Barrett oesophagus and GORD is on long-term omeprazole 40 mg daily. He asks about potential risks of prolonged PPI use.\n\nWhich of the following is a well-established risk of long-term PPI therapy?", "options": {"A": "Hepatocellular carcinoma", "B": "Hypomagnesaemia", "C": "Hyperkalaemia", "D": "Thrombocytopenia", "E": "Vitamin B12 deficiency"}, "answer": "B", "explanation": "Hypomagnesaemia is a well-established complication of long-term PPI use, mediated by impaired intestinal magnesium absorption via TRPM6/7 channels. Other established risks include C. difficile infection, community-acquired pneumonia, osteoporosis-related fractures, vitamin B12 deficiency, and iron deficiency. The mechanism involves reduced gastric acid impairing absorption of minerals and vitamins requiring an acidic environment. Hepatocellular carcinoma and thrombocytopenia are not established PPI risks.", "diagram": null}, {"id": 106, "specialty": "gastroenterology", "tag": "medical_science_gastroenterology_pathophysiology", "question": "A 35-year-old woman is diagnosed with coeliac disease after presenting with iron deficiency anaemia and chronic diarrhoea. Duodenal biopsy shows villous atrophy, crypt hyperplasia, and increased intraepithelial lymphocytes.\n\nWhat is the primary immunological mechanism underlying coeliac disease?", "options": {"A": "IgE-mediated mast cell degranulation against wheat proteins", "B": "HLA-DQ2/DQ8-restricted T-cell response to deamidated gliadin peptides", "C": "Complement-mediated destruction of enterocytes by anti-endomysial antibodies", "D": "Innate immune activation by wheat amylase-trypsin inhibitors", "E": "IgG4-mediated autoimmune activation of intestinal epithelial cells"}, "answer": "B", "explanation": "Coeliac disease is driven by an adaptive immune response: tissue transglutaminase (tTG) deamidates gliadin peptides, which are then presented by HLA-DQ2 or DQ8 molecules on antigen-presenting cells to CD4+ T cells in the lamina propria. This triggers a Th1 inflammatory response with release of IFN-gamma, leading to villous atrophy and crypt hyperplasia. The intraepithelial lymphocytes (CD8+ T cells) mediate direct epithelial damage. It is not IgE-mediated (that would be wheat allergy).", "diagram": null}, {"id": 107, "specialty": "gastroenterology", "tag": "medical_science_gastroenterology_pathophysiology", "question": "A 52-year-old man with alcohol-related cirrhosis develops hepatorenal syndrome type 1. His serum creatinine has risen from 90 to 280 µmol/L [45–90] over 10 days despite volume resuscitation.\n\nWhat is the primary pathophysiological mechanism of hepatorenal syndrome?", "options": {"A": "Direct nephrotoxicity from circulating bile acids", "B": "Splanchnic vasodilatation leading to renal vasoconstriction", "C": "Immune-complex deposition in the glomeruli", "D": "Renal tubular obstruction by bilirubin casts", "E": "Acute tubular necrosis from transient ischaemia"}, "answer": "B", "explanation": "Hepatorenal syndrome (HRS) is a functional renal failure caused by severe splanchnic arterial vasodilatation (mediated by nitric oxide and other vasodilators in portal hypertension). This leads to reduced effective arterial blood volume, activation of the renin-angiotensin-aldosterone system and sympathetic nervous system, and intense renal vasoconstriction. The kidneys are structurally normal — if transplanted to a healthy recipient, they function normally. Treatment targets the splanchnic vasodilation (terlipressin + albumin).", "diagram": null}, {"id": 108, "specialty": "gastroenterology", "tag": "medical_science_gastroenterology_immunology", "question": "A 30-year-old woman presents with jaundice, fatigue, and elevated liver enzymes. ANA titre is 1:640, anti-smooth muscle antibodies are positive, and IgG is 28 g/L [6.5–16.0]. Liver biopsy shows interface hepatitis with plasma cell-rich infiltrate.\n\nWhat is the most likely diagnosis?", "options": {"A": "Primary biliary cholangitis", "B": "Autoimmune hepatitis type 1", "C": "Primary sclerosing cholangitis", "D": "Drug-induced liver injury", "E": "Primary sclerosing cholangitis with anti-mitochondrial antibody positivity"}, "answer": "B", "explanation": "The combination of positive ANA, anti-smooth muscle antibodies (anti-SMA), markedly elevated IgG, and interface hepatitis with plasma cell infiltrate on biopsy is diagnostic of autoimmune hepatitis type 1. Type 2 AIH is characterised by anti-LKM1 antibodies and is more common in children. PBC presents with cholestatic enzymes and anti-mitochondrial antibodies. PSC shows biliary changes on cholangiography with a peri-ductal \"onion-skin\" fibrosis pattern.", "diagram": null}, {"id": 109, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_prevention", "question": "A 50-year-old man with no family history of colorectal cancer undergoes his first screening colonoscopy. Two adenomas are removed: a 12 mm tubular adenoma without high-grade dysplasia, and a 7 mm sessile serrated lesion. Complete colonoscopy to caecum with adequate mucosal visualisation. No other pathology identified.\n\nWhat surveillance interval is recommended?", "options": {"A": "1 year", "B": "3 years", "C": "5 years", "D": "10 years", "E": "Biennial surveillance due to adenoma prevalence"}, "answer": "B", "explanation": "According to current guidelines (BSG, NHMRC), patients with 1-4 small (<20 mm) tubular adenomas with low-grade dysplasia are classified as intermediate risk and should have surveillance colonoscopy at 3 years. High-risk features (>5 adenomas, any adenoma >20 mm, villous histology, or high-grade dysplasia) warrant 1-year surveillance. Low-risk patients (1-2 adenomas <10 mm) can be surveilled at 5 years or returned to population screening.", "diagram": null}, {"id": 110, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_prevention", "question": "A 25-year-old man is diagnosed with familial adenomatous polyposis (FAP) after genetic testing reveals an APC gene mutation. His father died of colorectal cancer at age 38. Clinical examination reveals >100 adenomatous polyps throughout the colon and rectum. Flexible sigmoidoscopy shows no dysplasia in the rectum currently. Extraintestinal manifestations: none currently, but ophthalmology screening arranged.\n\nWhat is the most appropriate management?", "options": {"A": "Annual colonoscopy with polypectomy of large polyps", "B": "Prophylactic proctocolectomy", "C": "Sulindac therapy to induce polyp regression", "D": "Five-yearly colonoscopic surveillance", "E": "Flexible sigmoidoscopy with selective polypectomy"}, "answer": "B", "explanation": "Classic FAP with >100 colorectal polyps carries a near-100% lifetime risk of colorectal cancer if untreated. Prophylactic proctocolectomy (with ileal pouch-anal anastomosis or end ileostomy) is the definitive management, ideally performed in early adulthood before cancer develops. NSAIDs (sulindac, celecoxib) can reduce polyp burden but do not eliminate cancer risk and are not a substitute for surgery. Surveillance alone is inadequate given the polyp burden.", "diagram": null}, {"id": 111, "specialty": "gastroenterology", "tag": "medical_science_gastroenterology_genetics", "question": "A 32-year-old woman is diagnosed with colorectal cancer. Family history reveals her mother had endometrial cancer at age 45 and her maternal uncle had colorectal cancer at age 42. Immunohistochemistry of the tumour shows loss of MLH1 and PMS2 expression.\n\nWhat is the most likely underlying genetic condition?", "options": {"A": "Familial adenomatous polyposis", "B": "Lynch syndrome (hereditary non-polyposis colorectal cancer)", "C": "Li-Fraumeni syndrome", "D": "Peutz-Jeghers syndrome", "E": "Mismatch repair gene (MLH1/MSH2/MSH6/PMS2) deficiency"}, "answer": "B", "explanation": "Lynch syndrome is caused by germline mutations in DNA mismatch repair genes (MLH1, MSH2, MSH6, PMS2). Loss of MLH1/PMS2 expression on immunohistochemistry, young-onset CRC, and a family history meeting Amsterdam criteria (CRC + endometrial cancer in first-degree relatives) is diagnostic. Lynch syndrome confers increased risk of colorectal, endometrial, ovarian, gastric, and urothelial cancers. FAP involves APC gene mutations with hundreds of polyps. Peutz-Jeghers involves STK11 mutations with hamartomatous polyps.", "diagram": null}, {"id": 112, "specialty": "gastroenterology", "tag": "medical_science_gastroenterology_genetics", "question": "A 22-year-old man presents with recurrent episodes of unconjugated hyperbilirubinaemia, typically precipitated by fasting, illness, or stress. Total bilirubin is 52 µmol/L [<20] with a conjugated fraction of 5 µmol/L. All other liver function tests are normal. Full blood count and reticulocyte count are normal.\n\nWhat is the most likely diagnosis?", "options": {"A": "Crigler-Najjar syndrome type I", "B": "Gilbert syndrome", "C": "Dubin-Johnson syndrome", "D": "Rotor syndrome", "E": "Dubin-Johnson syndrome with impaired bilirubin excretion"}, "answer": "B", "explanation": "Gilbert syndrome is the most common inherited cause of unconjugated hyperbilirubinaemia, affecting 5-10% of the population. It results from reduced UGT1A1 enzyme activity (typically a TA repeat polymorphism in the promoter region). Bilirubin rises with fasting, stress, or illness but rarely exceeds 80 µmol/L. It is benign and requires no treatment. Crigler-Najjar type I causes severe neonatal jaundice. Dubin-Johnson and Rotor syndromes cause conjugated hyperbilirubinaemia.", "diagram": null}, {"id": 113, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_hepatitis", "question": "A 35-year-old man presents with jaundice, fatigue, and right upper quadrant pain. He recently returned from Southeast Asia. Serology shows HBsAg positive, IgM anti-HBc positive, HBeAg positive, and HBV DNA elevated.\nWhat is the most likely diagnosis?", "options": {"A": "Chronic hepatitis B", "B": "Acute hepatitis B infection", "C": "Hepatitis B with delta co-infection", "D": "Occult hepatitis B", "E": "Hepatitis D co-infection"}, "answer": "B", "explanation": "IgM anti-HBc is the hallmark of acute hepatitis B infection, appearing early and typically lasting 4-6 months. In acute infection, HBsAg and HBeAg are also positive with elevated HBV DNA. In chronic hepatitis B, IgG anti-HBc replaces IgM. The combination of positive HBsAg, IgM anti-HBc, and HBeAg with elevated viral load in a symptomatic patient from an endemic area confirms acute infection. Most immunocompetent adults (>95%) clear acute HBV spontaneously.", "diagram": null}, {"id": 114, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_pancreatitis", "question": "A 52-year-old man presents with severe epigastric pain radiating to the back, nausea, and vomiting. His serum lipase is 1,200 U/L (normal <60). CT abdomen with contrast at 72 hours reveals >30% pancreatic necrosis.\nWhich feature carries the WORST prognostic significance?", "options": {"A": "Elevated serum lipase", "B": "CT evidence of pancreatic necrosis", "C": "Age over 50 years", "D": "Presence of nausea and vomiting", "E": "Ranson criteria at admission"}, "answer": "B", "explanation": "Pancreatic necrosis on CT is one of the most important prognostic indicators in acute pancreatitis. The revised Atlanta classification distinguishes mild (no organ failure or local complications), moderately severe (transient organ failure <48h or local complications), and severe (persistent organ failure >48h) disease. CT-documented necrosis significantly increases the risk of infected necrosis, organ failure, and mortality. Ranson criteria and APACHE II scores also predict severity, but imaging-confirmed necrosis is a key determinant of outcome.", "diagram": null}, {"id": 115, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_coeliac", "question": "A 30-year-old woman presents with iron deficiency anaemia, intermittent bloating, and diarrhoea. She has a family history of type 1 diabetes. Anti-tissue transglutaminase (tTG) IgA antibody is strongly positive and total IgA is normal.\nWhat is the recommended next step?", "options": {"A": "Start a gluten-free diet immediately", "B": "Duodenal biopsy via upper endoscopy", "C": "Check HLA-DQ2/DQ8 genotyping", "D": "Trial of proton pump inhibitor therapy", "E": "HLA-DQ8 genotyping alone"}, "answer": "B", "explanation": "While anti-tTG IgA has high sensitivity and specificity for coeliac disease, duodenal biopsy remains the standard for confirming the diagnosis in adults before committing to lifelong dietary restriction. Characteristic histological findings include villous atrophy, crypt hyperplasia, and intraepithelial lymphocytosis (Marsh classification). It is essential that the patient is still consuming gluten at the time of biopsy to avoid false-negative results. HLA-DQ2/DQ8 testing is useful for exclusion (high negative predictive value) but not confirmation.", "diagram": null}, {"id": 116, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_liver_disease", "question": "A 48-year-old man with a 20-year history of heavy alcohol use presents with ascites, jaundice, and spider naevi. His INR is 2.1, albumin 24 g/L, bilirubin 85 µmol/L, and he has grade II hepatic encephalopathy.\nWhat is this patient's Child-Pugh class?", "options": {"A": "Child-Pugh A", "B": "Child-Pugh B", "C": "Child-Pugh C", "D": "Cannot be determined without additional information", "E": "Child-Pugh B"}, "answer": "C", "explanation": "The Child-Pugh score uses five parameters: bilirubin, albumin, INR, ascites, and hepatic encephalopathy, each scored 1-3 points. This patient scores: bilirubin (85 µmol/L = 3 points), albumin (24 g/L = 3 points), INR (2.1 = 3 points), ascites (present = 2-3 points), encephalopathy grade II (= 3 points), giving a total of 14-15 = Class C (10-15 points). Child-Pugh C indicates decompensated cirrhosis with 1-year survival of approximately 45% and should prompt assessment for liver transplantation.", "diagram": null}, {"id": 117, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_gord", "question": "A 58-year-old man presents with a 10-year history of heartburn and nocturnal regurgitation. Upper endoscopy reveals circumferential salmon-coloured mucosa extending 4 cm above the gastro-oesophageal junction. Biopsies confirm intestinal metaplasia.\nWhat is this condition and what is the recommended surveillance strategy?", "options": {"A": "Barrett oesophagus — endoscopic surveillance every 2-3 years if no dysplasia", "B": "Oesophageal adenocarcinoma — urgent surgical referral", "C": "Erosive oesophagitis — repeat endoscopy in 8 weeks on PPI", "D": "Eosinophilic oesophagitis — dietary elimination trial", "E": "Oesophageal squamous cell carcinoma — urgent surgical referral"}, "answer": "A", "explanation": "Barrett oesophagus is defined by the replacement of normal squamous epithelium by intestinal metaplasia (goblet cells) in the distal oesophagus, a complication of chronic GORD. Long-segment Barrett (≥3 cm) carries an increased risk of progression to dysplasia and oesophageal adenocarcinoma. Management includes high-dose PPI therapy and endoscopic surveillance — every 2-3 years for non-dysplastic Barrett, with more frequent surveillance or intervention (endoscopic mucosal resection or radiofrequency ablation) if dysplasia is detected.", "diagram": null}, {"id": 118, "specialty": "gastroenterology", "tag": "medical_science_gastroenterology_bilirubin", "question": "Which enzyme is primarily responsible for conjugation of bilirubin in hepatocytes?", "options": {"A": "Heme oxygenase", "B": "UDP-glucuronosyltransferase (UGT1A1)", "C": "Biliverdin reductase", "D": "Cytochrome P450 3A4", "E": "Glutathione S-transferase"}, "answer": "B", "explanation": "UGT1A1 conjugates unconjugated bilirubin with glucuronic acid, producing water-soluble conjugated bilirubin for biliary excretion.", "diagram": null}, {"id": 119, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_liver_disease", "question": "A 52-year-old man with alcohol-related cirrhosis presents with increasing abdominal distension over 2 weeks. Diagnostic paracentesis reveals: protein 8 g/L, serum-ascites albumin gradient (SAAG) 18 g/L, neutrophil count 80 cells/µL. What is the most likely cause of his ascites?", "options": {"A": "Portal hypertension", "B": "Peritoneal carcinomatosis", "C": "Spontaneous bacterial peritonitis", "D": "Tuberculous peritonitis", "E": "Nephrotic syndrome"}, "answer": "A", "explanation": "A SAAG ≥11 g/L indicates portal hypertension as the cause. The low ascitic protein and low neutrophil count (<250) exclude SBP and other causes.", "diagram": null}, {"id": 120, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_ibd", "question": "A 35-year-old woman with Crohn disease on azathioprine 2 mg/kg/day develops a WCC of 2.1 × 10⁹/L (neutrophils 0.8 × 10⁹/L). TPMT genotype testing shows intermediate activity. What is the most appropriate next step?", "options": {"A": "Cease azathioprine and switch to methotrexate", "B": "Reduce azathioprine dose by 50% and recheck FBC in 2 weeks", "C": "Continue current dose and repeat FBC in 1 week", "D": "Add allopurinol and reduce azathioprine to one-third dose", "E": "Increase azathioprine dose to overcome marrow suppression"}, "answer": "B", "explanation": "Intermediate TPMT activity increases risk of myelosuppression. Dose reduction (typically 50%) with close monitoring is appropriate. Cessation may be needed if counts do not recover.", "diagram": null}, {"id": 121, "specialty": "gastroenterology", "tag": "medical_science_gastroenterology_absorption", "question": "A patient with short bowel syndrome following extensive ileal resection is most likely to develop deficiency of which vitamin?", "options": {"A": "Vitamin A", "B": "Vitamin C", "C": "Vitamin B12", "D": "Vitamin K", "E": "Vitamin E"}, "answer": "C", "explanation": "Vitamin B12 is exclusively absorbed in the terminal ileum via intrinsic factor-dependent receptors. Ileal resection causes B12 malabsorption requiring lifelong supplementation.", "diagram": null}, {"id": 122, "specialty": "gastroenterology", "tag": "clinical_science_gastroenterology_hepatitis", "question": "A 38-year-old man with chronic hepatitis B (HBeAg-negative, HBV DNA 45,000 IU/mL, ALT 95 U/L) has FibroScan showing liver stiffness of 9.2 kPa (F2-3). What is the most appropriate management?", "options": {"A": "Monitor ALT and HBV DNA every 6 months", "B": "Commence tenofovir disoproxil fumarate", "C": "Commence pegylated interferon-alpha for 48 weeks", "D": "Commence entecavir and tenofovir combination", "E": "Liver biopsy before making treatment decision"}, "answer": "B", "explanation": "With active viral replication (HBV DNA >2000 IU/mL), elevated ALT, and significant fibrosis (≥F2), antiviral therapy is indicated. Tenofovir is first-line with high barrier to resistance.", "diagram": null}, {"id": 123, "specialty": "haematology", "tag": "clinical_science_haematology_anaemia", "question": "A 68-year-old woman presents with fatigue and macrocytic anaemia. Blood film shows hypersegmented neutrophils. Serum vitamin B12 is low and intrinsic factor antibodies are positive. What is the most appropriate initial treatment?", "options": {"A": "Oral folic acid 5 mg daily", "B": "Intramuscular hydroxocobalamin", "C": "Oral iron supplementation", "D": "Blood transfusion", "E": "Oral cyanocobalamin with intrinsic factor concentrate"}, "answer": "B", "explanation": "Pernicious anaemia is an autoimmune condition causing vitamin B12 deficiency due to intrinsic factor antibodies. Treatment is parenteral B12 replacement (intramuscular hydroxocobalamin), as oral absorption is impaired. Folic acid alone may mask B12 deficiency and worsen neurological complications.", "diagram": null}, {"id": 124, "specialty": "haematology", "tag": "clinical_science_haematology_coagulation", "question": "A 32-year-old woman with recurrent miscarriages presents with a prolonged APTT that does not correct with a mixing study. Anti-cardiolipin antibodies and lupus anticoagulant are positive. What is the most appropriate long-term management?", "options": {"A": "Aspirin alone", "B": "Warfarin with target INR 2.0-3.0", "C": "Low-molecular-weight heparin lifelong", "D": "Rituximab", "E": "Dabigatran with target anti-Xa level 0.5-1.5 µg/mL"}, "answer": "B", "explanation": "Antiphospholipid syndrome (APS) with thrombotic events or obstetric morbidity requires long-term anticoagulation. Warfarin with a target INR of 2.0-3.0 is the standard of care. DOACs are generally not recommended in APS due to higher thrombotic risk shown in the TRAPS trial.", "diagram": null}, {"id": 125, "specialty": "haematology", "tag": "clinical_science_haematology_lymphoma", "question": "A 25-year-old man presents with painless cervical lymphadenopathy (3 cm), night sweats drenching clothes, and pruritus. Haemoglobin 105 g/L, WCC 8.2 x 10^9/L, platelets 165 x 10^9/L, LDH 680 U/L, albumin 32 g/L. Chest X-ray shows mediastinal widening and bilateral hilar lymphadenopathy. Abdominal CT shows splenomegaly (14 cm) and para-aortic lymph nodes. PET-CT reveals hypermetabolic lymph nodes in cervical, mediastinal, and abdominal regions with splenic involvement. Lymph node biopsy confirms Hodgkin lymphoma, nodular sclerosis subtype.\n\nWhat is the stage according to the Ann Arbor classification?", "options": {"A": "Stage IIB", "B": "Stage IIIB", "C": "Stage IVB", "D": "Stage IIIA", "E": "Stage IIA with no B symptoms"}, "answer": "B", "explanation": "Reed-Sternberg cells are pathognomonic for Hodgkin lymphoma. Disease above and below the diaphragm with splenic involvement is Stage III. The \"B\" suffix indicates B symptoms (night sweats, fever, weight loss). Splenic involvement alone is Stage III, not Stage IV (which requires extranodal dissemination).", "diagram": null}, {"id": 126, "specialty": "haematology", "tag": "clinical_science_haematology_leukaemia", "question": "A 62-year-old man presents with fatigue and splenomegaly. FBC shows WCC 85 x 10^9/L with a left shift including myelocytes, metamyelocytes, and basophilia. Philadelphia chromosome is detected on cytogenetics. What is the most appropriate first-line treatment?", "options": {"A": "Hydroxyurea", "B": "Imatinib", "C": "Allogeneic stem cell transplant", "D": "Interferon-alpha", "E": "Nilotinib or dasatinib as second-generation tyrosine kinase inhibitor"}, "answer": "B", "explanation": "CML in chronic phase with Philadelphia chromosome (BCR-ABL1 fusion) is treated with tyrosine kinase inhibitors. Imatinib was the first TKI and remains appropriate first-line therapy. Hydroxyurea is used for initial cytoreduction but is not definitive. Stem cell transplant is reserved for TKI-resistant disease.", "diagram": null}, {"id": 127, "specialty": "haematology", "tag": "clinical_science_haematology_transfusion", "question": "A 45-year-old woman develops rigors, fever to 39.5°C, and hypotension 30 minutes into a red cell transfusion. What is the most important immediate step?", "options": {"A": "Slow the transfusion rate and administer paracetamol", "B": "Stop the transfusion and send the unit for investigation", "C": "Administer IV hydrocortisone and continue the transfusion", "D": "Switch to irradiated blood products", "E": "Perform extensive diagnostic workup including crossmatch repeat"}, "answer": "B", "explanation": "Acute haemolytic transfusion reaction presents with fever, rigors, hypotension, and can be life-threatening. The immediate action is to stop the transfusion, maintain IV access with normal saline, and send the unit and post-transfusion blood samples for investigation including repeat crossmatch and direct antiglobulin test.", "diagram": null}, {"id": 128, "specialty": "haematology", "tag": "clinical_science_haematology_thrombocytopenia", "question": "A 28-year-old woman presents with petechiae and mucosal bleeding. Platelet count is 8 x 10^9/L. Blood film shows large platelets with no fragmentation. Haemoglobin and white cell count are normal. What is the most likely diagnosis?", "options": {"A": "Thrombotic thrombocytopenic purpura", "B": "Immune thrombocytopenic purpura", "C": "Disseminated intravascular coagulation", "D": "Aplastic anaemia", "E": "Microangiopathic haemolytic anaemia with mechanical trauma"}, "answer": "B", "explanation": "ITP presents with isolated thrombocytopenia (normal Hb and WCC) with large platelets on film reflecting increased marrow production. Absence of fragmented red cells (schistocytes) argues against TTP. DIC would show abnormal coagulation and fragmentation. Aplastic anaemia causes pancytopenia.", "diagram": null}, {"id": 129, "specialty": "haematology", "tag": "clinical_science_haematology_iron_studies", "question": "A 55-year-old man with rheumatoid arthritis has a haemoglobin of 98 g/L with microcytic red cells. Iron studies show: serum iron low, transferrin low, ferritin 280 µg/L (elevated). What is the most likely cause of his anaemia?", "options": {"A": "Iron deficiency anaemia", "B": "Anaemia of chronic disease", "C": "Thalassaemia trait", "D": "Sideroblastic anaemia", "E": "Systemic sclerosis-associated anaemia"}, "answer": "B", "explanation": "Anaemia of chronic disease typically shows low serum iron, low transferrin (unlike iron deficiency where transferrin is high), and elevated ferritin (an acute phase reactant). Iron deficiency would show low ferritin and high transferrin. The clinical context of rheumatoid arthritis supports chronic inflammation as the cause.", "diagram": null}, {"id": 130, "specialty": "haematology", "tag": "clinical_science_haematology_myeloma", "question": "A 72-year-old man presents with back pain for 2 months, progressive fatigue, and recurrent infections (UTI, pneumonia). Haemoglobin 92 g/L, WCC 5.5 x 10^9/L, platelets 98 x 10^9/L, creatinine 145 µmol/L, calcium 11.8 mg/dL (corrected), albumin 28 g/L. Serum protein electrophoresis shows a 38 g/L monoclonal spike (IgG, kappa). Bone marrow aspirate shows 35% plasma cells. X-ray skeleton shows punched-out lytic lesions in the skull and pelvis. Immunofixation electrophoresis confirms IgG-kappa monoclonal protein.\n\nWhat diagnostic criteria are met for multiple myeloma?", "options": {"A": "Monoclonal protein >30 g/L alone", "B": "Any one of the CRAB criteria", "C": "Bone marrow plasma cells >10% AND any myeloma-defining event", "D": "Positive PET-CT scan alone", "E": "Serum calcium >11.5 mg/dL and bone marrow involvement alone"}, "answer": "C", "explanation": "Under revised IMWG 2014 criteria, myeloma diagnosis requires clonal bone marrow plasma cells ≥10% AND at least one myeloma-defining event: CRAB criteria (calcium elevation, renal insufficiency, anaemia, bone lesions) OR biomarkers of malignancy (≥60% plasma cells, free light chain ratio ≥100, >1 focal lesion on MRI). This patient meets criteria with 35% plasma cells plus hypercalcaemia, renal impairment, and anaemia.", "diagram": null}, {"id": 131, "specialty": "haematology", "tag": "clinical_science_haematology_haemolysis", "question": "A 40-year-old man presents with jaundice and dark urine. He was started on trimethoprim-sulfamethoxazole 3 days ago for a urinary tract infection. Blood film shows bite cells and Heinz bodies. What is the most likely underlying diagnosis?", "options": {"A": "Autoimmune haemolytic anaemia", "B": "Hereditary spherocytosis", "C": "G6PD deficiency", "D": "Paroxysmal nocturnal haemoglobinuria", "E": "Acute intermittent porphyria with drug-induced haemolysis"}, "answer": "C", "explanation": "Bite cells and Heinz bodies following oxidant drug exposure (sulfonamides) are characteristic of G6PD deficiency. G6PD is X-linked and leads to oxidative haemolysis when exposed to triggers including sulfonamides, antimalarials, and fava beans. Diagnosis is confirmed by G6PD enzyme assay, ideally performed weeks after the acute episode as reticulocytes have higher G6PD levels.", "diagram": null}, {"id": 132, "specialty": "haematology", "tag": "clinical_science_haematology_thrombophilia", "question": "A 30-year-old man presents with his second unprovoked deep vein thrombosis. His father had a pulmonary embolism at age 35. Thrombophilia screen shows activated protein C resistance. What is the most likely inherited thrombophilia?", "options": {"A": "Protein C deficiency", "B": "Protein S deficiency", "C": "Factor V Leiden mutation", "D": "Antithrombin deficiency", "E": "Antithrombin deficiency with heparin resistance"}, "answer": "C", "explanation": "Activated protein C resistance is the functional hallmark of Factor V Leiden mutation, the most common inherited thrombophilia (5% prevalence in Caucasians). The mutant Factor V is resistant to inactivation by activated protein C. Heterozygotes have a 5-7 fold increased VTE risk; homozygotes have 50-80 fold increased risk.", "diagram": null}, {"id": 133, "specialty": "haematology", "tag": "clinical_science_haematology_stem_cell", "question": "A 55-year-old man undergoes allogeneic haematopoietic stem cell transplant for AML. On day +35, he develops a maculopapular rash, diarrhoea, and rising bilirubin. What is the most likely diagnosis?", "options": {"A": "Graft-versus-host disease", "B": "Veno-occlusive disease", "C": "CMV reactivation", "D": "Drug reaction", "E": "Rejection of donor haematopoietic cells"}, "answer": "A", "explanation": "Acute graft-versus-host disease (GVHD) typically occurs 2-6 weeks post-transplant and classically involves skin (maculopapular rash), liver (rising bilirubin), and gut (diarrhoea). Veno-occlusive disease presents with hepatomegaly, weight gain, and jaundice, usually earlier. The triad of skin, liver, and gut involvement is characteristic of acute GVHD.", "diagram": null}, {"id": 134, "specialty": "haematology", "tag": "clinical_science_haematology_polycythaemia", "question": "A 58-year-old man is found to have haemoglobin 195 g/L and haematocrit 0.58 on routine testing. He reports fatigue, mild headaches, and pruritus after hot showers. Examination reveals plethora and splenomegaly (3 cm). JAK2 V617F mutation is positive. Serum erythropoietin level is appropriately suppressed. He has no prior thrombotic events. White cell count 7.8 x 10^9/L, platelet count 580 x 10^9/L. Oxygen saturation 98% on room air.\n\nWhat is the most appropriate first-line management strategy?", "options": {"A": "Interferon-alpha", "B": "Hydroxyurea", "C": "Venesection to target haematocrit <0.45", "D": "Ruxolitinib", "E": "Initiation of aspirin and hydroxyurea without venesection"}, "answer": "C", "explanation": "Polycythaemia vera (PV) confirmed by JAK2 mutation requires venesection as first-line to maintain haematocrit <0.45, as shown in the CYTO-PV trial which demonstrated reduced cardiovascular events. Low-dose aspirin is added for all patients. Cytoreductive therapy (hydroxyurea) is added for high-risk patients (age >60 or prior thrombosis).", "diagram": null}, {"id": 135, "specialty": "haematology", "tag": "clinical_science_haematology_dic", "question": "A 45-year-old woman with sepsis develops widespread bleeding from venepuncture sites. Investigations show: platelets 35 x 10^9/L, PT 22s (normal <14s), APTT 48s (normal <35s), fibrinogen 0.8 g/L (<1.5 g/L), and elevated D-dimer. Blood film shows schistocytes. What is the most important management priority?", "options": {"A": "Administer tranexamic acid", "B": "Treat the underlying sepsis", "C": "Give heparin infusion", "D": "Platelet transfusion alone", "E": "Administration of fresh frozen plasma to correct coagulopathy"}, "answer": "B", "explanation": "DIC is always secondary to an underlying cause (sepsis, malignancy, trauma, obstetric emergencies). The cornerstone of management is treating the underlying trigger. Supportive measures include cryoprecipitate (for fibrinogen <1.5 g/L), FFP, and platelet transfusion if bleeding. Heparin is only considered in DIC with predominant thrombosis.", "diagram": null}, {"id": 136, "specialty": "haematology", "tag": "clinical_science_haematology_sickle_cell", "question": "A 22-year-old man with homozygous sickle cell disease (HbSS) presents with acute chest pain, fever (38.5°C), and dyspnoea. O₂ saturation 92% on room air. Chest X-ray shows new infiltrate in the right lower lobe. WCC 16.2 x 10^9/L (left shift), haemoglobin 72 g/L (baseline 85 g/L), reticulocyte count 8%, bilirubin 45 µmol/L. Blood culture is pending. He has not received pneumococcal vaccination.\n\nWhat is the most appropriate transfusion strategy for acute chest syndrome?", "options": {"A": "Simple red cell transfusion to Hb 100 g/L", "B": "Exchange transfusion targeting HbS <30%", "C": "No transfusion — treat with antibiotics alone", "D": "Whole blood transfusion", "E": "Simple transfusion to Hb 70 g/L with oxygen supplementation"}, "answer": "B", "explanation": "Acute chest syndrome is a life-threatening complication of sickle cell disease. Exchange transfusion is preferred for severe cases as it reduces HbS% without increasing blood viscosity (which would occur with simple transfusion raising Hb above 100 g/L). Target HbS <30% and total Hb not exceeding 100 g/L.", "diagram": null}, {"id": 137, "specialty": "haematology", "tag": "clinical_science_haematology_anticoagulation", "question": "A 72-year-old man on warfarin for atrial fibrillation presents with INR 8.5 and no evidence of bleeding. What is the most appropriate management?", "options": {"A": "Administer IV vitamin K 5 mg and prothrombin complex concentrate", "B": "Withhold warfarin and administer oral vitamin K 1-2 mg", "C": "Withhold warfarin only and recheck INR in 24 hours", "D": "Fresh frozen plasma infusion", "E": "Continue warfarin and administer intravenous vitamin K 10 mg"}, "answer": "B", "explanation": "For INR >5.0 without significant bleeding, withhold warfarin and give low-dose oral vitamin K (1-2 mg). IV vitamin K and prothrombin complex concentrate are reserved for major or life-threatening bleeding. Oral vitamin K provides more predictable and sustained INR reduction compared to withholding warfarin alone.", "diagram": null}, {"id": 138, "specialty": "haematology", "tag": "clinical_science_haematology_ttp", "question": "A 35-year-old woman presents with confusion, fever, thrombocytopenia (platelets 22 x 10^9/L), microangiopathic haemolytic anaemia (schistocytes on film, LDH elevated, haptoglobin undetectable), and acute kidney injury. ADAMTS13 activity is <5%. What is the most appropriate initial treatment?", "options": {"A": "Platelet transfusion", "B": "Plasma exchange and corticosteroids", "C": "Eculizumab", "D": "Haemodialysis", "E": "Shiga toxin-producing enterobacterium (atypical HUS)"}, "answer": "B", "explanation": "TTP with severe ADAMTS13 deficiency (<10%) requires urgent plasma exchange (replaces ADAMTS13 and removes inhibitory antibodies) plus corticosteroids. Caplacizumab (anti-vWF) is added in many centres. Platelet transfusion is relatively contraindicated in TTP as it may worsen thrombotic microangiopathy. Eculizumab is used in atypical HUS, not TTP.", "diagram": null}, {"id": 139, "specialty": "haematology", "tag": "clinical_science_haematology_neutropenia", "question": "A 58-year-old woman receiving chemotherapy for breast cancer presents with fever of 38.5°C and neutrophil count of 0.3 x 10^9/L. She appears well with no clear focus of infection. Blood cultures are taken. What is the most appropriate initial antibiotic therapy?", "options": {"A": "Oral amoxicillin-clavulanate", "B": "IV piperacillin-tazobactam", "C": "IV vancomycin alone", "D": "Await culture results before starting antibiotics", "E": "Oral fluoroquinolone prophylaxis without empiric antibiotics"}, "answer": "B", "explanation": "Febrile neutropenia (temperature ≥38.3°C or sustained ≥38.0°C for 1 hour, with ANC <0.5 x 10^9/L) requires immediate empiric broad-spectrum IV antibiotics. Piperacillin-tazobactam or meropenem are standard empiric choices. Vancomycin is added for specific indications (line infection, skin/soft tissue, haemodynamic instability). Delaying antibiotics increases mortality.", "diagram": null}, {"id": 140, "specialty": "haematology", "tag": "clinical_science_haematology_haemophilia", "question": "A 2-year-old boy presents with spontaneous haemarthrosis of the right knee requiring aspiration. There is no family history of bleeding disorders. Activated partial thromboplastin time (APPT) is prolonged at 68 seconds (control 28–40 s). Mixing study corrects the APPT. Factor assays show: VIII 2% (reference >40%), IX 95%, von Willebrand factor antigen 92%. FBC is normal.\n\nWhat is the diagnosis and management strategy?", "options": {"A": "Mild haemophilia A — desmopressin as needed", "B": "Severe haemophilia A — regular factor VIII prophylaxis", "C": "Moderate haemophilia A — on-demand factor VIII", "D": "Severe haemophilia B — factor IX concentrate", "E": "Moderate haemophilia B — on-demand factor IX concentrate"}, "answer": "B", "explanation": "Factor VIII <1% defines severe haemophilia A. These patients have spontaneous bleeding into joints and muscles. Standard prophylaxis with regular factor VIII replacement (or emicizumab, a bispecific antibody mimicking factor VIIIa) reduces joint damage. Haemophilia A is X-linked recessive, consistent with the maternal uncle history.", "diagram": null}, {"id": 141, "specialty": "haematology", "tag": "clinical_science_haematology_myelodysplasia", "question": "A 70-year-old man presents with macrocytic anaemia (Hb 85 g/L, MCV 108 fL) and mild neutropenia. Blood film shows dysplastic neutrophils with pseudo-Pelger-Huët anomaly. Bone marrow aspirate shows 8% blasts. Cytogenetics reveal del(5q). What is the IPSS-R risk category most likely, and what targeted therapy may be considered?", "options": {"A": "Very low risk — observation only", "B": "Low risk — lenalidomide", "C": "High risk — azacitidine", "D": "Very high risk — allogeneic transplant", "E": "Very high risk — allogeneic transplant only"}, "answer": "B", "explanation": "MDS with isolated del(5q) has a specific WHO subtype and responds well to lenalidomide, which produces transfusion independence in ~67% of patients. Despite the 8% blasts (which might suggest higher risk), isolated del(5q) with low blast count typically falls in lower IPSS-R categories. Lenalidomide is specifically approved for transfusion-dependent del(5q) MDS.", "diagram": null}, {"id": 142, "specialty": "haematology", "tag": "clinical_science_haematology_von_willebrand", "question": "A 20-year-old woman presents with menorrhagia, easy bruising, and prolonged bleeding after dental extraction. Her mother has similar symptoms. Investigations show: APTT mildly prolonged, PT normal, platelet count normal, bleeding time prolonged. Factor VIII:C is mildly reduced. What is the most likely diagnosis?", "options": {"A": "Platelet function disorder", "B": "Haemophilia A carrier", "C": "Von Willebrand disease type 1", "D": "Factor XI deficiency", "E": "Acquired von Willebrand syndrome secondary to aortic stenosis"}, "answer": "C", "explanation": "Von Willebrand disease type 1 (partial quantitative deficiency) is the most common inherited bleeding disorder. It presents with mucocutaneous bleeding, prolonged bleeding time, mildly prolonged APTT (due to reduced factor VIII carriage), and autosomal dominant inheritance. Type 1 accounts for ~70% of vWD. Treatment is desmopressin (DDAVP) for mild-moderate bleeding.", "diagram": null}, {"id": 143, "specialty": "haematology", "tag": "clinical_science_haematology_thalassaemia", "question": "A 25-year-old woman of Mediterranean descent has a haemoglobin of 98 g/L, MCV 62 fL, and normal iron studies. Her blood film shows target cells and basophilic stippling. Haemoglobin electrophoresis reveals HbA2 of 5.8% (normal <3.5%).\nWhat is the most likely diagnosis?", "options": {"A": "Iron deficiency anaemia", "B": "Alpha-thalassaemia trait", "C": "Beta-thalassaemia trait", "D": "Sideroblastic anaemia", "E": "Alpha-thalassaemia intermedia (HbH disease)"}, "answer": "C", "explanation": "Beta-thalassaemia trait (carrier status) is characterised by mild microcytic anaemia with a disproportionately low MCV relative to the degree of anaemia. Elevated HbA2 (>3.5%) on haemoglobin electrophoresis is the diagnostic hallmark. Iron studies are typically normal, distinguishing it from iron deficiency. Target cells and basophilic stippling are common blood film findings. Genetic counselling is important, as two carriers have a 25% chance of having a child with beta-thalassaemia major.", "diagram": null}, {"id": 144, "specialty": "haematology", "tag": "clinical_science_haematology_aplastic", "question": "A 20-year-old man presents with fatigue, petechiae, and recurrent infections. FBC shows pancytopenia with Hb 72 g/L, WCC 1.8 × 10⁹/L, neutrophils 0.4 × 10⁹/L, and platelets 12 × 10⁹/L. Reticulocyte count is very low. Bone marrow biopsy reveals a markedly hypocellular marrow (<25% cellularity) with fat replacement.\nWhat is the diagnosis?", "options": {"A": "Myelodysplastic syndrome", "B": "Acute leukaemia", "C": "Severe aplastic anaemia", "D": "Megaloblastic anaemia", "E": "Myelofibrosis with marrow fibrosis"}, "answer": "C", "explanation": "Severe aplastic anaemia is defined by bone marrow cellularity <25% plus at least two of: neutrophils <0.5 × 10⁹/L, platelets <20 × 10⁹/L, reticulocytes <20 × 10⁹/L. It results from immune-mediated destruction of haematopoietic stem cells in most cases. Treatment depends on age and severity: young patients with a matched sibling donor should be offered allogeneic stem cell transplantation, while others receive immunosuppressive therapy with anti-thymocyte globulin (ATG) and ciclosporin. The condition must be distinguished from MDS, which typically shows dysplastic changes.", "diagram": null}, {"id": 145, "specialty": "haematology", "tag": "clinical_science_haematology_haemochromatosis", "question": "A 45-year-old man presents with fatigue, arthralgia affecting the 2nd and 3rd MCP joints, and elevated liver enzymes. His serum ferritin is 1,200 µg/L and transferrin saturation is 65%. HFE gene testing confirms C282Y homozygosity.\nWhat is the cornerstone of treatment?", "options": {"A": "Iron chelation with desferrioxamine", "B": "Regular venesection (phlebotomy)", "C": "Dietary iron restriction alone", "D": "Liver transplantation", "E": "Oral deferasirox chelation therapy"}, "answer": "B", "explanation": "Hereditary haemochromatosis (HH) due to C282Y homozygosity in the HFE gene leads to excessive intestinal iron absorption and organ iron deposition. Regular venesection (phlebotomy) is the mainstay of treatment, aiming for a target ferritin of 50-100 µg/L. Early treatment prevents complications including cirrhosis, hepatocellular carcinoma, diabetes mellitus, cardiomyopathy, and hypogonadism. Arthropathy (particularly 2nd/3rd MCP joints) and fatigue may not fully resolve. First-degree relatives should be offered HFE genotyping and iron studies screening.", "diagram": null}, {"id": 146, "specialty": "haematology", "tag": "medical_science_haematology_coagulation", "question": "In the coagulation cascade, which factor is common to both the intrinsic and extrinsic pathways?", "options": {"A": "Factor VII", "B": "Factor XII", "C": "Factor X", "D": "Factor VIII", "E": "Factor V"}, "answer": "C", "explanation": "Factor X is activated by both the intrinsic tenase (VIIIa/IXa) and extrinsic tenase (VIIa/tissue factor) complexes, representing the convergence point of the common pathway.", "diagram": null}, {"id": 147, "specialty": "haematology", "tag": "clinical_science_haematology_anaemia", "question": "A 68-year-old woman presents with fatigue. FBC: Hb 82 g/L, MCV 112 fL, WCC 3.2 × 10⁹/L, platelets 98 × 10⁹/L. Blood film shows hypersegmented neutrophils and oval macrocytes. Serum B12 is 85 pmol/L [>150], folate is normal. What is the most appropriate initial treatment?", "options": {"A": "Oral cyanocobalamin 1 mg daily", "B": "Intramuscular hydroxocobalamin 1 mg every other day for 2 weeks", "C": "Folate 5 mg daily", "D": "Packed red cell transfusion", "E": "Iron infusion with B12 supplementation"}, "answer": "B", "explanation": "Severe B12 deficiency with pancytopenia and neurological risk requires parenteral replacement initially (IM hydroxocobalamin) to rapidly replete stores before switching to maintenance.", "diagram": null}, {"id": 148, "specialty": "haematology", "tag": "clinical_science_haematology_thrombosis", "question": "A 32-year-old woman on the combined oral contraceptive pill presents with acute left leg DVT. She has a strong family history of VTE (mother and sister). Which thrombophilia screening result would change her acute management?", "options": {"A": "Factor V Leiden heterozygosity", "B": "Prothrombin gene G20210A mutation", "C": "Antiphospholipid antibodies (lupus anticoagulant positive)", "D": "MTHFR C677T polymorphism", "E": "Protein S deficiency"}, "answer": "C", "explanation": "Antiphospholipid syndrome requires long-term anticoagulation with warfarin (not DOACs) and changes management decisions. Factor V Leiden and prothrombin mutations do not alter acute treatment.", "diagram": null}, {"id": 149, "specialty": "haematology", "tag": "medical_science_haematology_haemoglobin", "question": "Haemoglobin F (HbF) has higher oxygen affinity than haemoglobin A primarily because HbF:", "options": {"A": "Contains alpha and delta globin chains", "B": "Has reduced binding of 2,3-diphosphoglycerate (2,3-DPG)", "C": "Has a higher Bohr effect", "D": "Contains iron in the ferric (Fe³⁺) state", "E": "Undergoes more rapid autooxidation"}, "answer": "B", "explanation": "HbF contains gamma globin chains which bind 2,3-DPG less effectively than beta chains in HbA. This shifts the oxygen dissociation curve left, increasing oxygen affinity.", "diagram": null}, {"id": 150, "specialty": "haematology", "tag": "clinical_science_haematology_leukaemia", "question": "A 55-year-old man is diagnosed with chronic myeloid leukaemia (CML) in chronic phase. Cytogenetics confirm t(9;22) Philadelphia chromosome. He is commenced on imatinib 400 mg daily. At 3-month review, BCR-ABL1/ABL1 ratio is 12% (IS). What does this result indicate?", "options": {"A": "Optimal response — continue current dose", "B": "Warning — recheck in 3 months, consider dose escalation", "C": "Failure — switch to second-generation TKI", "D": "Complete molecular response achieved", "E": "Allogeneic stem cell transplant"}, "answer": "A", "explanation": "At 3 months, BCR-ABL1 ≤10% IS is optimal per ELN guidelines. A result of 12% is borderline; at exactly 3 months this constitutes a warning, requiring close monitoring and recheck.", "diagram": null}, {"id": 151, "specialty": "haematology", "tag": "medical_science_haematology_iron", "question": "Which laboratory finding best distinguishes iron deficiency anaemia from anaemia of chronic disease?", "options": {"A": "Low serum iron", "B": "Elevated ferritin", "C": "Low transferrin saturation with elevated soluble transferrin receptor", "D": "Elevated ESR", "E": "Reduced reticulocyte count"}, "answer": "C", "explanation": "Soluble transferrin receptor (sTfR) is elevated in true iron deficiency but normal in anaemia of chronic disease. Both conditions can have low serum iron and transferrin saturation.", "diagram": null}, {"id": 152, "specialty": "haematology", "tag": "clinical_science_haematology_transfusion", "question": "A patient develops fever, rigors, and back pain 15 minutes into a red cell transfusion. BP 80/50 mmHg. Repeat blood group shows ABO incompatibility. What is the most important immediate action?", "options": {"A": "Slow the transfusion rate and administer paracetamol", "B": "Stop the transfusion immediately and commence IV normal saline", "C": "Administer IV hydrocortisone 200 mg", "D": "Send repeat crossmatch and continue transfusion at reduced rate", "E": "Administer IV adrenaline 0.5 mg IM"}, "answer": "B", "explanation": "Acute haemolytic transfusion reaction from ABO incompatibility is life-threatening. The transfusion must be stopped immediately, and aggressive IV fluid resuscitation commenced to prevent renal failure from haemoglobinuria.", "diagram": null}, {"id": 153, "specialty": "cardiology", "tag": "clinical_science_cardiology_arrhythmia", "question": "A 72-year-old man with hypertension and type 2 diabetes presents with palpitations and dyspnea. HR 142 bpm, BP 98/64 mmHg, elevated JVP. ECG shows narrow-complex tachycardia with rate 142 bpm. Troponin negative, BNP 580 pg/mL. IV adenosine 6 mg given with no effect. IV adenosine 12 mg given—rhythm remains unchanged.\n\nWhat is the most likely diagnosis?", "options": {"A": "Atrial flutter with fixed AV conduction", "B": "Atrial tachycardia", "C": "Atrioventricular reentrant tachycardia", "D": "Sinus tachycardia secondary to sepsis", "E": "Intravenous esmolol infusion"}, "answer": "B", "explanation": "Adenosine-resistant narrow-complex tachycardia with fixed rate suggests atrial tachycardia, which arises from an ectopic atrial focus. AVNRT and AVRT are adenosine-sensitive and terminate with AV block. Atrial flutter typically shows flutter waves and variable AV conduction. Sinus tachycardia would have variable rate with manoeuvres.", "diagram": null}, {"id": 154, "specialty": "cardiology", "tag": "medical_science_cardiology_pharmacology", "question": "A 68-year-old woman with CKD stage 3b (eGFR 38 mL/min/1.73m²) and heart failure with reduced ejection fraction (HFrEF, LVEF 28%) on lisinopril and bisoprolol is commenced on SGLT2 inhibitor. After 8 weeks, Cr 145 μmol/L (baseline 138), K+ 5.8 mmol/L (baseline 4.9), HCO3- 22 mmol/L (baseline 24).\n\nWhat is the most appropriate management?", "options": {"A": "Stop SGLT2 inhibitor; check for acute kidney injury", "B": "Continue SGLT2 inhibitor; recheck renal function in 4 weeks", "C": "Add sodium bicarbonate supplementation", "D": "Switch SGLT2 inhibitor to second-generation agent", "E": "Implantable loop recorder"}, "answer": "B", "explanation": "Initial transient rise in creatinine (hyperkalemia paradoxically from hemodynamic changes) is expected within 2-4 weeks of SGLT2 inhibitor initiation and typically stabilizes. Continue monitoring. Serum K+ elevation warrants reassessment but is not alone an indication to cease SGLT2 inhibitors given their renal and cardiac benefits in HFrEF. Repeat labs in 4 weeks to confirm stabilization.", "diagram": null}, {"id": 155, "specialty": "cardiology", "tag": "clinical_science_cardiology_ischemia", "question": "A 58-year-old man with prior MI (2 years ago, LAD stented) presents with 3 days of exertional chest discomfort and dyspnea. Troponin I 0.18 μg/L (ULN 0.04), Hb 108 g/L, eGFR 55 mL/min/1.73m². ECG shows 2 mm ST depression in V2-V4, T wave inversion in lateral leads. Coronary angiography shows 95% stenosis in RCA, severe disease in LCx, and patent LAD stent. LVEF 38%.\n\nWhat is the most appropriate therapeutic approach?", "options": {"A": "Percutaneous coronary intervention to RCA only", "B": "Coronary artery bypass grafting", "C": "Medical therapy with intensive antiplatelet and anti-ischemic agents", "D": "Percutaneous coronary intervention to RCA and LCx", "E": "Cardiac MRI with late gadolinium enhancement"}, "answer": "B", "explanation": "Triple-vessel disease with LVEF 38% and ongoing ischemia is best managed with CABG rather than multivessel PCI, which carries higher mortality in this setting. CABG provides superior long-term outcomes in multivessel disease with reduced ejection fraction. Medical therapy alone is inadequate given acute presentation with elevated biomarkers.", "diagram": null}, {"id": 156, "specialty": "cardiology", "tag": "medical_science_cardiology_electrolytes", "question": "A 64-year-old woman on loop diuretics for heart failure develops palpitations. K+ 3.2 mmol/L, Mg2+ 0.68 mmol/L, Ca2+ 2.05 mmol/L, albumin 32 g/L. ECG shows prominent U waves, flattened T waves. Digoxin level 1.8 ng/mL (therapeutic 0.5-2.0).\n\nWhat is the underlying mechanism of arrhythmia risk?", "options": {"A": "Hypomagnesemia prolongs repolarization and increases automaticity", "B": "Hypocalcemia increases cardiac contractility", "C": "Hypokalaemia alone is sufficient to cause torsades", "D": "Digoxin toxicity with AV block", "E": "Intravenous isoprenaline infusion"}, "answer": "A", "explanation": "Hypomagnesemia and hypokalemia synergistically prolong action potential duration and increase triggered activity, creating substrate for polymorphic ventricular arrhythmias. Mg2+ is essential for KATP channel function and Na/K-ATPase. Concurrent digoxin (already at therapeutic upper limit) increases arrhythmia risk. Calcium levels are normal. Hypocalcemia decreases, not increases, contractility.", "diagram": null}, {"id": 157, "specialty": "cardiology", "tag": "clinical_science_cardiology_heart_failure", "question": "A 71-year-old woman with HFpEF (LVEF 52%) and AF (paroxysmal) presents with orthopnea and ankle edema. BP 158/92 mmHg, HR 78 bpm, JVP 8 cm, fine crepitations. NT-proBNP 820 pg/mL. Echocardiogram shows restrictive filling pattern, elevated E/e' ratio of 18. She takes amlodipine 5 mg daily.\n\nWhich agent is most evidence-based to reduce HFpEF hospitalizations?", "options": {"A": "Finerenone (non-steroidal MRA)", "B": "Sacubitril/valsartan", "C": "Ivabradine", "D": "Isosorbide dinitrate", "E": "Surgical aortic valve replacement"}, "answer": "A", "explanation": "In HFpEF with reduced ejection fraction and albuminuria/CKD, finerenone reduces hospitalizations and mortality. SGLT2 inhibitors (empagliflozin) and finerenone are evidence-based in HFpEF. Sacubitril/valsartan benefit is unclear in HFpEF without reduced EF. Ivabradine is for HFrEF with HR >70 bpm. Nitrates are short-term symptom relief only.", "diagram": null}, {"id": 158, "specialty": "cardiology", "tag": "medical_science_cardiology_imaging", "question": "A 55-year-old man with chest discomfort and risk factors (smoking, hypertension) undergoes stress CMR. Peak wall thickening >30% globally, no inducible ischemia. Rest LVEF 55%. Late gadolinium enhancement shows subendocardial enhancement in LAD territory.\n\nWhat does the LGE pattern suggest?", "options": {"A": "Acute myocarditis", "B": "Prior myocardial infarction", "C": "Takotsubo cardiomyopathy", "D": "Cardiac amyloidosis", "E": "Coronary artery bypass grafting"}, "answer": "B", "explanation": "Subendocardial LGE in coronary distribution indicates chronic myocardial scar from prior infarction. Acute myocarditis shows epicardial/midwall LGE. Takotsubo shows apical ballooning with no LGE. Amyloidosis shows diffuse transmural or subepicardial pattern. The absence of inducible ischemia suggests chronic scar rather than acute ischemia.", "diagram": null}, {"id": 159, "specialty": "cardiology", "tag": "clinical_science_cardiology_valvular", "question": "A 68-year-old man with bicuspid aortic valve and known moderate aortic stenosis (AVA 1.2 cm², peak velocity 3.8 m/s) presents with exertional angina and mild dyspnea. LVEF 52%. Aortic root diameter 4.8 cm. He declines surgery currently.\n\nWhat is the most appropriate management?", "options": {"A": "Proceed to aortic valve replacement", "B": "Conservative management with 6-monthly echocardiography", "C": "TAVI under rapid pacing", "D": "Repeat echo in 2 years", "E": "Dual-chamber pacemaker insertion"}, "answer": "A", "explanation": "Symptomatic moderate aortic stenosis (presence of angina, dyspnea) is an indication for aortic valve replacement regardless of degree of stenosis. Mortality is high if left untreated. With bicuspid aortic valve and aortic root 4.8 cm (approaching threshold for aortic root surgery), surgical intervention is preferred over conservative management. TAVI is considered in non-surgical candidates.", "diagram": null}, {"id": 160, "specialty": "cardiology", "tag": "medical_science_cardiology_lipids", "question": "A 52-year-old man with familial hypercholesterolaemia (FH) on atorvastatin 80 mg daily has TC 6.2 mmol/L, LDL-C 3.8 mmol/L, TG 1.2 mmol/L, HDL-C 1.1 mmol/L. Alanine aminotransferase (ALT) 28 U/L, creatine kinase (CK) 85 U/L. PCSK9 inhibitor not funded in his region.\n\nWhat is the next best step?", "options": {"A": "Increase atorvastatin to 80 mg BD", "B": "Add ezetimibe 10 mg daily", "C": "Add inclisiran (PCSK9 inhibitor)", "D": "Dietary intervention alone", "E": "Percutaneous mitral valve repair (MitraClip)"}, "answer": "B", "explanation": "In FH, combination therapy with high-intensity statin plus ezetimibe reduces LDL-C by ~50%. Inclisiran is cost-prohibitive in most settings without funding. Doubling statin dose has diminishing returns and increases myopathy risk. Dietary intervention alone is insufficient in FH, which requires pharmacotherapy.", "diagram": null}, {"id": 161, "specialty": "cardiology", "tag": "clinical_science_cardiology_pericardium", "question": "A 34-year-old woman 3 weeks post-viral upper respiratory infection presents with pleuritic chest pain, dyspnea, and palpitations. Temp 37.9°C, HR 104 bpm. ECG shows diffuse ST elevation (except aVR, V1). Troponin I 0.16 μg/L, CRP 98 mg/L, WBC 9.8 × 10^9/L. Echocardiogram shows no pericardial effusion and normal LVEF.\n\nWhat is the most likely diagnosis?", "options": {"A": "Acute pericarditis with myopericarditis", "B": "Acute myocardial infarction", "C": "Pulmonary embolism", "D": "Aortic dissection", "E": "Dobutamine stress echocardiography"}, "answer": "A", "explanation": "Acute myopericarditis is characterized by pleuritic chest pain, diffuse ST elevation (except aVR/V1), elevated troponin, and elevated inflammatory markers in post-viral context. The absence of reciprocal ST depression and normal echocardiography exclude STEMI. The diffuse nature and clinical context support viral myopericarditis. Troponin elevation reflects myocardial involvement.", "diagram": null}, {"id": 162, "specialty": "cardiology", "tag": "medical_science_cardiology_hypertension", "question": "A 58-year-old woman with hypertension, CKD stage 3 (eGFR 42 mL/min/1.73m²), and albuminuria (ACR 38 mg/mmol) is on amlodipine 5 mg daily, BP 152/88 mmHg. Serum K+ 4.6 mmol/L, Cr 82 μmol/L.\n\nWhat is the most appropriate add-on therapy?", "options": {"A": "Increase amlodipine to 10 mg daily", "B": "Add lisinopril 10 mg daily", "C": "Add indapamide 2.5 mg daily", "D": "Add atenolol 50 mg daily", "E": "Amiodarone loading dose"}, "answer": "B", "explanation": "ACE inhibitors are first-line add-on in hypertension with CKD and albuminuria due to renal-protective effects via intraglomerular pressure reduction. They reduce progression of CKD and proteinuria independent of BP lowering. K+ is still normal, permitting safe ACE inhibitor initiation with renal function monitoring. Thiazide-like diuretics are second-line in CKD.", "diagram": null}, {"id": 163, "specialty": "cardiology", "tag": "clinical_science_cardiology_sudden_death", "question": "A 19-year-old man collapses during football training. Bystander CPR initiated. After defibrillation, ROSC achieved. Troponin negative, ECG post-resuscitation shows Brugada pattern (Type 1 coved ST elevation in V1-V2). Family history of sudden cardiac death in 45-year-old uncle. Coronary angiography normal.\n\nWhat is the most appropriate next step?", "options": {"A": "Implantable cardioverter-defibrillator insertion", "B": "Genetic testing for Brugada syndrome", "C": "Continue conservative management", "D": "Procainamide challenge test", "E": "Subcutaneous ICD insertion"}, "answer": "A", "explanation": "Brugada syndrome presenting with cardiac arrest is high-risk and warrants ICD insertion regardless of family history. The Type 1 Brugada pattern with VF arrest indicates severe phenotype. Genetic testing is supportive but not required for ICD decision. Procainamide challenge may unmask Brugada pattern but is not needed for decision-making in symptomatic patients. Conservative management carries unacceptable mortality risk.", "diagram": null}, {"id": 164, "specialty": "cardiology", "tag": "medical_science_cardiology_biomarkers", "question": "A 64-year-old man with dyspnea, orthopnea, and ankle edema has NT-proBNP 2840 pg/mL. LVEF by echo is 55%. Serum albumin 28 g/L, bilirubin 1.8 mg/dL (elevated), INR 1.3. Renal function is normal.\n\nWhich diagnosis is most likely?", "options": {"A": "HFrEF", "B": "HFpEF with hepatic congestion", "C": "Decompensated cirrhosis", "D": "Acute coronary syndrome", "E": "Cardiac resynchronisation therapy"}, "answer": "B", "explanation": "Elevated NT-proBNP with preserved LVEF (55%) indicates HFpEF. Hepatic congestion from right heart failure causes elevated bilirubin, INR, and low albumin (synthetic dysfunction). The clinical picture of dyspnea, elevated JVP, ankle edema with preserved systolic function points to HFpEF with right heart failure and hepatic congestion rather than primary cirrhosis (which would show different etiology).", "diagram": null}, {"id": 165, "specialty": "cardiology", "tag": "clinical_science_cardiology_congenital", "question": "A 28-year-old woman, 18 weeks pregnant with Eisenmenger syndrome (secundum ASD with reversal to right-to-left shunt) presents with dyspnea and syncope. Sat 82% on room air. Echo shows severe RV dilatation, TR, dilated IVC. She is on sildenafil monotherapy.\n\nWhat is the most appropriate management?", "options": {"A": "Proceed with pregnancy with enhanced monitoring", "B": "Recommend pregnancy termination", "C": "Add inhaled nitric oxide", "D": "Switch to bosentan therapy", "E": "Intra-aortic balloon pump"}, "answer": "B", "explanation": "Eisenmenger syndrome with right-to-left shunt and cyanosis carries maternal mortality of 25-50%. Pregnancy increases mortality risk through increased cardiac demands and hypercoagulability. Termination is recommended. If continuing, intensive ICU monitoring and specialist cardio-obstetric care is essential. Inhaled nitric oxide and additional vasodilators provide temporary benefit only.", "diagram": null}, {"id": 166, "specialty": "cardiology", "tag": "medical_science_cardiology_remodeling", "question": "A 52-year-old man with prior anterior STEMI (2 months ago, LAD stented) has LVEF 32%, LV end-systolic volume 95 mL/m², and LV end-diastolic dimension 68 mm. He is on optimal medical therapy (ACE inhibitor, beta-blocker, MRA). BNP 680 pg/mL.\n\nWhat is the most evidence-based intervention to prevent progressive LV remodeling?", "options": {"A": "Cardiac resynchronization therapy (CRT)", "B": "Mechanical left ventricular support device", "C": "SGLT2 inhibitor (dapagliflozin)", "D": "High-dose inotrope infusion", "E": "Catheter ablation for atrial flutter"}, "answer": "C", "explanation": "SGLT2 inhibitors reduce LV remodeling and progression of HFrEF through mechanisms including improved myocardial energetics and reduced fibrosis. They reduce hospitalizations and mortality. CRT is for symptomatic HF with QRS ≥120 ms; patient not described as CRT-eligible. LVAD is bridge-to-transplant or destination therapy, not remodeling prevention.", "diagram": null}, {"id": 167, "specialty": "cardiology", "tag": "clinical_science_cardiology_aorta", "question": "A 62-year-old man with uncontrolled hypertension (BP 178/96) and smoking history presents with acute tearing back pain radiating to the groin. BP 162/88 (asymmetric: right arm 162/88, left arm 148/82), HR 98 bpm. CXR shows widened mediastinum. CT angiography shows Type B aortic dissection with false lumen extending from below left subclavian artery to iliacs with thrombosis of false lumen.\n\nWhat is the most appropriate initial management?", "options": {"A": "Immediate endovascular repair", "B": "Medical management with IV beta-blocker and vasodilator", "C": "Surgical aortic repair", "D": "Balloon aortic occlusion", "E": "Ivabradine 5 mg BD"}, "answer": "B", "explanation": "Type B aortic dissection (descending thoracic) with uncomplicated course (thrombosed false lumen, no organ malperfusion, no rupture) is managed medically with aggressive BP control (target SBP 100-120 mmHg) and HR <60 bpm using beta-blockers and vasodilators. Endovascular repair is reserved for complicated dissection (rupture, malperfusion, expanding false lumen). Surgical repair has higher mortality in acute uncomplicated dissection.", "diagram": null}, {"id": 168, "specialty": "cardiology", "tag": "medical_science_cardiology_metabolic", "question": "A 48-year-old woman with obesity (BMI 34), hypertension, and prediabetes (HbA1c 42 mmol/mol) on amlodipine presents with dyspnea and ankle edema. LVEF 48% (borderline reduced). Fasting glucose 6.8 mmol/L, triglycerides 2.1 mmol/L, HDL-C 0.9 mmol/L. Troponin negative, NT-proBNP 480 pg/mL.\n\nWhich mechanism best explains her cardiac phenotype?", "options": {"A": "Diastolic dysfunction from insulin resistance and myocardial stiffness", "B": "Acute coronary syndrome", "C": "Restrictive cardiomyopathy", "D": "Thyroid dysfunction", "E": "Pericardiocentesis under fluoroscopic guidance"}, "answer": "A", "explanation": "Obesity and insulin resistance cause diastolic dysfunction through increased myocardial fibrosis, inflammation, and altered calcium handling. HbA1c in prediabetic range and elevated triglycerides with low HDL indicate metabolic syndrome. LVEF 48% and elevated
